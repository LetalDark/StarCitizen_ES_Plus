item_DescFlair_Model_Carrack_toy_b_1H=This highly detailed miniature celebrates the Carrack being named Best in Show at the 2952 Intergalactic Aerospace Expo. Takuetsu worked with Anvil Aerospace to get the dimensions and details precisely right so the handheld version of this beloved exploration ship can join you on adventures across the empire.  
item_DescHammer_Propulsion_HMX_4_3,P=Hammer Propulsion HMX 4.3 Thruster
item_DescHammer_Propulsion_Twin_HM_4_3=The luxury version of the HM4.3, Hammer Propulsion's HMX4.3 engine system features customized racing parts from some of the league's top engineers to help weather corrosion and general part decay.
item_DescRSI_Constellation_Aquila_shop=Manufacturer: RSI\nFocus: Expedition\n\nExplore any distant horizons! The Constellation Aquila features a redesigned cockpit for maximum visibility, advanced sensors and an onboard Ursa rover for planetary exploration. Let’s see what’s out there!
; FORCE
item_Desc_BASL_combat_light_helmet_01_01_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -31 / 61 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n\nThe unique open-faced design makes the Advocacy Interceptor helmet a lightweight and liberating option for operating in atmosphere. It features precisely layered plating to protect the head from a variety of combat and environmental hazards and an impact resistant, anti-glare visor over the eyes. Visor is AR crosshair compatible.
; FORCE
item_Desc_BASL_undersuit_01_01_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nFeaturing a deceptively simple design, the Advocacy Interceptor undersuit is jet black with reinforced grey protective padding on the arms and legs. Basilisk's renowned craftsmanship make this flight suit durable and supremely comfortable, leaving no mystery as to why it's widely used by the Advocacy.
; FORCE
item_Desc_CDS_Undersuit_Armor_02_Shared=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nThe FBL-8u is the first CDS undersuit to utilize the manufacturers new orb-weave technology that produces an impressively light yet strong material that can withstand the rigors of space travel. Originally developed to pair perfectly with CDS's FBL-8a light armor, it remains compatible with other armor sets.
; FORCE
item_Desc_CDS_Undersuit_Armor_Shared=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nThis comprehensive Tactical Combat Suit provides a complete sealed suit against vacuum, free range of motion, and interfaces seamlessly with compatible armor systems.
; FORCE
item_Desc_CDS_undersuit_01_03_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nThis comprehensive Tactical Combat Suit provides a complete sealed suit against vacuum, free range of motion, and interfaces seamlessly with compatible armor systems. The Lifeforce edition was designed with first responders in mind with a highly visible white, red, and grey color scheme.
; FORCE
item_Desc_COMP_WLOP_S02_Baas=Item Type: Computer\nManufacturer: WillsOp\nSize: 2\nGrade: C\nClass: Civilian\n\nThe Baas from WillsOp gives you superior performance to deliver one of the fastest and comprehensive computational experiences.
; FORCE
item_Desc_Slaver_Undersuit_Armor_Shared=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nKastak Arms' Stoneskin series of combat undersuits are built upon CDS' famous TCS-4 system based on extensive feedback from the operators who rely on this technology in the field. Offering a myriad of options for armor and EVA capabilities, the Stoneskin is set to rival CDS as a rugged and reliable undersuit.
; FORCE
item_Desc_basl_combat_light_flightsuit_02_01_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nFeaturing a deceptively simple design, the Ace Interceptor flight suit is jet black with reinforced grey protective padding on the arms and legs. Basilisk's renowned craftsmanship make this flight suit durable and supremely comfortable, leaving no mystery as to why it's widely used by top pilots across the empire.
; FORCE
item_Desc_basl_combat_light_helmet_02_01_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -35 / 65 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n\nThe unique open-faced design makes the Ace Interceptor helmet a lightweight and liberating option for operating in atmosphere. It features precisely layered plating to protect the head from a variety of combat and environmental hazards and an impact resistant, anti-glare visor over the eyes. Visor is AR crosshair compatible.
; FORCE
item_Desc_cds_undersuit_01_crus01_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nThis comprehensive Tactical Combat Suit provides a complete sealed suit against vacuum, free range of motion, and interfaces seamlessly with compatible armor systems. The Crusader Edition was made specifically for the company's security services.
; FORCE
item_Desc_cds_undersuit_armor_01_02_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nUsing materials made with orb-weave technology, CDS has created a lightweight, durable undersuit that has been designed to meet the needs of on-the-ground combatants. It was made to match the limited-edition GCD-Army medium armor, but is compatible with a wide range of other sets.
; FORCE
item_Desc_cds_undersuit_helmet_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nThe A23 has been one of CDS' mainstay helmet systems for years. Built out of impact-resistant composite technology and a hardened laminate faceplate, the A23 is perfect for hazardous environment and basic EVA operations. Visor is AR crosshair compatible.
; FORCE
item_Desc_clda_undersuit_02=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nBuilt for adventure but comfortable enough for everyday, the Markanda undersuit has become beloved by explorers. A unique patchwork design creates a flexible yet resilient undersuit, while an odor resistant SureSoft inner lining will keep you from wanting to take it off. This particular undersuit has been repaired for extended use.
; FORCE
item_Desc_clda_undersuit_02_02_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nBuilt for adventure but comfortable enough for everyday, the Markanda undersuit has become beloved by explorers. A unique patchwork design creates a flexible yet resilient undersuit, while an odor resistant SureSoft inner lining will keep you from wanting to take it off. This edition features the colors and logo of the now defunct Pyrotechnic Amalgamated.
; FORCE
item_Desc_gys_undersuit_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nConfidently venture into the unknown with the Deep-Space undersuit. Smartly designed with several overlapping sections to guarantee the suit's integrity, Gyson has created an affordable and fashionable undersuit that helps make space travel more accessible to all.
; FORCE
item_Desc_hdtc_undersuit_01_01_01=Item Type: Undersuit\nDamage Reduction: 10%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nThe Lamont looks so good you won't want to wear armor over it. Seamlessly blending lightweight plating with durable synthetic weaves, the Lamont will be as comfortable in the cockpit as it is stylish in the streets. Embrace personal protection gear suitable for both work and play, and gain the Hardin Tactical advantage.
; FORCE
item_Desc_ksar_undersuit_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nThis baseline undersuit from Kastak Arms offers complete protection seal from the elements and compatibility with multiple armor types.
; FORCE
item_Desc_mrai_flightsuit_01_01_01=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nMirai’s Racing Flight Suit uses synthetic fabrics sourced from the Xi’an to create a comfortable flight suit durable enough to endure the stresses of high-velocity racing. Taking inspiration from traditional Saisei culture and aesthetics, the stark red stripe across the body of the flight suit results in a striking but elegant design.
; FORCE
item_Desc_mrai_flightsuit_01_03_01=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nEmbody luxury, style, and speed by stepping into the flight suit worn by the Origin racing team. This crisp white flight suit features blue and grey highlight and the Origin logo in several prominent places. 
; FORCE
item_Desc_mrai_flightsuit_01_04_01=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\n\nBold neon yellow and vivid blue combine to make the official Murray Cup racing flight suit stand out from the crowd. Designed to the same standards as the flight suits worn by professional racers, it also features logos from official sponsors of the Murray Cup race.
; FORCE
item_Desc_mrai_flightsuit_01_05_01=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nThe Star Kitten racing flight suit embraces the iconic look of the cartoon character. Worn by Team Takahashi racers, the flight suit is primarily pink with teal highlights and larges images of Star Kitten on the front and back.
; FORCE
item_Desc_mrai_flightsuit_02_01_01=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nNeed a bit of luck to help you cross the finish line? This Fortuna Racing Flight Suit in green with shimmering accents may be just the thing to turn your fortune around. 
; FORCE
item_Desc_mrai_flightsuit_helmet_01_01_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nMirai’s Racing helmets uses advanced Xi’an materials to create a comfortable, lightweight helmet durable enough to endure the stresses of high-velocity racing. Taking inspiration from traditional Saisei culture and aesthetics, the stark red highlight and bold Mirai branding results in a striking but elegant design.
; FORCE
item_Desc_mrai_flightsuit_helmet_01_03_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nPlunge headlong into extreme speed in comfort and style with the Origin racing helmet. Primarily white with black and blue highlights, the helmet features a wide visor for unobstructed views as you speed by.
; FORCE
item_Desc_mrai_flightsuit_helmet_01_04_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nThe Murray Cup racing helmet was made to match the flight suit of the same name. Neon yellow, blue, and packed full of logos from official race sponsors, the helmet is both lightweight and supremely comfortable.
; FORCE
item_Desc_mrai_flightsuit_helmet_01_05_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nThe famous Star Kitten racing helmet worn by Team Takahashi racers can now be yours. It's vibrant pink with Star Kitten iconography on the front and back, plus playful teal whiskers across the faceplate.
; FORCE
item_Desc_mrai_flightsuit_helmet_01_06_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nNeed a bit of luck to help you cross the finish line? This Fortuna Racing Helmet in shimmering green may be just the thing to turn your fortune around. 
; FORCE
item_Desc_nvs_pilot_flightsuit_01=Item Type: Armored Flight Suit\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\nG-Force Tolerance: +97.5%\nCarrying Capacity: 8.0 µSCU\n\nInspired by the armored flight suit worn by UEE Navy pilots, the OMNI-AFS-Sapphire has been battle tested and refined for centuries to become the ultimate wear for any pilot. Its sturdy yet comfortable construction can not only withstand hostile environments, but comes with integrated arm, core, and leg armor for combat encounters. The only way a pilot can get closer to the real thing is by enlisting.
; FORCE
item_Desc_nvs_pilot_flightsuit_helmet_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -35 / 65 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n\nSimilar to the helmet worn by UEE Navy pilots, the OMNI-AFS-Sapphire helmet delivers excellent protection and visibility. Multilayered plating protects against impacts while its wide faceplate ensures clear, unobstructed views whether in the cockpit or on foot.
; FORCE
item_Desc_nvy_flightsuit_01_01_01=Item Type: Flight Suit\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +97.5%\n\nInspired by the original flight suits worn by Earth's Air Force, this replica stays true to the historical design while incorporating modern comforts.\n\nThe Aviator edition is primarily green-beige with light green accents.
; FORCE
item_Desc_nvy_flightsuit_01_02_01=Item Type: Flight Suit\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +97.5%\n\nInspired by the original flight suits worn by Earth's Air Force, this replica stays true to the historical design while incorporating modern comforts.\n\nThe Bombardier edition is primarily a stone color with dark brown accents.
; FORCE
item_Desc_nvy_flightsuit_helmet_01_01_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nInspired by the original flight suits worn by Earth's Air Force, this replica stays true to the historical design while incorporating modern comforts. Featuring a period appropriate, tinted half-visor, this helmet reproduction is not airtight.\n\nThe Aviator edition is primarily green-beige with light green accents.
; FORCE
item_Desc_nvy_flightsuit_helmet_01_02_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nInspired by the original flight suits worn by Earth's Air Force, this replica stays true to the historical design while incorporating modern comforts. Featuring a period appropriate, tinted half-visor, this helmet reproduction is not airtight.\n\nThe Bombardier edition is primarily a stone color with dark brown accents.
; FORCE
item_Desc_nvy_pilot_flightsuit=Item Type: Flight Suit\nDamage Reduction: 10%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +97.5%\nCarrying Capacity: 8.0 µSCU\n\nThe Navy has spent centuries refining the flight suits that their combat pilots wear. The OMNI-CFS Diamond is the culmination of this long and battle-tested military. The Omni features reinforced construction to withstand a variety of hostile environments and integrates flawlessly with appropriately classic armor systems.
; FORCE
item_Desc_nvy_pilot_flightsuit_helmet_01_Shared=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nThe AVS-E helmet's carbon fiber shell offers superb impact and penetration protection, an uninterrupted field of view and excellent stability making it ideal for all kinds of operations in the field.
; FORCE
item_Desc_orig_armor_medium_helmet_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -55 / 85 °C\nRadiation Protection: 26400 REM\nRadiation Scrub Rate: 145.8 REM/s\n\nInspired by the sleek stylings of the 100 series, the Giocoso is a helmet worthy of Origin Jumpworks. It features a wide face shield to provide excellent peripheral vision and a special internal air flow system to dissipate heat and humidity. In a nod to the 100 series, the back of the helmet slyly integrates the iconic shape language of the ship's tail into the form.
; FORCE
item_Desc_orig_flightsuit_01_01_01=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nEmbody luxury, style, and speed by stepping into this official flight suit worn by the Origin racing team. This gray and yellow flight suit features the Origin and 350r logo in several prominent places. 
; FORCE
item_Desc_orig_flightsuit_helmet_01_01_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nPlunge headlong into extreme speed in comfort and style with the Origin racing helmet. This gray and yellow helmet sports the Origin logo and features a wide visor for unobstructed views as you speed by.
; FORCE
