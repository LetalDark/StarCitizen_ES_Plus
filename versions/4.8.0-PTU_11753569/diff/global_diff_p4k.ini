item_Desc_rsi_explorer_undersuit_01_iae2023_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nWhether you’re discovering bold new frontiers or simply stretching your legs after a long spaceflight, Robert Space Industries’ Venture Explorer Suit takes vacuum-safe wear to the next level with its incorporation of top-of-class safety features seamlessly blended with phenomenal freedom of movement. This special IAE 2953 edition has a black and grey color palette with copper accents.
; FORCE
item_Desc_rsi_explorer_undersuit_01_ruso=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nWhether you’re discovering bold new frontiers or simply stretching your legs after a long spaceflight, Robert Space Industries’ Venture Explorer Suit takes vacuum-safe wear to the next level with its incorporation of top-of-class safety features seamlessly blended with phenomenal freedom of movement. The Rust Society edition adds a red and tan color scheme so you look good while working hard.
; FORCE
item_Desc_rsi_odyssey_undersuit_01_Shared=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nThe latest generation of RSI's classic Odyssey undersuit features a new rugged design capable of withstanding the harshest of conditions in space or planetside. Built using the latest microweave technology, the Odyssey II undersuit provides hours of comfort in locations that are anything but comfortable.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_01_01_coramor=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nContinuing RSI's legacy of rugged and reliable helmets, the Odyssey II streamlines the original design into a lighter frame without sacrificing durability. This omni-purpose helmet was extensively field-tested in a variety of conditions and environments to keep you safe every time you suit up. This special Lovestruck edition features a stylish metallic pink and black color scheme inspired by the colors of the Coramor festival.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_01_01_opaque=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nContinuing RSI's legacy of rugged and reliable helmets, the Odyssey II streamlines the original design into a lighter frame without sacrificing durability. This omni-purpose helmet was extensively field-tested in a variety of conditions and environments to keep you safe every time you suit up. This special Obsidian variant features a darkened visor for anyone looking to maintain their anonymity.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_01_02_coramor=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nContinuing RSI's legacy of rugged and reliable helmets, the Odyssey II streamlines the original design into a lighter frame without sacrificing durability. This omni-purpose helmet was extensively field-tested in a variety of conditions and environments to keep you safe every time you suit up. This special Envy edition inspired by the Coramor festival features a vibrant pink and purple color scheme for the most enthusiastic of lovers.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_01_03_coramor=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nContinuing RSI's legacy of rugged and reliable helmets, the Odyssey II streamlines the original design into a lighter frame without sacrificing durability. This omni-purpose helmet was extensively field-tested in a variety of conditions and environments to keep you safe every time you suit up. This special Starcrossed edition is modeled after the armor worn by Yuri Ilyin in the famous 25th century vid, Coramor, which inspired the eponymous lovers' festival.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_01_Shared=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nContinuing RSI's legacy of rugged and reliable helmets, the Odyssey II streamlines the original design into a lighter frame without sacrificing durability. This omni-purpose helmet was extensively field-tested in a variety of conditions and environments to keep you safe every time you suit up.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_02_01_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nWhen flying through the dangerous reaches of space, it's common for brave pilots to routinely face down death as part of their every day. Now with the Azrael helmet from CC's Conversions you can look the part with the grim visage of a skull peering out from beneath the visor of this otherwise normal looking helmet.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_02_02_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nWhen flying through the dangerous reaches of space, it's common for brave pilots to routinely face down death as part of their every day. Now with the Azrael helmet from CC's Conversions you can look the part with the grim visage of a skull peering out from beneath the visor of this otherwise normal looking helmet.\n\nThe Ruby version casts the skull in a bold red light.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_02_03_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nWhen flying through the dangerous reaches of space, it's common for brave pilots to routinely face down death as part of their every day. Now with the Azrael helmet from CC's Conversions you can look the part with the grim visage of a skull peering out from beneath the visor of this otherwise normal looking helmet.\n\nThe Sapphire version casts the skull in a pixelated blue light.
; FORCE
item_Desc_rsi_pilot_flightsuit_helmet_01=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nRSI's Odyssey helmet is so light and unobtrusive, you'll almost forget you're wearing it. The durable impact-resistant carbon fiber construction with shock-absorbing foam inserts and a single piece molded laminate visor that provides maximum field of view horizontally and vertically.
; FORCE
item_Desc_slaver_undersuit_armor_01_01_01=Item Type: Undersuit\nDamage Reduction: 10%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nKastak Arms' Stoneskin is a combat undersuit that are built upon CDS' famous TCS-4 system based on extensive feedback from the operators who rely on this technology in the field. Offering a myriad of options for armor and EVA capabilities, the Stoneskin is set to rival CDS as a rugged and reliable undersuit.
; FORCE
item_Desc_srvl_undersuit_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nFeaturing the same relatively reliable construction as the Why Not helmet, the Second Life takes some of those tattered old undersuits and gives them new life.
; FORCE
item_Desc_srvl_undersuit_02_01_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nRoughly sewn together from a variety of ransacked materials, the Wastelander undersuit will just about do the job.
; FORCE
item_Desc_srvl_undersuit_02_01_02=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\n\nRoughly sewn together from a variety of ransacked materials, the Wastelander undersuit will just about do the job. This version features a bold rust color.
; FORCE
item_Desc_srvl_undersuit_helmet_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nJust because a helmet's broken doesn't mean it's useless. This scavenged undersuit helmet should provide suitable protection against vacuum. If you like taking chances, take a chance on this. Why not? 
; FORCE
item_Desc_syfb_flightsuit_helmet_01_01_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nAdapted by Syang Fabrication to meet the unique requirements of the Human physique, the Xanthule helmet faithfully recreates the bold silhouette preferred by Xi'an. When paired with the Xanthule suit, it creates a distinct and eye-catching look.
; FORCE
