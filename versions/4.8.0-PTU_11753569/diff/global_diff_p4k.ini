item_Desc_rsi_explorer_undersuit_01_03_coramor=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nWhether you’re discovering bold new frontiers or simply stretching your legs after a long spaceflight, Robert Space Industries’ Venture Explorer Suit takes vacuum-safe wear to the next level with its incorporation of top-of-class safety features seamlessly blended with phenomenal freedom of movement. This special Starcrossed edition is modeled after the armor worn by Yuri Ilyin in the famous 25th century vid, Coramor, which inspired the eponymous lovers' festival.
