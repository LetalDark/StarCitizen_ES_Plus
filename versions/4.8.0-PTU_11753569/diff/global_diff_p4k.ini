item_Desc_rsi_deckcrew_undersuit_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nRSI's Beacon undersuit is a general use utility designed to provide total protection against environments and vacuum. Built out of a durable but flexible polymers, the Beacon provides a wide freedom of motion for a variety of body types.
; FORCE
item_Desc_rsi_deckcrew_undersuit_01_ruso=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nRSI's Beacon undersuit is a general use utility designed to provide total protection against environments and vacuum. Built out of a durable but flexible polymers, the Beacon provides a wide freedom of motion for a variety of body types. The Rust Society edition celebrates blue-collar workers with an exclusive red and tan coloration that hides dirt and wear and tear well.  
; FORCE
item_Desc_rsi_explorer_undersuit_01=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nWhether you’re discovering bold new frontiers or simply stretching your legs after a long spaceflight, Robert Space Industries’ Venture Explorer Suit takes vacuum-safe wear to the next level with its incorporation of top-of-class safety features seamlessly blended with phenomenal freedom of movement.
; FORCE
item_Desc_rsi_explorer_undersuit_01_01_coramor=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nWhether you’re discovering bold new frontiers or simply stretching your legs after a long spaceflight, Robert Space Industries’ Venture Explorer Suit takes vacuum-safe wear to the next level with its incorporation of top-of-class safety features seamlessly blended with phenomenal freedom of movement. This special Lovestruck edition features a stylish metallic pink and black color scheme inspired by the colors of the Coramor festival.
; FORCE
