Vaughn_EliminateSpecific_FPS_storm_H_desc_003=A previous target I had thought to have been eliminated seems to have resurfaced as a hired merc over at <EM4>~mission(Location)</EM4> working for ASD. While I am supremely disappointed with the contractor who claimed to have eliminated <EM4>~mission(TargetName|Last)</EM4>, I'm going to re-open the original contract and give it to you to finish it.\n\nThey are currently stationed at an operational facility, so they will not be alone. Use your discretion in executing the contract, but know that <EM4>~mission(TargetName)</EM4> is the priority.\n\nI trust you'll do better than my former subcontractor,\n\nVaughn
; FORCE
Vaughn_EliminateSpecific_FPS_storm_H_desc_004=Have a difficult contract for a discerning operative. Target's name is <EM4>~mission(TargetName)</EM4>. They're currently working as hired security for Associated Science & Development and posted at <EM4>~mission(Location)</EM4>, a far cry from their previous career as a syndicate enforcer and bagman.\n\nI'll need you to get in and take out <EM4>~mission(TargetName|Last)</EM4> which is easier said then done as they will undoubtedly be entrenched with other corporate security forces, but I believe you'll figure it out.\n\nAll the best,\n\nVaughn
; FORCE
Vehicle_DescGRIN_UTV=Manufacturer: Greycat Industrial\nFocus: Passenger\n\nThe Greycat UTV is a durable, utility buggy designed to transport light cargo loads across rugged terrain. Whether you’re coordinating freight storage or making a supply run to a neighboring outpost, the straightforward design of the UTV allows operators to focus on tackling the job at hand.
; FORCE
