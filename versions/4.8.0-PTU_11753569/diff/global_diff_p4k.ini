HeadHunters_RecoverCargo_Hard_Description=Looking for a hauler to pick up some cargo for me. Thing is, there’s a catch.\n\nThe cargo’s in the back of an abandoned ship located at <EM4>~mission(Location|Address)</EM4>. As you may have figured, this ain’t our cargo, but it sure as hell doesn’t deserve to go to anyone else. I’ll be damned if those CFP assholes get their hands on it before we do.\n\nBe lucky as hell if we were the first to know about this, but I’d wager there’s gonna be more ships swarming around there than flies on a kopion carcass. If you got some pals you can trust, bring them along and ghost those assholes. And don’t forget your <EM4>heavy-duty tractor beam</EM4> of course.\n\nYou manage to get that cargo and bring it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>, I can get you a nice cut of the sale.\n\nStows out.
; FORCE
Journal_General_Harvestables_Content=This guide will help you identify what's useful, what's edible, and what's deadly.\n\n*STANTON SYSTEM*\nIt may seem completely corporate, but the Stanton system is rich with resources for the enterprising forager.\n\nDEGNOUS ROOT\nA type of macroalgae that has acclimated to much of the Stanton system, the degnous root is originally from Terra III, where it grows in abundance along shallow coastlines. It was introduced to some planets and moons of Stanton when they were first being terraformed as a part of their artificially constructed ecosystems. Powdered degnous root is a popular additive to multiple medical and health products thanks to its unique blend of amino acids.\nWhere to Find: Grasslands of Hurston (Stanton I)\n\nGOLDEN MEDMON\nFirst cultivated on Jalan, the maru ebony tree is most notable for the fruit that it produces, the curiously-shaped golden medmon. When they are harvested, golden medmon are extremely firm and astringent, with tough orange skin. They only become palatable if allowed to soften through ethylene ripening, after which they take on a flavor similar to caramel and develop a creamy consistency. At this point, the yellow-orange skin becomes wrinkled and dark, which sometimes leads those unfamiliar with the fruit to mistakenly dismiss it as rotten.\nWhere to Find: Grasslands of Hurston (Stanton I), Tundras of microTech (Stanton IV)\n\nHEART OF THE WOODS\nThis reddish-brown, mushroom-like fungus can be found in cold climates where it grows on trees and decaying logs. Prized by epicureans for its complex taste, heart of the woods has yet to be commercially cultivated and can thus fetch a high price in the right markets. It should be noted that the mushroom is mildly toxic until it is fully cooked, so it should not be eaten raw.\nWhere to Find: Forests of microTech (Stanton IV)\n\nPITAMBU\nA leafy plant that was first discovered on Reisse, the pitambu bears a fruit of the same name that has a mild, nutty taste. While it is cultivated as a commercial crop, it is often found in the wild thanks to its ability to survive in a wide variety of climates. The fruit is crisp and watery underneath its skin and is filled with tiny seeds that can be consumed alongside the flesh. The blossom of the pitambu can be cooked and eaten as well, or it can be steeped in hot water to create a tea that can help ease digestive distress.\nWhere to Find: Grasslands of Hurston (Stanton I), Tundras of microTech (Stanton IV)\n\nPROTA\nResilient and prolific, prota is a type of slime mold able to grow in extreme environments. In general, it prefers acid-rich conditions and has been known to thrive in areas affected by industrial pollution. When it is ready to reproduce, the prota creates spore pods which sprout on short stalks from the surface of the mold. These pods have innate adhesive properties, which has led to their use as an ingredient in multiple types of commercial glue.\nWhere to Find: Grasslands of Hurston (Stanton I)\n\nREVENANT POD\nThe seed pods of the revenant tree are typically collected because the pollen is processed and turned into the drug altruciatoxin which is illegal in many jurisdictions. A variety of the altrucia tree from Terra III, the revenant tree arose from the harsh, windy climate of Hyperion, where it was introduced by geoengineers in an attempt to create shelterbelts against dust. It is important not to consume the seeds or the pollen found in the pods, as they can induce an allergic reaction and can cause unwelcome sensory and muscular effects. Transport of the pods may be restricted in some areas.\nWhere to Find: Deserts of Hurston (Stanton I)\n\nSTONE BUG SHELL\nThe stone bug isn't actually a bug – it's a crustacean that lives on land and inhabits dry and rocky areas. On average, it is about 45 cm long and can be identified by its multi-jointed legs and tough outer shell. When threatened, it curls into a tight ball, using its durable carapace to keep its soft insides safe from the jaws of predators. Processed stone bug shells are used as an ingredient in certain types of armor composites.\nWhere to Find: Deserts of Daymar (Stanton 2b)\n\nSUNSET BERRIES\nThe sunset berry shrub can be found growing wild in perpetually cold environments. It can be identified by its lovely red berries, which grow year-round in clusters on the plant's woody branches. Although they may look enticing, if consumed, these very bitter, tannic berries can cause vomiting, extreme cramping, and muscle spasms. Multiple pharmaceutical companies are conducting research studies on the potential medical applications of the berry, and have been known to purchase them from individual collectors.\nWhere to Find: Tundras of microTech (Stanton IV)\n\n\n*PYRO SYSTEM*\nBetween the rampant outlaws and harsh environment, the Pyro system can be difficult to navigate but may yet still be rewarding for the resourceful forager willing to take on a bit of risk.\n\nAMIANT POD\nHarvested from the amiant tree, the fibrous husks of these seed pods are used to make heat resistant textiles. Once removed, the husks must first be soaked in a chemical solution before the fibers can be separated out.\nWhere to Find: Bloom (Pyro III)\n\nDECARI POD\nThe decari is a type of fungus that produces a large spore pod. It anchors itself to rocks and soil using long, filament-like rhizoids that are capable of regrowing the decari's main body if it is destroyed. The pods can be collected and used for various scientific pursuits or even as a food source. However, the decari pod cannot be consumed directly. It must have its thick outer layer and spiny filaments removed, and the fibrous hymenium cooked for a long time before it can be safely digested by Humans.\nWhere to Find: Pyro I\n\nFLAREWEED STALK\nFlareweed is a hearty plant that can survive in harsh environments. With a natural ability to filter out harmful elements from its water supply, flareweed stalks are frequently harvested to be used in filtration systems.\nWhere to Find: Bloom (Pyro III)\n\nFOTIA SEEDPOD\nThe fotia scrub relies on solar flares for its reproduction. Rather than having traditional stamen and pollen, it allows radiation from flares to mutate its genetics before releasing its seedpod. Some enterprising individuals seek out and collect the seedpods because of their natural radiological properties that can be utilized in various ways.\nWhere to Find: Pyro I\n\nPINGALA SEEDS\nEvery aspect of the pingala follows the golden ratio resulting in a visually arresting plant. This includes its seeds which are highly sought after by plant collectors. Especially since attempts to cultivate the pingala in greenhouse environments has proven extremely difficult.\nWhere to Find: Monox (Pyro II)\n\nWUOTAN SEED\nThe wuotan is a woody plant indigenous to the Pyro system. Able to thrive in stormy environments, it has evolved to withstand gale-force winds and weather lightning strikes. It produces a seed that becomes bioluminescent when ripe to draw attention and encourage their spread. They are often collected to utilize as a natural light source.\nWhere to Find: Pyro I\n\n\n*NYX SYSTEM*\n\nMINER’S HORN\nFirst discovered in the sewer lines at the QV Mining Station built into the Delamar asteroid in Nyx, this quick growing fungus has become a useful manufacturing component for the settlers of Levski thanks to the strong mycelium fibers that can be dried and used in a variety of ways.\nWhere to Find: Levski\n\n\n*MULTIPLE SYSTEMS*\n\nAMIOSHI PLAGUE\nNot nearly as ominous as its name, the amioshi plague is an invasive lichen that grows in the cracks of rocks. While the core of the lichen burrows out of sight to try and absorb as much moisture as it can find, the part near the surface sprouts hooded scales that eject spores to spread to other rocks. Its relatively short maturation period is the origin of its name.\nWhere to Find: Caves on all of Pyro’s Planets and Moons, Caves on Hurston (Stanton I) and its Moons, Caves on Cellin (Stanton 2a), Caves on Daymar (Stanton 2b), Caves on Wala (Stanton 3b), Caves on microTech (Stanton IV), Caves on Euterpe (Stanton 4c)\n\nBLUEMOON FUNGUS\nPreferring to spore in the depths of dark caves, the fruiting mushrooms of the bluemoon fungus are often collected for manufacturing a highly-valued petroleum-free lubricant used across a wide-variety of industries.\nWhere to Find: Caves on all of Pyro’s Planets and Moons, Caves on Hurston (Stanton I) and its Moons, Caves on Cellin (Stanton 2a), Caves on Daymar (Stanton 2b), Caves on Wala (Stanton 3b), Caves on microTech (Stanton IV), Caves on Euterpe (Stanton 4c)\n\nRANTA DUNG\nA dry cube-shaped dung that comes from the ranta, a large isopod-like crustacean. It has recently been discovered that the dung contains a unique bacterial biome that helps the ranta process and digest minerals and some researchers are hopeful its study will lead to industrial or medical innovations.\nWhere to Find: Caves on all of Pyro’s Planets and Moons, Caves on Hurston (Stanton I) and its Moons, Caves on Cellin (Stanton 2a), Caves on Daymar (Stanton 2b), Caves on Wala (Stanton 3b), Caves on microTech (Stanton IV), Caves on Euterpe (Stanton 4c)
; FORCE
Journal_General_Mining_Compendium_Content=To promote the entrepreneurial spirit of the modern miner, the United Resource Workers have put together a handy guide listing the most common locations to find minerals, ores, and gemstones across the ‘verse.\n\nAgricium - ARC-L3, Cellin, CRU-L5, Daymar, MIC-L4, Pyro Asteroid Clusters, Terminus, Vuur, Yela\n\nAluminium - Aaron Halo, Aberdeen, ARC-L1, ARC-L2, Arial, CRU-L3, Glaciem Ring, HUR-L1, HUR-L2, HUR-L4, HUR-L5, Ita, Keeger Belt, Magda, MIC-L1, MIC-L2, MIC-L5, Pyro Asteroid Clusters\n\nAphorite - All Moons/Planets/Caves\n\nAslarite - Aaron Halo, ARC-L5, CRU-L4, Fuego, Ita, Magda, MIC-L4, Pyro Asteroid Clusters, Vuur\n\nBeradon - Bloom, Pyro I\n\nBeryl - Aaron Halo, ARC-L3, CRU-L5, MIC-L4, Pyro Asteroid Clusters, Wala\n\nBexalite - CRU-L1, CRU-L2, Fairo, Fuego, Glaciem Ring, HUR-L3, Keeger Belt, Pyro Asteroid Clusters, Vuur\n\nBorase - Adir, Bloom, Fuego, HUR-L1, HUR-L4, HUR-L5, Pyro Asteroid Clusters, Pyro IV\n\nCaranite - Aberdeen, Daymar\n\nCopper - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Clio, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Euterpe, Lyria, MIC-L3, MIC-L4, Pyro Asteroid Clusters, Pyro I, Pyro IV, Terminus, Wala, Yela Ring\n\nCorundum - Aberdeen, ARC-L1, ARC-L2, ARC-L4, Arial, CRU-L3, Hurston, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, MIC-L2, MIC-L5, Pyro Asteroid Clusters\n\nDolivine - All Moons/Planets/Caves\n\nFeynmaline - Pyro IV\n\nGlacosite - Monox\n\nGold - ARC-L5, CRU-L4, Fairo, Ignis, MIC-L3, Pyro Asteroid Clusters, Terminus, Vatra\n\nHadanite - All Moons/Planets/Caves\n\nHephaestanite - Arial, ARC-L1, ARC-L2, ARC-L4, Calliope, CRU-L3, Fuego, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, microTech, MIC-L2, MIC-L5, Monox, Pyro Asteroid Clusters, Vuur\n\nIce - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Calliope, Clio, Euterpe, Glaciem Ring, HUR-L3, Keeger Belt, microTech, MIC-L3, MIC-L4, Pyro Asteroid Clusters, Yela Ring\n\nIron - Aaron Halo, Adir, Akiro Cluster, ARC-L3, ARC-L5, Bloom, Calliope, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Fairo, Fuego, Glaciem Ring, HUR-L3, Keeger Belt, Lyria, Magda, microTech, MIC-L3, MIC-L4, Monox, Pyro Asteroid Clusters, Pyro I, Pyro IV, Vatra, Vuur, Wala, Yela Ring\n\nJanalite - Daymar, Hurston, Ita, Magda Sand Caves, Wala\n\nLaranite - HUR-L1, HUR-L4, HUR-L5, Lyria, Pyro IV, Wala\n\nLindinium - Glaciem Ring, Keeger Belt\n\nOuratite - Aberdeen, Arial, Hurston, Yela Ring\n\nQuantainium - Found in All Stanton Deposits (Rare)\n\nQuartz - Bloom, Cellin, Daymar, Pyro Asteroid Clusters, Yela\n\nRiccite - Adir, Akiro Cluster, Bloom, Ignis, Pyro Asteroid Clusters, Terminus, Vatra\n\nSadaryx - QV Breaker Stations (Nyx)\n\nSavrilium - Glaciem Ring, Keeger Belt, QV Breaker Stations (Nyx)\n\nSilicon - Aaron Halo, Akiro Cluster, Cellin, Daymar, Fairo, Ignis, Pyro Asteroid Clusters, Vatra, Yela\n\nStileron - All Pyro Planets, Akiro Cluster, Pyro Asteroid Clusters\n\nTaranite - ARC-L1, ARC-L2, ARC-L4, Cellin, Clio, Euterpe, HUR-L2, Pyro Asteroid Clusters, Yela\n\nTin - Arial, Hurston, Ignis, Ita, Monox, Pyro Asteroid Clusters, Pyro I\n\nTitanium - Aaron Halo, Aberdeen, CRU-L1, CRU-L2, HUR-L3, Magda, Pyro Asteroid Clusters, Terminus, Yela Ring\n\nTorite - Akiro Cluster, CRU-L3, Glaciem Ring, Keeger Belt, MIC-L1, MIC-L2, MIC-L5, Pyro Asteroid Clusters, QV Breaker Stations (Nyx)\n\nTungsten - Adir, ARC-L1, ARC-L2, ARC-L4, Fairo, HUR-L2, Pyro Asteroid Clusters
