item_desc_FLBL_RSI_Scorpius_Handling=Manufacturer: Broad & Rabiee\nType: Flight Blade\n\nUnlock the potential of your RSI Scorpius with the PHB Flight Blade from Broad & Rabiee. By re-allocating forward thrust resources, you can expect your ship to deliver increased precision handling during tight maneuvers.
; FORCE
item_desc_FLBL_RSI_Scorpius_Speed=Manufacturer: Broad & Rabiee\nType: Flight Blade\n\nUnlock the potential of your RSI Scorpius with the TSB Flight Blade from Broad & Rabiee. By re-allocating lateral thrust resources, you can expect your ship to deliver increased top speeds in the straightaway.
; FORCE
item_desc_gys_undersuit_01_01_12=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nConfidently venture into the unknown with the Deep-Space undersuit. Smartly designed with several overlapping sections to guarantee the suit's integrity, Gyson has created an affordable and fashionable undersuit that helps make space travel more accessible to all.\n\nThe Shutdown version features black and gray coloring with dark metal accents.
; FORCE
item_desc_gys_undersuit_01_01_13=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nConfidently venture into the unknown with the Deep-Space undersuit. Smartly designed with several overlapping sections to guarantee the suit's integrity, Gyson has created an affordable and fashionable undersuit that helps make space travel more accessible to all.\n\nThe Bruiser version features dark crimson and midnight blue coloring with polished metal accents.
; FORCE
item_desc_gys_undersuit_01_01_14=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nConfidently venture into the unknown with the Deep-Space undersuit. Smartly designed with several overlapping sections to guarantee the suit's integrity, Gyson has created an affordable and fashionable undersuit that helps make space travel more accessible to all.\n\nThe Brassy version features white coloring with bronze accents.
; FORCE
item_fuelnozzle_GRIN_Fast_Desc=Manufacturer: Greycat Industrial\nItem Type: Fuel Nozzle\nFlow Speed: 1.71 SCU/s\n\nAllowing for a greatly increased overall flow rate, the Norfield fuel nozzle from Greycat prioritizes the fast and efficient transfer of fuel while only sacrificing some pod storage capacity.  \n
; FORCE
item_fuelnozzle_GRIN_Safe_Desc=Manufacturer: Greycat Industrial\nItem Type: Fuel Nozzle\nFlow Speed: 1.04 SCU/s\n\nBy maintaining a higher working pressure, the Harkin fuel nozzle from Greycat not only boasts a secure build, but allows the attached storage to hold additional fuel albeit at a slower overall transfer speed.\n
; FORCE
item_fuelnozzle_MISC_Standard_Desc=Manufacturer: MISC\nItem Type: Fuel Nozzle\nFlow Speed: 1.65 SCU/s\n\nThe nozzle of choice for the acclaimed MISC Starfarer, the RN-7s was designed to be a flexible fuel transfer option suited for a variety of situations.\n
; FORCE
item_fuelpod_MISC_Standard_Desc=Manufacturer: MISC\nItem Type: Fuel Pod\nFlow Modifier: +5%\nCapacity: 10 SCU\n\nThe standard fuel pod of the Starfarer, the CR-60 was designed by MISC to be a well balanced fuel storage option ready to tackle a wide variety of jobs.\n
; FORCE
item_fuelpod_STOR_Fast_Desc=Manufacturer: Stor*All\nItem Type: Fuel Pod\nFlow Modifier: -37%\nCapacity: 16.8 SCU\n\nWhen it comes to balancing your bottom line, time is money. That’s why Stor*All designed the GSX-RF fuel pod to have one of the fastest flow rates on the market. While it does have a slightly reduced capacity, the time saved and modest improvements to the safe flow rate makes this an ideal solution for service ships.\n
; FORCE
item_fuelpod_STOR_Safe_Desc=Manufacturer: Stor*All\nItem Type: Fuel Pod\nFlow Modifier: -37%\nCapacity: 7.35 SCU\n\nBy using a triple reinforced outer plating rated far above industry standards, the GSX-HP fuel pod from Stor*All can handle higher pressures than your typical storage options. This allows you to transport more fuel and improves the safe flow rates of whichever nozzle you use.\n
; FORCE
manufacturer_NameKRIG=Kruger Intergalactic
; FORCE
mg_pacheco_assassin_sync_desc_001=A little while ago I got a not too subtle blackmail threat. We were able to track it down to two operators who go by ~mission(TargetName) and ~mission(TargetName2).\n\nYou're going to send a message about what we do to people who try to take advantage of us.\n\nForm a crew and hunt these bastards down. And because we can't risk them leaking the information they have, you need to kill both of them at the same time. \n\n~Mission(Danger) Make it so no one thinks about blackmailing us again for a long time.\n\n-Twitch
; FORCE
mg_pacheco_assassin_sync_desc_002=My employers want ~mission(TargetName) and ~mission(TargetName2) dead.\n\nMore importantly, they want them dead at the same time. \n\nCoordinate with some hired guns you trust to perform a simultaneous hit.\n\n~Mission(Danger) However it goes down, make it clean and don't let either of them get away. \n\n-Twitch
; FORCE
