item_Desc_syfb_flightsuit_helmet_01_iae2023_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nAdapted by Syang Fabrication to meet the unique requirements of the Human physique, the Xanthule helmet faithfully recreates the bold silhouette preferred by Xi'an. When paired with the Xanthule suit, it creates a distinct and eye-catching look. This special IAE 2953 edition is decorated with a copper and white pattern inspired by Gatac Manufacture's Syulen.
; FORCE
item_Desc_syfb_flightsuit_suit_01_01_01=Item Type: Flight Suit\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +97.5%\nCarrying Capacity: 6.5 µSCU\nBackpacks: Light\n\nPerfected through centuries of innovation, Syang Fabrication's sleek and stylish Xanthule flight suit has been meticulously adapted to the Human physique. The Xanthule suit features breathable lightweight plating made with a carbon-silk weave that provides reliable protection while maintaining the famed House's signature aesthetic.
; FORCE
item_Desc_syfb_flightsuit_suit_01_01_02=Item Type: Flight Suit\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +97.5%\nCarrying Capacity: 6.5 µSCU\nBackpacks: Light\n\nPerfected through centuries of innovation, Syang Fabrication's sleek and stylish Xanthule flight suit has been meticulously adapted to the Human physique. The Xanthule suit features breathable lightweight plating made with a carbon-silk weave that provides reliable protection while maintaining the famed House's signature aesthetic.
; FORCE
item_Desc_syfb_flightsuit_suit_01_01_07=Item Type: Flight Suit\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +97.5%\nCarrying Capacity: 6.5 µSCU\nBackpacks: Light\n\nPerfected through centuries of innovation, Syang Fabrication's sleek and stylish Xanthule flight suit has been meticulously adapted to the Human physique. The Xanthule suit features breathable lightweight plating made with a carbon-silk weave that provides reliable protection while maintaining the famed House's signature aesthetic.
; FORCE
item_Desc_syfb_flightsuit_suit_01_iae2023_01=Item Type: Flight Suit\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +97.5%\nCarrying Capacity: 6.5 µSCU\nBackpacks: Light\n\nPerfected through centuries of innovation, Syang Fabrication's sleek and stylish Xanthule flight suit has been meticulously adapted to the Human physique. The Xanthule suit features breathable lightweight plating made with a carbon-silk weave that provides reliable protection while maintaining the famed House's signature aesthetic. This special IAE 2953 edition is decorated with a copper and white pattern inspired by Gatac Manufacture's Syulen.
; FORCE
item_Desc_uba_prison_undersuit_01=Item Type: Worksuit\nDamage Reduction: 5%\nTemp. Rating: -75 / 75 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nThe Inmate Worksuit is a durable and highly visible worksuit designed to survive harsh conditions often faced by inmates during work release programs. The worksuit integrated reinforced padding for protection with a strong synthetic weave that meets the minimal government standard for thermal insulation while keeping costs low. The sturdy workpack provides ample storage capacity and evenly distributes weight across the wearer's back allowing them to carry more during every shift. It also features secure bottom straps to allow you to determine oxygen tank size on a per inmate basis, minimizing escape risk.
; FORCE
item_Desc_vgl_undersuit_01_01_Shared=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n\nVirgil's ForceFlex is the next generation in undersuit technology. Rated for combat as well as industrial work, you can rest assured that the comboweave will keep you protected in whatever situation you put it through.
; FORCE
item_Desc_vpw_bouncer_jacket_01_01_01=Carrying Capacity: 1K µSCU\n\nThe Vaporwear Creese jacket features an old-Earth collar and tags around the shoulders. Armored shoulder accents and ventilated sleeves allow the jacket to be worn casually or piloting an open canopy vehicle.
; FORCE
item_Desc_vpw_bouncer_jacket_01_02_01=Carrying Capacity: 1K µSCU\n\nThe Vaporwear Creese jacket features an old-Earth collar and tags around the shoulders. Armored shoulder accents and ventilated sleeves provide protection without restricting movement, allowing the jacket to be worn casually or piloting an open canopy vehicle. The special Skullsnap edition is a slick silver with geometric stylings and a screaming skull on the back.
; FORCE
item_Desc_vpw_bouncer_jacket_01_03_01=Carrying Capacity: 1K µSCU\n\nThe Vaporwear Creese jacket features an old-Earth collar and tags around the shoulders. Armored shoulder accents and ventilated sleeves provide protection without restricting movement, allowing the jacket to be worn casually or piloting an open canopy vehicle. The special Toxic Fog edition is black with poison gas green accents and a skull on the front and back.
; FORCE
item_Desc_vpw_bouncer_jacket_01_04_01=Carrying Capacity: 1K µSCU\n\nThe Vaporwear Creese jacket features an old-Earth collar and tags around the shoulders. Armored shoulder accents and ventilated sleeves provide protection without restricting movement, allowing the jacket to be worn casually or piloting an open canopy vehicle. The special Copperhead edition features a snake enwrapping the front, back, and left arm of the jacket.
; FORCE
item_Descvolt_optics_tsco_x8_s3_store01=Manufacturer: VOLT\nType: Telescopic\nAttachment Point: Optic\nMagnification: 8x\nAim Time: +0%\nSize: 3\n\nDesigned for long distance precision shooting, the FarSight is carefully crafted to provide unparalleled fidelity of targets. VOLT's TruePicture lens technology provides high levels of light transmission, ensuring easy target acquisition and daylight illumination so you always get your mark.\n\nThe Golden Blossom version is mostly black, embellished with intricate golden flowers, giving your enemies one final glimpse of life before death.
; FORCE
item_Descvolt_sniper_energy_01_store01=Manufacturer: Verified Offworld Laser Technologies\nItem Type: Sniper Rifle\nClass: Energy (Laser)\n\nBattery Size: 22\nRate of Fire: 60-300 rpm\nEffective Range: 80 m\n\nAttachments: Optics (S3), Underbarrel (S2)\n\nThe Zenith Laser Sniper Rifle from VOLT offers operational flexibility on the battlefield as it can fire lower-energy shots rapidly, or be allowed time to automatically charge to fire a much more powerful energy blast that also generates significantly more noise and heat.\n\nThe Golden Blossom version is mostly black, embellished with intricate golden flowers, giving your enemies one final glimpse of life before death.
; FORCE
