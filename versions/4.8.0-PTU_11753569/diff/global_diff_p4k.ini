Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Desc_001=CONTRACT: Mining Order\nLOCATION: Nyx\n\nDETAILS:\nOne of our prospecting teams recently confirmed that the asteroids which house QV Breaker Stations throughout Nyx's Keeger Belt contain a rare ore type, Sadaryx.\n\nHowever, owing to the difficulty in access these stations and the inherent risks involved, we are seeking external mining crews to handle the extraction.\n\nWe do not have a confirmed location of where the Sadaryx deposits are located within the station, but would recommend starting with the cave sections where minerals naturally form. If you get really lucky, you may even find some crystals in storage that were mined by the old QV work crews.\n\n<EM4>TERMS*:</EM4>\nYour crew will need to gain access to a <EM4>QV Breaker Station</EM4>, collect the required <EM4>Sadaryx ore</EM4>, and deliver it to the freight elevator located at <EM4>~mission(Destination|Address)</EM4>.\n\nThis will require a <EM4>Multi-Tool with a Mining Attachment</EM4> and a basic understanding of hand mining.\n\nOur prospecting teams have reported that these stations may have been infiltrated by outlaws. Caution is advised.\n\n*By accepting this contract you are assuming any and all risks associated with the work outlined herein and in no way can Shubin Interstellar be held accountable for any damages accrued during the duration of the contract.
