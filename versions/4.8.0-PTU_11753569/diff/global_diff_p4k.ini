vehicel_DescANVL_Valkyrie=Manufacturer: Anvil Aerospace \nFocus: Drop Ship\n\nThe Valkyrie ups the ante on troop transport. Designed to carry up to twenty soldiers, as well as vehicles, to the most hostile locations, this conflict-ready mil-spec craft is a formidable force, both offensively and defensively. Built with military and private defense contractors in mind, the Valkyrie is one of the most efficient and effective personnel transports in its class.
; FORCE
vehicl_DescMISC_Hull_B=Manufacturer: MISC\nFocus: Medium Freight\n\nThe MISC Hull B is a rugged option for pilots seeking a dedicated cargo transport. While not as large as some of the other Hull-series models, the Hull B's smaller profile provides greater flexibility and more access options.
; FORCE
vehicle_DescAEGS_Avenger_Stalker=Manufacturer: Aegis Dynamics\nFocus: Interceptor\n\nInitially designed as Aegis’ frontline carrier ship for the military, the Avenger Stalker took a different path, ultimately having a long and storied career as the standard patrol craft of the UEE Advocacy. Utilizing its cargo hold for prisoner transport, the Avenger features a sturdy, reliable hull and the capacity for larger-than-expected engine mounts.
; FORCE
vehicle_DescAEGS_Firebird_Collector_Milt,P=Manufacturer: Aegis Dynamics\nFocus: Stealth Fighter\n \nWhen frontline skirmishes call for a swift and decisive offensive, the Sabre Firebird is the ideal medium fighter for any arsenal. Taking the already battle proven Sabre Raven, Aegis has designed the Firebird variant with an enhanced missile launcher capable of engaging with a wide array of threats.
; FORCE
vehicle_DescAEGS_Retaliator=Manufacturer: Aegis Dynamics\nFocus: Modular\n\nThis civilian refit of the Retaliator updates the military ship's chassis with unladen space able to be fitted with various modules to suit your needs.
; FORCE
vehicle_DescAEGS_Sabre_Firebird=Manufacturer: Aegis Dynamics\nFocus: Stealth Fighter\n \nWhen frontline skirmishes call for a swift and decisive offensive, the Sabre Firebird is the ideal medium fighter for any arsenal. Taking the already battle proven Sabre Raven, Aegis has designed the Firebird variant with an enhanced missile launcher capable of engaging with a wide array of threats.
; FORCE
vehicle_DescAEGS_Vanguard_Harbinger=Manufacturer: Aegis Dynamics\nFocus: Heavy Fighter / Bomber\n\nThe Vanguard Harbinger is Earth's standard fighter/bomber, converting the standard Warden's escape pod into a potent bomb bay. The extended range of the Vanguard and the relatively small profile mean that it can go where carrier-based ships or larger strategic bombers don't, strike hard, and then make it back to base.
; FORCE
vehicle_DescAEGS_Vanguard_Hoplite=Manufacturer: Aegis Dynamics\nFocus: Drop Ship \n\nThe Vanguard Hoplite is a cross between the winning Vanguard deep space fighter and a dedicated boarding ship. Adapted from proven assault ship designs, the Hoplite is the perfect tool for inserting an armored strike team with enough firepower to get them out again.
; FORCE
vehicle_DescAEGS_Vanguard_Sentinel=Manufacturer: Aegis Dynamics\nFocus: Heavy Fighter \n\nThe Vanguard Sentinel is a ship that's designed to fight smart instead of taking enemies head on. The conversion features an AR cockpit, an external e-War pod, decoy missiles and a set of EMP charges. Vanguard Sentinels often provide necessary combat support for combined operations. A lone Sentinel is frequently paired with Harbinger bombers and Warden escorts for large attack missions.
; FORCE
vehicle_DescANVL_Asgard=Manufacturer: Anvil Aerospace\nFocus: Drop Ship\n \nAs the battles of today continue to grow in scale and complexity, Anvil Aerospace understands the impact a single vehicle can have on the outcome. Enter the Asgard. The next generation in ground vehicle transport, the Anvil Asgard features a quick-load ramp, a sizeable hold to securely store your assault vehicle of choice, and hefty array of armaments to ensure access to even the most combat-heavy of drop sites.
; FORCE
vehicle_DescANVL_Asgard_Collector_Military=Manufacturer: Anvil Aerospace\nFocus: Drop Ship\n \nAs the battles of today continue to grow in scale and complexity, Anvil Aerospace understands the impact a single vehicle can have on the outcome. Enter the Asgard. The next generation in ground vehicle transport, the Anvil Asgard features a quick-load ramp, a sizeable hold to securely store your assault vehicle of choice, and hefty array of armaments to ensure access to even the most combat-heavy of drop sites.\n\nWikelo here. Made useful modifications to make ship much more fighter like. Very impressive.
; FORCE
vehicle_DescANVL_Ballista=Manufacturer: Anvil Aerospace\nFocus: Anti-Air\n\nKeep your airspace clear of danger with the Anvil Ballista. Originally designed to defend outposts from Vanduul attacks, this mobile missile defense system packs a powerful loadout, allowing the Ballista to stand firm against any threat, whether it arrives by air or land.
; FORCE
vehicle_DescANVL_Ballista_Dunestalker=Manufacturer: Anvil Aerospace\nFocus: Anti-Air\n\nKeep your airspace clear of danger with the Anvil Ballista. Originally designed to defend outposts from Vanduul attacks, this mobile missile defense system packs a powerful loadout, allowing the Ballista to stand firm against any threat, whether it arrives by air or land. The Dunestalker variant features a naturalistic paint scheme ideal for blending into harsh landscapes.
; FORCE
vehicle_DescANVL_Ballista_Snowblind=Manufacturer: Anvil Aerospace\nFocus: Anti-Air\n\nKeep your airspace clear of danger with the Anvil Ballista. Originally designed to defend outposts from Vanduul attacks, this mobile missile defense system packs a powerful loadout, allowing the Ballista to stand firm against any threat, whether it arrives by air or land. The Snowblind variant comes in a grey camouflage pattern to keep it concealed against rocky or lunar terrain.  
; FORCE
vehicle_DescANVL_C8X_Pisces_Expedition=Manufacturer: Anvil Aerospace\nFocus: Pathfinder\n\nSporting more guns and a limited-edition livery, the C8X Pisces Expedition turns the stout snub into a perfectly viable standalone exploration vessel. With its compact frame, deft maneuverability, and seating for three, the Pisces Expedition is ready to take on its own adventures.
; FORCE
vehicle_DescANVL_C8_Pisces=Manufacturer: Anvil Aerospace\nFocus: Pathfinder\n\nWith its compact frame, deft maneuverability, and seating for three, the C8 Pisces snub craft, included with every Carrack, is built by Anvil Aerospace for scouting ahead or exploring environments inaccessible to its larger carrier ship. 
; FORCE
vehicle_DescANVL_Carrack=Manufacturer: Anvil Aerospace\nFocus: Expedition\n\nAdventure calls and Anvil Aerospace answers with the Carrack. Built to endure extreme conditions in both space and atmosphere, this self-sustaining explorer has more than earned its long-standing status as the go-to pathfinder for both military and civilian service. 
; FORCE
vehicle_DescANVL_Carrack_Expedition=Manufacturer: Anvil Aerospace\nFocus: Expedition\n\nAdventure calls and Anvil Aerospace answers with the Carrack. Built to endure extreme conditions in both space and atmosphere, this self-sustaining explorer has more than earned its long-standing status as the go-to pathfinder for both military and civilian service. The 'Expedition' edition features a special livery ideal for boldly traveling the stars.
; FORCE
vehicle_DescANVL_Centurion=Manufacturer: Anvil Aerospace\nFocus: Anti-Air\n\nBuilt on Anvil's popular Atlas Platform, the Centurion presents a tactical solution for short-range anti-aircraft operations. Thanks to the Centurion’s custom energy-based AA turret, your forces can establish ground superiority by assuring immediate threats from above are dealt with quickly and efficiently.
; FORCE
vehicle_DescANVL_Spartan=Manufacturer: Anvil Aerospace\nFocus: Passenger\n\nBuilt on Anvil’s robust Atlas Platform, the same chassis used for their devastating Ballista air defense system, the Spartan is a fully armored transport outfitted with eight jump seats. The Spartan’s rugged frame makes it perfect for all kinds of terrain, and its remote Gatling turret helps clear the area for easier deployment.
; FORCE
vehicle_DescANVL_Valkyrie_CitizenCon=Manufacturer: Anvil Aerospace \nFocus: Drop Ship\n\nFor over a century, Anvil ships have distinguished themselves in countless civilian and military combat operations. Honor that proud tradition of security with the limited Liberator Edition Valkyrie, featuring an exclusive trim package commemorating the ship's debut at CitizenCon 2948.
; FORCE
vehicle_DescARGO_CSV_Cargo=Manufacturer: Argo Astronautics\nFocus: Light Freight\n\nYou got your plot of land, you’ve got the right construction materials, and now you’re ready to watch your dreams take shape. The ideal companion to the CSV-FM, the CSV Supply Model provides additional storage for all the resources required to build your next settlement.\n
; FORCE
vehicle_DescARGO_MOTH=Manufacturer: Argo Astronautics\nFocus: Medium Salvage\n\nExperience Argo's centuries of industrial expertise with the MOTH. Using a tried and tested chassis as its foundation, the MOTH features three dedicated salvage turrets and an external salvage autoloader, so a four person crew can strip, rip, and store salvage as fast as they can get to it.
; FORCE
vehicle_DescARGO_MPUV_Tractor=Manufacturer: Argo Astronautics\nFocus: Light Freight\n\nThe Argo Astronautics MPUV-1T is outfitted with a tractor beam to allow it to handily move cargo containers on and off larger hauling vessels.  Its smaller size and maneuverability make it an ideal support vehicle at landing zones and space stations.
; FORCE
vehicle_DescARGO_MPUV_Transport=Manufacturer: Argo Astronautics\nFocus: Passenger\n\nThe Argo Astronautics MPUV-1P (commonly ‘Argo Personnel’). This version of the Argo is geared towards a simple but incredibly important responsibility: moving grounds of people from place to place. The UEE Navy uses MPUV-1Ps extensively, and any new recruit can likely recall those terrifying moments in which such a ship carried them to their first space assignment. In civilian hands, Argo Personnel ships are adapted for everything from standard taxi services to use as makeshift combat dropships. The Argo MPUV-1P is capable of carrying up to eight humans and their equipment.
; FORCE
vehicle_DescARGO_Mole=Manufacturer: Argo Astronautics\nFocus: Medium Mining\n\nArgo’s iconic multi-operator laser extractor, more commonly referred to as the MOLE, lets you work faster and more effectively than ever before, thanks to its patented trilateral mining system. Three independently controlled articulated extraction stations allow for maximum power and near-limitless versatility. The MOLE lives by the adage "many hands make for light work".
; FORCE
vehicle_DescARGO_Mole_Carbon=Manufacturer: Argo Astronautics\nFocus: Medium Mining\n\nArgo’s iconic multi-operator laser extractor, more commonly referred to as the MOLE, lets you work faster and more effectively than ever before, thanks to its patented trilateral mining system. Three independently controlled articulated extraction stations allow for maximum power and near-limitless versatility. The Carbon Edition offers the MOLE's revered mining ability with a distinctive all-black finish.
; FORCE
vehicle_DescARGO_Mole_Talus=Manufacturer: Argo Astronautics\nFocus: Medium Mining\n\nArgo’s iconic multi-operator laser extractor, more commonly referred to as the MOLE, lets you work faster and more effectively than ever before, thanks to its patented trilateral mining system. Three independently controlled articulated extraction stations allow for maximum power and near-limitless versatility. The MOLE Talus Edition boasts the same mining proficiency as the standard ship along with a more discreet gray skin.\n
; FORCE
vehicle_DescARGO_Mole_Teach=Manufacturer: Argo Astronautics\nFocus: Medium Mining\n\nArgo’s iconic multi-operator laser extractor, more commonly referred to as the MOLE, lets you work faster and more effectively than ever before, thanks to its patented trilateral mining system. Three independently controlled articulated extraction stations allow for maximum power and near-limitless versatility. The MOLE lives by the adage "many hands make for light work".\n\nCatering to the difficult work condition's of Nyx, Teach's Ship Shop has outfitted this special edition with a custom loadout featuring rugged components so you can better tackle the job at hand.
; FORCE
vehicle_DescARGO_RAFT=Manufacturer: Argo Astronautics\nFocus: Medium Freight\n\nThe Argo RAFT features a hefty 192 SCU cargo hold, and is capable of carrying standardized 32 SCU cargo containers. Perfect for entry-level haulers and old pros alike, the RAFT is an ideal solution for reliable local freight transport.
; FORCE
vehicle_DescARGO_RAFT_Collector_Indust=Manufacturer: Argo Astronautics\nFocus: Medium Freight\n\nThe Argo RAFT features a hefty 192 SCU cargo hold, and is capable of carrying standardized 32 SCU cargo containers. Perfect for entry-level haulers and old pros alike, the RAFT is an ideal solution for reliable local freight transport.\n\nWikelo hi. Made useful modifications to make ship even more industrious. You will like.
; FORCE
vehicle_DescARGO_SRV=Manufacturer: Argo Astronautics\nFocus: Recovery\n\nWhen it comes to getting the job done, Argo doesn’t mess around. From simple freight and cargo towing to harrowing search-and-rescue operations, the SRV handles whatever you can throw at it. The bespoke tractor system utilizes an innovative plate and arm combination, allowing for effortless solo use as well as precision team towing for bigger jobs. Your crew and passengers stay safe too thanks to durable shields and heavy-duty armor that keep the cockpit and components secure when the situation gets hairy.
; FORCE
vehicle_DescCNOU_HoverQuad=Manufacturer: Consolidated Outland\nFocus: Passenger\n\nDesigned as a companion ground vehicle for the Nomad, the HoverQuad's sleek angular frame utilizes four gravlev pads for maximum maneuverability, making it the perfect transport across all kinds of surfaces.
; FORCE
vehicle_DescCNOU_Mustang_Alpha=Manufacturer: Consolidated Outland \nFocus: Starter / Light Freight\n\nInspired by Consolidated Outland CEO Silas Koerner’s cutting edge vision, the Mustang Alpha is a sleek, stylish spacecraft that uses ultralight alloys to push power ratios to the limits, albeit sometimes unsafely. And now, with the optional Cargo Carrier, you can have the Alpha’s advantages without sacrificing carrying capacity.
; FORCE
vehicle_DescCNOU_Mustang_Alpha_CitizenCon18=Manufacturer: Consolidated Outland \nFocus: Starter / Light Freight\n\nDesigned to commemorate the 2948 CitizenCon, this customized model of the newly revised Mustang Alpha features an exclusive new paintjob designed by Silas Koerner himself. 
; FORCE
vehicle_DescCNOU_Nomad=Manufacturer: Consolidated Outland \nFocus: Starter / Light Freight\n\nWith the versatility of a medium-sized multi-purpose freighter packed into a stylish, compact frame, the Consolidated Outland Nomad is the model of self-sufficiency, the spirit of the open sky, and the perfect solution for anyone yearning to start a brand-new adventure.
; FORCE
vehicle_DescCNOU_Nomad_Teach=Manufacturer: Consolidated Outland \nFocus: Starter / Light Freight\n\nWith the versatility of a medium-sized multi-purpose freighter packed into a stylish, compact frame, the Consolidated Outland Nomad is the model of self-sufficiency, the spirit of the open sky, and the perfect solution for anyone yearning to start a brand-new adventure.\n\nCatering to the difficult work condition's of Nyx, Teach's Ship Shop has outfitted this special edition with a custom loadout featuring rugged components so you can better tackle the job at hand.
; FORCE
vehicle_DescCRUS_A1_Spirit=Manufacturer: Crusader Industries\nFocus: Bomber\n\nCrusader Industries brings its usual commitment to excellence directly to the civilian market with the A1 Spirit, a mid-size multi-purpose starship equipped as a light bomber but packing enough versatility to tackle multiple roles and unpredictable jobs.
; FORCE
vehicle_DescCRUS_C1_Spirit=Manufacturer: Crusader Industries\nFocus: Light Freight\n\nCrusader Industries brings its usual commitment to excellence directly to the civilian market with the C1 Spirit, a mid-size multi-purpose starship built for cargo transport and delivery but packing enough versatility to tackle multiple roles and unpredictable jobs.
; FORCE
vehicle_DescCRUS_Intrepid=Manufacturer: Crusader Industries\nFocus: Starter / Light Freight\n\nFor those eager to meet their future head on, the renowned ship engineers at Crusader Industries proudly present the Intrepid. A bold ship ready to tackle any number of jobs and conquer numerous challenges, the Intrepid features efficient cargo space and comfortable living quarters to make the most of your solo journey across the stars.
; FORCE
vehicle_DescCRUS_Intrepid_Collector_Indust,P=Manufacturer: Crusader Industries\nFocus: Starter / Light Freight\n\nFor those eager to meet their future head on, the renowned ship engineers at Crusader Industries proudly present the Intrepid. A bold ship ready to tackle any number of jobs and conquer numerous challenges, the Intrepid features efficient cargo space and comfortable living quarters to make the most of your solo journey across the stars.
; FORCE
vehicle_DescCRUS_Spirit_C1_Collector_Civilian=Manufacturer: Crusader Industries\nFocus: Light Freight\n\nCrusader Industries brings its usual commitment to excellence directly to the civilian market with the C1 Spirit, a mid-size multi-purpose starship built for cargo transport and delivery but packing enough versatility to tackle multiple roles and unpredictable jobs.\n\nWikelo here. Made useful modifications to make much more impressive.
; FORCE
vehicle_DescCRUS_Starlifter_2951_BIS=Manufacturer: Crusader Industries\nFocus: Heavy Freight\n\nUtilizing the patented Hercules military-grade spaceframe and expanding cargo capacity, while sacrificing barely any firepower, the C2 has taken the private sector by storm. It has become the industry standard for racing teams, ship dealers and manufacturers, construction orgs, mining corporations, and even large-scale touring entertainment outfits. To celebrate the Hercules being voted a Best in Show finalist for 2951, this edition of the ship features a special blue and black livery already applied.  
; FORCE
vehicle_DescCRUS_Starlifter_A2=Manufacturer: Crusader Industries\nFocus: Heavy Bomber\n\nThe A2 Starlifter has been used to devastating effect in airborne assaults, search and rescue operations, and landing initiatives. With more than double the firepower of the M2, and a custom bomb bay capable of delivering a staggering payload, the A2 caters to anyone hauling massive amounts of cargo through potentially unfriendly skies.
; FORCE
vehicle_DescCRUS_Starlifter_A2_Collector_Military=Manufacturer: Crusader Industries\nFocus: Heavy Bomber\n\nThe A2 Starlifter has been used to devastating effect in airborne assaults, search and rescue operations, and landing initiatives. With more than double the firepower of the M2, and a custom bomb bay capable of delivering a staggering payload, the A2 caters to anyone hauling massive amounts of cargo through potentially unfriendly skies.\n\nWikelo here. Made useful modifications to make ship much more fighter like. Very impressive.
; FORCE
vehicle_DescCRUS_Starlifter_C2=Manufacturer: Crusader Industries\nFocus: Heavy Freight\n\nUtilizing the patented Hercules military-grade spaceframe and expanding cargo capacity, while sacrificing barely any firepower, the C2 has taken the private sector by storm. It has become the industry standard for racing teams, ship dealers and manufacturers, construction orgs, mining corporations, and even large-scale touring entertainment outfits.
; FORCE
vehicle_DescCRUS_Starlifter_M2=Manufacturer: Crusader Industries\nFocus: Heavy Freight\n\nThe M2 Hercules is the UEE's premier tactical starlifter. The large-scale transport's potent combination of capacity, maneuverability, durability, and robust weapons package assures your cargo and crew get to where they’re going in one piece.
; FORCE
vehicle_DescDRAK_Buccaneer=Manufacturer: Drake Interplanetary\nFocus: Light Fighter\n\nThe Buccaneer has been designed from the ground up to fly and fight the way you live. No leather interiors or hyperpillows here: the Bucc is a scrapper designed to maneuver and fight above its weight class. This rough-and-tumble frontier fighter can be maintained in the worst of conditions in order to keep real, working space crews alive.
; FORCE
vehicle_DescDRAK_Caterpillar=Manufacturer: Drake Interplanetary\nFocus: Medium Freight\n\nFirst introduced in 2871, Drake Interplanetary's Caterpillar has long proven to be a reliable, cost-effective multi-role vessel, capable of being outfitted for everything from mercantile operations to combat support. Long hailed as a hard-fought alternative to the ubiquitous Hull series, the Caterpillar is a freighter that doesn't skimp on weaponry or customization.
; FORCE
vehicle_DescDRAK_Caterpillar_Pirate=Manufacturer: Drake Interplanetary\nFocus: Medium Freight\n\nFirst introduced in 2871, Drake Interplanetary's Caterpillar has long proven to be a reliable, cost-effective multi-role vessel, capable of being outfitted for everything from mercantile operations to combat support. Long hailed as a hard-fought alternative to the ubiquitous Hull series, the Caterpillar is a freighter that doesn't skimp on weaponry or customization. This model features a unique livery applied by the previous owners.
; FORCE
vehicle_DescDRAK_Caterpillar_ShipShowdown=Manufacturer: Drake Interplanetary\nFocus: Medium Freight\n\nFirst introduced in 2871, Drake Interplanetary's Caterpillar has long proven to be a reliable, cost-effective multi-role vessel, capable of being outfitted for everything from mercantile operations to combat support. Long hailed as a hard-fought alternative to the ubiquitous Hull series, the Caterpillar is a freighter that doesn't skimp on weaponry or customization.
; FORCE
vehicle_DescDRAK_Clipper=Manufacturer: Drake Interplanetary\nFocus: Generalist\n \nIf there’s one thing every captain needs to take to heart as they prepare to journey across the stars it’s “expect the unexpected.” With a cargo bay, medical facilities, and crafting capabilities, along with Drake’s practical design sensibility, the Clipper is the perfect all-arounder for any new spacefaring enterprise.
; FORCE
vehicle_DescDRAK_Corsair=Manufacturer: Drake Interplanetary\nFocus: Expedition\n\nHeed the call of uncharted space and harness the spirit of exploration with the Drake Corsair. Utilizing a unique asymmetrical hull design, this versatile explorer can go wherever the winds of adventure may steer you.
; FORCE
vehicle_DescDRAK_Corsair_PYAM_Exec=Manufacturer: Drake Interplanetary\nFocus: Expedition\n\nHeed the call of uncharted space and harness the spirit of exploration with the Drake Corsair. Utilizing a unique asymmetrical hull design, this versatile explorer can go wherever the winds of adventure may steer you. This variant features an exclusive livery and loadout for the ship.
; FORCE
vehicle_DescDRAK_Cutlass_Black=Manufacturer: Drake Interplanetary\nFocus: Light Freight / Medium Fighter\n\nDrake Interplanetary claims that the Cutlass Black is a low-cost, easy-to-maintain solution for local in-system militia units. The larger-than-average cargo hold, RIO seat and dedicated tractor mount are, the company literature insists, for facilitating search and rescue operations.
; FORCE
vehicle_DescDRAK_Cutlass_Black_PYAM_Exec=Manufacturer: Drake Interplanetary\nFocus: Light Freight / Medium Fighter\n\nDrake Interplanetary claims that the Cutlass Black is a low-cost, easy-to-maintain solution for local in-system militia units. The larger-than-average cargo hold, RIO seat and dedicated tractor mount are, the company literature insists, for facilitating search and rescue operations. This variant features an exclusive livery and loadout for the ship.
; FORCE
vehicle_DescDRAK_Cutlass_Black_ShipShowdown=Manufacturer: Drake Interplanetary\nFocus: Light Freight / Medium Fighter\n\nDrake Interplanetary claims that the Cutlass Black is a low-cost, easy-to-maintain solution for local in-system militia units. The larger-than-average cargo hold, RIO seat and dedicated tractor mount are, the company literature insists, for facilitating search and rescue operations.
; FORCE
vehicle_DescDRAK_Cutlass_Steel=Manufacturer: Drake Interplanetary\nFocus: Drop Ship\n\nWith the Cutlass Steel, Drake Interplanetary has once again reinvented their classic design to create a next generation combat transport ship through the addition of dedicated jump seats and an expanded arsenal. It’s a dangerous ‘verse out there, and the Cutlass Steel is ready to cut a path through whatever stands in the way of you and your dedicated crew. 
; FORCE
vehicle_DescDRAK_Cutter=Manufacturer: Drake Interplanetary\nFocus: Starter / Pathfinder\n\nDesigned for hard-working folks of all stripes, the Cutter packs 4 SCU of cargo room and plenty of wallop into a rough and tumble, compact frame. It's a ship that truly embodies the spirit of Drake: that no matter who you are or what you do, you can reach the stars.
; FORCE
vehicle_DescDRAK_Cutter_Scout=Manufacturer: Drake Interplanetary\nFocus: Pathfinder\n\nPairing down the rough and tumble, compact frame of the Cutter to the bare essentials, Drake took an already impressive ship and transformed it into the ideal scouting vessel. Featuring improved radar and scanning capabilities paired with more power and cooling, the Cutter Scout is ready to fly ahead of the pack.
; FORCE
vehicle_DescDRAK_Golem=Manufacturer: Drake Interplanetary\nFocus: Starter / Light Mining\n\nWith the Golem, Drake designed the ideal ship for those interested in starting a mining career. The ship features a bespoke mining laser and the capacity to carry 32 SCU of valuable resources. In classic Drake fashion, the Golem is a purpose-built ship that prioritizes function over frills.
; FORCE
vehicle_DescDRAK_Golem_Collector_Indust=Manufacturer: Drake Interplanetary\nFocus: Starter / Light Mining\n\nWith the Golem, Drake designed the ideal ship for those interested in starting a mining career. The ship features a bespoke mining laser and the capacity to carry 32 SCU of valuable resources. In classic Drake fashion, the Golem is a purpose-built ship that prioritizes function over frills.\n\nWikelo hi. Made useful modifications to make ship even more industrious. You will like. 
; FORCE
vehicle_DescDRAK_Golem_OX=Manufacturer: Drake Interplanetary\nFocus: Light Freight\n \nWith the Golem OX, Drake has transformed the dependable workhorse into the ideal cargo ship for hauling supplies and equipment. Made for pilots who prefer function over frills, the OX doubles the capacity of the original with room for 64 SCU and features a tractor beam to make cargo transfers smooth as silk.
; FORCE
vehicle_DescDRAK_Golem_Teach=Manufacturer: Drake Interplanetary\nFocus: Starter / Light Mining\n\nWith the Golem, Drake designed the ideal ship for those interested in starting a mining career. The ship features a bespoke mining laser and the capacity to carry 32 SCU of valuable resources. In classic Drake fashion, the Golem is a purpose-built ship that prioritizes function over frills.\n\nCatering to the difficult work condition's of Nyx, Teach's Ship Shop has outfitted this special edition with a custom loadout featuring rugged components so you can better tackle the job at hand.
; FORCE
vehicle_DescDRAK_Ironclad_Assault=Manufacturer: Drake Interplanetary\nFocus: Drop Ship\n \nWhen the special delivery you have to make is a full-blown incursion, you need the Drake Ironclad Assault. Not only can it fit multiple ground vehicles into its hold, it has turrets along its underside to clear the way for landing, and even a fabrication bay for emergency repairs.
; FORCE
vehicle_DescDRAK_Mule=Manufacturer: Drake Interplanetary\nFocus: Light Freight\n\nThe six-wheeled Drake Mule is a dependable workhorse for all sorts of loading and hauling jobs. Whether transporting cargo over rough terrain or ferrying it onto larger vessels and cargo decks, the Mule sees even the toughest contracts through to the end. Plain and simple.
; FORCE
vehicle_DescESPR_Prowler=Manufacturer: Esperia\nFocus: Drop Ship\n\nNamed after the UPE military designation, the Prowler is a modernized version of the infamous Tevarin boarding craft from the First Tevarin War. The Prowler’s effectiveness as a rapid personnel deployment vehicle was mainly due to its silence. With the Prowler, you will find the perfect fusion of two cultures: the elegance and effectiveness of the Tevarin war machine combined with the reliability of modern UEE technology.
; FORCE
vehicle_DescESPR_Prowler_Utility=Manufacturer: Esperia\nFocus: Light Freight\n\nWhile no known Tevarin-made examples of this historical ship exist, historians at Esperia studied contemporary UPE military field reports to reconstruct this modified Prowler. Used by the Tevarin military to deliver urgently needed supplies to the frontlines, the Prowler Utility pairs a tractor beam with a fully accessible hold, alongside the warship’s still significant armaments, to make the transfer of cargo in battlefield conditions a precision operation. 
; FORCE
vehicle_DescESPR_Prowler_Utility_Collector_Indust=Manufacturer: Esperia\nFocus: Light Freight\n\nWhile no known Tevarin-made examples of this historical ship exist, historians at Esperia studied contemporary UPE military field reports to reconstruct this modified Prowler. Used by the Tevarin military to deliver urgently needed supplies to the frontlines, the Prowler Utility pairs a tractor beam with a fully accessible hold, alongside the warship’s still significant armaments, to make the transfer of cargo in battlefield conditions a precision operation. \n\nWikelo hi. Made useful modifications to make ship even more industrious. You will like.
; FORCE
vehicle_DescGAMA_Syulen=Manufacturer: Gatac Manufacture\nFocus: Starter / Pathfinder\n\nThe Syulen cargo vessel has been artfully crafted by the renowned House Gatac to be well suited for both Human and Xi’an pilots. With a refined agile frame, the Syulen lends itself to ferrying important deliveries across the universe, or as the ideal ship for those making their transport career debut.
; FORCE
vehicle_DescGAMA_Syulen_PYAM_Exec=Manufacturer: Gatac Manufacture\nFocus: Starter / Pathfinder\n\nThe Syulen cargo vessel has been artfully crafted by the renowned House Gatac to be well suited for both Human and Xi’an pilots. With a refined agile frame, the Syulen lends itself to ferrying important deliveries across the universe. This special variant features an exclusive livery and loadout for the ship.
; FORCE
vehicle_DescGRIN_MTC=Manufacturer: Greycat Industrial\nFocus: Pathfinder\n\nAs an expert in industrial operations, Greycat understands that jobsite security is a vital part of any successful business venture. Not only that, but to be fully effective, you need to be able to get your security personnel and their equipment to wherever they’re needed most. That’s why the MTC Mobile Tactical Center is such an important addition to your next venture. Nimble enough to access the difficult terrain encountered at remote operations and equipped with enough suit lockers, weapon racks, and storage to tackle a wide host of issues, the Greycat MTC could make all the difference when it comes to turning a potential problem into potential profit.
; FORCE
vehicle_DescGRIN_PTV=Manufacturer: Greycat Industrial\nFocus: Passenger\n\nThe Greycat PTV is a simple and practical buggy frequently used to reduce travel times in large hangars or outposts.
; FORCE
vehicle_DescGRIN_ROC=Manufacturer: Greycat Industrial\nFocus: Light Mining\n\nBy focusing on the essentials of terrestrial-based mining, Greycat Industrial designed their hardworking, no-nonsense ROC (Remote Ore Collector) to complement the miners who use it. From its precision gimbaled mining arm to its all-terrain wheels, this solo-operated vehicle shows how important it is to have the right tool for the job. 
; FORCE
vehicle_DescGRIN_ROC_DS=Manufacturer: Greycat Industrial\nFocus: Light Mining\n\nBy focusing on the essentials of terrestrial-based mining, Greycat Industrial designed their hardworking, no-nonsense ROC-DS (Remote Ore Collector Dual Seat) to let mining pairs do more while in the field. The ROC-DS raises the ground-mining game by adding extra cargo capacity and a second seat to operate the precision gimbaled mining arm. Greycat even upgraded the driver's cab with a protective enclosure to allow for longer excursions in harsh conditions. With the ROC-DS, mining duos now have the right tool to comfortably collect more ore. 
; FORCE
vehicle_DescGRIN_STV=Manufacturer: Greycat Industrial\nFocus: Passenger\n\nGet ready to have some serious fun on the job with the STV from Greycat. This Sport Terrain Vehicle was built by pros for pros and features blazing speed and convenient built-in storage.
; FORCE
vehicle_DescGrin_MDC=Manufacturer: Greycat Industrial\nFocus: Anti - Air\n \nBuilding upon a robust and sturdy industrial frame, Greycat has crafted the MDC Mobile Defense Center into an effective combat vehicle ready to protect your interests from remote mining sites to patrolling high-value processing centers thanks to its mounted PDS turret. 
; FORCE
vehicle_DescKRIG_P72_Archimedes=Manufacturer: Kruger Intergalactic\nFocus: Racing\n\nWhether for added security, exploring a system or simply the joy of flying, the Kruger Intergalactic’s P-72 Archimedes snub craft was designed to deliver exceptional handling and nimble acceleration in a sleek and stylish package. 
; FORCE
vehicle_DescKRIG_P72_Archimedes_Emerald=Manufacturer: Kruger Intergalactic\nFocus: Racing\n\nWhether for added security, exploring a system or simply the joy of flying, the Kruger Intergalactic P-72 Archimedes snub craft was designed to deliver exceptional handling and nimble acceleration in a sleek and stylish package.  The Emerald limited edition features a special "lucky" paint job.
; FORCE
vehicle_DescMISC_Fortune=Manufacturer: MISC\nFocus: Light Salvage\n\nFor those ready to elevate their profession to the next level, the engineers at MISC have carefully crafted the Fortune as a best-in-class small reclamation vessel. Equipped with a versatile salvage arm and a cargo lift, the MISC Fortune is built from the struts up to turn trash into treasure.\n
; FORCE
vehicle_DescMISC_Fortune_Teach=Manufacturer: MISC\nFocus: Light Salvage\n\nFor those ready to elevate their profession to the next level, the engineers at MISC have carefully crafted the Fortune as a best-in-class small reclamation vessel. Equipped with a versatile salvage arm and a cargo lift, the MISC Fortune is built from the struts up to turn trash into treasure.\n\nCatering to the difficult work condition's of Nyx, Teach's Ship Shop has outfitted this special edition with a custom loadout featuring rugged components so you can better tackle the job at hand.
; FORCE
vehicle_DescMISC_Freelancer=Manufacturer: MISC\nFocus: Light Freight\n\nFreelancers are used as long haul merchant ships by major corporations, but they are just as frequently repurposed as dedicated exploration vessels by independent captains who want to operate on the fringes of the galaxy.
; FORCE
vehicle_DescMISC_Hull_A=Manufacturer: MISC\nFocus: Light Freight\n\nThe smallest, most affordable Hull. The Hull A is great for those just striking out in the galaxy on their own. The Hull A is most similar to the Aurora and Mustang, but lacks the ‘jack of all trades’ nature. Where the others trade cargo capacity for firepower or speed, the Hull A is 100% on-mission transport.
; FORCE
vehicle_DescMISC_Prospector=Manufacturer: MISC\nFocus: Light Mining\n\nFor years, the Prospector has been the universe’s preferred mining vessel for solo operators. Featuring MISC’s sleek design sensibility and a bevy of upgraded high-tech mining tools, the 2947 Prospector perfectly balances form and functionality. 
; FORCE
vehicle_DescMISC_Prospector_Collector_Indust=Manufacturer: MISC\nFocus: Light Mining\n\nFor years, the Prospector has been the universe’s preferred mining vessel for solo operators. Featuring MISC’s sleek design sensibility and a bevy of upgraded high-tech mining tools, the 2947 Prospector perfectly balances form and functionality. \n\nWikelo hi. Made useful modifications to make ship even more industrious. You will like.
; FORCE
vehicle_DescMISC_Razor_LX=Manufacturer: Mirai\nFocus: Racing\n\nThe Razor gets supercharged. The LX features an overclocked engine to unleash blazing top speeds. This power comes at a cost with reduced maneuverability and armaments making it ideal for straight-shot racing. But who needs weapons when you’re leaving your competition in the dust.
; FORCE
vehicle_DescMISC_Reliant=Manufacturer: MISC\nFocus: Starter / Light Freight\n\nWith the Reliant Kore, MISC adds to its already impressive lineup of ships, a smaller introductory-class spacecraft. Utilizing advanced Xi’An designs, the Reliant features broad, sleek wings, omni-directional thrusters and a fully-articulated two-seat cockpit that supports horizontal and vertical flight modes. All of this combines with a larger carrying capacity than many ships in its class to make the Kore a natural choice for short-range hauling, or with the simple addition of a few optional components, this can-do ship can do anything you dream of.
; FORCE
vehicle_DescMISC_Starlancer_MAX_Collector_Indust,P=Manufacturer: MISC\nFocus: Medium Freight\n \nFor those looking to expand their hauling operations, the engineers at MISC have upgraded the Starlancer MAX with an extra spacious hold ready to transport cargo and vehicles. Paired with comfortable accommodations for longer trips and a full defensive package for when you go off the beaten path, it’s easy to see why the Starlancer MAX is the hauler of choice for industrious pilots across the ‘verse.
; FORCE
vehicle_DescMISC_Starlancer_TAC_Collector_Military=Manufacturer: MISC\nFocus: Gunship\n \nFor those looking to for a versatile ship that can stand on its own in a fight, the engineers have upgraded the Starlancer TAC with an aggressive offensive package ready to face down the fiercest of foes. When you take on a high risk, high reward job, the Starlancer TAC is there to make sure you and your crew are able to see it through to the very end.\n\nWikelo here. Made useful modifications to make ship even more fighter like. Very impressive.
; FORCE
vehicle_DescMRAI_Guardian=Manufacturer: Mirai\nFocus: Heavy Fighter\n\nTaking the adage that the best defense is a good offense, Mirai engineers have brought their expertise in performance and maneuverability to the Guardian long range fighter.  Fly circles around your opponents with the Mirai Guardian while establishing your space superiority. \n
; FORCE
vehicle_DescMRAI_Guardian_Collector_Military=Manufacturer: Mirai\nFocus: Heavy Fighter\n\nTaking the adage that the best defense is a good offense, Mirai engineers have brought their expertise in performance and maneuverability to the Guardian long range fighter.  Fly circles around your opponents with the Mirai Guardian while establishing your space superiority. \n\nWikelo here. Made useful modifications to make ship much more fighter like. Very impressive.
; FORCE
vehicle_DescMisc_Fury_Miru=Manufacturer: Mirai\nFocus: Snub Fighter\n\nFeaturing best-in-class maneuverability and fully integrated, cutting-edge Xi’an tech, the next-generation Fury MX snub bomber from Mirai uses its twenty halo-mounted missiles to devastate targets during short-range space combat.
; FORCE
vehicle_DescORIG_100i=Manufacturer: Origin Jumpworks\nFocus: Starter / Pathfinder\n\nTour the universe with the perfect coupling of luxury and performance. The 100i features Origin Jumpworks' patented AIR fuel system, making it the most efficient and eco-friendly ship on the market. Capable of long distance flights that most ships of its size aren't equipped for, the 100i is perfect for solo pilots looking to turn heads without sacrificing functionality or reliability.
; FORCE
vehicle_DescORIG_125a=Manufacturer: Origin Jumpworks\nFocus: Light Fighter\n\nRisks were meant to be taken, but why risk running out of fuel in the heat of battle? With the AIR fuel system, a souped-up weapons package, and all the luxury and refinement you've come to expect from Origin Jumpworks, the 125a has been designed for the discerning maverick.
; FORCE
vehicle_DescORIG_135c=Manufacturer: Origin Jumpworks\nFocus: Light Freight\n\nWith a deceptive amount of storage space in its sleek, stylish frame, and Origin's patented AIR fuel system, the 135c model is the obvious choice for musicians, couriers, and anyone trying to get the party started. Get it there fast, and look good while you're doing it.
; FORCE
vehicle_DescORIG_300i=Manufacturer: Origin Jumpworks\nFocus: Luxury Touring\n\nIf you're going to travel the stars... why not do it in style? The 300i is Origin Jumpworks' premiere luxury spacecraft. It is a sleek, silver killer that sends as much of a message with its silhouette as it does with its particle cannons.
; FORCE
vehicle_DescORIG_325a=Manufacturer: Origin Jumpworks\nFocus: Interceptor\n\nJust because it's a rough galaxy doesn't mean you need to sacrifice your comfort: the 325a can come out on top in any dogfight. The 325a features an advanced weapon payload as well as a custom targeting system designed especially for the 325a by WillsOp.
; FORCE
vehicle_DescORIG_400i=Manufacturer: Origin Jumpworks\nFocus: Expedition\n\nTo explore the stars is a most noble endeavor, and Origin Jumpworks has risen to the occasion in crafting the 400i high-performance pathfinder. With class-leading range, substantial defensive capabilities, and a factory-equipped scanning array, the 400i is ready to take on the harshest corners of the galaxy while maintaining the comfort and elegance Origin is known for. 
; FORCE
vehicle_DescORIG_600i=Manufacturer: Origin Jumpworks\nFocus: Expedition\n\nThis multi-role luxury vessel from Origin Jumpworks features an exquisitely detailed hull design that balances performance and versatility in a sleek and timeless form. The 600i is designed with a cutting-edge modular technology, allowing you to customize your ship for your needs.
; FORCE
vehicle_DescORIG_600i_2951_BIS=Manufacturer: Origin Jumpworks\nFocus: Expedition\n\nThis multi-role luxury vessel from Origin Jumpworks features an exquisitely detailed hull design that balances performance and versatility in a sleek and timeless form. The 600i is designed with a cutting-edge modular technology, allowing you to customize your ship for your needs. To celebrate the 600i being voted a Best in Show finalist for 2951, this edition of the ship features a special blue and black livery already applied.  
; FORCE
vehicle_DescORIG_600i_Touring=Manufacturer: Origin Jumpworks\nFocus: Luxury Touring\n\nThis multi-role luxury vessel from Origin Jumpworks features an exquisitely detailed hull design that balances performance and versatility in a sleek and timeless form. The 600i is designed with a cutting-edge modular technology, allowing you to customize your ship for your needs.
; FORCE
vehicle_DescORIG_890Jump=Manufacturer: Origin Jumpworks\nFocus: Luxury Touring\n\nWith an elegant, sleek exterior that belies its spacious interior, the 890 Jump is a true engineering marvel; crafted to impress from every angle by combining a unique, innovative design with the finest materials and the most advanced technology. The result is a vessel that is in a class all of its own, a masterpiece worthy of the name Origin.
; FORCE
vehicle_DescORIG_X1=Manufacturer: Origin Jumpworks\nFocus: Passenger\n\nWelcome to the next level with the X1, Origin Jumpworks' high performance open-canopy vehicle. Built from lightweight polymers, the X1 takes speed and agility to the next level thanks to seamlessly integrated engine technology and joint vector thruster placement. Innovative design and high-quality engineering weave together to create a flight experience like no other.
; FORCE
vehicle_DescORIG_X1_Force=Manufacturer: Origin Jumpworks\nFocus: Passenger\n\nBuilt to endure tougher environments and look good doing it, the X1 Force is a modified version of the base X1 model featuring additional defensive elements to toughen up this speedy and agile open-canopy bike, allowing it to serve in a variety of roles, from exploring worlds to potential security infiltration ops.
; FORCE
vehicle_DescRSI_Aurora_ES=Manufacturer: RSI\nFocus: Starter / Pathfinder\n\nThe Aurora is the modern day descendant of the Roberts Space Industries X-7 spacecraft which tested the very first jump engines. Utilitarian to a T, the Aurora is the perfect beginner's ship: what it lacks in style it makes up for in ample room for upgrade modules.
; FORCE
vehicle_DescRSI_Aurora_MR=Manufacturer: RSI\nFocus: Starter / Light Fighter\n\nPerhaps you're looking for something that offers carrying capacity but has combat capabilities too? The Aurora Marque comes with a pair of Behring-quality lasers and a high quality gun cooler system.
; FORCE
vehicle_DescRSI_Aurora_Mk2=Manufacturer: Roberts Space Industries\nFocus: Starter / Light Freight\n \nA new take of the classic ship, Roberts Space Industries has reimagined the tried-and-true Aurora from the struts up. Introducing the Aurora Mk II. Everything from the ship’s performance, usability, to its styling has been overhauled with a new generation of pilots in mind. Plus, this latest version introduces a new trick for the Aurora series – swappable modules. Rather than locking pilots into a single career path, these modules allow for straightforward operational specialization from the comfort of your hangar. Whether you’re a first-time shipowner, or a long-time pilot ready for an upgrade to your daily flyer, the Aurora Mk II is waiting for you.   
; FORCE
vehicle_DescRSI_Constellation_Phoenix=Manufacturer: RSI\nFocus: Luxury Touring\n\nA dedicated luxury spacecraft for the discerning star captain. The Constellation Phoenix can be operated as an organization command ship and features a luxurious redesigned interior. Includes a hidden sensor-dampened area for your most precious cargo. The Phoenix comes with a Lynx rover and a Kruger P-72 Archimedes Fighter.
; FORCE
vehicle_DescRSI_Constellation_Phoenix_Emerald=Manufacturer: RSI \nFocus: Luxury Touring\n\nWhether you are a discerning socialite or a freewheeling party animal, the Constellation Phoenix Emerald is your personal passport to entertainment. With a swank interior cabin designed specifically for revelry, and a limited edition "lucky" paint job, the Emerald is the perfect venue to sip a glass of Radegast Gold or throw back a green Sleeping Tiger Malt while hurtling luxuriously through the stars. Just be sure to bring a designated pilot.
; FORCE
vehicle_DescRSI_Hermes=Manufacturer: Roberts Space Industries\nFocus: Medium Freight\n\nUnlike its mythical namesake, the RSI Hermes is no trickster - it really is that fast. Featuring a bespoke, innovative thruster-package, an impressive array of defensive measures, and a sizeable cargo hold, the Hermes is ready to speed deliveries to their final destinations. Even to dangerous drop-offs other haulers wouldn’t dare to go.  
; FORCE
vehicle_DescRSI_Lynx=Manufacturer: RSI\nFocus: Luxury Touring\n\nRSI designed the Lynx Rover to be a vehicle capable of exploring a wide variety of terrains while still delivering a top-rated and finely tuned driving experience.
; FORCE
vehicle_DescRSI_Perseus=Manufacturer: RSI\nFocus: Heavy Gunship\n\nWhen RSI set out to make the definitive modern statement in persuasive prevention, they looked into their own past, to the historic gunships designated Perseus. Capable of shredding sub-capital class goliaths, the mere presence of a Perseus gunship in a blockade or patrol squad is enough to make your most aggressive enemies think twice before engaging, just like its vintage namesake.
; FORCE
vehicle_DescRSI_Scorpius_Antares=Manufacturer: RSI\nFocus: Heavy Fighter\n\nRSI has updated the signature Scorpius adaptable bi-wing configuration and added a bespoke Quantum Dampener and EMP Device exclusively designed by their in-house team to create the powerful Scorpius Antares. Built with stopping power in mind, the Scorpius Antares is engineered to bring any chase to a quick finish.
; FORCE
vehicle_DescRSI_Ursa_Rover=Manufacturer: RSI\nFocus: Pathfinder\n\nBuilt by RSI specifically for the planetside explorer, the Ursa Rover offers civilians military-grade all-terrain capabilities and stands as the rugged standard in ground-based scouting, mapping and discovery applications.
; FORCE
vehicle_DescRSI_Ursa_Rover_Emerald=Manufacturer: RSI\nFocus: Pathfinder\n\nFortune favors the bold. The most trusted name in all-terrain exploration embodies the essence of good fortune and success with this commemorative limited-edition Ursa Rover.
; FORCE
vehicle_DescRSI_Zeus_ES=Manufacturer: Roberts Space Industries\nFocus: Expedition\n\nReady to ferry a whole new generation of travelers across the universe, Roberts Space Industries is proud to introduce a starship eight centuries in the making - the all-new Zeus Mk II spacecraft. Paying homage to the classic design that launched Humanity to the stars in 2140, the Zeus Mk II has been updated to exceed modern standards while retaining the heart of this beloved spacefaring icon.  With a focus on exploration, the Zeus Mk II ES edition features a robust radar package for finding new discoveries, and enhanced weaponry and shielding to help bring them back home.\n
; FORCE
vehicle_DescRSI_Zeus_ES_Collector_Indust,P=Manufacturer: Roberts Space Industries\nFocus: Expedition\n\nReady to ferry a whole new generation of travelers across the universe, Roberts Space Industries is proud to introduce a starship eight centuries in the making - the all-new Zeus Mk II spacecraft. Paying homage to the classic design that launched Humanity to the stars in 2140, the Zeus Mk II has been updated to exceed modern standards while retaining the heart of this beloved spacefaring icon.  With a focus on exploration, the Zeus Mk II ES edition features a robust radar package for finding new discoveries, and enhanced weaponry and shielding to help bring them back home.
; FORCE
vehicle_DescTMBL_Cyclone=Manufacturer: Tumbril Land Systems\nFocus: Passenger\n\nWith a potent combination of speed, maneuverability, and rugged durability, the Cyclone is a perfect choice for local deliveries and transport between planetside homesteads and outposts.
; FORCE
vehicle_DescTMBL_Cyclone_AA=Manufacturer: Tumbril Land Systems \nFocus: Anti-Air\n\nA battlefield equalizer, the Cyclone AA comes equipped with a surface-to-air missile and countermeasure package to provide cover for ground troops against airborne targets.
; FORCE
vehicle_DescTMBL_Cyclone_MT=Manufacturer: Tumbril Land Systems \nFocus: Anti-Air\n\nFollowing the success of the initial release of the Cyclone, Tumbril has taken your feedback and expanded their popular line of tactical vehicles with the all new Cyclone MT. Outfitted with a combination gun and missile turret, this module offers increased combat options in the field.
; FORCE
vehicle_DescTMBL_Cyclone_RN=Manufacturer: Tumbril Land Systems \nFocus: Pathfinder\n\nStay mobile and aware with the Cyclone RN. This light reconnaissance vehicle is the perfect solution for scouting runs, providing fast and detailed scans of terrain as well as beacon placement.
; FORCE
vehicle_DescTMBL_Cyclone_TR=Manufacturer: Tumbril Land Systems \nFocus: Anti-Vehicle\n\nDesigned for militia and security use, the Cyclone TR module features upgraded armor and a single Human-operated turret capable of mounting a Size 1 weapon and a responsive 360° field of fire.
; FORCE
vehicle_DescTMBL_Nova=Manufacturer: Tumbril Land Systems\nFocus: Heavy Tank\n\nTumbril's new Nova is a classic battlefield warrior, reimagined for the modern age. This heavy tank offers a devastating combination of weaponry to eliminate threats on the ground and in the air.
; FORCE
vehicle_DescTMBL_Storm=Manufacturer: Tumbril Land Systems\nFocus: Light Tank\n \nOriginally introduced in 2606 during the Second Tevarin War, the Tumbril Storm single-operator mini-tank was built to blitz battlefields and take out enemy artillery. Reimagined from the ground up to be faster, stronger, and more impactful than ever, the latest Storm is a true force of nature, well-suited to the frenetic landscape of modern warfare.
; FORCE
vehicle_DescTMBL_Storm_AA=Manufacturer: Tumbril Land Systems\nFocus: Light Tank\n\nOriginally introduced in 2606 during the Second Tevarin War, the Tumbril Storm single-operator mini-tank was built to blitz battlefields and take out enemy artillery. Reimagined from the ground up to be faster, stronger, and more impactful than ever, the Storm AA is a true force of nature, equipped with a barrage of missiles to provide cover against airborne and ground targets.
; FORCE
