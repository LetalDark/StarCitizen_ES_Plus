Vehicle_DescGRIN_UTV=Manufacturer: Greycat Industrial\nFocus: Cargo\n\nThe Greycat UTV is a durable, utility buggy designed to transport light cargo loads across rugged terrain. Whether you’re coordinating freight storage or making a supply run to a neighboring outpost, the straightforward design of the UTV allows operators to focus on tackling the job at hand.
Vehicle_NameGRIN_UTV=Greycat UTV
X2_JournalTracker_Content=The terrorist group XenoThreat have returned to Stanton seeking to violently impose their intolerant values on the system. Their well-armed members are harassing not only the alien residents, but anyone they have deemed a traitor to Humanity, specifically Human pilots of alien-made spacecraft.\n\nIt is clear that they will not stop attempting to spread their hatred unless we stop them.\n\nJoin us. Do your part.
