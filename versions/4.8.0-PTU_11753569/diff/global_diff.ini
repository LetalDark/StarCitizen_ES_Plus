Foxwell_DefendEntitesAndEscort_VE_Desc,P=For any pilots in the area – a group of bandits is targeting one of our clients at <EM4>~mission(Location|Address)</EM4>, specifically their <EM4>~mission(Objects)</EM4> and the maintenance ships that manage them. From our intel, it's only a few outlaws trying to make some quick credits, but they're also the type to cause some real damage if you get in their way.\n\nIf you take care of them and relocate the client's ship and crew safely, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.
Foxwell_DefendEntitesAndEscort_VE_Title,P=Yellow Lvl. Contract: Defend ~mission(Objects) and Escort Employees
Foxwell_DefendEntitesAndEscort_VH_Desc,P=Urgent ship aid needed at <EM4>~mission(Location|Address)</EM4>. A band of destructive criminal outlaws that have been trying to make a name for themselves recently has struck hard against one of our high priority clients, <EM4>attacking their ships and targeting the client's ~mission(Objects)</EM4>. It will be your job to keep everyone and everything safe – though it won't be an easy feat.\n\nI cannot stress enough how dangerous these attackers are, so be sure to <EM>bring backup</EM> to deal with them. If you, the crew, and the infrastructures make it out intact, we’re offering a generous sum of <EM4>~mission(ScripAmount)  MG Scrip</EM4> to the main contractor. \n\nBest of luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.
