Nozzle_FuelGiver_GRIN_NozzleSecure_Desc=Manufacturer: Greycat Industrial\nItem Type: Fuel Nozzle\nFlow Speed: 1.23 SCU/s\n\nA product of Greycat's long-standing commitment to quality and reliability, the Marlin fuel nozzle provides stability and security at every stage of the refueling process.
Nozzle_FuelGiver_GRIN_NozzleSecure_Name=Marlin
Nozzle_FuelGiver_GRIN_NozzleVeryFast_Desc=Manufacturer: Greycat Industrial\nItem Type: Fuel Nozzle\nFlow Speed: 1.99 SCU/s\n\nGreycat's Lindstrom nozzle comfortably achieves impressive flow speeds, albeit at the expense of security. If time is of the essence, this is the nozzle to choose.
Nozzle_FuelGiver_GRIN_NozzleVeryFast_Name=Lindstrom
Nozzle_FuelGiver_SHIN_NozzleExpensiveFast_Desc=Manufacturer: Shubin Interstellar\nItem Type: Fuel Nozzle\nFlow Speed: 2.31 SCU/s\n\nIf speed is the priority and price is no object, the Bendix fuel nozzle from Shubin offers top-end transfer speeds in a reliable package.
Nozzle_FuelGiver_SHIN_NozzleExpensiveFast_Name=Bendix
Nozzle_FuelGiver_SHIN_NozzleExpensiveSecure_Desc=Manufacturer: Shubin Interstellar\nItem Type: Fuel Nozzle\nFlow Speed: 1.43 SCU/s\n\nA nozzle that deserves its premium price tag, the Torrez from Shubin prioritizes stability and security while still delivering solid and reliable transfer speeds.
Nozzle_FuelGiver_SHIN_NozzleExpensiveSecure_Name=Torrez
Nozzle_FuelGiver_SHIN_NozzleMostExpensive_Desc=Manufacturer: Shubin Interstellar\nItem Type: Fuel Nozzle\nFlow Speed: 1.98 SCU/s\n\nShubin's Ezra fuel nozzle is a well-rounded package that offers a finely-balanced combination of transfer speed and security. However, this kind of well thought-out quality comes at a price.
Nozzle_FuelGiver_SHIN_NozzleMostExpensive_Name=Ezra
