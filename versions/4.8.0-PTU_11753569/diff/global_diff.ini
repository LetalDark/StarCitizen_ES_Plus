Intersec_TSG_WeakenDef_Solo_Desc_001=MISSION SPECS\n\nArea of Operation: Nyx System \nHostile Forces: Shattered Blade\nEquipment Specs: Combat Ships w/Ordnance\nBriefing: \nRegional analysis indicates that there is a suspected Shattered Blade hideout in an old QV Extraction station and Intersec is looking for a pilot to launch an attack against the station's power infrastructure.\n\nThis will be a multi-tiered assault, requiring you to target and destroy station components on the exterior and interior. From previous operations, we've learned that <EM4>certain components cannot be destroyed by energy weapons, so ballistic or ordnance will be needed</EM4>. Parts of the station have historically been flooded with <EM4>heavy distortion energy, so you will need to act efficiently while inside</EM4>.\n\nThese attacks are all an effort to allow you to<EM4>destroy the now-exposed power core at the center</EM4>.\n\nThe loss of this station will greatly impact the gang's ability to operate in the system and so has been deemed a high priority.\n\nGood luck,   \n\nDeacon Tobin \nOperations Manager \nInterSec Defense Solutions  \n\nThis communication consists of confidential information solely intended for the recipient. Please disregard if received in error and notify the sender. All operations are conducted at the contractor’s own personal risk and must adhere to UEE and system law where applicable.
