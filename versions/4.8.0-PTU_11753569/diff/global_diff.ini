PU_AMartel_CIV_M_PMH_TSGMissionAbandon_GP_001,P=Look, we needed your help. You shouldn't just bail like that.
PU_AMartel_CIV_M_PMH_TSGMissionAbandon_GP_002,P=A promise used to mean something. Typical UEE bullshit.
PU_AMartel_CIV_M_PMH_TSGMissionAbandon_GP_003,P=I knew we couldn't trust a corporate rep to follow through.
PU_AMartel_CIV_M_PMH_TSGMissionFail_GP_001,P=Reroute all power to <death scream>
PU_AMartel_CIV_M_PMH_TSGMissionFail_GP_002,P=Tranqulity's lost. Abandon <death scream>
PU_AMartel_CIV_M_PMH_TSGMissionFail_GP_003,P=All hands, aband- <scream>
PU_AMartel_CIV_M_PMH_TSGPhase1CompletedIdrisAvailable_GP_001,P=Think that was the last of them. If you need it, we'll open our bay doors so you can rearm and refuel. It's the least we can do.
PU_AMartel_CIV_M_PMH_TSGPhase1Completed_GP_001,P=Looks like we're clear of hostiles. You got here in the nick of time.
PU_AMartel_CIV_M_PMH_TSGPhase1Completed_GP_002,P=Scope's clear of immediate threats.
PU_AMartel_CIV_M_PMH_TSGPhase1Completed_GP_003,P=Think we're good for now. Nice work.
PU_AMartel_CIV_M_PMH_TSGPhase1IntroDefeatAttackingFighters_GP_001,P=Intersec said someone would be coming. My name's Captain Aniss Martel of the security vessel, Tranquility. One of ours is being held hostage inside that station, but first we need help clearing out these fighters.
PU_AMartel_CIV_M_PMH_TSGPhase1IntroDefeatAttackingFighters_GP_002,P=You from Intersec? I'm Captain Martel of the People's Alliance. I'll fill you in later, we need to clear these fighters off the Tranquility first.
PU_AMartel_CIV_M_PMH_TSGPhase1IntroDefeatAttackingFighters_GP_003,P=Glad you could make it. My name's Martel and this ship's the Tranquility. Once you get these fighters off us, I'll fill you in on the situation.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFinal_GP_001,P=That did it. Bays to the power core should be open. Go and take it out.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFinal_GP_002,P=Last one's down. You should have access to the central power core now.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFirst_GP_001,P=All the generators in that arm are down. Got two more to go. All the turrets on that arm should be vulnerable now.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFirst_GP_002,P=First arm's generators are down. That'll disable the shields on the turrets, but two more to go until we can get to the power core.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageSecond_GP_001,P=That arm's down. Let's keep it up and take out the last one.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageSecond_GP_002,P=Second arm's down. Just one more to go. We got this.
PU_AMartel_CIV_M_PMH_TSGPhase2IntroAssaultStationWeaponType_GP_001,P=One more thing, looks like those power relays are using some heavy shielding, so you might need to hit it with something other than energy weapons.
PU_AMartel_CIV_M_PMH_TSGPhase2IntroAssaultStation_GP_001,P=Onto the crisis at hand, we thought that station was abandoned and sent a pilot to investigate, turns out Shattered Blade were hiding out. We got lit up by their turrets when we tried to attack, so we had to pull back. Comms have been cut off so we haven't been able to make contact or know if they're even alive. The station's one of the older models in the system, so the targeting system on the turrets can't track smaller ships. You'll have to jump through several hoops to get in, but there might be a way to bypass their security and defenses. You'll need to destroy the power relays positioned around the station. Take those out and I'll advise from there.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveFinalCoolerDestroyed_GP_001,P=That was the last cooler. Power core's exposed. Take it out and we can hopefully re-establish comms with Gabe, our pilot.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveFinalCoolerDestroyed_GP_002,P=Last cooler's been taken out. You should have a shot at the power core now. Good luck
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveIntro2A_GP_001,P=That was the last one. You should have access to the station arms. If you make your way inside, you'll need to take out the coolers which will cause the central power core to open up. Just be careful though, we're getting heavy levels of distortion energy in there.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveIntro2A_GP_002,P=The station arms should be open now. You'll need to head inside and destroy the coolers to expose the power core. Scanners are picking up a large amount of distortion energy so you'll have to be quick.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveSuccess_GP_001,P=That was the last one. You should have access to the station arms. If you make your way inside, there are three shield generators per arm. We'll need to take them out to get access to the power core of the station.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveSuccess_GP_002,P=The station arms should be open now. If you're able to get past the turrets and get inside, you'll have to destroy three shield generators that are installed inside each one.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveSuccess_GP_003,P=Without those relays, you should have access to each of the station arms. Head inside and destroy the generators in each. That should expose the power core and let you take out their turrets.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_001,P=Relay down. Nice one.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_002,P=Nice job taking that out.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_003,P=Keep it up. We're almost there.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_004,P=Good hit. Nice work.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_005,P=Relay destroyed. Great job.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_006,P=Relay taken out.
PU_AMartel_CIV_M_PMH_TSGPhase3IntroInterceptBombers_GP_001,P=Dammit, picking up multiple Shattered Blade bombers. Guess they don't like what we're doing here. We're gonna need some help.
PU_AMartel_CIV_M_PMH_TSGPhase3IntroInterceptBombers_GP_002,P=Shattered Blade just sent a bunch of bombers. Any chance you could lend a hand? We'll need it.
PU_AMartel_CIV_M_PMH_TSGPhase4DestroypowercoreSuccess_GP_001,P=Great job. Taking out the power core should trigger a station-wide override which should reset all the Shattered Blade protocols.
PU_AMartel_CIV_M_PMH_TSGPhase4ReminderDestroyPowerCore_GP_001,P=We still got to take out the power core if we want to get our pilot back.
PU_AMartel_CIV_M_PMH_TSGPhase5Remind_GP_001,P=Might want to hurry up in there. Getting a little hectic out here.
PU_AMartel_CIV_M_PMH_TSGPhase5Remind_GP_002,P=Hate to bother you, but you should get a move on.
PU_AMartel_CIV_M_PMH_TSGPhase5Remind_GP_003,P=Situation's going from bad to worse out here. I'd move if you can.
PU_AMartel_CIV_M_PMH_TSGPhase5SavePilotCaptainsResponse_GP_001,P=We got you, Gabe. Glad to hear you're alright. We got some help here who're gonna get you out of there. I'll leave it to you two to get you back in the air.
PU_AMartel_CIV_M_PMH_TSGPhase5SavePilotCaptainsResponsetoForgeThreat_GP_001,P=I don't like the sound of that. You'll need to hurry. Also, if you need to restock, I'd do it now. We'll need to shell up if Vanduul show up.
PU_AMartel_CIV_M_PMH_TSGPhase5Success_GP_002,P=No chance, Gabe. I want you out of here. We got Vanduul incoming and you're in no condition to tangle with them. You quantum out of here now.
PU_AMartel_CIV_M_PMH_TSGPhase5VanduulWarning_GP_001,P=Long range sensors flagged incoming contacts. You might want to hurry up.
PU_AMartel_CIV_M_PMH_TSGPhase5VanduulWarning_GP_002,P=Vanduul contacts heading to our position. Got a little time but not much.
PU_AMartel_CIV_M_PMH_TSGPhase6AttackMauler_GP_001,P=If you're up for it, we're going to try and take down that Mauler. It's too dangerous to let run loose in the system.
PU_AMartel_CIV_M_PMH_TSGPhase6BonusObjectiveSuccess_GP_001,P=Oh, one more thing. Not sure if it helps you at all, but we intercepted a code in some chatter when the Shattered Blade atttacked. If you're thinking of looking into that station, maybe it'll mean something there.
PU_AMartel_CIV_M_PMH_TSGPhase6EscapeMaulerIdrisLeaving_GP_001,P=Alright, we can't afford to stick around any longer, not with that cap ship here. You should quantum away while you still can. Good luck.
PU_AMartel_CIV_M_PMH_TSGPhase6EscapeMauler_GP_001,P=You should get out of here while you can. We'll hold off the Vanduul.
PU_AMartel_CIV_M_PMH_TSGPhase6FailPilotDead_GP_001,P=Wanted to thank you for trying to save Gabe. Universe is just getting more dangerous. We all should be sticking together and looking out for each other more. Anyway, we should go. Take care.
PU_AMartel_CIV_M_PMH_TSGPhase6FailPilotDead_GP_002,P=Never gets easier losing a volunteer under your command. But we can carry on what Gabe believed in: making Nyx a safer place for everyone. Let's all do our part, okay? Take care.
PU_AMartel_CIV_M_PMH_TSGPhase6GabeDiesCaptainsresponse_GP_001,P=Dammit. Gabe's down…
PU_AMartel_CIV_M_PMH_TSGPhase6GabeEscapesCaptainsresponse_GP_001,P=Thanks for getting Gabe out of here.
PU_AMartel_CIV_M_PMH_TSGPhase6SuccessCaptainsresponse_GP_001,P=Just want to say, you really stepped up today. My people and I all appreciate your tenacity and hard work. Hope to see you around Levski some time.
PU_AMartel_CIV_M_PMH_TSGPhase6SuccessCaptainsresponse_GP_002,P=I never would've thought anyone from the UEE would've stood with us like this. Thank you. I hope you find peace where you seek it. Take care.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerArrives_GP_001,P=Eyes up all. Vanduul cap ship just showed up. Keep doing what you're doing. We'll hold them off as long as we can.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerArrives_GP_002,P=Got a vanduul cap ship on site. Gabe, get the hell out of here. We'll hold them off.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerArrives_GP_003,P=New contact. Vanduul cap ship quantumed in. Get Gabe out of here. We'll get their attention.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerDestroyed_GP_001,P=Vanduul cap ship down! I can't believe you did that.
PU_AMartel_CIV_M_PMH_TSGPhase7MissionComplete_GP_001,P=That looks like all of it. The Governing Committee will be thrilled to hear we managed to get our hands on actual data pulled from a Vanduul cap ship. Anyway, top notch work. I got the higher ups to give you something special for all your trouble. Thanks again.
PU_AMartel_CIV_M_PMH_TSGPhase7VanduulDataDiscoveredMissionStart_GP_001,P=Hey, it's Captain Martel again.  I've never seen someone take down one of those Maulers. Not outside of the Navy at least. What you're looking at there is one of their data stores. We've been trying to get a better sense of their numbers in Nyx and those can help. If you can pull the rest of the data, it'll give the Alliance a serious advantage.
PU_AMartel_CIV_M_PMH_TSGTargetEncouragement_GP_001,P=Take out that target.
PU_AMartel_CIV_M_PMH_TSGTargetEncouragement_GP_002,P=Hate to rush you but we need that taken out.
PU_AMartel_CIV_M_PMH_TSGTargetEncouragement_GP_003,P=Need that target dealt with.
PU_DELOIT_UWC_F_PMH_GenericMissionAbandon_GP_001,P=Oh dear. I'm so sorry you're not going to be able to finish this one. I hope you're feeling alright. Well, maybe things'll work out better next time. Talk to you soon.
PU_DELOIT_UWC_F_PMH_GenericMissionAbandon_GP_002,P=Woah, quitting, huh? I'll be honest, I'm a bit surprised, but I get it, life happens. Just don't make it a habit, okay? Later.
PU_DELOIT_UWC_F_PMH_GenericMissionAbandon_GP_003,P=Wait, you're canceling the contract? Really? Okay then… If you think that's what's best…
PU_DELOIT_UWC_F_PMH_GenericMissionAccept_GP_001,P=Heya, DD here. Thanks for hopping onto this job. I think you're gonna be perfect for it. Just take it one step at time and be safe out there, okay?
PU_DELOIT_UWC_F_PMH_GenericMissionAccept_GP_002,P=Hey again. It's DD. I was wondering when you'd come back for another contract. Anyway, time's a wasting so we better hop to it!
PU_DELOIT_UWC_F_PMH_GenericMissionAccept_GP_003,P=Hi! It's DD again. Always love seeing your name pop up on a contract. You have the details so be good out there and we'll talk later.
PU_DELOIT_UWC_F_PMH_GenericMissionComplete_GP_001,P=It's DD. Just calling to say I appreciate that you're the dependable sort. Just the kind of pilot Wayfarer needs. Safe flying and don't be a stranger, you hear?
PU_DELOIT_UWC_F_PMH_GenericMissionComplete_GP_002,P=Look at that. Contract complete. Always good to see. Anyway, get some rest, and we'll talk soon.
PU_DELOIT_UWC_F_PMH_GenericMissionComplete_GP_003,P=Wayfarer could use a few more pilots like you, that's for sure. Enjoy the pay, and I'm sure we'll have another contract for you soon.
PU_DELOIT_UWC_F_PMH_GenericMissionFail_GP_001,P=DD here. Always tough when the job doesn't work out. Only thing we can do is learn and move on. Take a little break and I'll see you on the next one.
PU_DELOIT_UWC_F_PMH_GenericMissionFail_GP_002,P=DD calling from UWC. Doesn't look like that job's working out. It happens to the best of us. Don't let it bring you down and get back out there soon.
PU_DELOIT_UWC_F_PMH_GenericMissionFail_GP_003,P=Oof. That's a tough break. I'm so sorry this one didn't go your way. Keep your chin up, okay?
PU_DELOIT_UWC_F_PMH_MissionAcceptIntro_GP_001,P=Let me be the first to say welcome aboard. There's always plenty of people out there counting on Wayfarer's help so its good when a new pilot joins the fray. I'm Dina Deloit but you can call me DD, everyone else does. I'll be your main dispatcher. What do you say we get you going, huh? Clients aren't gonna take care of themselves.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_001,P=Uh oh. Something doesn't feel right here… Look out!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_002,P=That's weird. I don't see a ship… careful! It's a trap.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_003,P=Hey! It's a set up! Watch out!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_001,P=Allrighty, looks like you just arrived, so I'm gonna patch you into the client.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_002,P=Great, you made it. I'll patch the client into you now.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_003,P=Okay, now that you're onsite I'll get you patched in with the client…
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_001,P=Hey, heads up! You got trouble coming your way. Look sharp.
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_002,P=Hey. Get ready. You got some hostiles that'll be there any moment. 
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_003,P=Bad news. Picked up some hotstiles heading right for you.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_001,P=Hey there, it's DD. Thanks for hopping on this refueling contract. Don't know about you, but the thought of being stranded without fuel scares the hell outta me. Well, thankfully they got you to rescue them.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_002,P=Hiya, DD here. Let's see what you got cooking today… Alright, a refueling job. What would we do without folks forgetting to top off, huh? Anyway, I'll leave you to it.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_003,P=Heyo, it's DD again. Looks like we got you booked for a refueling job. Good luck and be safe out there.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_001,P=Oh my. That poor soul... And I'm afraid there's more bad news. Without a ship to refuel, I have to cancel the contract. Next one will have a happier ending I hope. Be safe, you hear?
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_002,P=I can't believe the client didn't make it. At least you're still with us, huh? Silver linings and all that. Unfortunately, I am going to have cancel the contract. Better luck next time.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_003,P=While I love this job, some days sure are tougher than others. Not only is the client gone, but I have to cancel the contract too. Well, tomorrow's another day, right? Talk soon.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_001,P=Whew! I am pleased you made it out of that mess. And don't worry about the contract. I arranged for Wayfarer's to give you some credits anyway. I mean, it wasn't your fault the service request ended up being bait. 
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_002,P=Thank heavens you're alright. Now, normally no client means no pay, but I was able to swing some compensation for your trouble. Hopefully that makes your day a little brighter. Be safe out there, okay.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_003,P=Can't believe you're okay. That was pretty scary, but I was able to get you some hazard pay for all your trouble. That way we can get you back out there as soon as possible, alright? Let's talk soon.
PU_Forge_SHA_M_PMH_TSGPhase2TauntKnown_GP_001,P=Well shit. It's you again. Can't seem to be rid of you, can I? Oh well, maybe we'll have better luck this time and put you in the fucking ground.
PU_Forge_SHA_M_PMH_TSGPhase2TauntKnown_GP_002,P=Back again? I was hoping someone killed you by now. Well, guess we'll have to take care of that.
PU_Forge_SHA_M_PMH_TSGPhase2TauntKnown_GP_003,P=I'm gonna say it, I’m glad I ran into you again. You killed a lot of good people. Time for payback, asshole.
PU_Forge_SHA_M_PMH_TSGPhase2Taunt_GP_001,P=You know, we had a really nice thing going. We were left alone doing our thing, but now we can't turn around without running into one of you UEE assholes.
PU_Forge_SHA_M_PMH_TSGPhase2Taunt_GP_002,P=You have any idea how long it took us to fortify this place?
PU_Forge_SHA_M_PMH_TSGPhase2Taunt_GP_003,P=Here's an idea, can I hire you to just piss off? That's all you mercs care about anyway, right?
PU_Forge_SHA_M_PMH_TSGPhase3Taunt_GP_001,P=How about this? We blast the shit out of that idris and you can leave. That sound good? You won't have any reason to stay then.
PU_Forge_SHA_M_PMH_TSGPhase3Taunt_GP_002,P=People's Alliance could've just walked away. You could have too. But now they die. This should have been so much simpler.
PU_Forge_SHA_M_PMH_TSGPhase3Taunt_GP_003,P=Fine. We're gonna go scorched earth, pure annihilation. It's the one thing the Vanduul do right.
PU_Forge_SHA_M_PMH_TSGPhase5Taunt_GP_001,P=<crazy scrambled sound> You like that? Hell if I know what it means, but what I do know is that you blast that out on comms, some Vanduul are sure to come running. Have fun.
PU_Forge_SHA_M_PMH_TSGPhase5Taunt_GP_002,P=<crazy scrambled sound> Have you seen what Vanduul do to Humans? It's ugly… raw… merciless. Don't worry if you haven't. You're about to.
PU_GWindell_CIV_M_PMH_TSGGenericDeathThroe_GP_001,P=Shit, shit, shit <death scream>
PU_GWindell_CIV_M_PMH_TSGGenericDeathThroe_GP_002,P=Help, help, help!
PU_GWindell_CIV_M_PMH_TSGGenericDeathThroe_GP_003,P=Please anybody!
PU_GWindell_CIV_M_PMH_TSGGenericHostileKilledEncouragement_GP_001,P=Damn, you're good at this.
PU_GWindell_CIV_M_PMH_TSGGenericHostileKilledEncouragement_GP_002,P=Oh shit, that was amazing.
PU_GWindell_CIV_M_PMH_TSGGenericHostileKilledEncouragement_GP_003,P=You got 'em. You got 'em.
PU_GWindell_CIV_M_PMH_TSGGenericNeedHelp_GP_001,P=These ships are chewing me up.
PU_GWindell_CIV_M_PMH_TSGGenericNeedHelp_GP_002,P=Anybody lend a hand with these ships?
PU_GWindell_CIV_M_PMH_TSGGenericNeedHelp_GP_003,P=Somebody get these fighters.
PU_GWindell_CIV_M_PMH_TSGPhase5DestroyTerminalUponEnter_GP_001,P=Hey, Gabe here. I'm holed up in my ship and safe… for now at least. You'll need to get to the hangar terminal to open the outer doors so I can get out.
PU_GWindell_CIV_M_PMH_TSGPhase5SavePilotPilotdistresscall_GP_001,P=Mayday, mayday, mayday... Do you copy? Tranquility, it's Gabe.
PU_GWindell_CIV_M_PMH_TSGPhase5SuccessReward_GP_001,P=You did it. Hangar's open and launching now. Captain Martel, I'm ready to get back in there.
PU_GWindell_CIV_M_PMH_TSGPhase6ArrivesatDestination_GP_001,P=We're far enough away. I'll need some time to spin up the quantum drive.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionComplete_GP_001,P=Spun up. Thanks for getting me out of there.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionReminder_GP_001,P=I won't be able to quantum with all these fighters on me.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionReminder_GP_002,P=You need to clear out these fighters so I can spin up.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionReminder_GP_003,P=There are too many fighters to quantum away. Clear them out.
PU_GWindell_CIV_M_PMH_TSGPhase6SuccessReward_GP_001,P=Hey, sorry I couldn't stick around and help out, but back when I was trapped on the station, I saw some of the Shattered Blade accidentally drop a keycard. If you're poking around their station, maybe it will help out. Thanks again and see you around.
PU_HAWKER1_SK_WalkPast_NoBuy_IG_001_YourePassingOn,P=You're passing on the deal of the century.
PU_HAWKER1_SK_WalkPast_NoBuy_IG_002_OiWhereYou,P=Hey, where you going?
PU_HAWKER1_SK_WalkPast_NoBuy_IG_003_WhyTheRush,P=Why the rush, my friend?
PU_HAWKER1_SK_WalkPast_NoBuy_IG_004_AllRightSome,P=All right some other time then. You know where to find me.
PU_HAWKER2_SK_WalkPast_NoBuy_IG_001_YourePassingOn,P=You're passing on the deal of the century.
PU_HAWKER2_SK_WalkPast_NoBuy_IG_002_HeyHeyHey,P=Hey, hey hey hey, where you going?
PU_HAWKER2_SK_WalkPast_NoBuy_IG_003_WhyTheRush,P=Why the rush, my friend?
PU_HAWKER2_SK_WalkPast_NoBuy_IG_004_OkaySomeOther,P=Okay, some other time then. You know where to find me.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Well, that was absolutely terrifying. Okay, let's hurry up and get the fuel transfer done.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=Is that all of them? Alright, how about we finish this and get the hell out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Thank you. This system's getting more dangerous by the day. Let's finish this before more show up.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_001,P=That's it. Ready to go. Thanks again and sorry for the trouble.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_002,P=Okay. Fuel transfer's done. Thanks for the rescue. I hope it wasn't too much bother for you.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_003,P=Phew. All refueled. Thanks so much for the help. I'm going to try to be a bit better about watching my gauges next time.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=Great. We're docked up. Go ahead and authorize the fuel transaction.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Docking complete. Just need you to confirm the fuel transaction.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=That should do it. Set the fuel transaction terms, and I'll take a look.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Hold up. I lost connection.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Hey, I still need more fuel.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Wait, the fuel transfer wasn't done yet.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Hey, thanks for showing up. I feel like an idiot for running out of fuel. If you want to dock up quick, we can get this over with.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=Hey, over here. I'm really sorry about this. I could've sworn I calculated the distance right… Anyway, let's get docked up so you can get on your way.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Hi. Sorry, this is really embarassing. I had a bunch of things I needed to pick up from the last transfer station and I guess I forgot to get fuel. Such a rookie mistake. Anyway, sorry, if we can get docked, I can get you out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=All right, come back soon. I'll be here waiting.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=No worries, take care of whatever you have to. I'll be here when you're ready.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Oh, you're leaving… yeah, sure, that's fine. I can wait.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Okay, let's get reconnected so we can get out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Welcome back. Let's dock and finish the refuel.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=Glad you made it. I'm ready to dock when you are.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=That's great. Seeing the fuel transfer now.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=That price's a bit higher than I was expecting.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Holy shit! Who the hell is that?!
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Got company… got bad company…
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Help! I'm under attack.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=Hey! What gives?
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Why did you do that?!
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell's the matter with you?
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Thank the powers. Gotta admit it got tense there for a moment. Now that's done, let's finish up.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=That was close. Let's finish refueling so I can get gone.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Glad that's over. Hopefully we can finish up without any more issues.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_001,P=Alright. Looks like we're done. I'm out of here.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_002,P=Okay. I'm refueled. Thanks. And sorry if I was a bit short with you. Just one of those days. Safe flying.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_003,P=There. Tank's full. Thought I would never get out of here. Okay. I'm off.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=We're connected. Get the pricing set so we can get going.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Docked. Go ahead and send the pricing over.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Connection confirmed. Set the transaction terms so we can get started.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Hey, I wasn't done refueling yet.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_002,P=What's going on? We're not done refueling.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Something wrong? I still need more fuel.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Good, you're here. Go ahead and dock so we can get this show on the road.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=About time. Was about to lose my mind if I had to float any longer. Get docked so I can get out of here.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Glad someone showed up. Why don't you hurry up and dock. No reason this has to take any longer than it needs to.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Okay… Guess I'm supposed to just wait here then?
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=Hurry up and come back, okay? I don't want to spend all day waiting on you.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Sure... Leave me waiting here. It's not like I have anything better to do.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=How about you dock so we can finish this. Or are you going to waste more of my time?
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=There you are. Dock already and we can wrap this up.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=And my savior returns. How about you dock so I can get going.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Filling up my tank now. Should be done soon.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=That's more than I can pay.
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Damn it. What else can go wrong today!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Crap! Get them off me!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=You gotta be kidding me. First the fuel, and now this?
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=What the hell are you doing?!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Have you lost your mind?
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell was that for?
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Seems we're safe for now. Better finish refueling.
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=I think that was the last of 'em. Let's finish sorting my fuel while we can.
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=All clear. Hopefully we can finish refueling before any more trouble shows up.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_001,P=And there we go. Topped off and ready to fly. Thanks for all your hard work.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_002,P=Done. Thanks for the refuel. Fly safe out there.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_003,P=Great. All fueled up. Though here's hoping I won't need your services again for a while.
PU_RefuelNPC03_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=All right. Connected. Not too bad. Just need you to approve the fuel transaction.
PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=There we go. All hooked up. I'm ready to look at the fuel transaction terms as soon as you send 'em my way.
PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Looks like we're set. Go ahead and confirm the fuel transaction.
PU_RefuelNPC03_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Uh… you know we're not done yet, right?
PU_RefuelNPC03_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Hold on there. I'm still not refueled yet.
PU_RefuelNPC03_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Whoa, what's happening? I still need more fuel.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Ah, perfect. You're here. Appreciate the help. Can't believe I ran out. Anyway, I'm ready to dock when you are.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=Great, thanks for coming. I'm all set to dock so we can start whenever you want. I actually used to fly a tanker myself so I know what it's like. Makes it that much more embarassing that my fuel dried up. Anyway, I'll leave you to it.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Hey, you made it. Thanks for coming. Where would the 'verse be without refuelers like you, huh? I've got everything set up so we can start the transfer once you're docked.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Okay, if you got something urgent, I can just hold tight until you get back with the rest of the fuel.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=Oh, you're ducking out for a minute? No worries. I'll hang out here. Just hurry back, okay?
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=We taking a little break? Just don't take too long, all right. Would be good to get back flying soon.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Welcome back. I'm still ready to dock.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Nice to see you again. Let's get docked and refueled.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=Glad you made it back. Shall we go ahead and get this refueling sorted once and for all?
PU_RefuelNPC03_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Okay, fuel transferring now.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=You better be joking with that price. Try again.
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Oh, shit. I'm taking fire!
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Damn it. Could they have picked a worse time?
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Can you believe these assholes?
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=What the hell's gotten into you?
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Hey, you're supposed to help me, not shoot me.
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What was that for?
PU_RefuelNPC04_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Geez. That was too close. Finish refueling before any more trouble shows up.
PU_RefuelNPC04_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=Was that all of them? Let's finish refueling so I can get the hell out of here.
PU_RefuelNPC04_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Good riddance. Now hurry up and finishing refueling me.
PU_RefuelNPC04_CIV_M_ATC_RefuelingComplete_GP_001,P=There. All done. And no, you won't be getting a tip.
PU_RefuelNPC04_CIV_M_ATC_RefuelingComplete_GP_002,P=That's it. Got my fuel. Bye.
PU_RefuelNPC04_CIV_M_ATC_RefuelingComplete_GP_003,P=Good. We're finally finished. I'm out of here.
PU_RefuelNPC04_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC04_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=Docked. Set the transaction to what we agreed.
PU_RefuelNPC04_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Okay. We’re docked. Just set the transaction price to what was agreed.
PU_RefuelNPC04_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Everything's connected. Set the price to what I specified. No funny stuff.
PU_RefuelNPC04_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Where the hell are you going with my fuel?
PU_RefuelNPC04_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Hey, we're not done here.
PU_RefuelNPC04_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Uh, if you hadn't noticed, you didn't finish refueling me.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=You must be my refueler. And before you ask, no, I don't want any extra services. Just the refuel. Now go ahead and dock.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=I was wondering when my tanker was going to show up. Anyway, what are you waiting for? Go ahead and dock.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Let's just skip the pleasantries, okay? You're here to do a job, so go ahead and dock.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=You're leaving? I guess I don't have anything better to do with my time than wait around here for you to come back.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=I can't believe you're leaving without finishing. Fine. Whatever. Just get back as soon as possible.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Wow. How professional. Guess I'm expected to just sit here waiting for you to feel like coming back? Sure. Why not.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Finally. Dock so we can get this over with.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Look who decided to come back? Dock already and finish refueling me.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=About time. You know, I should really get a discount after sitting here waiting. Whatever, go ahead and dock. I'm late enough as it is.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Okay, fuel's transferring. And don't bother with small talk.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=I'm not paying that.
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Damn it! I can't afford extra repairs right now!
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=What the hell are they shooting me for?
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Oh, hell no! Get them off me!
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=Watch what you're shooting!
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Hey! That how you treat a customer?
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell? You're shooting at me?!
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_001,P=Hey there, I'm gonna be your refueler for today. Go ahead and request to dock so we can started.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_002,P=Low on gas, huh? Happens to the best of us. Well, request to dock and we can see about getting you back out on the move.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_003,P=How's it going? Got some fuel here with your name on it. Just need yo to request to dock and we can get you out of here.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_001,P=Okay, glad that's over. Let's finish up the refueling while we can.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_002,P=I think we're good. Connect the ships before more show up.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_003,P=That all of them? Good. Let's get you fueled up.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_001,P=All right, you should be all set. Hope you have a good rest of your day.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_002,P=Tank's full. Stay safe out there.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_003,P=We are all good now. Tank's full and space awaits. Take it easy.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_001,P=Okay, we're all connected. Once you confirm the fuel purchase from you mobi I can start the transfer.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_002,P=Alright… link established. You should be able to see the fuel purchase order in your mobi now. Once you confirm I can start filling your tanks.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_003,P=And there we go. Linked up. Now we just need you to sign off on the fuel purchase in your mobiGlas.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_001,P=You know what, I got other clients waiting. We're done here.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_002,P=Okay, I think I know where this is headed. I'm out of here.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_003,P=I don't have time for this. Good luck.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_001,P=Okay, transferring fuel now.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_002,P=Great, starting fuel transfer.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_003,P=Looks good. Fuel's a-flowing.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_001,P=Woah! The transfer wasn't done yet.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_002,P=Why'd you break? You aren't refueled.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_003,P=Lost the connection. What happened?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Where do you think you're going? What about the rest of the fuel?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=What's going on? Your ship's not full yet.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Uh… hello? We haven't finished the refueling.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Damn it, we got trouble.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Look out. Got some hostiles.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Watch it. They don't look like they're here to help.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=Hey! I'm trying to help you!
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=What the hell are you doing?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=Oh hell no. I'm out of here.
PU_Tobin_INT_M_PMH_TSGMissionAbandon_GP_001,P=I'll need to find someone else to take care of this contract.
PU_Tobin_INT_M_PMH_TSGMissionAbandon_GP_002,P=Look, InterSec can't use people who don't follow through on contracts. If you're gonna work for us, make sure you can commit.
PU_Tobin_INT_M_PMH_TSGMissionAbandon_GP_003,P=You're walking away from a volatile situation that still needs to be resolved. Please don't do this in the future.
PU_Tobin_INT_M_PMH_TSGMissionAcceptIntro_GP_001,P=This is Deacon Tobin. I'll be your op manager over here at Intersec. An anonymous source has indicated that a People's Alliance security ship has been crippled by a Shattered Blade station and desperately needs help. I've contacted their captain and told them that you're inbound with all due haste. They'll establish contact and walk you through what needs to be done when you arrive.
PU_Tobin_INT_M_PMH_TSGMissionAccept_GP_001,P=Deacon from Intersec here. These People's Alliance ships seem to keep kicking the hornet's nest. You know the drill. They'll direct once you're on site. Good luck.
PU_Tobin_INT_M_PMH_TSGMissionAccept_GP_002,P=Intersec calling. Seems the People's Alliance found another Shattered Blade station and are in need of help. Scramble to the AO as quick as you can and they'll direct from there.
PU_Tobin_INT_M_PMH_TSGMissionAccept_GP_003,P=Tobin at Intersec calling. Got another situation between the People's Alliance and Shattered Blade. Head out there and they'll advise.
PU_Tobin_INT_M_PMH_TSGMissionFail_GP_001,P=Hate to do it, but I'm calling this operation. There is a zero chance of success now.
PU_Tobin_INT_M_PMH_TSGMissionFail_GP_002,P=I'm pulling you out. We've lost any chance of completing this mission.
PU_Tobin_INT_M_PMH_TSGMissionFail_GP_003,P=This op isn't going to work. We've lost control of the situation.
Pyro1_desc=Orbiting very close to Pyro's volatile star, Pyro I has high temperatures and atmospheric pressure.\n\nPotential Ship Mineables:\nIron\nCopper\nTin\nStileron\n\nPotential Ground Vehicle Mineables:\nBeradon\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nDecari Pod\nFotia Seedpod\nWuotan Seeds\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
Pyro2_desc=The coreless Monox, nicknamed for the toxic carbon monoxide in its part-oxygen atmosphere, bears the scars of old mining operations.\n\nPotential Ship Mineables:\nHephaestanite\nIron\nTin\nStileron\n\nPotential Ground Vehicle Mineables:\nGlacosite\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nPingala Seeds\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)\n\nPotential Creatures:\nQuasigrazer
Pyro3_desc=This icy terrestrial world has a breathable atmosphere of nitrogen and oxygen and has been overrun by outlaws.\n\nPotential Ship Mineables:\nQuartz\nBorase\nRiccite\nStileron\n\nPotential Ground Vehicle Mineables:\nBeradon\n\nPotential Hand Mineables:\nAphorite\nDolivine\nJanalite\n\nPotential Harvestables:\nFlareweed Stalk\nAmiant Pod\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)\n\nPotential Creatures:\nQuasigrazer
Pyro4_desc=Astronomers theorize that in the distant past, Pyro IV collided with a planet-sized mass, warping the landscape and knocking it into the orbit of Pyro V.\n\nPotential Ship Mineables:\nCopper\nLaranite\nBorase\nStileron\n\nPotential Ground Vehicle Mineables:\nFeynmaline\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)\n\nPotential Creatures:\nQuasigrazer
Pyro5a_Ignis_desc=This innermost moon of Pyro V is covered in deep canyons and dried riverbeds. No other signs of water remain on its desiccated surface.\n\nPotential Ship Mineables:\nTin\nSilicon\nGold\nRiccite\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
Pyro5b_Vatra_desc=The thick, high-pressure nitrogen-methane atmosphere of this moon hides a dark and eerie landscape.\n\nPotential Ship Mineables:\nIron\nSilicon\nGold\nRiccite\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
Pyro5c_Adir_desc=The crater-ridden surface of Adir is interspersed with rocky hills and jagged mountains.\n\nPotential Ship Mineables:\nIron\nTungsten\nBorase\nRiccite\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
Pyro5d_Fairo_desc=Frequent earthquakes rock Fairo, causing spectacular waves in its brackish seas.\n\nPotential Ship Mineables:\nSilicon\nTungsten\nGold\nBexalite\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
Pyro5e_Fuego_desc=High amounts of iron-sulfide in Fuego’s soil turn it a livid shade of yellow-black.\n\nPotential Ship Mineables:\nHephaestanite\nAslarite\nBorase\nBexalite\n\nPotential Hand Mineables:\nAphorite\nDolivine\nJanalite\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
Pyro5f_Vuur_desc=The carbon-rich soil of Vuur supports unique forms of plant life that use crystalline carbon in their base structures.\n\nPotential Ship Mineables:\nHephaestanite\nAgricium\nAslarite\nBexalite\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
Pyro6_desc=Terminus is a frigid, barely-habitable planet with a methane-laced atmosphere.\n\nPotential Ship Mineables:\nIce\nCopper\nAgricium\nTitanium\nGold\nRiccite\nStileron\n\nPotential Hand Mineables:\nAphorite\nDolivine\nJanalite\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nBluemoon Fungus (Caves)
