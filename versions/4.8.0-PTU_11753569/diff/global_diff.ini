FTLCourier_RepUI_Description=Specializing primarily in the delivery of small, handheld parcels, FTL have established a reputation as the empire’s #1 courier service. As a company, FTL are always seeking new ways to ensure clients’ shipments get where they are going faster and more securely, ensuring that “when you need a parcel delivered, nothing's Faster Than Light.”
