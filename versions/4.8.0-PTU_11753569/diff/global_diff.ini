item_fuelpod_GRIN_BigAndFast_Desc=Manufacturer: Greycat Industrial\nItem Type: Fuel Pod\nFlow Modifier: +30%\nCapacity: 12.35 SCU\n\nGreycat's products have long been a staple of the industrial and commercial sectors and their reputation for quality and reliability extends to their fuel pods. The Gargant is the largest of Greycat's range and boasts refueling speeds that set new standards for a pod this size.
item_fuelpod_GRIN_BigAndFast_Name=Gargant
item_fuelpod_GRIN_FastAndSmall_Desc=Manufacturer: Greycat Industrial\nItem Type: Fuel Pod\nFlow Modifier: +70%\nCapacity: 4.75 SCU\n\nThe Greycat Bonito offers a best-in-class transfer speed in a compact unit. This comes at the cost of capacity, making the Bonito best suited to fast-turnaround missions refueling medium to small vessels.
item_fuelpod_GRIN_FastAndSmall_Name=Bonito
item_fuelpod_SHIN_BitQuckerThanStandard_Desc=Manufacturer: Shubin Interstellar\nItem Type: Fuel Pod\nFlow Modifier: +43%\nCapacity: 10 SCU\n\nShubin's fuel pods draw on a wealth and depth of experience and expertise built over centuries of development and innovation. The Nemec is an effective all-rounder, despite sacrificing some damage resistance in order to facilitate higher fuel transfer speeds.
item_fuelpod_SHIN_BitQuckerThanStandard_Name=Nemec
item_fuelpod_SHIN_FastAndInsecure_Desc=Manufacturer: Shubin Interstellar\nItem Type: Fuel Pod\nFlow Modifier: +87%\nCapacity: 10 SCU\n\nThe Shubin Rumford prioritizes - and achieves - high fuel transfer speed over durability, making it a good choice for a refuelling run through protected space.
item_fuelpod_SHIN_FastAndInsecure_Name=Rumford
item_fuelpod_STOR_BigandSlow_Desc=Manufacturer: Stor*All\nItem Type: Fuel Pod\nFlow Modifier: -55%\nCapacity: 16.8 SCU\n\nThe Stor*All GSX-EX offers an impressive combination of premium size and protection, and should be given serious consideration when refueling speed is less of a priority.
item_fuelpod_STOR_BigandSlow_Name=GSX-EX
