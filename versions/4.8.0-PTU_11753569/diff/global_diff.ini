item_DescBuccaneer_Paint_Red_Red_Black=Featuring a fierce red base paint with black highlights, the Redline livery gives the Buccaneer a bold new look.
item_DescCOOL_VNCL_S04_Mauler=This Vanduul cooler processes the excessive heat generated by the Mauler during intense combat.
item_DescCarryable_TBO_MissionItem_TSG_FuelTank=This container from the QV Extraction Facility's operational days contains quantanium fuel that has been improperly stored causing a chemical anomaly in the fuel.
item_DescDRAK_CML_Chaff,P=Drake Noise Launcher
item_DescDRAK_CML_Flare,P=Drake Decoy Launcher
item_DescFlair_Dashboard_Cockpit_Bot_1_a,P=Made to sit neatly on your dashboard, this companion Dashbot reacts during your travels with a large range of humorous facial expressions. Whether it's happy to see you or silently judging your piloting skills, the Emoto Dashbot is sure to make your next flight a little more fun.
item_DescHTNK_VNCL_S04_Mauler=The Vanduul Mauler's Hydrogen Fuel Tank stores fuel to power the Mauler conventional engines and thrusters.
item_DescHermes_Paint_White_Blue_Blue=Crisp white with blue accents, the Keystone livery celebrates the workers whose mining, refining, hauling, salvaging, and more have made the empire what it is today.
item_DescHullB_Paint_Black_White_Yellow=Cargo hauling takes on a bold new look with the Hull B Empyrean Livery which features a dynamic tricolor design. Yellow highlights divide a white nose from a grey engineering section lending the appearance of speed to the freighter.
item_DescHullB_Paint_Black_Yellow_Black=For the long haul cargo captains who prefer to make a subtle statement when it comes to their freighter, MISC offers the distinguished Hull B Dusk Livery. A complete grey hull highlights the ship's classic silhouette with tasteful gold trim.
item_DescHullB_Paint_Brown_White_Bronze=Even a hard working spacecraft deserves to look its best. The Hull B Horizon Livery offers a stylish two-tone grey-and-white color scheme that's ideal for turning heads at the spaceport.
item_DescHullB_Paint_White_Blue_Blue=Crisp white with blue accents, the Keystone livery celebrates the workers whose mining, refining, hauling, salvaging, and more have made the empire what it is today.
item_DescHullB_Paint_Yellow_Yellow_Black=Haulers looking to create buzz about the look of their Hull B should equip the First Light livery with its black front and yellow back sections.
item_DescINTK_VNCL_S04_Mauler=This Fuel Intake replenishes the hydrogen fuel stores for the Mauler to keep its tanks full during combat maneuvers.
item_DescMISC_Hull_B_MRCK_S06_Bespoke=Item Type: Missile Rack\nManufacturer: MISC\nSize: 6\nMissiles: 8xS3\n\nBespoke missile rack for the MISC Hull B that fires eight S3 missiles.
item_DescPOWR_VNCL_S04_Mauler=The Vanduul Mauler's built-in Power Plant generates enough energy for the operation of essential systems, even in heavy combat.
item_DescPlayerDeco_Flair_Banu_Instrument_1_a=Inspired by Human-made instruments which were the Banu's first introduction to music, this ornately decorated Ochelo features four strings on a raised fret and a leather-skinned drum base. Some of the most popular practitioners of the instrument have risen to fame performing as buskers in markets and city squares. 
item_DescQDRV_VNCL_S04_Mauler=This Quantum Drive has been calibrated to allow for the Mauler to undertake long and short quantum travel as well as access jump points.
item_DescQTNK_VNCL_S04_Mauler=This Quantum Fuel Tank stores fuel to power the Mauler's quantum engine.
item_DescRADR_VNCL_S04_Mauler=The Radar system for the Vanduul Mauler allowing it to detect objects large and small for navigational and combat data.
item_DescRAFT_Paint_White_Blue_Blue=Crisp white with blue accents, the Keystone livery celebrates the workers whose mining, refining, hauling, salvaging, and more have made the empire what it is today.
item_DescSHLD_VNCL_S04_Mauler,P=The Mauler's shield generator provides defensive coverage against incoming fire and other threats to the ship.
item_DescUTV_Paint_Brown_Grey_Red=Light brown and grey camo combine with red highlights for the Resistor Camo livery.
item_DescUTV_Paint_Gold_Black_Black=The Bonanza livery gives the UTV a lustrous look with its gold and black finish.
item_DescUTV_Paint_Green_Grey_Red=The Wilderness Camo livery brings a classic green and grey camo pattern to the UTV with red highlights.
item_DescUTV_Paint_Grey_Black_Orange=Bright pops of orange stand out against the grey base paint of the Reckoner livery.
item_DescUTV_Paint_White_Blue_Blue=Crisp white with blue accents, the Keystone livery celebrates the workers whose mining, refining, hauling, salvaging, and more have made the empire what it is today.
item_DescVNCL_Gen2_LaserBeam_S9=Manufacturer: Vanduul\nItem Type: Laser Beam\n\nThis destructive laser beam typically found on Vanduul warships, is commonly known by its \nUEE Navy designation, 'IGNITER'.
item_DescVNCL_Gen2_LaserRepeater_S6=Manufacturer: Vanduul\nItem Type: Laser Repeater\n\nThis close range laser repeater, standard for larger Vanduul capital ships, is referred to by the \nUEE Navy's designation of 'STRIKER'.
item_DescVNCL_Gen2_PlasmaCannon_S8=Manufacturer: Vanduul\nItem Type: Plasma Cannon\n\nThis hard-hitting plasma cannon, often seen on Vanduul battleships, is referred to as 'RAGE,' its UEE designation.
item_DescVNCL_Gen2_TachyonCannon_S10=Manufacturer: Vanduul\nItem Type: Tachyon Cannon\n\nThis devestatingly powerful Tachyon cannon, typically found on large-scale Vanduul \ncapital ships, is more commonly referred to by its UEE Navy designation of 'ANNIHILATOR'.
item_DescVNCL_Gen2_TachyonCannon_S7=Manufacturer: Vanduul\nItem Type: Tachyon Cannon\n\nThis powerful Tachyon cannon, prized on Vanduul warships for it's long range, is more \ncommonly referred to by it's designated UEE designation of 'ERADICATOR'.
item_Desc_COMP_WLOP_S00_Adze=Item Type: Computer\nManufacturer: WillsOp\nSize: 0\nGrade: C\nClass: Civilian\n\nYou can now experience the robust data processing of WillsOp in a mobile form factor with the Adze computing system.
item_Desc_Carryable_2H_CY_CollectorMaterial_001=This is a test for new metamaterial with special design by Wikelo. It will be light and strong but maybe not! Good to test.
item_Desc_Carryable_2H_SQ_CollectorMaterial_002=This a new metamaterial test with design by Wikelo. I think one will this help make things go faster. Last two tests not so good, but maybe this one works. 
item_Desc_hdtc_undersuit_01_01_02=Item Type: Undersuit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +90%\nCarrying Capacity: 8.0 µSCU\n \nThe Lamont looks so good you won't want to wear armor over it. Seamlessly blending lightweight plating with durable synthetic weaves, the Lamont will be as comfortable in the cockpit as it is stylish in the streets. Embrace personal protection gear suitable for both work and play, and gain the Hardin Tactical advantage.\n \nThe Xy'kara undersuit draws inspiration from the millennia-long heritage of the Xi'an.
item_Desc_kap_combat_heavy_arms_02_09_01=Item Type: Heavy Armor\nDamage Reduction: 40%\nTemp. Rating: -77 / 107 °C\nRadiation Protection: 26800 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 7.5 µSCU\n \nFrom the masterwork designers of Kilgore & Poole comes the Monde heavy armor. Effortlessly integrating triple-laminate plating with the latest in defensive technology, this armor provides battle-ready protection with a next-class comfort system and specialized flex-point joints.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_kap_combat_heavy_core_02_09_01=Item Type: Heavy Armor\nDamage Reduction: 40%\nTemp. Rating: -77 / 107 °C\nRadiation Protection: 26800 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 12.0 µSCU\nBackpacks: All\n \nFrom the masterwork designers of Kilgore & Poole comes the Monde heavy armor. Effortlessly integrating triple-laminate plating with the latest in defensive technology, this armor provides battle-ready protection with a next-class comfort system and specialized flex-point joints.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_kap_combat_heavy_helmet_02_09_01=Item Type: Heavy Armor\nDamage Reduction: 40%\nTemp. Rating: -77 / 107 °C\nRadiation Protection: 26800 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nFrom the masterwork designers of Kilgore & Poole comes the Monde helmet. Effortlessly integrating triple-laminate plating with the latest in defensive technology, this armor provides battle-ready protection with a next-class comfort system.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_kap_combat_heavy_legs_02_09_01=Item Type: Heavy Armor\nDamage Reduction: 40%\nTemp. Rating: -77 / 107 °C\nRadiation Protection: 26800 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 7.5 µSCU\n \nFrom the masterwork designers of Kilgore & Poole comes the Monde heavy armor. Effortlessly integrating triple-laminate plating with the latest in defensive technology, this armor provides battle-ready protection with a next-class comfort system and specialized flex-point joints.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_mrai_flightsuit_01_07_02,P=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nMake an unmissable statement in the WhiteHot racing flight suit. Fitting like a second skin without skimping on style, it's pure-white profile enhanced by red accents offers a combination of eye-catching style and function, allowing you to concentrate on what matters most: winning.
item_Desc_mrai_flightsuit_01_07_12,P=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nA racing suit that fits like a second skin without skimping on style, the BlackFire has a sleek monochrome profile enhanced by pale gray accents and offers a low-key combination of looks and protection, allowing you to concentrate on what matters most: winning.
item_Desc_mrai_flightsuit_01_07_18,P=Item Type: Flight Suit\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\nG-Force Tolerance: +100%\nCarrying Capacity: 8.0 µSCU\n\nCut a dashing figure in the BlueFlame racing flight suit. Fitting like a second skin without skimping on style, it's dark blue profile enhanced by red and white accents offers a combination of eye-catching style and function, allowing you to concentrate on what matters most: winning.
item_Desc_mrai_flightsuit_helmet_01_07_02,P=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nMirai’s racing helmets use advanced Xi’an materials to create a comfortable, lightweight helmet durable enough to handle the stresses of high-velocity racing. The WhiteHot helmet features a bright white and red finish paired with a sleek, minimalist aesthetic.
item_Desc_mrai_flightsuit_helmet_01_07_12,P=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nMirai’s racing helmets use advanced Xi’an materials to create a comfortable, lightweight helmet durable enough to handle the stresses of high-velocity racing. The BlackFire helmet features a dark gray finish paired with a sleek, minimalist aesthetic.
item_Desc_mrai_flightsuit_helmet_01_07_18,P=Item Type: Racing Helmet\nDamage Reduction: 5%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\nMirai’s racing helmets use advanced Xi’an materials to create a comfortable, lightweight helmet durable enough to handle the stresses of high-velocity racing. The BlueFlame helmet features a deep blue and red finish paired with a sleek, minimalist aesthetic.
item_Desc_qrt_combat_medium_arms_01_02_01=Item Type: Medium Armor\nDamage Reduction: 30%\nTemp. Rating: -50 / 80 °C\nRadiation Protection: 26400 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nThe Testudo armor for Quirinus Tech blends battlefield durability with everyday comfort. It weaves tough, yet lightweight, plating with ultra-strong synthetic fibers to provide premium protection. Lining the inside is a proprietary micromodal fabric that's soft to the touch and wicks away moisture for supreme comfort.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_qrt_combat_medium_backpack_01_02_01=Item Type: Medium Backpack\nCarrying Capacity: 105K µSCU\nCore Compatibility: Medium & Heavy\n \nThe Testudo backpack may feel as light as a feather in your hands, but it can hold an impressive amount of weight thanks to its use of the same tough yet lightweight plating as the armor set.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_qrt_combat_medium_core_01_02_01=Item Type: Medium Armor\nDamage Reduction: 30%\nTemp. Rating: -50 / 80 °C\nRadiation Protection: 26400 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 8K µSCU\nBackpacks: Medium, Light\n \nThe Testudo armor for Quirinus Tech blends battlefield durability with everyday comfort. It weaves tough, yet lightweight, plating with ultra-strong synthetic fibers to provide premium protection. Lining the inside is a proprietary micromodal fabric that's soft to the touch and wicks away moisture for supreme comfort.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_qrt_combat_medium_helmet_01_02_01=Item Type: Medium Armor\nDamage Reduction: 30%\nTemp. Rating: -50 / 80 °C\nRadiation Protection: 26400 REM\nRadiation Scrub Rate: 145.8 REM/s \n \nKeep your eyes on the prize and your head protected with the Testudo helmet. It features a wide faceplate and a durable outer shell that protrudes above the forehead in a way specifically designed to absorb and efficiently disperse the energy of impacts. \n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_qrt_combat_medium_legs_01_02_01=Item Type: Medium Armor\nDamage Reduction: 30%\nTemp. Rating: -50 / 80 °C\nRadiation Protection: 26400 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 4K µSCU\n \nThe Testudo armor for Quirinus Tech blends battlefield durability with everyday comfort. It weaves tough, yet lightweight, plating with ultra-strong synthetic fibers to provide premium protection. Lining the inside is a proprietary micromodal fabric that's soft to the touch and wicks away moisture for supreme comfort.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_r6p_glasses_01_01_01=When the future's looking bright, reach for these aviator shades from R6 Pro. With a design that has remained an acknowledged classic for centuries, you can salute the trailblazing aviators of the past as you seek tomorrow's new horizons.
item_Desc_slaver_undersuit_helmet_01=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\n\nKastak Arms' Stoneskin series is built upon CDS' famous TCS-4 system based on extensive feedback from the operators who rely on this technology in the field. The Stoneskin is set to rival competitors as a rugged and reliable helmet.
item_Desc_slaver_undersuit_helmet_02=Item Type: Flight Helmet\nDamage Reduction: 15%\nTemp. Rating: -30 / 60 °C\nRadiation Protection: 15200 REM\nRadiation Scrub Rate: 81 REM/s\n\n\nKastak Arms' Stoneskin series is built upon CDS' famous TCS-4 system based on extensive feedback from the operators who rely on this technology in the field. The Stoneskin is set to rival competitors as a rugged and reliable helmet.
item_Desc_srvl_armor_heavy_legs_02,P=Item Type: Heavy Armor\nDamage Reduction: 40%\nTemp. Rating: -85 / 115 °C\nRadiation Protection: 26800 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 8.0 µSCU\n\nSalvaged ship parts and pieces of disused protective gear were welded together to make this intimidating armor set. Paired with a decorated leather belt.
item_Desc_syfb_combat_light_arms_01_01_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -31 / 61 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nThe Xy'kara Armor from Syang Fabrications offers the result of thousands of years of Xi'an combat expertise in a Human package. Closely patterned to the Human physique, the Xy'kara armor provides unparalleled protection without sacrificing mobility and combat effectiveness without sacrificing style.
item_Desc_syfb_combat_light_core_01_01_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -31 / 61 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\nCapacity: 2000 mSCU\n \nThe Xy'kara Armor from Syang Fabrications offers the result of thousands of years of Xi'an combat expertise in a Human package. Closely patterned to the Human physique, the Xy'kara armor provides unparalleled protection without sacrificing mobility and combat effectiveness without sacrificing style.
item_Desc_syfb_combat_light_helmet_01_01_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -31 / 61 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nThe Xy'kara Armor from Syang Fabrications offers the result of thousands of years of combat expertise in a Human package. Closely patterned to the Human physique, the Xy'kara armor provides unparalleled protection without sacrificing mobility and combat effectiveness without sacrificing style - nowhere more so than in the helmet whose Xi'an-face visor acknowledges the millennia-long heritage of the ancient race that created it.
item_Desc_syfb_combat_light_legs_01_01_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -31 / 61 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n\nThe Xy'kara Armor from Syang Fabrications offers the result of thousands of years of Xi'an combat expertise in a Human package. Closely patterned to the Human physique, the Xy'kara armor provides unparalleled protection without sacrificing mobility and combat effectiveness without sacrificing style.
item_Desc_vgl_combat_heavy_backpack_01_12_01=Item Type: Heavy Backpack\nCarrying Capacity: 150K µSCU\nCore Compatibility: Heavy\n \nThis hard backpack from Virgil, Ltd. makes travel easy. Whether you need a place to carry your weapons or you've decided to bring some extra rations along for a long journey, this backpack was designed to handle any occasion. The interior features a generous, closeable pocket to keep your small items from falling out of place.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_vgl_utility_light_arms_01_04_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -35 / 65 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n\nBe the first on the scene with the Chiron armor. Designed to provide the essential protection that combat medics need, the armor features ultra-lightweight paneling to keep the wearer quick on their feet without compromising on safety. Crucial, high-impact sections have been reinforced with raised carbon plating on top of a highly durable polyfiber for maximum flexibility.\n\nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_vgl_utility_light_arms_03_02_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -35 / 65 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nBe the first on the scene with the Chiron armor. Designed to provide the essential protection that combat medics need, the armor features ultra-lightweight panelling to keep the wearer quick on their feet without compromising on safety. Crucial, high-impact sections have been reinforced with raised carbon plating on top of a highly durable polyfiber for maximum flexibility.\n \nCelebrate the UEE's commitment to building a brighter future with this Foundation Festival special edition. Designed with Guides and other community leaders in mind, it features a teal polyfiber underlayer and matching accents on the carbon plating sections.
item_Desc_vgl_utility_light_backpack_01_04_01=Item Type: Light Backpack\nCarrying Capacity: 75K µSCU\nCore Compatibility: All\n \nEngineered with first responders in mind, the Chiron backpack provides an ideal carryall for critical supplies with quick access to the medical essentials that are stored inside.\n \nCelebrate the UEE's commitment to building a brighter future with this Foundation Festival special edition. Designed with Guides and other community leaders in mind, it features a teal polyfiber underlayer and matching accents on the carbon plating sections.
item_Desc_vgl_utility_light_backpack_01_05_01=Item Type: Light Backpack\nCarrying Capacity: 75K µSCU\nCore Compatibility: All\n\nEngineered with first responders in mind, the Chiron backpack provides an ideal carryall for critical supplies with quick access to the medical essentials that are stored inside.\n\nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_vgl_utility_light_core_01_04_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -32 / 62 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 4.0 µSCU\nBackpacks: Light\n \nBe the first on the scene with the Chiron armor. Designed to provide the essential protection that combat medics need, the armor features ultra-lightweight paneling to keep the wearer quick on their feet without compromising on safety. Crucial, high-impact sections have been reinforced with raised carbon plating on top of a highly durable polyfiber for maximum flexibility.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_vgl_utility_light_core_03_02_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -35 / 65 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nBe the first on the scene with the Chiron armor. Designed to provide the essential protection that combat medics need, the armor features ultra-lightweight panelling to keep the wearer quick on their feet without compromising on safety. Crucial, high-impact sections have been reinforced with raised carbon plating on top of a highly durable polyfiber for maximum flexibility.\n \nCelebrate the UEE's commitment to building a brighter future with this Foundation Festival special edition. Designed with Guides and other community leaders in mind, it features a teal polyfiber underlayer and matching accents on the carbon plating sections.
item_Desc_vgl_utility_light_helmet_01_05_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -61 / 91 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nUtilizing a crystal clear protective glass treated with a specialist hydrophobic glaze, the Chiron light helmet was purpose built to protect against fogging and glare, guaranteeing that first responders will retain complete vision in emergency situations.\n \nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_vgl_utility_light_helmet_03_02_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -61 / 91 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nUtilizing a crystal clear protective glass treated with a specialist hydrophobic glaze, the Chiron light helmet was purpose built to protect against fogging and glare, guaranteeing that first responders will retain complete vision in emergency situations.\n \nCelebrate the UEE's commitment to building a brighter future with this Foundation Festival special edition. Designed with Guides and other community leaders in mind, it features a teal polyfiber underlayer and matching accents on the carbon plating sections.
item_Desc_vgl_utility_light_legs_01_04_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -35 / 65 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\nCarrying Capacity: 2.5 µSCU\n\nBe the first on the scene with the Chiron armor. Designed to provide the essential protection that combat medics need, the armor features ultra-lightweight panelling to keep the wearer quick on their feet without compromising on safety. Crucial, high-impact sections have been reinforced with raised carbon plating on top of a highly durable polyfiber for maximum flexibility.\n\nThe Purgatory Camo edition features a sleek gray-on-gray pattern.
item_Desc_vgl_utility_light_legs_03_02_01=Item Type: Light Armor\nDamage Reduction: 20%\nTemp. Rating: -35 / 65 °C\nRadiation Protection: 26000 REM\nRadiation Scrub Rate: 145.8 REM/s\n \nBe the first on the scene with the Chiron armor. Designed to provide the essential protection that combat medics need, the armor features ultra-lightweight panelling to keep the wearer quick on their feet without compromising on safety. Crucial, high-impact sections have been reinforced with raised carbon plating on top of a highly durable polyfiber for maximum flexibility.\n \nCelebrate the UEE's commitment to building a brighter future with this Foundation Festival special edition. Designed with Guides and other community leaders in mind, it features a teal polyfiber underlayer and matching accents on the carbon plating sections.
item_Descksar_gren_frag_01=Manufacturer: Kastak Arms\nItem Type: Grenade\n \nArea of Effect: 7.5 m\nDamage Type: Plasma\n \nKastak Arms Scorch plasma grenade is sure to be a devastating addition to your next battle. Once primed and ready, the Scorch will explode on impact, unleashing a burst of intense plasma damage on your target that leave a lingering hazard area behind. 
item_Descutfl_crossbow_ballistic_01=Manufacturer: UltiFlex\nItem Type: Crossbow\n \nMagazine Size: 5\nRate Of Fire: 60 rpm\nEffective Range: 50 m\n \nAttachments: Optics (S3), Underbarrel (S3)\n \nThe craftsman at UltiFlex went through hundreds of prototypes to discover the perfect lightweight material with the right combination of strength and flexibility for its Novia crossbow, an ideal companion on everything from frontier expeditions to tactical infiltrations. With a pull of its firing action, the Novia near-silently launches a heavy bolt that shatters on impact causing devastating damage to close-range targets. 
item_Descutfl_crossbow_ballistic_01_mag=Item Type: Magazine\nCapacity: 5\n\nThis magazine for the Novia crossbow comes preloaded with five bolts.
item_Descutfl_crossbow_ballistic_01_store01=Manufacturer: UltiFlex\nItem Type: Crossbow\n  \nMagazine Size: 5\nRate Of Fire: 60 rpm\nEffective Range: 50 m\n  \nAttachments: Optics (S3),Underbarrel (S3)\n  \nThe craftsman at UltiFlex went through hundreds of prototypes to discover the perfect lightweight material with the right combination of strength and flexibility for its Novia crossbow, an ideal companion on everything from frontier expeditions to tactical infiltrations. With a pull of its firing action, the Novia near-silently launches a heavy bolt that shatters on impact causing devastating damage to close-range targets. \n \nThe bronze accents of the Xy'kara edition draw inspiration from the millennia-long heritage of the Xi'an.
item_Descutfl_crossbow_ballistic_01_tint01,P=Manufacturer: UltiFlex\nItem Type: Crossbow\n  \nMagazine Size: 5\nRate Of Fire: 60 rpm\nEffective Range: 50 m\n  \nAttachments: Optics (S3), Underbarrel (S3)\n  \nThe craftsman at UltiFlex went through hundreds of prototypes to discover the perfect lightweight material with the right combination of strength and flexibility for its Novia crossbow, an ideal companion on everything from frontier expeditions to tactical infiltrations. With a pull of its firing action, the Novia near-silently launches a heavy bolt that shatters on impact causing devastating damage to close-range targets. \n \nThe Nighthunter edition sports a dipped-in-shadow matte black frame.
item_Descutfl_crossbow_ballistic_01_tint02,P=Manufacturer: UltiFlex\nItem Type: Crossbow\n  \nMagazine Size: 5\nRate Of Fire: 60 rpm\nEffective Range: 50 m\n  \nAttachments: Optics (S3), Underbarrel (S3)\n  \nThe craftsman at UltiFlex went through hundreds of prototypes to discover the perfect lightweight material with the right combination of strength and flexibility for its Novia crossbow, an ideal companion on everything from frontier expeditions to tactical infiltrations. With a pull of its firing action, the Novia near-silently launches a heavy bolt that shatters on impact causing devastating damage to close-range targets. \n \nThe Ghostmaker edition sports smoke gray accents on a metallic body.
item_Descutfl_crossbow_ballistic_01_tint03,P=Manufacturer: UltiFlex\nItem Type: Crossbow\n  \nMagazine Size: 5\nRate Of Fire: 60 rpm\nEffective Range: 50 m\n  \nAttachments: Optics (S3), Underbarrel (S3)\n \nThe craftsman at UltiFlex went through hundreds of prototypes to discover the perfect lightweight material with the right combination of strength and flexibility for its Novia crossbow, an ideal companion on everything from frontier expeditions to tactical infiltrations. With a pull of its firing action, the Novia near-silently launches a heavy bolt that shatters on impact causing devastating damage to close-range targets. \n \nThe Wildshot edition's styling mixes subdued natural tones.
