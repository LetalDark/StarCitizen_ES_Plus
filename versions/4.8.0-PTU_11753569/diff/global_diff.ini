Foxwell_DefendEntitesAndEscort_M_Desc,P=We need a contractor to provide convoy and protection services at <EM4>~mission(Location|Address)</EM4>. One of our elite clients' are under attack from a band of outlaws targeting their <EM4>~mission(Objects) and ships</EM4>. You'll need to keep the crew safe as they traverse the area, as well as make sure the assets stay as intact. These thugs look like they can do some real damage, so be sure you engage them with caution or the client might not be the only one to take heavy losses.\n\nIf you manage to nail this to the Foxwell standards, we’re offering <EM4>~mission(ScripAmount) MG Scrip</EM4> as compensation to the main contractor. \n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, Your Way'\n\nFoxwell Enforcement is a bonded security specialist licensed to operate throughout the UEE. We are always looking for new operators to join our family. If you or anyone you know is interested, please reach out to one of our contract representatives.
