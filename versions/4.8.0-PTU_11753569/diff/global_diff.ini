Guild_United_Wayfarers_Club_RepUI_Description=The UWC represents a vast network of repair, refueling and recovery specialists spread across the UEE. The network has even grown to include a handful of Banu and Xi’an affiliate clubs.  The UWC's expanding reach aims to ensure safe travel for all Club members, no matter how far from home they may find themselves.
