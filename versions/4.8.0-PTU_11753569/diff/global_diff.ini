vehicle_DescDRAK_Command_Module=Manufacturer: Drake Interplanetary\nFocus: Logistics\n\nEven the most experienced captains know when the best course of action is to cut their losses and live to fight another day. With this detachable command module, Drake has made sure that cautious operators can extract themselves from the ship’s main body and make a hasty exit with ease, should the need arise. 
vehicle_DescKRIG_L22_Alpha_Wolf_Collector_Military=Manufacturer: Kruger Intergalactic\nFocus: Light Fighter\n\nMeet a ship almost 400 years in the making, and well worth the wait. Kruger Intergalactic is excited to present their first independently manufactured ship, the Wolf. Combining speed, style, and an impeccably precise design, the L-22 Alpha Wolf is not only a showcase for Kruger but is battle-ready to hunt alone or in packs with a powerful array of armaments, including two bespoke S4 laser repeaters.\n\nWikelo here. Made useful modifications to make ship much more fighter like. Very impressive.
vehicle_DescVNCL_Mauler=Manufacturer: Vanduul Clans\nFocus: Destroyer\n\nThe Mauler is a massive escort craft essential to the Vanduul fleet. This tank of a ship gives its pilots a taste of power, with its multi-level angular design, vast array of weaponry and sharp points on the sides for both aerodynamics and fear-factor.
