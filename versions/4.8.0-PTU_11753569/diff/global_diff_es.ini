PU_Tobin_INT_M_PMH_TSGMissionAbandon_GP_002,P=Mira, en InterSec no podemos contar con gente que no cumple los contratos. Si vas a trabajar para nosotros, asegúrate de poder comprometerte.
PU_Tobin_INT_M_PMH_TSGMissionAbandon_GP_003,P=Te alejas de una situación volátil que aún necesita resolverse. Por favor, no vuelvas a hacerlo.
PU_Tobin_INT_M_PMH_TSGMissionAcceptIntro_GP_001,P=Soy Deacon Tobin. Seré tu gestor de operaciones aquí en Intersec. Una fuente anónima ha indicado que una nave de seguridad de la People's Alliance ha sido inutilizada por una estación de Shattered Blade y necesita ayuda urgente. He contactado con su capitán y le he dicho que vas en camino con toda la prisa posible. Establecerán contacto y te guiarán por lo que hay que hacer cuando llegues.
PU_Tobin_INT_M_PMH_TSGMissionAccept_GP_001,P=Deacon de Intersec al habla. Estas naves de la People's Alliance no paran de remover el avispero. Ya conoces el procedimiento. Te darán indicaciones cuando estés en el sitio. Buena suerte.
PU_Tobin_INT_M_PMH_TSGMissionAccept_GP_002,P=Aquí Intersec. Parece que la People's Alliance ha encontrado otra estación de Shattered Blade y necesita ayuda. Acude al área de operaciones lo más rápido que puedas y te darán indicaciones desde allí.
PU_Tobin_INT_M_PMH_TSGMissionAccept_GP_003,P=Tobin de Intersec al habla. Tenemos otra situación entre la People's Alliance y Shattered Blade. Dirígete allí y te darán instrucciones.
PU_Tobin_INT_M_PMH_TSGMissionFail_GP_001,P=No me gusta hacerlo, pero voy a cancelar esta operación. Ahora mismo no hay ninguna posibilidad de éxito.
PU_Tobin_INT_M_PMH_TSGMissionFail_GP_002,P=Te saco. Hemos perdido cualquier oportunidad de completar esta misión.
PU_Tobin_INT_M_PMH_TSGMissionFail_GP_003,P=Esta operación no va a funcionar. Hemos perdido el control de la situación.
Pyro1_desc=Orbitando muy cerca de la volátil estrella de Pyro, Pyro I presenta altas temperaturas y presión atmosférica.\n\nPosibles minerales para minería con nave:\nHierro\nCobre\nEstaño\nStileron\n\nPosibles minerales para minería con vehículo terrestre:\nBeradon\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nDecari Pod\nFotia Seedpod\nWuotan Seeds\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Pyro2_desc=El planeta sin núcleo Monox, apodado así por el tóxico monóxido de carbono presente en su atmósfera parcialmente oxigenada, muestra las cicatrices de antiguas operaciones mineras.\n\nPosibles minerales para minería con nave:\nHephaestanite\nHierro\nEstaño\nStileron\n\nPosibles minerales para minería con vehículo terrestre:\nGlacosite\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nPingala Seeds\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)\n\nPosibles criaturas:\nQuasigrazer
Pyro3_desc=Este mundo terrestre helado tiene una atmósfera respirable de nitrógeno y oxígeno y ha sido invadido por forajidos.\n\nPosibles minerales para minería con nave:\nCuarzo\nBorase\nRiccite\nStileron\n\nPosibles minerales para minería con vehículo terrestre:\nBeradon\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nJanalite\n\nPosibles recursos recolectables:\nFlareweed Stalk\nAmiant Pod\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)\n\nPosibles criaturas:\nQuasigrazer
Pyro4_desc=Los astrónomos teorizan que en un pasado lejano, Pyro IV colisionó con una masa del tamaño de un planeta, deformando el paisaje y desplazándolo hasta la órbita de Pyro V.\n\nPosibles minerales para minería con nave:\nCobre\nLaranite\nBorase\nStileron\n\nPosibles minerales para minería con vehículo terrestre:\nFeynmaline\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)\n\nPosibles criaturas:\nQuasigrazer
Pyro5a_Ignis_desc=Esta luna interior de Pyro V está cubierta de profundos cañones y cauces de ríos secos. No quedan otros signos de agua en su superficie desecada.\n\nPosibles minerales para minería con nave:\nEstaño\nSilicio\nOro\nRiccite\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Pyro5b_Vatra_desc=La densa atmósfera de nitrógeno y metano de alta presión de esta luna oculta un paisaje oscuro e inquietante.\n\nPosibles minerales para minería con nave:\nHierro\nSilicio\nOro\nRiccite\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Pyro5c_Adir_desc=La superficie llena de cráteres de Adir está intercalada con colinas rocosas y montañas escarpadas.\n\nPosibles minerales para minería con nave:\nHierro\nTungsteno\nBorase\nRiccite\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Pyro5d_Fairo_desc=Frecuentes terremotos sacuden Fairo, provocando espectaculares olas en sus mares salobres.\n\nPosibles minerales para minería con nave:\nSilicio\nTungsteno\nOro\nBexalite\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Pyro5e_Fuego_desc=Las altas cantidades de sulfuro de hierro en el suelo de Fuego lo tiñen de un intenso tono amarillo-negro.\n\nPosibles minerales para minería con nave:\nHephaestanite\nAslarite\nBorase\nBexalite\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nJanalite\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Pyro5f_Vuur_desc=El suelo rico en carbono de Vuur sustenta formas de vida vegetal únicas que utilizan carbono cristalino en sus estructuras base.\n\nPosibles minerales para minería con nave:\nHephaestanite\nAgricium\nAslarite\nBexalite\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Pyro6_desc=Terminus es un planeta gélido, apenas habitable, con una atmósfera cargada de metano.\n\nPosibles minerales para minería con nave:\nHielo\nCobre\nAgricium\nTitanio\nOro\nRiccite\nStileron\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nJanalite\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
