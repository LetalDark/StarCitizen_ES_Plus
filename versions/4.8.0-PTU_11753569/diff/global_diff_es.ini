Intersec_TSG_Assist_Solo_Desc_001=ESPECIFICACIONES DE LA MISIÓN\n\nÁrea de operaciones: sistema Nyx \nFuerzas hostiles: Vanduul\nEspecificaciones de equipo: listo para combate\nInforme: \nUna nave de seguridad de clase Idris de la People's Alliance llamada Tranquility está enfrentándose actualmente a una <EM>nave capital Vanduul</EM4> cerca de una antigua <EM4>estación de extracción QV</EM4> e Intersec busca pilotos de combate que presten apoyo.\n\nDespega hacia el AO y <EM4>enfrenta a los cazas Vanduul para que la Tranquility pueda centrarse en la nave capital</EM4>. \n\nBuena suerte,   \n\nDeacon Tobin \nGerente de operaciones \nInterSec Defense Solutions  \n\nEsta comunicación contiene información confidencial destinada exclusivamente al destinatario. Por favor, ignórela si la ha recibido por error y notifique al remitente. Todas las operaciones se llevan a cabo bajo el riesgo personal del contratista y deben cumplir con las leyes del UEE y del sistema cuando corresponda.
