Foxwell_DefendDestructibleEntites_E_Desc_001=¿Algún piloto disponible en la zona? Necesitamos protección en <EM4>~mission(Location|Address)</EM4> para un cliente. Una banda de forajidos lleva atacando sus <EM4>~mission(Objects)</EM4> y, si no se hace nada al respecto, van a causar daños serios. Necesitamos a alguien que proteja la propiedad del cliente lo máximo posible y se ocupe de esos matones.\n\nPor la información que hemos podido reunir, estos matones son de poca monta, pero pueden hacer pupa si no andas con ojo. Así que, si lo manejas según los estándares de Foxwell, ofrecemos <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal. \n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendDestructibleEntites_E_Title_001=Contrato nivel amarillo: Proteger ~mission(Objects)
Foxwell_DefendDestructibleEntites_H_Desc_001=Uno de nuestros clientes de alta prioridad está siendo atacado por una banda criminal que ataca sus <EM4>~mission(Objects)</EM4> en <EM4>~mission(Location|Address)</EM4>. Los activos del cliente son valiosos, así que tenemos que mantenerlos a salvo a toda costa, pero no te voy a engañar: va a ser un reto y medio con estos matones decididos a hacer daños serios. \n\nSi fuera yo, no dudaría en <EM>llevar refuerzos</EM4> para encargarme de ellos. No son ninguna broma, así que ofrecemos unos bien merecidos <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal que se encargue de estos tipos con éxito. \n\nMucha suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendDestructibleEntites_H_Title_001=Contrato nivel naranja: Proteger ~mission(Objects)
Foxwell_DefendDestructibleEntites_M_Desc_001=Espero que puedas prestar servicios de protección en <EM4>~mission(Location|Address)</EM4>. Uno de nuestros clientes de alta prioridad está teniendo serios problemas con una banda de forajidos que ataca sus ~mission(Objects). Hay que mantener los activos lo más a salvo e intactos posible. El cliente espera el servicio por el que paga, así que no la cagues o podríamos perder a un cliente fiel.\n\nDe momento, todavía estamos un poco a oscuras con estos forajidos, pero si lo manejas según los estándares de Foxwell, ofrecemos <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal. \n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendDestructibleEntites_M_Title_001=Contrato nivel naranja: Defender ~mission(Objects)
Foxwell_DefendDestructibleEntites_S_Desc_001=Acaba de entrar un contrato de emergencia sobre una banda de matones violentos sembrando el caos en las infraestructuras de uno de nuestros clientes VIP. Si estás disponible, necesitamos que corras a <EM4>~mission(Location|Address)</EM4> y defiendas los <EM4>~mission(Objects)</EM4> extremadamente valiosos del cliente a toda costa. \n\nFoxwell conoce muy bien a este grupo, así que créeme cuando te digo que estos pilotos no son para tomarse a la ligera. Te recomiendo encarecidamente que organices una <EM>fuerza de apoyo altamente competente</EM> que vuele contigo hasta el lugar.\n\nSi consigues sobrevivir al encuentro con la propiedad del cliente intacta, sumamos <EM4>~mission(ScripAmount) MG Scrip</EM4> a cualquier contratista principal lo bastante valiente como para aceptar este trabajo. \n\nMantente a salvo, y buena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendDestructibleEntites_S_Title_001=Contrato nivel rojo: Proteger ~mission(Objects)
Foxwell_DefendDestructibleEntites_VE_Desc_001=Atención a todos los pilotos: uno de nuestros clientes busca protección para sus <EM4>~mission(Objects)</EM4>, situados en <EM4>~mission(Location|Address)</EM4>. Por lo que hemos podido recoger, los atacantes son un grupo de aspirantes a forajidos pesados que probablemente no se han dado cuenta del valor de los activos que intentan destruir, simplemente sembrando el caos por hacerlo. Aun así, la propiedad del cliente es importante, así que hay que mantenerla lo más intacta posible.\n\nSi te encargas de ellos según los estándares de Foxwell, ofrecemos <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal. \n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendDestructibleEntites_VE_Title_001=Contrato nivel amarillo: Defender ~mission(Objects)
Foxwell_DefendDestructibleEntites_VH_Desc_001=Apoyo urgente de naves necesario en <EM4>~mission(Location|Address)</EM4>. Una conocida organización criminal destructiva lleva meses tanteando el terreno con la propiedad de uno de nuestros clientes, y ahora ha montado un infierno atacando los <EM4>~mission(Objects)</EM4> del cliente. Estos activos son muy valiosos, así que hay que mantenerlos a salvo a toda costa, aunque sabemos que no será nada fácil.\n\nNo puedo enfatizar lo suficiente lo peligrosos que son estos tipos, así que no dudaría en <EM>llevar refuerzos</EM> para encargarme de ellos. Si tú y los activos salís intactos, ofrecemos unos bien merecidos <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal. \n\nMucha suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendDestructibleEntites_VH_Title_001=Contrato nivel rojo: Defender ~mission(Objects)
Foxwell_DefendEntitesAndEscort_E_Desc,P=Necesitamos un contratista que preste servicios de convoy y protección en <EM4>~mission(Location|Address)</EM4>. Uno de nuestros clientes de élite está siendo atacado por una banda de forajidos que ataca sus <EM4>~mission(Objects) y naves</EM4>. Tendrás que mantener a la tripulación a salvo mientras atraviesa la zona, y asegurarte además de que los activos sigan intactos. Estos matones parecen capaces de hacer daños serios, así que asegúrate de enfrentarlos con cautela o el cliente podría no ser el único en sufrir grandes pérdidas.\n\nSi lo manejas según los estándares de Foxwell, ofrecemos <EM4>~mission(ScripAmount) MG Scrip</EM4> como compensación al contratista principal. \n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendEntitesAndEscort_E_Title,P=Contrato nivel amarillo: Proteger ~mission(Objects) y escoltar a los empleados
Foxwell_DefendEntitesAndEscort_H_Desc,P=La tripulación que gestiona las operaciones de uno de nuestros clientes en <EM4>~mission(Location|Address)</EM4> ha informado de que están siendo atacados por una banda criminal que ataca las <EM4>~mission(Objects) y naves</EM4> de la zona. Tu trabajo será mantener a ambos a salvo a toda costa. Aún no tengo todos los datos, pero supongo que será una misión dura: estos forajidos parecen decididos a montar una buena carnicería. \n\nSi fuera yo, <EM>llevaría refuerzos</EM4> para encargarme de ellos. Y si consigues proteger a todos, ofrecemos unos bien merecidos <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal que se encargue con éxito de estos miserables. \n\nMucha suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendEntitesAndEscort_H_Title,P=Contrato nivel naranja: Proteger ~mission(Objects) y escoltar a los empleados
Foxwell_DefendEntitesAndEscort_M_Desc,P=Necesitamos un contratista que preste servicios de convoy y protección en <EM4>~mission(Location|Address)</EM4>. Uno de nuestros clientes de élite está siendo atacado por una banda de forajidos que ataca sus <EM4>~mission(Objects) y naves</EM4>. Tendrás que mantener a la tripulación a salvo mientras atraviesa la zona, y asegurarte además de que los activos sigan intactos. Estos matones parecen capaces de hacer daños serios, así que asegúrate de enfrentarlos con cautela o el cliente podría no ser el único en sufrir grandes pérdidas.\n\nSi lo manejas según los estándares de Foxwell, ofrecemos <EM4>~mission(ScripAmount) MG Scrip</EM4> como compensación al contratista principal. \n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendEntitesAndEscort_M_Title,P=Contrato nivel naranja: Defender ~mission(Objects) y escoltar a los empleados
Foxwell_DefendEntitesAndEscort_S_Desc,P=Acaba de llegar un SOS de emergencia de una tripulación de mantenimiento al servicio de uno de los clientes VIP de Foxwell. Si estás disponible, te urgimos a llegar a <EM4>~mission(Location|Address)</EM4> lo antes posible. Mientras te enfrentas a los atacantes, deberás proteger los <EM4>~mission(Objects) del cliente y cualquiera de sus naves que pueda necesitar ayuda</EM4>. \n\nNo es ni de lejos la primera vez que vemos a estos forajidos en concreto, así que créeme cuando te digo que estos pilotos no son para tomarse a la ligera. Te recomiendo encarecidamente que organices una <EM>fuerza de apoyo altamente competente</EM> que vuele contigo hasta el lugar.\n\nSi consigues defender con éxito los intereses del cliente, ofrecemos <EM4>~mission(ScripAmount) MG Scrip</EM4> como compensación al contratista principal lo bastante valiente como para aceptar este trabajo. \n\nMantente a salvo, y buena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendEntitesAndEscort_S_Title,P=Contrato nivel rojo: Proteger ~mission(Objects) y escoltar a los empleados
Foxwell_DefendEntitesAndEscort_VE_Desc,P=Atención a cualquier piloto en la zona: un grupo de bandidos está atacando a uno de nuestros clientes en <EM4>~mission(Location|Address)</EM4>, en concreto sus <EM4>~mission(Objects)</EM4> y las naves de mantenimiento que los gestionan. Por nuestra información, son solo unos pocos forajidos intentando ganar unos créditos rápidos, pero también son del tipo que causa daños serios si te metes en su camino.\n\nSi te encargas de ellos y reubicas la nave y la tripulación del cliente con seguridad, ofrecemos <EM4>~mission(ScripAmount) MG Scrip</EM4> al contratista principal. \n\nBuena suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_DefendEntitesAndEscort_VE_Title,P=Contrato nivel amarillo: Defender ~mission(Objects) y escoltar a los empleados
Foxwell_DefendEntitesAndEscort_VH_Desc,P=Ayuda urgente a naves necesaria en <EM4>~mission(Location|Address)</EM4>. Una banda de forajidos criminales destructivos que llevan tiempo intentando hacerse un nombre ha golpeado con fuerza a uno de nuestros clientes de alta prioridad, <EM4>atacando sus naves y los ~mission(Objects) del cliente</EM4>. Tu trabajo será mantener a todos y todo a salvo, aunque no será fácil.\n\nNo puedo enfatizar lo suficiente lo peligrosos que son estos atacantes, así que asegúrate de <EM>llevar refuerzos</EM> para encargarte de ellos. Si tú, la tripulación y las infraestructuras salís intactos, ofrecemos una generosa suma de <EM4>~mission(ScripAmount)  MG Scrip</EM4> al contratista principal. \n\nMucha suerte,\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
