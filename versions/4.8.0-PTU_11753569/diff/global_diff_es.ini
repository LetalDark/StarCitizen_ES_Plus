HUD_Notification_Contract_Not_Accepted=Contrato no aceptado
HeadHunters_DefendEntitesAndEscort_E_Desc=Estaba teniendo un día de mierda y acaba de empeorar. Nuestros intereses en <EM4>~mission(Location|Address)</EM4> han llamado para avisarme de que sus <EM>~mission(Objects)</EM4> están siendo atacados por unos hampones sin nombre que quieren hacerse un hueco.\n\nVas a ir allí por mí y proteger el sitio, incluyendo cualquier <EM4>nave amiga</EM4> que tenga la mala suerte de quedarse atrapada en el fuego cruzado. No creo que poner a estos aspirantes en su sitio sea muy complicado para alguien como tú. \n\nAdemás, voy a endulzar el bote dándole al contratista principal <EM4>~mission(ScripAmount) Council Scrip</EM4> solo para mostrar mi agradecimiento. \n\nStows fuera.
HeadHunters_DefendEntitesAndEscort_E_Title=Brindar protección en ~mission(Location)
HeadHunters_DefendEntitesAndEscort_H_Desc=Hay una bandita que sigue siendo una espina clavada en nuestro costado, y los cabrones acaban de tender una emboscada a unos amigos en <EM4>~mission(Location|Address)</EM4>. Parece que están haciendo todo lo posible por destruir los <EM4>~mission(Objects)</EM4> de allí.\n\nTe necesito a ti y a la <EM4>tripulación que puedas reunir</EM4> en el sitio parando a estos zopencos antes de que vuelen todo por los aires y protegiendo cualquier <EM4>nave amiga</EM4> que necesite una mano.\n\nLleva esto bien y le daré al contratista principal <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows
HeadHunters_DefendEntitesAndEscort_H_Title=Detener ataque rival en ~mission(Location)
HeadHunters_DefendEntitesAndEscort_M_Desc=Una nueva banda que está siendo un grano en el culo para los Headhunters acaba de subir la apuesta atacando los <EM4>~mission(Objects)</EM4> en <EM4>~mission(Location|Address)</EM4>. Nunca es bueno, ya que tenemos interés en el bienestar de la gente de allí, pero doblemente porque si hacen demasiado daño podrían cargarse una operación que tenemos en marcha.\n\nVe allí en cuanto puedas y para el ataque antes de que puedan hacer daños duraderos. Y si alguna <EM4>nave amiga</EM4> necesita una mano, también quiero que las cuides. No esperes que esta banda sean unos pringados, pero deberías ser capaz de manejarlos si mantienes la cabeza fría.\n \nSi necesitas algo más de motivación, añado <EM4>~mission(ScripAmount) Council Scrip</EM4> para el contratista principal.\n\n- Stows
HeadHunters_DefendEntitesAndEscort_M_Title=Asegurar ~mission(Location) frente a aspirantes
HeadHunters_DefendEntitesAndEscort_S_Desc=El mantenimiento y el correcto funcionamiento de <EM4>~mission(Location|Address)</EM4> es bastante importante para los Headhunters, pero esta tripulación rival parece decidida a sacarlo de la jugada. Están en el sitio ahora mismo, atacando los <EM4>~mission(Objects)</EM4> de allí. \n\nProteger el sitio y cualquier <EM4>nave amiga</EM4> de la zona es lo bastante importante como para que quiera que <EM4>traigas refuerzos fiables</EM4> cuando vayas a liquidar a estos descerebrados. \n\nPara demostrar lo en serio que nos tomamos que esto se haga bien, el contratista principal se ganará <EM4>~mission(ScripAmount) Council Scrip</EM4> por asegurarse de que absolutamente nada salga mal.\n\n- Stow
HeadHunters_DefendEntitesAndEscort_S_Title=Custodiar ~mission(Location) frente a rivales
HeadHunters_DefendEntitesAndEscort_VE_Desc=No te aburriré con los detalles, pero confía en mí cuando digo que <EM4>~mission(Location|Address)</EM4> es importante para los Headhunters. Así que imagínate lo cabreado que estoy al enterarme de que están siendo acosados por unos aspirantes agresivos empeñados en cargarse sus <EM>~mission(Objects)</EM4>. No lo voy a consentir.   \n\nVe allí y proporciona algo de protección antes de que todo sea destruido, incluyendo <EM4>cualquier nave amiga</EM4> de la zona. Descerebrados como estos no deberían suponer demasiado reto para una estrella en ascenso como tú.\n\nLímpialos a todos y le tiraré <EM4>~mission(ScripAmount) Council Scrip</EM4> a quien aceptara este curro.\n\n- Stows
HeadHunters_DefendEntitesAndEscort_VE_Title=Mantener a salvo ~mission(Location)
HeadHunters_DefendEntitesAndEscort_VH_Desc=Pensé que habíamos hecho un buen trabajo manteniendo las cosas en bajo perfil, pero parece que se ha sabido que <EM4>~mission(Location|Address)</EM4> tiene vínculos con los Headhunters. Ahora hay unos operadores pesados causando problemas serios allí, atacando los <EM>~mission(Objects)</EM4> y dándome en general un dolor de cabeza monumental.\n\nCon la cantidad de potencia de fuego que llevan estos intrusos, vas a tener que llevar a tu <EM4>propia tripulación</EM4> para sacar esto adelante. Sobre todo porque necesito que protejas cualquier <EM4>nave amiga</EM4> que necesite ayuda.\n\nEsta operación tiene que salir sin contratiempos, así que ofrezco al contratista principal <EM4>~mission(ScripAmount) Council Scrip</EM4> por un trabajo bien hecho. \n\nStows fuera.
HeadHunters_DefendEntitesAndEscort_VH_Title=Defender ~mission(Location) frente a mercenarios
Headhunters_DefendDestructibleEntites_E_Desc_001=Unos imbéciles con una idea seriamente inflada de su lugar en el 'verso tomaron la decisión más estúpida de atacar los <EM>~mission(Objects)</EM4> en <EM4>~mission(Location|Address)</EM4>. Tenemos cosas en juego allí y no podemos dejar que se salgan con la suya.\n\nSi te interesa echar una mano, ve y encárgate de estos paletos antes de que puedan hacer demasiado daño. No creo que sudes mucho con ellos.\n\nAdemás, voy a endulzar el bote dándole al contratista principal <EM4>~mission(ScripAmount) Council Scrip</EM4> solo para mostrar mi agradecimiento. \n\nStows fuera.
Headhunters_DefendDestructibleEntites_E_Title_001=Proteger ~mission(Objects) de paletos
Headhunters_DefendDestructibleEntites_H_Desc_001=Nos han llegado noticias de unos aliados nuestros en <EM4>~mission(Location|Address)</EM4> de que están siendo atacados. Una banda con la que ya hemos tenido encontronazos antes está intentando hacerse con ellos destruyendo primero sus <EM4>~mission(Objects)</EM4>.\n\nEsta tripulación son zopencos de cabo a rabo, pero van en serio y saben defenderse en una pelea. Costará lo suyo asegurarse de que no lo vuelen todo por los aires. Quizá deberías plantearte <EM>traer algo de ayuda</EM> contigo.\n\nLleva esto bien y le daré al contratista principal <EM4>~mission(ScripAmount) Council Scrip</EM4>.\n\n- Stows
Headhunters_DefendDestructibleEntites_H_Title_001=Detener a la banda de destruir ~mission(Objects)
Headhunters_DefendDestructibleEntites_M_Desc_001=Nuestros amigos en <EM4>~mission(Location|Address)</EM4> han sido comprometidos. Una nueva banda de la zona los está amenazando atacando sus <EM4>~mission(Objects)</EM4>.  \n\nSi los destruyen, va a ser muy malo para el negocio, así que te quiero allí pitando, en labores de protección.  \n \nSi necesitas algo más de motivación, añado <EM4>~mission(ScripAmount) Council Scrip</EM4> para el contratista principal.\n\n- Stows
Headhunters_DefendDestructibleEntites_M_Title_001=Asegurar ~mission(Objects) frente a rivales
Headhunters_DefendDestructibleEntites_S_Desc_001=Nuestros socios en <EM4>~mission(Location|Address)</EM4> necesitan ayuda. Una tripulación rival de forajidos está enjambrando la zona y atacando los <EM4>~mission(Objects)</EM4> de allí. Eso ya sería bastante malo de por sí, pero este sitio es absolutamente crítico para nuestros planes futuros en la zona, y es muy importante que siga operativo.\n\nCon la escala de este ataque y la habilidad de estos pilotos, no hay duda de que algunos <EM>refuerzos fiables</EM> te vendrían bien. Reúne a tu tripulación, vuela hasta el sitio y para a estos lameculos antes de que puedan hacer daños duraderos. \n\nPara demostrar lo en serio que nos tomamos que esto se haga bien, el contratista principal se ganará <EM4>~mission(ScripAmount) Council Scrip</EM4> por asegurarse de que absolutamente nada salga mal.\n\n- Stow
Headhunters_DefendDestructibleEntites_S_Title_001=Custodiar ~mission(Objects) a toda costa
Headhunters_DefendDestructibleEntites_VE_Desc_001=No necesitas todos los detalles, pero los Headhunters tienen interés en lo que pasa en <EM4>~mission(Location|Address)</EM4> y acabo de recibir noticias de que están siendo acosados por unos aspirantes agresivos. \n\nLos muy idiotas están intentando paralizar el sitio cargándose sus <EM>~mission(Objects)</EM4>. No voy a tolerarlo.   \n\nVe allí y proporciona algo de protección antes de que todo sea destruido. Estos pringados son peso pluma, así que no deberían suponerte demasiado problema. \n\nLímpialos a todos y le tiraré <EM4>~mission(ScripAmount) Council Scrip</EM4> a quien aceptara este curro como bonus.\n\n- Stows
Headhunters_DefendDestructibleEntites_VE_Title_001=Mantener a salvo ~mission(Objects) frente a aspirantes
Headhunters_DefendDestructibleEntites_VH_Desc_001=Han enviado a una banda de pistoleros a sueldo a tocar nuestros intereses en <EM4>~mission(Location|Address)</EM4>. Parece que alguien ha soplado que si se destruyen los <EM>~mission(Objects)</EM4> de allí, eso interrumpiría gravemente las operaciones de los Headhunters en la zona. Es un problema que quiero que me arregles.\n\nNo te voy a mentir, estos mercenarios no son ninguna broma. Sería estúpido ir solo. Por eso vas a tener que ir bien aprovisionado y encontrar a <EM>algunos amigos de confianza</EM> que vuelen en tu ala.\n\nEsta operación tiene que salir sin contratiempos, así que ofrezco al contratista principal <EM4>~mission(ScripAmount) Council Scrip</EM4> por un trabajo bien hecho. \n\nStows fuera.
Headhunters_DefendDestructibleEntites_VH_Title_001=Defender ~mission(Objects) frente a mercenarios
