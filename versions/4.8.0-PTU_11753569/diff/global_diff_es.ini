Journal_General_Refueling_Content=A veces ocurre lo inesperado: un trabajo exige un desvío repentino, una urgencia obliga a saltarse una parada de repostaje, o la inexperiencia simplemente le pasa factura al piloto. Sea cual sea el motivo, si un piloto se encuentra colgado en el vacío interestelar con el indicador de combustible a cero, ahí es donde el United Wayfarers Club puede ayudar.\n\nAunque la mayoría de los pilotos prefieren repostar en un hangar cuando es posible, si se ven incapaces de hacerlo, pueden crear una baliza para solicitar asistencia de un contratista cualificado. El UWC se enorgullece de un historial probado de varios siglos de duración del trabajo de nuestro equipo dedicado de respondedores que devuelven a las naves al vuelo.\n\nEn esta guía cubriremos los cuatro pasos básicos del protocolo de repostaje del UWC: CONTRATO, MODO REPOSTAJE Y ATRAQUE, PRECIO, REPOSTAR.\n\nCONTRATO\nAntes de aceptar un contrato, pregúntate:\n* ¿Tienes el tipo correcto de combustible -Quantum o Hidrógeno- en cantidad suficiente para el trabajo? Puedes rellenar tus módulos de combustible en la estación, usando la aplicación Mantenimiento de Vehículos.\n* ¿Tu nave tiene la combinación adecuada de módulos de combustible y boquillas? Esta configuración determinará la capacidad y la velocidad de repostaje de tu nave. La velocidad de repostaje es un factor importante. Los forajidos rastrean balizas y puede que ya estén en camino. Cuanto más rápido el repostaje, menos posibilidades de compañía no deseada.\n* En ocasiones muy raras puede que estés respondiendo a una baliza falsa: cebo para una emboscada. Dependiendo de lo que te diga el instinto sobre un trabajo, quizá te interese contactar con un compañero afiliado para que te haga de respaldo. Y si el trabajo resulta ser legítimo, todo en orden. El UWC prefiere verte volver a casa a salvo, con tu nave y tu pellejo intactos, listo para el siguiente contrato.\n\nMODO REPOSTAJE Y ATRAQUE\nCuando llegues a la ubicación de la baliza, maniobra en proximidad cercana a la nave del cliente e inicia el modo repostaje. Esto extenderá la boquilla de repostaje de tu nave y entonces podrás enviar una petición de atraque. Una vez aceptada tu petición de atraque, podrás atracar.\n\nPRECIO\nEn un contrato del United Wayfarers Club, te pagarán a una tarifa de combustible acordada de antemano y tendrás derecho a una comisión de servicio del UWC. Cualquier contrato no UWC deberá negociarse entre tú y tu cliente.\n\nEntonces podrán aceptar o rechazar a través del mobiGlas. Puedes establecer tu precio en cualquier momento -no importa dónde estés, ni si has aceptado un contrato-, pero no puedes cambiar el precio una vez que tu cliente haya atracado contigo. \n\nPodría ser tentador aprovechar la situación y poner un precio alto al combustible que llevas -al fin y al cabo, tú no eres el que está colgado en el espacio, funcionando con los últimos vapores-, pero te animamos a tener cuidado con no cobrar de más por tus servicios. El cliente puede que no siempre tenga razón, pero siempre tiene derecho a buscar una mejor oferta. \n\nREPOSTAR\nUna vez que el cliente haya aceptado el precio, puede comenzar la transferencia de combustible. Aunque puedes transferir combustible entre módulos en cualquier momento, necesitas que al menos un módulo del combustible requerido esté abierto para que se reposte la nave del cliente. \n\nLO SIGUIENTE\nUna vez que los depósitos estén llenos y el cliente esté contento, dirígete a una estación para rellenar tus módulos de combustible, usando la aplicación Mantenimiento de Vehículos en tu mobiGlas, y estarás listo para el siguiente contrato.
Journal_General_Refueling_From=United Wayfarers Club
Journal_General_Refueling_Title=Protocolo de repostaje
Kaboos_Mission_Description=\n<EM4>Posibles Planos</EM4>\n- Pistola Pulse "Blacklist"\n- Subfusil de energía Quartz\n- SMG Quartz de Energía "Black Op"\n- Brazos de la armadura Testudo\n- Pechera de la armadura Testudo\n- Piernas de la armadura Testudo\n- Casco de la armadura Testudo\n- Casco de la armadura Testudo Clanguard\n- Pechera de la armadura Testudo Clanguard\n- Piernas de la armadura Testudo Clanguard\n- Brazos de la armadura Testudo Clanguard\n- Batería de SMG Quartz de Energía (cap. 45)\n- Batería para Pistola Láser de Pulso (60 Cap)\n
