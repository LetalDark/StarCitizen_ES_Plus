Nozzle_FuelGiver_GRIN_NozzleSecure_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 1.23 SCU/s\n\nProducto del compromiso de larga data de Greycat con la calidad y la fiabilidad, la boquilla de combustible Marlin proporciona estabilidad y seguridad en cada etapa del proceso de repostaje.
Nozzle_FuelGiver_GRIN_NozzleSecure_Name=Marlin
Nozzle_FuelGiver_GRIN_NozzleVeryFast_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 1.99 SCU/s\n\nLa boquilla Lindstrom de Greycat alcanza cómodamente impresionantes velocidades de flujo, aunque a costa de la seguridad. Si el tiempo apremia, esta es la boquilla a elegir.
Nozzle_FuelGiver_GRIN_NozzleVeryFast_Name=Lindstrom
Nozzle_FuelGiver_SHIN_NozzleExpensiveFast_Desc=Fabricante: Shubin Interstellar\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 2.31 SCU/s\n\nSi la velocidad es la prioridad y el precio no importa, la boquilla de combustible Bendix de Shubin ofrece velocidades de transferencia de gama alta en un paquete fiable.
Nozzle_FuelGiver_SHIN_NozzleExpensiveFast_Name=Bendix
Nozzle_FuelGiver_SHIN_NozzleExpensiveSecure_Desc=Fabricante: Shubin Interstellar\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 1.43 SCU/s\n\nUna boquilla que se merece su precio premium, la Torrez de Shubin prioriza la estabilidad y la seguridad sin dejar de ofrecer velocidades de transferencia sólidas y fiables.
Nozzle_FuelGiver_SHIN_NozzleExpensiveSecure_Name=Torrez
Nozzle_FuelGiver_SHIN_NozzleMostExpensive_Desc=Fabricante: Shubin Interstellar\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 1.98 SCU/s\n\nLa boquilla de combustible Ezra de Shubin es un paquete completo que ofrece una combinación finamente equilibrada de velocidad de transferencia y seguridad. Sin embargo, este tipo de calidad bien pensada tiene su precio.
Nozzle_FuelGiver_SHIN_NozzleMostExpensive_Name=Ezra
