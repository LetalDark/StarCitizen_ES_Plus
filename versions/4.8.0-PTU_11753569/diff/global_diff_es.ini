Intersec_TSG_WeakenDef_Solo_Desc_001=ESPECIFICACIONES DE LA MISIÓN\n\nÁrea de operaciones: sistema Nyx \nFuerzas hostiles: Shattered Blade\nEspecificaciones de equipo: naves de combate con armamento\nInforme: \nEl análisis regional indica que hay un sospechoso escondite de Shattered Blade en una antigua estación de extracción QV e Intersec busca un piloto que lance un ataque contra la infraestructura de energía de la estación.\n\nSerá un asalto multi-nivel que te requerirá apuntar y destruir componentes de la estación en el exterior y en el interior. Por operaciones anteriores, hemos aprendido que <EM4>ciertos componentes no pueden ser destruidos por armas de energía, así que se necesitarán balísticas o armamento</EM4>. Partes de la estación se han inundado históricamente con <EM4>una intensa energía de distorsión, así que tendrás que actuar con eficacia mientras estés dentro</EM4>.\n\nTodos estos ataques son un esfuerzo para permitirte <EM4>destruir el ahora expuesto núcleo de energía en el centro</EM4>.\n\nLa pérdida de esta estación impactará enormemente en la capacidad de la banda de operar en el sistema, por lo que se ha considerado de alta prioridad.\n\nBuena suerte,   \n\nDeacon Tobin \nGerente de operaciones \nInterSec Defense Solutions  \n\nEsta comunicación contiene información confidencial destinada exclusivamente al destinatario. Por favor, ignórela si la ha recibido por error y notifique al remitente. Todas las operaciones se llevan a cabo bajo el riesgo personal del contratista y deben cumplir con las leyes del UEE y del sistema cuando corresponda.
