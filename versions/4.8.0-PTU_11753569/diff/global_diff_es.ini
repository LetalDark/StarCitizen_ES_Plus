Guild_United_Wayfarers_Club_RepUI_Description=El UWC representa una vasta red de especialistas en reparación, repostaje y rescate repartidos por todo el UEE. La red incluso ha crecido para incluir un puñado de clubs afiliados Banu y Xi'an. El alcance creciente del UWC pretende garantizar viajes seguros para todos los miembros del Club, sin importar lo lejos de casa que se encuentren.
Guild_United_Wayfarers_Club_RepUI_Focus=Reparaciones en vuelo, repostaje y rearme. Rescate y recuperación de vehículos.
Guild_United_Wayfarers_Club_RepUI_Founded=2473
Guild_United_Wayfarers_Club_RepUI_Headquarters=Selene, sistema Vega
Guild_United_Wayfarers_Club_RepUI_Leadership=Bennet Hogg
Guild_United_Wayfarers_Club_RepUI_Name=United Wayfarers Club
