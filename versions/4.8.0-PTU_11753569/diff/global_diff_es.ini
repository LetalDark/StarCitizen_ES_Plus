FTLCourier_RepUI_Description=Especializada principalmente en la entrega de paquetes pequeños y portátiles, FTL se ha forjado una reputación como el servicio de mensajería n.º 1 del imperio. Como compañía, FTL está siempre buscando nuevas formas de garantizar que los envíos de los clientes lleguen a su destino más rápido y de manera más segura, asegurando que «cuando necesitas que te entreguen un paquete, nada es más rápido que la luz».
