PU_AMartel_CIV_M_PMH_TSGPhase1IntroDefeatAttackingFighters_GP_001,P=Intersec dijo que vendría alguien. Soy la capitana Aniss Martel de la nave de seguridad Tranquility. Uno de los nuestros está retenido como rehén dentro de esa estación, pero primero necesitamos ayuda para despejar a estos cazas.
PU_AMartel_CIV_M_PMH_TSGPhase1IntroDefeatAttackingFighters_GP_002,P=¿Eres de Intersec? Soy la capitana Martel de la People's Alliance. Te pongo al día más tarde, primero tenemos que quitar a estos cazas de encima de la Tranquility.
PU_AMartel_CIV_M_PMH_TSGPhase1IntroDefeatAttackingFighters_GP_003,P=Me alegro de que hayas podido venir. Me llamo Martel y esta nave es la Tranquility. Cuando nos quites a estos cazas de encima, te pongo al día de la situación.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFinal_GP_001,P=Eso es. Las bahías al núcleo de energía deberían estar abiertas. Ve y cárgatelo.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFinal_GP_002,P=El último ha caído. Deberías tener acceso al núcleo central de energía ahora.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFirst_GP_001,P=Todos los generadores de ese brazo están caídos. Quedan dos más. Todas las torretas de ese brazo deberían estar vulnerables ahora.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageFirst_GP_002,P=Los generadores del primer brazo están caídos. Eso desactivará los escudos de las torretas, pero quedan dos más antes de que podamos llegar al núcleo de energía.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageSecond_GP_001,P=Ese brazo está caído. Sigamos así y carguémonos el último.
PU_AMartel_CIV_M_PMH_TSGPhase2DamageSecond_GP_002,P=El segundo brazo está caído. Solo queda uno más. Podemos con esto.
PU_AMartel_CIV_M_PMH_TSGPhase2IntroAssaultStationWeaponType_GP_001,P=Una cosa más, parece que esos relés de energía usan blindaje pesado, así que puede que tengas que golpearlos con algo distinto a armas de energía.
PU_AMartel_CIV_M_PMH_TSGPhase2IntroAssaultStation_GP_001,P=Vamos al lío que nos ocupa. Pensábamos que esa estación estaba abandonada y enviamos a un piloto a investigar; resulta que Shattered Blade estaba escondiéndose. Sus torretas nos iluminaron cuando intentamos atacar, así que tuvimos que retirarnos. Las comunicaciones se han cortado, así que no hemos podido contactar ni saber si siquiera está vivo. La estación es uno de los modelos más antiguos del sistema, así que el sistema de apuntado de las torretas no puede rastrear naves más pequeñas. Tendrás que pasar por varios aros para entrar, pero puede que haya una forma de saltarse su seguridad y sus defensas. Necesitarás destruir los relés de energía situados alrededor de la estación. Cárgatelos y te indicaré desde ahí.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveFinalCoolerDestroyed_GP_001,P=Esa era la última unidad de refrigeración. El núcleo de energía está expuesto. Cárgatelo y, con suerte, podremos restablecer las comunicaciones con Gabe, nuestro piloto.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveFinalCoolerDestroyed_GP_002,P=La última unidad de refrigeración ha caído. Deberías tener vía libre al núcleo de energía. Buena suerte
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveIntro2A_GP_001,P=Esa era la última. Deberías tener acceso a los brazos de la estación. Si te metes dentro, tendrás que cargarte las unidades de refrigeración, lo que provocará que se abra el núcleo central de energía. Pero ten cuidado, estamos detectando niveles altos de energía de distorsión ahí dentro.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveIntro2A_GP_002,P=Los brazos de la estación deberían estar abiertos ahora. Tendrás que entrar y destruir las unidades de refrigeración para exponer el núcleo de energía. Los escáneres detectan una gran cantidad de energía de distorsión, así que tendrás que ser rápido.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveSuccess_GP_001,P=Esa era la última. Deberías tener acceso a los brazos de la estación. Si te metes dentro, hay tres generadores de escudo por brazo. Tendremos que cargárnoslos para acceder al núcleo de energía de la estación.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveSuccess_GP_002,P=Los brazos de la estación deberían estar abiertos ahora. Si consigues pasar las torretas y entrar, tendrás que destruir tres generadores de escudo instalados dentro de cada uno.
PU_AMartel_CIV_M_PMH_TSGPhase2SubObjectiveSuccess_GP_003,P=Sin esos relés, deberías tener acceso a cada uno de los brazos de la estación. Métete dentro y destruye los generadores de cada uno. Eso debería exponer el núcleo de energía y dejarte cargarte sus torretas.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_001,P=Relé caído. Bien hecho.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_002,P=Buen trabajo cargándotelo.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_003,P=Sigue así. Casi lo tenemos.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_004,P=Buen impacto. Buen trabajo.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_005,P=Relé destruido. Gran trabajo.
PU_AMartel_CIV_M_PMH_TSGPhase2TargetDestroyedEncouragement_GP_006,P=Relé eliminado.
PU_AMartel_CIV_M_PMH_TSGPhase3IntroInterceptBombers_GP_001,P=Joder, detecto múltiples bombarderos de Shattered Blade. Supongo que no les gusta lo que estamos haciendo aquí. Vamos a necesitar ayuda.
PU_AMartel_CIV_M_PMH_TSGPhase3IntroInterceptBombers_GP_002,P=Shattered Blade acaba de enviar un montón de bombarderos. ¿Alguna posibilidad de que nos eches una mano? Vamos a necesitarla.
PU_AMartel_CIV_M_PMH_TSGPhase4DestroypowercoreSuccess_GP_001,P=Gran trabajo. Cargarse el núcleo de energía debería disparar una anulación a nivel de toda la estación que reiniciará todos los protocolos de Shattered Blade.
PU_AMartel_CIV_M_PMH_TSGPhase4ReminderDestroyPowerCore_GP_001,P=Aún tenemos que cargarnos el núcleo de energía si queremos recuperar a nuestro piloto.
PU_AMartel_CIV_M_PMH_TSGPhase5Remind_GP_001,P=Quizá quieras darte prisa ahí dentro. Esto se está poniendo un poco chungo aquí fuera.
PU_AMartel_CIV_M_PMH_TSGPhase5Remind_GP_002,P=Odio molestarte, pero deberías mover el culo.
PU_AMartel_CIV_M_PMH_TSGPhase5Remind_GP_003,P=La situación va de mal en peor aquí fuera. Yo me movería si puedes.
PU_AMartel_CIV_M_PMH_TSGPhase5SavePilotCaptainsResponse_GP_001,P=Te tenemos, Gabe. Me alegro de oír que estás bien. Tenemos aquí ayuda que va a sacarte de ahí. Os dejo a los dos para que te volvamos a poner en el aire.
PU_AMartel_CIV_M_PMH_TSGPhase5SavePilotCaptainsResponsetoForgeThreat_GP_001,P=No me gusta cómo suena eso. Tendrás que darte prisa. Además, si necesitas reabastecerte, lo haría ahora. Tendremos que protegernos si aparecen los Vanduul.
PU_AMartel_CIV_M_PMH_TSGPhase5Success_GP_002,P=Ni hablar, Gabe. Te quiero fuera de aquí. Tenemos Vanduul entrando y no estás en condiciones de enredarte con ellos. Salta a quantum ya.
PU_AMartel_CIV_M_PMH_TSGPhase5VanduulWarning_GP_001,P=Los sensores de largo alcance han marcado contactos entrantes. Quizá quieras darte prisa.
PU_AMartel_CIV_M_PMH_TSGPhase5VanduulWarning_GP_002,P=Contactos Vanduul dirigiéndose a nuestra posición. Tenemos algo de tiempo, pero no mucho.
PU_AMartel_CIV_M_PMH_TSGPhase6AttackMauler_GP_001,P=Si te ves con ganas, vamos a intentar derribar ese Mauler. Es demasiado peligroso dejarlo suelto en el sistema.
PU_AMartel_CIV_M_PMH_TSGPhase6BonusObjectiveSuccess_GP_001,P=Ah, una cosa más. No sé si te servirá de algo, pero interceptamos un código en algunas comunicaciones cuando atacó Shattered Blade. Si estás pensando en investigar esa estación, quizá signifique algo allí.
PU_AMartel_CIV_M_PMH_TSGPhase6EscapeMaulerIdrisLeaving_GP_001,P=Vale, no podemos permitirnos quedarnos por aquí más tiempo, no con esa nave capital aquí. Deberías saltar a quantum mientras puedas. Buena suerte.
PU_AMartel_CIV_M_PMH_TSGPhase6EscapeMauler_GP_001,P=Deberías largarte de aquí mientras puedas. Nosotros aguantaremos a los Vanduul.
PU_AMartel_CIV_M_PMH_TSGPhase6FailPilotDead_GP_001,P=Quería darte las gracias por intentar salvar a Gabe. El universo es cada vez más peligroso. Todos deberíamos permanecer unidos y cuidarnos los unos a los otros más. En fin, deberíamos irnos. Cuídate.
PU_AMartel_CIV_M_PMH_TSGPhase6FailPilotDead_GP_002,P=Nunca es más fácil perder a un voluntario bajo tu mando. Pero podemos seguir adelante con lo que Gabe creía: hacer de Nyx un lugar más seguro para todos. Cumplamos todos con nuestra parte, ¿de acuerdo? Cuídate.
PU_AMartel_CIV_M_PMH_TSGPhase6GabeDiesCaptainsresponse_GP_001,P=Joder. Gabe ha caído…
PU_AMartel_CIV_M_PMH_TSGPhase6GabeEscapesCaptainsresponse_GP_001,P=Gracias por sacar a Gabe de aquí.
PU_AMartel_CIV_M_PMH_TSGPhase6SuccessCaptainsresponse_GP_001,P=Solo quiero decir que has dado el callo hoy. Mi gente y yo apreciamos tu tenacidad y tu esfuerzo. Espero verte por Levski en algún momento.
PU_AMartel_CIV_M_PMH_TSGPhase6SuccessCaptainsresponse_GP_002,P=Nunca habría pensado que alguien del UEE se pondría de nuestro lado así. Gracias. Espero que encuentres la paz allí donde la busques. Cuídate.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerArrives_GP_001,P=Atentos todos. Acaba de aparecer una nave capital Vanduul. Seguid con lo vuestro. Los aguantaremos todo lo que podamos.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerArrives_GP_002,P=Tenemos una nave capital Vanduul en el sitio. Gabe, lárgate de aquí cagando leches. Los aguantaremos.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerArrives_GP_003,P=Nuevo contacto. Una nave capital Vanduul ha saltado a quantum. Sacad a Gabe de aquí. Llamaremos su atención.
PU_AMartel_CIV_M_PMH_TSGPhase6VanduulMaulerDestroyed_GP_001,P=¡Nave capital Vanduul abatida! No me puedo creer que lo hayas hecho.
PU_AMartel_CIV_M_PMH_TSGPhase7MissionComplete_GP_001,P=Eso parece ser todo. Al Comité Gobernante le va a encantar saber que hemos conseguido echar mano a datos reales sacados de una nave capital Vanduul. En fin, trabajo de primera. He conseguido que mis superiores te den algo especial por todas las molestias. Gracias de nuevo.
PU_AMartel_CIV_M_PMH_TSGPhase7VanduulDataDiscoveredMissionStart_GP_001,P=Eh, soy la capitana Martel de nuevo.  Nunca había visto a alguien derribar uno de esos Mauler. No fuera de la Marina, al menos. Lo que estás viendo ahí es uno de sus almacenes de datos. Hemos estado intentando hacernos una mejor idea de su número en Nyx y eso puede ayudar. Si consigues sacar el resto de los datos, le dará a la Alianza una ventaja importante.
PU_AMartel_CIV_M_PMH_TSGTargetEncouragement_GP_001,P=Cárgate ese objetivo.
PU_AMartel_CIV_M_PMH_TSGTargetEncouragement_GP_002,P=Odio meterte prisa, pero necesitamos cargarnos eso.
PU_AMartel_CIV_M_PMH_TSGTargetEncouragement_GP_003,P=Necesito que se cargue ese objetivo.
PU_DELOIT_UWC_F_PMH_GenericMissionAbandon_GP_001,P=Vaya. Siento mucho que no vayas a poder terminar este. Espero que estés bien. Bueno, igual la próxima vez sale mejor. Hablamos pronto.
PU_DELOIT_UWC_F_PMH_GenericMissionAbandon_GP_002,P=Vaya, ¿abandonas? Te seré sincera, me sorprende un poco, pero lo entiendo, la vida pasa. Pero no lo conviertas en costumbre, ¿vale? Hasta luego.
PU_DELOIT_UWC_F_PMH_GenericMissionAbandon_GP_003,P=Espera, ¿estás cancelando el contrato? ¿En serio? Vale, pues… Si crees que es lo mejor…
PU_DELOIT_UWC_F_PMH_GenericMissionAccept_GP_001,P=Hola, soy DD. Gracias por aceptar este trabajo. Creo que vas a ser perfecto para él. Tómatelo paso a paso y ten cuidado ahí fuera, ¿vale?
PU_DELOIT_UWC_F_PMH_GenericMissionAccept_GP_002,P=Hola otra vez. Soy DD. Me preguntaba cuándo volverías a por otro contrato. En fin, el tiempo es oro, así que ¡al lío!
PU_DELOIT_UWC_F_PMH_GenericMissionAccept_GP_003,P=¡Hola! Soy DD otra vez. Siempre me alegra ver tu nombre aparecer en un contrato. Tienes los detalles, así que pórtate bien ahí fuera y ya hablamos.
PU_DELOIT_UWC_F_PMH_GenericMissionComplete_GP_001,P=Soy DD. Solo te llamo para decirte que aprecio que seas del tipo fiable. Justo el tipo de piloto que Wayfarer necesita. Vuela seguro y no te pierdas, ¿me oyes?
PU_DELOIT_UWC_F_PMH_GenericMissionComplete_GP_002,P=Mira eso. Contrato completado. Siempre da gusto verlo. En fin, descansa un poco y hablamos pronto.
PU_DELOIT_UWC_F_PMH_GenericMissionComplete_GP_003,P=A Wayfarer le vendrían bien unos cuantos pilotos más como tú, eso seguro. Disfruta del pago, y seguro que pronto tenemos otro contrato para ti.
PU_DELOIT_UWC_F_PMH_GenericMissionFail_GP_001,P=Soy DD. Siempre cuesta cuando el trabajo no sale. Lo único que podemos hacer es aprender y seguir adelante. Tómate un descanso y nos vemos en el siguiente.
PU_DELOIT_UWC_F_PMH_GenericMissionFail_GP_002,P=DD desde el UWC. No parece que ese trabajo esté saliendo. Le pasa al mejor. No dejes que te hunda y vuelve ahí fuera pronto.
PU_DELOIT_UWC_F_PMH_GenericMissionFail_GP_003,P=Vaya. Qué mala suerte. Siento mucho que este no haya salido como querías. Mantén la cabeza alta, ¿vale?
PU_DELOIT_UWC_F_PMH_MissionAcceptIntro_GP_001,P=Déjame ser la primera en darte la bienvenida a bordo. Siempre hay un montón de gente ahí fuera contando con la ayuda de Wayfarer, así que está bien cuando se une un nuevo piloto a la causa. Soy Dina Deloit, pero puedes llamarme DD, todo el mundo lo hace. Seré tu despachadora principal. ¿Qué te parece si te ponemos en marcha? Los clientes no se van a atender solos.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_001,P=Uh oh. Esto no me da buena espina… ¡Cuidado!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_002,P=Qué raro. No veo ninguna nave… ¡cuidado! Es una trampa.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_003,P=¡Eh! ¡Es un montaje! ¡Cuidado!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_001,P=Muy bien, parece que acabas de llegar, así que voy a pasarte con el cliente.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_002,P=Genial, has llegado. Te paso al cliente ahora.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_003,P=Vale, ahora que estás en el sitio te conectaré con el cliente…
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_001,P=¡Eh, atento! Tienes problemas de camino. Mantente alerta.
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_002,P=Eh. Prepárate. Tienes algunos hostiles que llegarán en cualquier momento.
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_003,P=Malas noticias. He detectado algunos hostiles dirigiéndose directos hacia ti.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_001,P=Hola, soy DD. Gracias por aceptar este contrato de repostaje. No sé tú, pero a mí la idea de quedarme tirado sin combustible me da un miedo de cojones. Bueno, por suerte te tienen a ti para rescatarlos.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_002,P=Hola, soy DD. A ver qué tienes hoy entre manos… Vale, un trabajo de repostaje. ¿Qué haríamos sin la gente que olvida llenar el depósito, eh? En fin, te dejo con ello.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_003,P=Hola, soy DD otra vez. Parece que te hemos asignado un trabajo de repostaje. Buena suerte y ten cuidado ahí fuera.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_001,P=Madre mía. Pobre alma… Y me temo que hay más malas noticias. Sin nave que repostar, tengo que cancelar el contrato. El próximo tendrá un final más feliz, espero. Mantente a salvo, ¿me oyes?
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_002,P=No me puedo creer que el cliente no lo haya conseguido. Al menos tú sigues con nosotros, ¿no? El lado bueno y todo eso. Por desgracia, voy a tener que cancelar el contrato. Más suerte la próxima vez.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_003,P=Aunque me encanta este trabajo, hay días que son más duros que otros. No solo hemos perdido al cliente, sino que también tengo que cancelar el contrato. Bueno, mañana es otro día, ¿no? Hablamos pronto.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_001,P=¡Uf! Me alegra que hayas salido de ese marrón. Y no te preocupes por el contrato. He conseguido que Wayfarer te pague algunos créditos igualmente. Quiero decir, no fue culpa tuya que la solicitud de servicio resultara ser cebo.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_002,P=Gracias al cielo que estás bien. Normalmente sin cliente no hay paga, pero he podido conseguir algo de compensación por las molestias. Espero que te alegre un poco el día. Mantente a salvo ahí fuera, ¿vale?
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_003,P=No me puedo creer que estés bien. Eso fue bastante aterrador, pero he podido conseguirte una paga por riesgo por todas las molestias. Así podemos volver a sacarte ahí fuera lo antes posible, ¿vale? Hablamos pronto.
PU_Forge_SHA_M_PMH_TSGPhase2TauntKnown_GP_001,P=Joder. Otra vez tú. Parece que no puedo librarme de ti, ¿eh? En fin, igual esta vez tenemos más suerte y te metemos en una puta tumba.
PU_Forge_SHA_M_PMH_TSGPhase2TauntKnown_GP_002,P=¿Otra vez por aquí? Esperaba que alguien te hubiera matado ya. Bueno, supongo que tendremos que encargarnos de eso.
PU_Forge_SHA_M_PMH_TSGPhase2TauntKnown_GP_003,P=Lo voy a decir, me alegro de haberme topado contigo otra vez. Mataste a mucha buena gente. Hora de la venganza, cabrón.
PU_Forge_SHA_M_PMH_TSGPhase2Taunt_GP_001,P=Sabes, teníamos algo bastante bueno montado. Nos dejaban en paz haciendo lo nuestro, pero ahora no podemos darnos la vuelta sin toparnos con uno de vosotros, cabrones del UEE.
PU_Forge_SHA_M_PMH_TSGPhase2Taunt_GP_002,P=¿Tienes idea de lo que nos costó fortificar este sitio?
PU_Forge_SHA_M_PMH_TSGPhase2Taunt_GP_003,P=Aquí va una idea: ¿puedo contratarte para que te largues a tomar por culo? Eso es lo único que os importa a los mercenarios, ¿no?
PU_Forge_SHA_M_PMH_TSGPhase3Taunt_GP_001,P=¿Qué tal esto? Volamos en pedazos a ese idris y os podéis ir. ¿Qué te parece? No tendrás motivo para quedarte.
PU_Forge_SHA_M_PMH_TSGPhase3Taunt_GP_002,P=La People's Alliance podría haberse marchado. Tú también. Pero ahora mueren. Esto debería haber sido mucho más simple.
PU_Forge_SHA_M_PMH_TSGPhase3Taunt_GP_003,P=Vale. Vamos a por la tierra quemada, aniquilación pura. Es la única cosa que los Vanduul hacen bien.
PU_Forge_SHA_M_PMH_TSGPhase5Taunt_GP_001,P=<crazy scrambled sound> ¿Te gusta eso? Que me parta un rayo si sé qué significa, pero lo que sí sé es que si lo emites por las comunicaciones, seguro que vienen unos cuantos Vanduul corriendo. Diviértete.
PU_Forge_SHA_M_PMH_TSGPhase5Taunt_GP_002,P=<crazy scrambled sound> ¿Has visto lo que les hacen los Vanduul a los Humanos? Es feo… crudo… despiadado. No te preocupes si no lo has visto. Estás a punto de hacerlo.
PU_GWindell_CIV_M_PMH_TSGGenericDeathThroe_GP_001,P=Mierda, mierda, mierda <death scream>
PU_GWindell_CIV_M_PMH_TSGGenericDeathThroe_GP_002,P=¡Ayuda, ayuda, ayuda!
PU_GWindell_CIV_M_PMH_TSGGenericDeathThroe_GP_003,P=¡Por favor, alguien!
PU_GWindell_CIV_M_PMH_TSGGenericHostileKilledEncouragement_GP_001,P=Joder, qué bueno eres en esto.
PU_GWindell_CIV_M_PMH_TSGGenericHostileKilledEncouragement_GP_002,P=Hostia, eso ha sido increíble.
PU_GWindell_CIV_M_PMH_TSGGenericHostileKilledEncouragement_GP_003,P=Los tienes. Los tienes.
PU_GWindell_CIV_M_PMH_TSGGenericNeedHelp_GP_001,P=Estas naves me están machacando.
PU_GWindell_CIV_M_PMH_TSGGenericNeedHelp_GP_002,P=¿Alguien me echa una mano con estas naves?
PU_GWindell_CIV_M_PMH_TSGGenericNeedHelp_GP_003,P=Que alguien se ocupe de estos cazas.
PU_GWindell_CIV_M_PMH_TSGPhase5DestroyTerminalUponEnter_GP_001,P=Eh, soy Gabe. Estoy escondido en mi nave y a salvo… por ahora al menos. Tendrás que llegar al terminal del hangar para abrir las puertas exteriores y poder salir.
PU_GWindell_CIV_M_PMH_TSGPhase5SavePilotPilotdistresscall_GP_001,P=Mayday, mayday, mayday... ¿Me recibes? Tranquility, soy Gabe.
PU_GWindell_CIV_M_PMH_TSGPhase5SuccessReward_GP_001,P=Lo conseguiste. Hangar abierto y lanzando ahora. Capitana Martel, estoy listo para volver al lío.
PU_GWindell_CIV_M_PMH_TSGPhase6ArrivesatDestination_GP_001,P=Estamos lo bastante lejos. Necesitaré algo de tiempo para activar el motor cuántico.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionComplete_GP_001,P=Activado. Gracias por sacarme de ahí.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionReminder_GP_001,P=No podré saltar a quantum con todos estos cazas encima.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionReminder_GP_002,P=Necesitas despejar a estos cazas para que pueda activar el motor.
PU_GWindell_CIV_M_PMH_TSGPhase6MissionReminder_GP_003,P=Hay demasiados cazas para saltar a quantum. Despéjalos.
PU_GWindell_CIV_M_PMH_TSGPhase6SuccessReward_GP_001,P=Eh, perdón por no quedarme a echar una mano, pero cuando estaba atrapado en la estación, vi a algunos de Shattered Blade soltar sin querer una tarjeta llave. Si andas husmeando por su estación, igual te sirve. Gracias otra vez y nos vemos.
PU_HAWKER1_SK_WalkPast_NoBuy_IG_001_YourePassingOn,P=Estás dejando pasar la oferta del siglo.
PU_HAWKER1_SK_WalkPast_NoBuy_IG_002_OiWhereYou,P=Eh, ¿adónde vas?
PU_HAWKER1_SK_WalkPast_NoBuy_IG_003_WhyTheRush,P=¿A qué tantas prisas, amigo?
PU_HAWKER1_SK_WalkPast_NoBuy_IG_004_AllRightSome,P=Vale, otro día entonces. Ya sabes dónde encontrarme.
PU_HAWKER2_SK_WalkPast_NoBuy_IG_001_YourePassingOn,P=Estás dejando pasar la oferta del siglo.
PU_HAWKER2_SK_WalkPast_NoBuy_IG_002_HeyHeyHey,P=Eh, eh eh eh, ¿adónde vas?
PU_HAWKER2_SK_WalkPast_NoBuy_IG_003_WhyTheRush,P=¿A qué tantas prisas, amigo?
PU_HAWKER2_SK_WalkPast_NoBuy_IG_004_OkaySomeOther,P=Vale, otro día entonces. Ya sabes dónde encontrarme.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Bueno, eso fue absolutamente aterrador. Vale, démonos prisa y terminemos la transferencia de combustible.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=¿Eran todos? Vale, ¿qué tal si terminamos esto y nos largamos cagando leches?
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Gracias. Este sistema se vuelve más peligroso cada día. Terminemos esto antes de que aparezcan más.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_001,P=Eso es. Listo para irme. Gracias otra vez y siento las molestias.
