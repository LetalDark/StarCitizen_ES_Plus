Foxwell_X2_AttackIdris_Desc=Tenemos localizado un Idris de XenoThreat con apoyo de cazas en <EM4>~mission(Location|Address)</EM4>. Su disciplina de comunicaciones es pésima. Según el parloteo por radio, el Comandante está a bordo del Idris. No recuerdo la última vez que lo tuvimos tan bien localizado. Esto podría ser una oportunidad para decapitar toda la operación. \n\n¿Te apuntas?\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_X2_AttackIdris_Title=Objetivo: grupo de ataque XenoThreat
Foxwell_X2_DrawOutBoss_Desc=Hemos interceptado una baliza de localización que sitúa a <EM>~mission(TargetName)</EM4> y a su escuadrilla de ataque personal en <EM4>~mission(Location|Address)</EM4>. Han sido uno de los ejecutores más brutales de XenoThreat desde su fundación. \n\n<EM>~mission(TargetName|Last)</EM4> no es de los que se echan atrás en una pelea, así que golpea a sus naves con la dureza suficiente, hazles bastante daño y no podrán resistirse a unirse a la acción. Una vez estén a la vista, serán tu objetivo principal.\n\n¿Listo?\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_X2_DrawOutBoss_Title=Eliminar al ejecutor de XenoThreat
Foxwell_X2_ShipAmbush_Desc=Nos han pasado información sólida sobre la trayectoria de vuelo de una escuadrilla de ataque de XenoThreat. Buscamos contratistas que puedan despegar ya y posicionarse en <EM4>~mission(Location|Address)</EM4> antes que ellos. Las condiciones locales enmascararán las firmas de tu escáner para que puedas darles la sorpresa de su vida. Vamos a convertir a los cazadores en presas.\n\n¿Interesado?\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_X2_ShipAmbush_Title=Emboscar a la escuadrilla de ataque de XenoThreat
Foxwell_X2_ShipDefend_Desc=Ha llegado una baliza de socorro desde <EM4>~mission(Location|Address)</EM4> sobre una nave atacada por XenoThreat. El piloto informa de que sus escudos están cediendo y no puede dejar atrás a los atacantes.\n\nLa nave es un <EM4>~mission(Ship)</EM4>, pero el piloto es Humano, lo que según la retorcida lógica de XenoThreat lo convierte en un traidor a la Humanidad y en blanco de su odio.\n\nBuscamos operadores que se dirijan allí y hagan algo bueno.\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_X2_ShipDefend_Title=Urgente - Nave bajo ataque de XenoThreat
Foxwell_X2_ShipWaves_Desc=Llegan múltiples informes de naves de XenoThreat concentrándose en <EM4>~mission(Location|Address)</EM4>\nBuscamos contratistas listos para llevarles la pelea. \n\nQuieren que creamos que tienen la razón de su lado. Quieren que creamos que tienen una fuerza abrumadora. Esta es una oportunidad para demostrarles que no nos chupamos el dedo.\n\nNo te voy a mentir, esto es para mí algo más que un simple contrato de seguridad. Odio a estos cabrones intolerantes y todo lo que representan.\n\n¿Te vienes?\n\nKevin Walton\nDespachador, Foxwell Enforcement\n'Seguridad, a tu manera'\n\nFoxwell Enforcement es un especialista en seguridad autorizado para operar en todo el UEE. Siempre estamos buscando nuevos operadores que se unan a nuestra familia. Si tú o alguien que conozcas está interesado, ponte en contacto con uno de nuestros representantes de contratos.
Foxwell_X2_ShipWaves_Title=Interceptar fuerza de ataque de XenoThreat
