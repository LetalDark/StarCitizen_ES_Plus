Stanton1_Desc=Una gran cantidad de minerales y otros recursos se extraen en Hurston para fabricar la línea de municiones y armas de la compañía. La intensa actividad industrial ha provocado una grave contaminación en todo el planeta.\n\nPosibles minerales para minería con nave:\nAluminio\nEstaño\nOuratite\nQuantainium\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nPitambu\nGolden Medmon\nRaíz Degnous\nCompBoard\nProta\nVaina de Revenant\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)\n\nPosibles criaturas:\nKopion \nMarok\nQuasigrazer\nValakkar juvenil
Stanton1a_Desc=Esta luna fue nombrada en honor al tercer CEO de Hurston Dynamics, Arial Hurston, conocido por crear el controvertido contrato laboral estilo Vida/Trabajo para empleados.\n\nPosibles minerales para minería con nave:\nAluminio\nEstaño\nHephaestanite\nCorindón\nOuratite\nQuantainium\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Stanton1b_Desc=Esta luna fue nombrada en honor al científico Aberdeen Hurston, a quien se atribuye el diseño de la primera ojiva de antimateria de la compañía. \n\nPosibles minerales para minería con nave:\nAluminio\nTitanio\nOuratite\nQuantainium\n\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Stanton1c_Desc=Esta luna fue nombrada en honor a la CEO de Hurston Dynamics, Magda Hurston, quien tomó la decisión de comprar Stanton I a la UEE. Magda es la madre del actual CEO «Coronel» Gavin E. Hurston.\n\nPosibles minerales para minería con nave:\nAluminio\nTitanio\nAslarite\nQuantainium\n\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Stanton1d_Desc=Esta luna fue nombrada en honor a Ita Hurston, quien murió durante la Primera Guerra Tevarin, como recordatorio de por qué «los productos que fabrica Hurston Dynamics son tan importantes».\n\nPosibles minerales para minería con nave:\nAluminio\nEstaño\nAslarite\nQuantainium\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Stanton2a_Desc=Bautizada en honor al menor de los tres hermanos del cuento moral infantil del siglo XXV «Un regalo para Baba», esta luna presenta más de un centenar de volcanes actualmente inactivos que, según se dice, representan la ira latente de Cellin.\n\nPosibles minerales para minería con nave:\nCuarzo\nAgricium\nTarantite\nQuantainium\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Stanton2b_Desc=Nombrada en honor al hermano mediano de los tres hermanos del cuento moral infantil del siglo XXV «Un regalo para Baba», esta es la mayor de las lunas de Crusader. La órbita ligeramente excéntrica de Daymar se dice que representa su facilidad para perderse en la historia.\n\nPosibles minerales para minería con nave:\nCuarzo\nAgricium\nSilicio\nQuantainium\nTitanio\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nHadanite\nJanalite (solo en cuevas)\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)\nCaparazón de Stone Bug (cuevas)\n\nPosibles criaturas\nValakkar juvenil
Stanton3b_Desc=La baja densidad de Wala la hace especialmente susceptible a las fuerzas de marea, lo que provoca que la luna tenga una forma notablemente prolata.\n\nPosibles minerales para minería con nave:\nHierro\nLaranite\nBeryl\nQuantainium\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nJanalite\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
Stanton4_Desc=Un error en la terraformación dejó al planeta con una cobertura de nubes anormalmente densa y un clima más frío de lo habitual, lo que lo convierte en un lugar ideal para que su propietario, microTech, aloje sus centros de computación y fabricación sensibles al calor.\n\nPosibles minerales para minería con nave:\nHierro\nHielo\nHephaestanite\nQuantainium\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nJanalite\n\nPosibles recursos recolectables:\nPitambu\nGolden Medmon\nSunset Berry\nHeart of the Woods\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)\n\nPosibles criaturas:\nKopion \nMarok\nQuasigrazer
Stanton4c_Desc=Llamada así en honor a la antigua musa griega de la música, supuestamente para recordar a quienes contemplan la luna desde microTech que deben guiarse por «el ritmo natural del universo en sus diseños».\n\nPosibles minerales para minería con nave:\nHielo\nCobre\nTaranite\nQuantainium\n\nPosibles minerales para minería manual:\nAphorite\nDolivine\nJanalite\n\nPosibles recursos recolectables:\nEstiércol de Ranta (cuevas)\nPlaga Amioshi (cuevas)\nArmillaria (cuevas)
