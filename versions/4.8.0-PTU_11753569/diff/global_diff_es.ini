vehicle_DescDRAK_Command_Module=Fabricante: Drake Interplanetary\nEnfoque: Logística\n\nIncluso los capitanes más experimentados saben cuándo el mejor curso de acción es asumir las pérdidas y vivir para luchar otro día. Con este módulo de mando desmontable, Drake se ha asegurado de que los operadores cautelosos puedan extraerse del cuerpo principal de la nave y hacer una salida apresurada con facilidad, si surge la necesidad.
vehicle_DescKRIG_L22_Alpha_Wolf_Collector_Military=Fabricante: Kruger Intergalactic\nEnfoque: Caza ligero\n\nConoce una nave casi 400 años en gestación, y bien merecedora de la espera. Kruger Intergalactic está emocionado de presentar su primera nave fabricada de forma independiente, el Wolf. Combinando velocidad, estilo y un diseño impecablemente preciso, el L-22 Alpha Wolf no solo es un escaparate para Kruger, sino que está listo para el combate, ya sea cazando solo o en manada con un poderoso conjunto de armamento, incluidos dos repetidores láser S4 a medida.\n\nWikelo aquí. Hechas modificaciones útiles para hacer nave mucho más como caza. Muy impresionante.
vehicle_DescVNCL_Mauler=Fabricante: Vanduul Clans\nEnfoque: Destructor\n\nEl Mauler es una enorme nave de escolta esencial para la flota Vanduul. Este tanque de nave da a sus pilotos una probada de poder, con su diseño angular multinivel, su vasto despliegue de armamento y puntas afiladas en los costados tanto por aerodinámica como por factor intimidante.
