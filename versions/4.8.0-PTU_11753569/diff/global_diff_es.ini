item_DescBuccaneer_Paint_Red_Red_Black=Con una pintura base roja intensa con detalles en negro, la pintura Redline le da a la Buccaneer un aspecto nuevo y audaz.Con una feroz pintura base roja y acentos negros, la pintura Redline dota al Buccaneer de un aspecto audaz y renovado.
item_DescCOOL_VNCL_S04_Mauler=Este enfriador Vanduul procesa el calor excesivo generado por el Mauler durante el combate intenso.
item_DescCarryable_TBO_MissionItem_TSG_FuelTank=Este contenedor de los días operativos de la Instalación de Extracción QV contiene combustible de quantanium almacenado de forma incorrecta, lo que ha provocado una anomalía química en el combustible.
item_DescDRAK_CML_Chaff,P=Lanzador de señuelos Drake
item_DescDRAK_CML_Flare,P=Lanzador de bengalas Drake
item_DescFlair_Dashboard_Cockpit_Bot_1_a,P=Diseñado para descansar limpiamente sobre tu salpicadero, este Dashbot acompañante reacciona durante tus viajes con una amplia variedad de expresiones faciales humorísticas. Tanto si está contento de verte como si juzga en silencio tus habilidades de pilotaje, el Emoto Dashbot hará que tu próximo vuelo sea un poco más divertido.
item_DescHTNK_VNCL_S04_Mauler=El tanque de combustible de hidrógeno del Vanduul Mauler almacena combustible para alimentar los motores y propulsores convencionales del Mauler.
item_DescHermes_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_DescHullB_Paint_Black_White_Yellow=El transporte de carga adquiere un aspecto audaz con la pintura Hull B Empyrean, que presenta un diseño tricolor dinámico. Los detalles amarillos separan una proa blanca de una sección de ingeniería gris, aportando una sensación de velocidad al carguero.El transporte de carga adopta un aspecto audaz y renovado con la pintura Empyrean del Hull B, que presenta un diseño tricolor dinámico. Los destellos amarillos añaden estilo a la base en blanco y negro.
item_DescHullB_Paint_Black_Yellow_Black=Para los capitanes de carga de largo recorrido que prefieren hacer una declaración sutil con su carguero, MISC ofrece la distinguida pintura Hull B Dusk. Un casco completamente gris resalta la silueta clásica de la nave con elegantes detalles en dorado.Para los capitanes de carga de largas distancias que prefieren hacer una declaración discreta con su buque, MISC ofrece la distinguida pintura Dusk con sus tonos negros y amarillos.
item_DescHullB_Paint_Brown_White_Bronze=Incluso una nave trabajadora merece lucir lo mejor posible. La pintura Hull B Horizon ofrece un elegante esquema de color en dos tonos gris y blanco, ideal para atraer miradas en el puerto espacial.Hasta una nave trabajadora merece lucir su mejor aspecto. La pintura Horizon del Hull B ofrece un elegante juego de dos tonos gris y blanco con toques de bronce.
item_DescHullB_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_DescHullB_Paint_Yellow_Yellow_Black=Los transportistas que quieran llamar la atención con el aspecto de su Hull B deberían equipar la pintura First Light, con su parte frontal negra y secciones traseras amarillas.Los transportistas que quieran llamar la atención con la estética de su Hull B deberían equipar la pintura First Light, con su frontal negro y cuerpo amarillo.
item_DescINTK_VNCL_S04_Mauler=Esta toma de combustible repone las reservas de hidrógeno del Mauler para mantener sus tanques llenos durante las maniobras de combate.
item_DescMISC_Hull_B_MRCK_S06_Bespoke=Tipo de artículo: Soporte de misiles\nFabricante: MISC\nTamaño: 6\nMisiles: 8xS3\n\nSoporte de misiles específico para la MISC Hull B que dispara ocho misiles S3.Tipo de objeto: Rack de Misiles\nFabricante: MISC\nTamaño: 6\nMisiles: 8xS3\n\nRack de misiles a medida para el MISC Hull B que dispara ocho misiles S3.
item_DescPOWR_VNCL_S04_Mauler=El generador de energía integrado del Vanduul Mauler produce suficiente energía para el funcionamiento de los sistemas esenciales, incluso en combate intenso.
item_DescPlayerDeco_Flair_Banu_Instrument_1_a=Inspirado en los instrumentos de fabricación humana que fueron la primera introducción de los Banu a la música, este Ochelo decorado con esmero presenta cuatro cuerdas sobre un mástil elevado y una base con piel de tambor. Algunos de los intérpretes más populares del instrumento han alcanzado la fama actuando como artistas callejeros en mercados y plazas urbanas.
item_DescQDRV_VNCL_S04_Mauler=Esta unidad cuántica ha sido calibrada para permitir al Mauler realizar viajes cuánticos largos y cortos, así como acceder a puntos de salto.
item_DescQTNK_VNCL_S04_Mauler=Este tanque de combustible cuántico almacena combustible para alimentar el motor cuántico del Mauler.
item_DescRADR_VNCL_S04_Mauler=El sistema de radar del Vanduul Mauler le permite detectar objetos grandes y pequeños para obtener datos de navegación y combate.
item_DescRAFT_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_DescSHLD_VNCL_S04_Mauler,P=El generador de escudo del Mauler proporciona cobertura defensiva contra el fuego entrante y otras amenazas a la nave.
item_DescUTV_Paint_Brown_Grey_Red=Camuflaje marrón claro y gris combinados con detalles en rojo para la pintura Resistor Camo.El camuflaje marrón claro y gris se combina con acentos rojos en la pintura Resistor Camo.
item_DescUTV_Paint_Gold_Black_Black=La pintura Bonanza le da a la UTV un aspecto lustroso con su acabado en dorado y negro.La pintura Bonanza otorga al UTV un aspecto lujoso con su acabado dorado y negro.
item_DescUTV_Paint_Green_Grey_Red=La pintura Wilderness Camo aporta un patrón clásico de camuflaje verde y gris a la UTV con detalles en rojo.La pintura Wilderness Camo aporta al UTV un clásico patrón de camuflaje en verde y gris con acentos rojos.
item_DescUTV_Paint_Grey_Black_Orange=Los vibrantes toques de naranja destacan sobre la pintura base gris de la pintura Reckoner.Llamativos toques de naranja destacan sobre la base gris de la pintura Reckoner.
item_DescUTV_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_DescVNCL_Gen2_LaserBeam_S9=Fabricante: Vanduul\nTipo de artículo: Rayo láser\n\nEste destructivo rayo láser, encontrado típicamente en naves de guerra Vanduul, es comúnmente conocido por su \ndesignación de la Marina de la UEE: 'IGNITER'.
item_DescVNCL_Gen2_LaserRepeater_S6=Fabricante: Vanduul\nTipo de artículo: Repetidor láser\n\nEste repetidor láser de corto alcance, estándar en las naves capitales Vanduul de mayor envergadura, recibe el \nnombre de 'STRIKER' por su designación de la Marina de la UEE.
item_DescVNCL_Gen2_PlasmaCannon_S8=Fabricante: Vanduul\nTipo de artículo: Cañón de plasma\n\nEste contundente cañón de plasma, frecuentemente visto en buques de guerra Vanduul, es conocido como 'RAGE', su designación UEE.
item_DescVNCL_Gen2_TachyonCannon_S10=Fabricante: Vanduul\nTipo de artículo: Cañón de taquiones\n\nEste cañón de taquiones devastadoramente potente, encontrado típicamente en naves capitales \nVanduul a gran escala, es más comúnmente conocido por su designación de la Marina de la UEE: 'ANNIHILATOR'.
item_DescVNCL_Gen2_TachyonCannon_S7=Fabricante: Vanduul\nTipo de artículo: Cañón de taquiones\n\nEste potente cañón de taquiones, apreciado en las naves de guerra Vanduul por su largo alcance, es \nmás comúnmente conocido por su designación oficial de la UEE: 'ERADICATOR'.
item_Desc_COMP_WLOP_S00_Adze=Tipo de artículo: Computadora\nFabricante: WillsOp\nTamaño: 0\nGrado: C\nClase: Civil\n\nAhora puedes experimentar el robusto procesamiento de datos de WillsOp en formato móvil con el sistema informático Adze.
item_Desc_Carryable_2H_CY_CollectorMaterial_001=Esto es prueba para nuevo metamaterial con diseño especial de Wikelo. Será ligero y fuerte pero ¡quizás no! Bueno para probar.
item_Desc_Carryable_2H_SQ_CollectorMaterial_002=Esto es nueva prueba metamaterial con diseño de Wikelo. Yo creo este ayudará a hacer cosas ir más rápido. Últimas dos pruebas no muy buenas, pero quizás esta funciona.
item_Desc_hdtc_undersuit_01_01_02=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n \nEl Lamont luce tan bien que no querrás llevar armadura encima. Combinando sin fisuras un blindaje ligero con tejidos sintéticos duraderos, el Lamont será tan cómodo en la cabina como elegante en las calles. Adopta un equipo de protección personal apto tanto para el trabajo como para el ocio, y obtén la ventaja Hardin Tactical.\n \nEl subtraje Xy'kara se inspira en la herencia milenaria de los Xi'an.
item_Desc_kap_combat_heavy_arms_02_09_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 7.5 µSCU\n \nDe los maestros diseñadores de Kilgore & Poole llega la armadura pesada Monde. Integrando sin esfuerzo blindaje de triple laminado con la última tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de comodidad de última generación y articulaciones flexibles especializadas.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_kap_combat_heavy_core_02_09_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 12.0 µSCU\nMochilas: Todas\n \nDe los maestros diseñadores de Kilgore & Poole llega la armadura pesada Monde. Integrando sin esfuerzo blindaje de triple laminado con la última tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de comodidad de última generación y articulaciones flexibles especializadas.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_kap_combat_heavy_helmet_02_09_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nDe los maestros diseñadores de Kilgore & Poole llega el casco Monde. Integrando sin esfuerzo blindaje de triple laminado con la última tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de comodidad de última generación.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_kap_combat_heavy_legs_02_09_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 7.5 µSCU\n \nDe los maestros diseñadores de Kilgore & Poole llega la armadura pesada Monde. Integrando sin esfuerzo blindaje de triple laminado con la última tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de comodidad de última generación y articulaciones flexibles especializadas.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_mrai_flightsuit_01_07_02,P=Tipo de artículo: Traje de vuelo\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nHaz una declaración inolvidable con el traje de vuelo de carreras WhiteHot. Ajusta como una segunda piel sin sacrificar el estilo; su perfil blanco puro realzado con detalles rojos ofrece una combinación de estilo llamativo y funcionalidad, permitiéndote concentrarte en lo que más importa: ganar.
item_Desc_mrai_flightsuit_01_07_12,P=Tipo de artículo: Traje de vuelo\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nUn traje de carreras que ajusta como una segunda piel sin sacrificar el estilo; el BlackFire tiene un elegante perfil monocromo realzado con detalles en gris pálido y ofrece una combinación discreta de aspecto y protección, permitiéndote concentrarte en lo que más importa: ganar.
item_Desc_mrai_flightsuit_01_07_18,P=Tipo de artículo: Traje de vuelo\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nLuce una figura impactante con el traje de vuelo de carreras BlueFlame. Ajusta como una segunda piel sin sacrificar el estilo; su perfil azul oscuro realzado con detalles rojos y blancos ofrece una combinación de estilo llamativo y funcionalidad, permitiéndote concentrarte en lo que más importa: ganar.
item_Desc_mrai_flightsuit_helmet_01_07_02,P=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\n\nLos cascos de carreras de Mirai utilizan materiales Xi'an avanzados para crear un casco cómodo y ligero, lo bastante resistente como para soportar las exigencias de las carreras a alta velocidad. El casco WhiteHot presenta un acabado en blanco brillante y rojo combinado con una estética minimalista y elegante.
item_Desc_mrai_flightsuit_helmet_01_07_12,P=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\n\nLos cascos de carreras de Mirai utilizan materiales Xi'an avanzados para crear un casco cómodo y ligero, lo bastante resistente como para soportar las exigencias de las carreras a alta velocidad. El casco BlackFire presenta un acabado en gris oscuro combinado con una estética minimalista y elegante.
item_Desc_mrai_flightsuit_helmet_01_07_18,P=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\n\nLos cascos de carreras de Mirai utilizan materiales Xi'an avanzados para crear un casco cómodo y ligero, lo bastante resistente como para soportar las exigencias de las carreras a alta velocidad. El casco BlueFlame presenta un acabado en azul profundo y rojo combinado con una estética minimalista y elegante.
item_Desc_qrt_combat_medium_arms_01_02_01=Tipo de artículo: Armadura media\nReducción de daño: 30%\nRango térmico: -50 / 80 °C\nProtección contra radiación: 26400 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nLa armadura Testudo de Quirinus Tech combina la durabilidad en combate con la comodidad del día a día. Entreteje placas resistentes pero ligeras con fibras sintéticas ultrarresistentes para ofrecer una protección de primera. En el interior lleva un tejido micromodal patentado, suave al tacto y que evacua la humedad para proporcionar una comodidad suprema.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_qrt_combat_medium_backpack_01_02_01=Tipo de artículo: Mochila media\nCapacidad de carga: 105K µSCU\nCompatibilidad con pechera: Media y pesada\n \nLa mochila Testudo puede sentirse ligera como una pluma en tus manos, pero puede soportar una cantidad impresionante de peso gracias al uso de las mismas placas resistentes pero ligeras que el conjunto de armadura.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_qrt_combat_medium_core_01_02_01=Tipo de artículo: Armadura media\nReducción de daño: 30%\nRango térmico: -50 / 80 °C\nProtección contra radiación: 26400 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 8K µSCU\nMochilas: Medias, ligeras\n \nLa armadura Testudo de Quirinus Tech combina la durabilidad en combate con la comodidad del día a día. Entreteje placas resistentes pero ligeras con fibras sintéticas ultrarresistentes para ofrecer una protección de primera. En el interior lleva un tejido micromodal patentado, suave al tacto y que evacua la humedad para proporcionar una comodidad suprema.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_qrt_combat_medium_helmet_01_02_01=Tipo de artículo: Armadura media\nReducción de daño: 30%\nRango térmico: -50 / 80 °C\nProtección contra radiación: 26400 REM\nTasa de depuración de radiación: 145.8 REM/s \n \nMantén la vista en el premio y la cabeza protegida con el casco Testudo. Cuenta con una visera amplia y una carcasa exterior duradera que sobresale por encima de la frente, diseñada específicamente para absorber y disipar de forma eficiente la energía de los impactos. \n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_qrt_combat_medium_legs_01_02_01=Tipo de artículo: Armadura media\nReducción de daño: 30%\nRango térmico: -50 / 80 °C\nProtección contra radiación: 26400 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 4K µSCU\n \nLa armadura Testudo de Quirinus Tech combina la durabilidad en combate con la comodidad del día a día. Entreteje placas resistentes pero ligeras con fibras sintéticas ultrarresistentes para ofrecer una protección de primera. En el interior lleva un tejido micromodal patentado, suave al tacto y que evacua la humedad para proporcionar una comodidad suprema.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_r6p_glasses_01_01_01=Cuando el futuro pinta brillante, recurre a estas gafas de aviador de R6 Pro. Con un diseño que ha permanecido como un clásico reconocido durante siglos, podrás rendir homenaje a los pioneros aviadores del pasado mientras buscas los nuevos horizontes del mañana.
item_Desc_slaver_undersuit_helmet_01=Tipo de artículo: Casco de vuelo\nReducción de daño: 15%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\n\n\nLa serie Stoneskin de Kastak Arms se basa en el famoso sistema TCS-4 de CDS, partiendo de los exhaustivos comentarios de los operadores que dependen de esta tecnología sobre el terreno. El Stoneskin está destinado a rivalizar con la competencia como un casco resistente y fiable.
item_Desc_slaver_undersuit_helmet_02=Tipo de artículo: Casco de vuelo\nReducción de daño: 15%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de depuración de radiación: 81 REM/s\n\n\nLa serie Stoneskin de Kastak Arms se basa en el famoso sistema TCS-4 de CDS, partiendo de los exhaustivos comentarios de los operadores que dependen de esta tecnología sobre el terreno. El Stoneskin está destinado a rivalizar con la competencia como un casco resistente y fiable.
item_Desc_srvl_armor_heavy_legs_02,P=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -85 / 115 °C\nProtección contra radiación: 26800 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 8.0 µSCU\n\nPiezas de naves recuperadas y restos de equipo protector en desuso fueron soldados juntos para crear este intimidante conjunto de armadura. Combinado con un cinturón de cuero decorado.
item_Desc_syfb_combat_light_arms_01_01_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -31 / 61 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nLa armadura Xy'kara de Syang Fabrications ofrece el resultado de miles de años de pericia en combate Xi'an en un envoltorio humano. Estrechamente adaptada a la fisionomía humana, la armadura Xy'kara proporciona una protección sin igual sin sacrificar la movilidad ni la efectividad en combate, sin renunciar al estilo.
item_Desc_syfb_combat_light_core_01_01_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -31 / 61 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad: 2000 mSCU\n \nLa armadura Xy'kara de Syang Fabrications ofrece el resultado de miles de años de pericia en combate Xi'an en un envoltorio humano. Estrechamente adaptada a la fisionomía humana, la armadura Xy'kara proporciona una protección sin igual sin sacrificar la movilidad ni la efectividad en combate, sin renunciar al estilo.
item_Desc_syfb_combat_light_helmet_01_01_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -31 / 61 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nLa armadura Xy'kara de Syang Fabrications ofrece el resultado de miles de años de pericia en combate en un envoltorio humano. Estrechamente adaptada a la fisionomía humana, la armadura Xy'kara proporciona una protección sin igual sin sacrificar la movilidad ni la efectividad en combate, sin renunciar al estilo, en ningún lugar más que en el casco, cuyo visor de cara Xi'an reconoce la herencia milenaria de la antigua raza que la creó.
item_Desc_syfb_combat_light_legs_01_01_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -31 / 61 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n\nLa armadura Xy'kara de Syang Fabrications ofrece el resultado de miles de años de pericia en combate Xi'an en un envoltorio humano. Estrechamente adaptada a la fisionomía humana, la armadura Xy'kara proporciona una protección sin igual sin sacrificar la movilidad ni la efectividad en combate, sin renunciar al estilo.
item_Desc_vgl_combat_heavy_backpack_01_12_01=Tipo de artículo: Mochila pesada\nCapacidad de carga: 150K µSCU\nCompatibilidad con pechera: Pesada\n \nEsta mochila rígida de Virgil, Ltd. hace que viajar sea fácil. Tanto si necesitas un lugar para llevar tus armas como si has decidido llevar raciones extra para un viaje largo, esta mochila se diseñó para cualquier ocasión. El interior cuenta con un generoso bolsillo cerrable para evitar que tus objetos pequeños se desordenen.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_vgl_utility_light_arms_01_04_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -35 / 65 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n\nSé el primero en llegar a la escena con la armadura Chiron. Diseñada para ofrecer la protección esencial que necesitan los médicos de combate, la armadura cuenta con paneles ultraligeros que mantienen al portador rápido sin comprometer la seguridad. Las secciones cruciales de alto impacto se han reforzado con placas de carbono elevadas sobre un polifibra altamente duradero para máxima flexibilidad.\n\nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_vgl_utility_light_arms_03_02_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -35 / 65 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nSé el primero en llegar a la escena con la armadura Chiron. Diseñada para ofrecer la protección esencial que necesitan los médicos de combate, la armadura cuenta con paneles ultraligeros que mantienen al portador rápido sin comprometer la seguridad. Las secciones cruciales de alto impacto se han reforzado con placas de carbono elevadas sobre un polifibra altamente duradero para máxima flexibilidad.\n \nCelebra el compromiso de la UEE de construir un futuro más brillante con esta edición especial del Festival de la Fundación. Diseñada pensando en los Guías y otros líderes de la comunidad, presenta una capa interior de polifibra verde azulada y detalles a juego en las secciones de placas de carbono.
item_Desc_vgl_utility_light_backpack_01_04_01=Tipo de artículo: Mochila ligera\nCapacidad de carga: 75K µSCU\nCompatibilidad con pechera: Todas\n \nDiseñada pensando en los primeros intervinientes, la mochila Chiron ofrece un transporte ideal para suministros críticos con acceso rápido a los elementos médicos esenciales que se almacenan en su interior.\n \nCelebra el compromiso de la UEE de construir un futuro más brillante con esta edición especial del Festival de la Fundación. Diseñada pensando en los Guías y otros líderes de la comunidad, presenta una capa interior de polifibra verde azulada y detalles a juego en las secciones de placas de carbono.
item_Desc_vgl_utility_light_backpack_01_05_01=Tipo de artículo: Mochila ligera\nCapacidad de carga: 75K µSCU\nCompatibilidad con pechera: Todas\n\nDiseñada pensando en los primeros intervinientes, la mochila Chiron ofrece un transporte ideal para suministros críticos con acceso rápido a los elementos médicos esenciales que se almacenan en su interior.\n\nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_vgl_utility_light_core_01_04_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -32 / 62 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 4.0 µSCU\nMochilas: Ligera\n \nSé el primero en llegar a la escena con la armadura Chiron. Diseñada para ofrecer la protección esencial que necesitan los médicos de combate, la armadura cuenta con paneles ultraligeros que mantienen al portador rápido sin comprometer la seguridad. Las secciones cruciales de alto impacto se han reforzado con placas de carbono elevadas sobre un polifibra altamente duradero para máxima flexibilidad.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_vgl_utility_light_core_03_02_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -35 / 65 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nSé el primero en llegar a la escena con la armadura Chiron. Diseñada para ofrecer la protección esencial que necesitan los médicos de combate, la armadura cuenta con paneles ultraligeros que mantienen al portador rápido sin comprometer la seguridad. Las secciones cruciales de alto impacto se han reforzado con placas de carbono elevadas sobre un polifibra altamente duradero para máxima flexibilidad.\n \nCelebra el compromiso de la UEE de construir un futuro más brillante con esta edición especial del Festival de la Fundación. Diseñada pensando en los Guías y otros líderes de la comunidad, presenta una capa interior de polifibra verde azulada y detalles a juego en las secciones de placas de carbono.
item_Desc_vgl_utility_light_helmet_01_05_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -61 / 91 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nUtilizando un cristal protector cristalino tratado con un esmaltado hidrófobo especializado, el casco ligero Chiron se diseñó específicamente para proteger contra el empañamiento y los reflejos, garantizando que los primeros intervinientes mantendrán una visión completa en situaciones de emergencia.\n \nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_vgl_utility_light_helmet_03_02_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -61 / 91 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nUtilizando un cristal protector cristalino tratado con un esmaltado hidrófobo especializado, el casco ligero Chiron se diseñó específicamente para proteger contra el empañamiento y los reflejos, garantizando que los primeros intervinientes mantendrán una visión completa en situaciones de emergencia.\n \nCelebra el compromiso de la UEE de construir un futuro más brillante con esta edición especial del Festival de la Fundación. Diseñada pensando en los Guías y otros líderes de la comunidad, presenta una capa interior de polifibra verde azulada y detalles a juego en las secciones de placas de carbono.
item_Desc_vgl_utility_light_legs_01_04_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -35 / 65 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\nCapacidad de carga: 2.5 µSCU\n\nSé el primero en llegar a la escena con la armadura Chiron. Diseñada para ofrecer la protección esencial que necesitan los médicos de combate, la armadura cuenta con paneles ultraligeros que mantienen al portador rápido sin comprometer la seguridad. Las secciones cruciales de alto impacto se han reforzado con placas de carbono elevadas sobre un polifibra altamente duradero para máxima flexibilidad.\n\nLa edición Purgatory Camo presenta un elegante patrón gris sobre gris.
item_Desc_vgl_utility_light_legs_03_02_01=Tipo de artículo: Armadura ligera\nReducción de daño: 20%\nRango térmico: -35 / 65 °C\nProtección contra radiación: 26000 REM\nTasa de depuración de radiación: 145.8 REM/s\n \nSé el primero en llegar a la escena con la armadura Chiron. Diseñada para ofrecer la protección esencial que necesitan los médicos de combate, la armadura cuenta con paneles ultraligeros que mantienen al portador rápido sin comprometer la seguridad. Las secciones cruciales de alto impacto se han reforzado con placas de carbono elevadas sobre un polifibra altamente duradero para máxima flexibilidad.\n \nCelebra el compromiso de la UEE de construir un futuro más brillante con esta edición especial del Festival de la Fundación. Diseñada pensando en los Guías y otros líderes de la comunidad, presenta una capa interior de polifibra verde azulada y detalles a juego en las secciones de placas de carbono.
item_Descksar_gren_frag_01=Fabricante: Kastak Arms\nTipo de artículo: Granada\n \nÁrea de efecto: 7.5 m\nTipo de daño: Plasma\n \nLa granada de plasma Scorch de Kastak Arms será sin duda una incorporación devastadora a tu próxima batalla. Una vez cebada y lista, la Scorch explotará al impactar, liberando una ráfaga de daño intenso por plasma sobre tu objetivo que dejará atrás una zona de peligro persistente.
item_Descutfl_crossbow_ballistic_01=Fabricante: UltiFlex\nTipo de artículo: Ballesta\n \nTamaño del cargador: 5\nCadencia: 60 rpm\nAlcance efectivo: 50 m\n \nAccesorios: Óptica (S3), Bajocañón (S3)\n \nLos artesanos de UltiFlex pasaron por cientos de prototipos para descubrir el material ligero perfecto con la combinación adecuada de resistencia y flexibilidad para su ballesta Novia, una compañera ideal en todo, desde expediciones fronterizas hasta infiltraciones tácticas. Con un tirón de su mecanismo de disparo, la Novia lanza casi en silencio un pesado virote que se astilla al impacto causando daño devastador a objetivos a corta distancia.
item_Descutfl_crossbow_ballistic_01_mag=Tipo de artículo: Cargador\nCapacidad: 5\n\nEste cargador para la ballesta Novia viene precargado con cinco virotes.
item_Descutfl_crossbow_ballistic_01_store01=Fabricante: UltiFlex\nTipo de artículo: Ballesta\n  \nTamaño del cargador: 5\nCadencia: 60 rpm\nAlcance efectivo: 50 m\n  \nAccesorios: Óptica (S3),Bajocañón (S3)\n  \nLos artesanos de UltiFlex pasaron por cientos de prototipos para descubrir el material ligero perfecto con la combinación adecuada de resistencia y flexibilidad para su ballesta Novia, una compañera ideal en todo, desde expediciones fronterizas hasta infiltraciones tácticas. Con un tirón de su mecanismo de disparo, la Novia lanza casi en silencio un pesado virote que se astilla al impacto causando daño devastador a objetivos a corta distancia. \n \nLos detalles en bronce de la edición Xy'kara se inspiran en la herencia milenaria de los Xi'an.
item_Descutfl_crossbow_ballistic_01_tint01,P=Fabricante: UltiFlex\nTipo de artículo: Ballesta\n  \nTamaño del cargador: 5\nCadencia: 60 rpm\nAlcance efectivo: 50 m\n  \nAccesorios: Óptica (S3), Bajocañón (S3)\n  \nLos artesanos de UltiFlex pasaron por cientos de prototipos para descubrir el material ligero perfecto con la combinación adecuada de resistencia y flexibilidad para su ballesta Novia, una compañera ideal en todo, desde expediciones fronterizas hasta infiltraciones tácticas. Con un tirón de su mecanismo de disparo, la Novia lanza casi en silencio un pesado virote que se astilla al impacto causando daño devastador a objetivos a corta distancia. \n \nLa edición Nighthunter luce un marco mate negro sumergido en sombras.
item_Descutfl_crossbow_ballistic_01_tint02,P=Fabricante: UltiFlex\nTipo de artículo: Ballesta\n  \nTamaño del cargador: 5\nCadencia: 60 rpm\nAlcance efectivo: 50 m\n  \nAccesorios: Óptica (S3), Bajocañón (S3)\n  \nLos artesanos de UltiFlex pasaron por cientos de prototipos para descubrir el material ligero perfecto con la combinación adecuada de resistencia y flexibilidad para su ballesta Novia, una compañera ideal en todo, desde expediciones fronterizas hasta infiltraciones tácticas. Con un tirón de su mecanismo de disparo, la Novia lanza casi en silencio un pesado virote que se astilla al impacto causando daño devastador a objetivos a corta distancia. \n \nLa edición Ghostmaker luce detalles en gris humo sobre un cuerpo metálico.
item_Descutfl_crossbow_ballistic_01_tint03,P=Fabricante: UltiFlex\nTipo de artículo: Ballesta\n  \nTamaño del cargador: 5\nCadencia: 60 rpm\nAlcance efectivo: 50 m\n \nAccesorios: Óptica (S3), Bajocañón (S3)\n \nLos artesanos de UltiFlex pasaron por cientos de prototipos para descubrir el material ligero perfecto con la combinación adecuada de resistencia y flexibilidad para su ballesta Novia, una compañera ideal en todo, desde expediciones fronterizas hasta infiltraciones tácticas. Con un tirón de su mecanismo de disparo, la Novia lanza casi en silencio un pesado virote que se astilla al impacto causando daño devastador a objetivos a corta distancia. \n \nLa edición Wildshot mezcla en su estilo tonos naturales discretos.
