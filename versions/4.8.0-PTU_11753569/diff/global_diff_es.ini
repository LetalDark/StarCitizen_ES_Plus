item_fuelpod_GRIN_BigAndFast_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Cápsula de combustible\nModificador de flujo: +30%\nCapacidad: 12.35 SCU\n\nLos productos de Greycat han sido durante mucho tiempo un pilar de los sectores industrial y comercial, y su reputación de calidad y fiabilidad se extiende a sus cápsulas de combustible. La Gargant es la mayor de la gama de Greycat y presume de velocidades de repostaje que establecen nuevos estándares para una cápsula de este tamaño.
item_fuelpod_GRIN_BigAndFast_Name=Gargant
item_fuelpod_GRIN_FastAndSmall_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Cápsula de combustible\nModificador de flujo: +70%\nCapacidad: 4.75 SCU\n\nLa Greycat Bonito ofrece una velocidad de transferencia de primer nivel en una unidad compacta. Esto tiene el coste de la capacidad, lo que hace que la Bonito sea más adecuada para misiones de respuesta rápida repostando naves de tamaño medio a pequeño.
item_fuelpod_GRIN_FastAndSmall_Name=Bonito
item_fuelpod_SHIN_BitQuckerThanStandard_Desc=Fabricante: Shubin Interstellar\nTipo de artículo: Cápsula de combustible\nModificador de flujo: +43%\nCapacidad: 10 SCU\n\nLas cápsulas de combustible de Shubin se basan en una riqueza y profundidad de experiencia y conocimientos construidos a lo largo de siglos de desarrollo e innovación. La Nemec es una opción polivalente eficaz, a pesar de sacrificar algo de resistencia al daño para facilitar mayores velocidades de transferencia de combustible.
item_fuelpod_SHIN_BitQuckerThanStandard_Name=Nemec
item_fuelpod_SHIN_FastAndInsecure_Desc=Fabricante: Shubin Interstellar\nTipo de artículo: Cápsula de combustible\nModificador de flujo: +87%\nCapacidad: 10 SCU\n\nLa Shubin Rumford prioriza —y consigue— una alta velocidad de transferencia de combustible por encima de la durabilidad, lo que la convierte en una buena elección para una ruta de repostaje a través de espacio protegido.
item_fuelpod_SHIN_FastAndInsecure_Name=Rumford
item_fuelpod_STOR_BigandSlow_Desc=Fabricante: Stor*All\nTipo de artículo: Cápsula de combustible\nModificador de flujo: -55%\nCapacidad: 16.8 SCU\n\nLa Stor*All GSX-EX ofrece una impresionante combinación de tamaño y protección de primera, y debe tomarse seriamente en consideración cuando la velocidad de repostaje es menos prioritaria.
item_fuelpod_STOR_BigandSlow_Name=GSX-EX
