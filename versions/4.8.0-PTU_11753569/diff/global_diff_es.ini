Vehicle_DescGRIN_UTV=Fabricante: Greycat Industrial\nEnfoque: Carga\n\nLa Greycat UTV es un buggy utilitario resistente diseñado para transportar cargas ligeras a través de terrenos accidentados. Ya sea que estés coordinando el almacenamiento de mercancías o realizando un transporte de suministros a un puesto de avanzada cercano, el diseño sencillo de la UTV permite a los operadores centrarse en afrontar el trabajo en cuestión.Fabricante: Greycat Industrial\nEnfoque: Carga\n\nEl Greycat UTV es un buggy utilitario y resistente diseñado para transportar cargas ligeras por terrenos accidentados. Tanto si coordinas el almacenamiento de mercancías como si haces una entrega a un puesto avanzado vecino, el diseño directo del UTV permite a los operadores centrarse en la tarea que tienen entre manos.
Vehicle_NameGRIN_UTV=Greycat UTV
X2_JournalTracker_Content=El grupo terrorista XenoThreat ha vuelto a Stanton para imponer violentamente sus valores intolerantes en el sistema. Sus miembros bien armados están hostigando no solo a los residentes alienígenas, sino a cualquiera al que hayan tachado de traidor a la Humanidad, en especial a los pilotos humanos de naves de fabricación alienígena.\n\nEstá claro que no dejarán de intentar propagar su odio a menos que los detengamos.\n\nÚnete a nosotros. Pon de tu parte.
