TheCollector_Recipes_Desc_L22Wolf=Wikelo muy emocionado. Tener idea para nuevo material. Pero hacerlo es muy complicado. Muy enrevesado. Necesito ayuda fabricando una muestra de prueba. Yo te doy plano, tú haces, traes a mí, y haré trato. Te doy un L-22 Wolf muy especial. Muy potente, muy lobo.
TheCollector_Recipes_Desc_NoneAR=Este rifle muy bueno disparando, pero podría tener mejor diseño. Wikelo arregla. Ahora tiene muy buena pinta. Te lo doy a cambio. Tráeme cosas, yo te doy el rifle. Incluso te doy plano si lo necesitas.
TheCollector_Recipes_Desc_VGLflightsuit=Las naves tienen ventanas grandes. Todos pueden verte volando. Tienes que estar con tu mejor pinta. Wikelo tiene muy buen traje de vuelo para ti. Hagamos trato, tráeme lo que necesito y Wikelo te da traje. Te doy plano también si no tienes.
