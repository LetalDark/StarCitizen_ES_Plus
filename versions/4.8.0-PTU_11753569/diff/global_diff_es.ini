Intersec_TSG_BombRun_Solo_Desc_001=ESPECIFICACIONES DE LA MISIÓN\n\nÁrea de operaciones: sistema Nyx \nFuerzas hostiles: Shattered Blade\nEspecificaciones de equipo: naves de combate con armamento\nInforme: \nLos activos locales han indicado que elementos de Shattered Blade están intentando reconstruir una de sus estaciones e Intersec busca un piloto que se asegure de que eso no ocurra.\n\nHan conseguido volver a poner en línea las defensas básicas de torreta, pero actualmente solo tienen <EM4>dos relés de energía activados</EM4>. Estos serán tus objetivos, ya que <EM4>no pueden ser destruidos por armas de energía, necesitarás llevar balísticas o armamento para ser efectivo</EM4>. \n\nLa reactivación de esta estación permitiría a Shattered Blade intentar recuperar un punto de apoyo en este sistema y no podemos dejar que eso ocurra.\n\nBuena suerte,   \n\nDeacon Tobin \nGerente de operaciones \nInterSec Defense Solutions  \n\nEsta comunicación contiene información confidencial destinada exclusivamente al destinatario. Por favor, ignórela si la ha recibido por error y notifique al remitente. Todas las operaciones se llevan a cabo bajo el riesgo personal del contratista y deben cumplir con las leyes del UEE y del sistema cuando corresponda.
Intersec_TSG_BombRun_Solo_Title_001=Bombardeo estratégico
Intersec_TSG_CollectData_Desc_001=ESPECIFICACIONES DE LA MISIÓN\n\nÁrea de operaciones: sistema Nyx \nFuerzas hostiles: Vanduul\nEspecificaciones de equipo: N/A\nInforme: \nLa capitana Martel de la nave Tranquility de la People's Alliance se ha puesto en contacto para decir que te han reclutado para recuperar discos de datos de la nave capital Vanduul destruida.\n\nTen cuidado al extraer dichos discos y entrégaselos a la People's Alliance para su análisis una vez completado.\n\nRespetuosamente,   \n\nDeacon Tobin \nGerente de operaciones \nInterSec Defense Solutions  \n\nEsta comunicación contiene información confidencial destinada exclusivamente al destinatario. Por favor, ignórela si la ha recibido por error y notifique al remitente. Todas las operaciones se llevan a cabo bajo el riesgo personal del contratista y deben cumplir con las leyes del UEE y del sistema cuando corresponda.
Intersec_TSG_CollectData_Title_001=Recuperar datos Vanduul
Intersec_TSG_DefendShip_Solo_Desc_001=ESPECIFICACIONES DE LA MISIÓN\n\nÁrea de operaciones: sistema Nyx \nFuerzas hostiles: Shattered Blade\nEspecificaciones de equipo: listo para combate\nInforme: \nNos ha llegado noticia de que un piloto de seguridad de la People's Alliance se topó con un escondite de Shattered Blade y necesita asistencia inmediata. \n\nDirígete a la estación abandonada y <EM4>proporciona cobertura hasta que pueda saltar a quantum a un lugar seguro</EM4>.\n\nRespetuosamente,   \n\nDeacon Tobin \nGerente de operaciones \nInterSec Defense Solutions  \n\nEsta comunicación contiene información confidencial destinada exclusivamente al destinatario. Por favor, ignórela si la ha recibido por error y notifique al remitente. Todas las operaciones se llevan a cabo bajo el riesgo personal del contratista y deben cumplir con las leyes del UEE y del sistema cuando corresponda.
Intersec_TSG_DefendShip_Solo_Title_001=Defender al piloto de la People's Alliance
Intersec_TSG_EscortShip_Solo_Desc_001=ESPECIFICACIONES DE LA MISIÓN\n\nÁrea de operaciones: sistema Nyx \nFuerzas hostiles: Shattered Blade\nEspecificaciones de equipo: listo para combate\nInforme: \nIntersec ha interceptado parloteo de los canales de Shattered Blade que indica que han capturado a un piloto de seguridad de la People's Alliance en una antigua estación de extracción que controlan.\n\nNecesitamos un piloto de combate experimentado que preste asistencia para que el piloto pueda escapar. El espacio aéreo fuera del hangar está plagado de hostiles, por lo que <EM4>tendrás que despejar el espacio aéreo para que el piloto pueda lanzar y saltar a quantum a salvo</EM4>.\n\nRespetuosamente,   \n\nDeacon Tobin \nGerente de operaciones \nInterSec Defense Solutions  \n\nEsta comunicación contiene información confidencial destinada exclusivamente al destinatario. Por favor, ignórela si la ha recibido por error y notifique al remitente. Todas las operaciones se llevan a cabo bajo el riesgo personal del contratista y deben cumplir con las leyes del UEE y del sistema cuando corresponda.
Intersec_TSG_EscortShip_Solo_Title_001=Misión de extracción
Intersec_TSG_Group_Desc_001=ESPECIFICACIONES DE LA MISIÓN\n\nÁrea de operaciones: sistema Nyx \nFuerzas hostiles: Shattered Blade\nEspecificaciones de equipo: grupo de asalto\nInforme: \nNos ha llegado noticia de que una nave de seguridad de la People's Alliance llamada Tranquility se topó con Shattered Blade ocultos en una antigua estación de extracción QV. Los detalles son borrosos, pero te conectaremos con activos locales una vez estés en el sitio. \n\nIntersec busca un equipo que intervenga y proteja a la Tranquility y a su personal. Según las conversaciones con la capitana de la Tranquility, <EM4>necesitarás balísticas y armamento para acabar con las defensas de la estación</EM4> y, en última instancia, <EM4>poner botas sobre el terreno para salvar a su piloto</EM4>.\n\n<EM4>Reclutar naves adicionales</EM4> que te apoyen en esta misión es absolutamente crítico. <EM4>Necesitarás una variedad de tipos de nave</EM4> para equilibrar múltiples zonas de combate en el espacio y en tierra.\n\nRespetuosamente,   \n\nDeacon Tobin \nGerente de operaciones \nInterSec Defense Solutions  \n\nEsta comunicación contiene información confidencial destinada exclusivamente al destinatario. Por favor, ignórela si la ha recibido por error y notifique al remitente. Todas las operaciones se llevan a cabo bajo el riesgo personal del contratista y deben cumplir con las leyes del UEE y del sistema cuando corresponda.
Intersec_TSG_Group_Title_001=Se necesita grupo de asalto táctico
