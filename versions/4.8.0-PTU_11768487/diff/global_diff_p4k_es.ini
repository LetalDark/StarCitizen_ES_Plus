HeadHunters_RecoverCargo_Hard_Description=Busco un transportista que recoja una carga para mí. La cosa es que hay trampa.\n\nLa carga está en la bodega de una nave abandonada situada en <EM4>~mission(Location|Address)</EM4>. Como ya habrás imaginado, esta no es nuestra carga, pero desde luego no merece ir a parar a manos de nadie más. Que me parta un rayo si esos cabrones de los CFP la pillan antes que nosotros.\n\nMucha suerte hemos tenido si fuimos los primeros en enterarnos, pero apostaría a que va a haber más naves zumbando por allí que moscas sobre un cadáver de kopion. Si tienes colegas de confianza, tráetelos y dejad fuera de juego a esos cabrones. Y no te olvides de tu <EM4>rayo tractor de gran potencia</EM4>, claro está.\n\nSi consigues llevarte esa carga y entregarla en el elevador de carga de <EM4>~mission(Destination|Address)</EM4>, te puedo conseguir una buena parte de la venta.\n\nStows fuera.
