item_Desc_nvs_pilot_flightsuit_01=Tipo de artículo: Traje de vuelo blindado\nReducción de daño: 15%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 26000 REM\nTasa de purga de radiación: 145.8 REM/s\nTolerancia a fuerza G: +97.5%\nCapacidad de carga: 8.0 µSCU\n\nInspirado en el traje de vuelo blindado utilizado por los pilotos de la Marina de la UEE, el OMNI-AFS-Sapphire ha sido probado en combate y refinado durante siglos hasta convertirse en la prenda definitiva para cualquier piloto. Su construcción robusta pero cómoda no solo resiste entornos hostiles, sino que también incorpora armadura integrada en brazos, torso y piernas para los enfrentamientos de combate. La única manera de que un piloto se acerque más a lo real es alistándose.
; FORCE
item_Desc_nvs_pilot_flightsuit_helmet_01=Tipo de artículo: Casco de vuelo\nReducción de daño: 15%\nRango térmico: -35 / 65 °C\nProtección contra radiación: 26000 REM\nTasa de purga de radiación: 145.8 REM/s\n\nSimilar al casco utilizado por los pilotos de la Marina de la UEE, el casco OMNI-AFS-Sapphire ofrece una protección y visibilidad excelentes. Su blindaje multicapa protege contra impactos, mientras que su amplia placa facial garantiza una vista clara y sin obstrucciones tanto en la cabina como a pie.
