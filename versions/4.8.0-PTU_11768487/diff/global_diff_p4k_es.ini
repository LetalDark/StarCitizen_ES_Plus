item_Desc_rsi_odyssey_undersuit_01_Shared=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nLa última generación del clásico subtraje Odyssey de RSI presenta un nuevo diseño resistente capaz de soportar las condiciones más extremas en el espacio o en la superficie de un planeta. Construido con la última tecnología de microtejido, el subtraje Odyssey II ofrece horas de comodidad en lugares que no lo son.
; FORCE
item_Desc_rsi_odyssey_undersuit_helmet_01_01_coramor=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\n\nContinuando con el legado de cascos resistentes y confiables de RSI, el Odyssey II optimiza el diseño original en una estructura más ligera sin sacrificar durabilidad. Este casco multiusos fue extensamente probado en una variedad de condiciones y entornos para mantenerte seguro cada vez que te equipes. Esta edición especial Lovestruck presenta un elegante esquema de colores rosa metálico y negro inspirado en los colores del festival Coramor.
