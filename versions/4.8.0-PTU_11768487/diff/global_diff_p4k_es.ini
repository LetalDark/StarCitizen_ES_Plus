item_Desc_mrai_flightsuit_01_03_01=Tipo de artículo: Traje de vuelo\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nEncarna el lujo, el estilo y la velocidad al ponerte el traje de vuelo utilizado por el equipo de carreras de Origin. Este nítido traje de vuelo blanco presenta detalles en azul y gris y el logo de Origin en varios lugares destacados.
