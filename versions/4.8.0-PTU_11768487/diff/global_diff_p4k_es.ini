vehicel_DescANVL_Valkyrie=Fabricante: Anvil Aerospace \nEnfoque: Dropship\n\nLa Valkyrie sube la apuesta en el transporte de tropas. Diseñada para transportar hasta veinte soldados, así como vehículos, a los lugares más hostiles, esta nave militar lista para el conflicto es una fuerza formidable, tanto ofensiva como defensivamente. Construida pensando en los contratistas de defensa militares y privados, la Valkyrie es uno de los transportes de personal más eficientes y efectivos de su clase.
; FORCE
vehicl_DescMISC_Hull_B=Fabricante: MISC\nEnfoque: Carga media\n\nEl MISC Hull B es una opción robusta para pilotos que buscan un transporte de carga dedicado. Aunque no es tan grande como algunos de los otros modelos de la serie Hull, el perfil más pequeño del Hull B proporciona una mayor flexibilidad y más opciones de acceso.
; FORCE
vehicle_DescAEGS_Avenger_Stalker=Fabricante: Aegis Dynamics\nEnfoque: Interceptor\n\nInicialmente diseñado como la nave de transporte de primera línea de Aegis para el ejército, el Avenger Stalker tomó un camino diferente y finalmente tuvo una larga e histórica carrera como patrullero estándar de la Fiscalía de la UEE. Utilizando su bodega de carga para el transporte de prisioneros, el Avenger presenta un casco robusto y fiable y capacidad para soportes de motor más grandes de lo esperado.
; FORCE
vehicle_DescAEGS_Firebird_Collector_Milt,P=Fabricante: Aegis Dynamics\nEnfoque: Caza sigiloso\n \nCuando los enfrentamientos en primera línea requieren un ataque rápido y decisivo, el Sabre Firebird es el caza mediano ideal para cualquier arsenal. Tomando el ya probado en batalla Sabre Raven, Aegis ha diseñado la variante Firebird con un lanzamisiles mejorado capaz de enfrentarse a una amplia gama de amenazas.
; FORCE
vehicle_DescAEGS_Retaliator=Fabricante: Aegis Dynamics\nEnfoque: Modular\n\nEsta versión civil modificada del Retaliator actualiza el chasis de la nave militar con espacio vacío que puede ser equipado con varios módulos para adaptarse a tus necesidades.
; FORCE
vehicle_DescAEGS_Sabre_Firebird=Fabricante: Aegis Dynamics\nEnfoque: Caza sigiloso\n \nCuando los enfrentamientos en primera línea requieren un ataque rápido y decisivo, el Sabre Firebird es el caza mediano ideal para cualquier arsenal. Tomando el ya probado en batalla Sabre Raven, Aegis ha diseñado la variante Firebird con un lanzamisiles mejorado capaz de enfrentarse a una amplia gama de amenazas.
; FORCE
vehicle_DescAEGS_Vanguard_Harbinger=Fabricante: Aegis Dynamics\nEnfoque: Caza pesado / Bombardero\n\nEl Vanguard Harbinger es el caza/bombardero estándar de la Tierra, que convierte la cápsula de escape estándar del Warden en una potente bahía de bombas. El alcance extendido del Vanguard y el perfil relativamente pequeño significan que puede ir donde las naves con base en portaaviones o los bombarderos estratégicos más grandes no llegan, atacar con fuerza y luego regresar a la base.
; FORCE
vehicle_DescAEGS_Vanguard_Hoplite=Fabricante: Aegis Dynamics\nEnfoque: Dropship \n\nEl Vanguard Hoplite es un cruce entre el caza espacial Vanguard ganador y una nave de abordaje dedicada. Adaptado de diseños probados de naves de asalto, el Hoplite es la herramienta perfecta para insertar un equipo de ataque blindado con suficiente potencia de fuego para sacarlos de nuevo.
; FORCE
vehicle_DescAEGS_Vanguard_Sentinel=Fabricante: Aegis Dynamics\nEnfoque: Caza pesado \n\nEl Vanguard Sentinel es una nave diseñada para luchar de forma inteligente en lugar de enfrentarse a los enemigos cara a cara. La conversión cuenta con una cabina AR, una cápsula e-War externa, misiles señuelo y un conjunto de cargas EMP. Los Vanguard Sentinel a menudo brindan el apoyo de combate necesario para operaciones combinadas. Un Sentinel solitario suele emparejarse con bombarderos Harbinger y escoltas Warden para grandes misiones de ataque.
; FORCE
vehicle_DescANVL_Asgard=Fabricante: Anvil Aerospace\nEnfoque: Dropship\n \nA medida que las batallas de hoy continúan creciendo en escala y complejidad, Anvil Aerospace entiende el impacto que un solo vehículo puede tener en el resultado. Llega el Asgard. La siguiente generación en transporte de vehículos terrestres, el Anvil Asgard cuenta con una rampa de carga rápida, una bodega de tamaño considerable para almacenar de forma segura el vehículo de asalto de tu elección y una amplia gama de armamento para garantizar el acceso incluso a las zonas de despliegue más intensas en combate.
; FORCE
vehicle_DescANVL_Asgard_Collector_Military=Fabricante: Anvil Aerospace\nEnfoque: Dropship\n \nA medida que las batallas de hoy continúan creciendo en escala y complejidad, Anvil Aerospace entiende el impacto que un solo vehículo puede tener en el resultado. Llega el Asgard. La siguiente generación en transporte de vehículos terrestres, el Anvil Asgard cuenta con una rampa de carga rápida, una bodega de tamaño considerable para almacenar de forma segura el vehículo de asalto de tu elección y una amplia gama de armamento para garantizar el acceso incluso a las zonas de despliegue más intensas en combate.\n\nWikelo aquí. He hecho modificaciones útiles para que nave sea mucho más como luchadora. Muy impresionante.
; FORCE
vehicle_DescANVL_Ballista=Fabricante: Anvil Aerospace\nEnfoque: Antiaéreo\n\nMantén tu espacio aéreo libre de peligros con la Anvil Ballista. Diseñada originalmente para defender puestos de avanzada de los ataques vanduul, este sistema móvil de defensa antimisiles cuenta con un potente equipamiento que permite a la Ballista mantenerse firme contra cualquier amenaza, ya llegue por aire o por tierra.
; FORCE
vehicle_DescANVL_Ballista_Dunestalker=Fabricante: Anvil Aerospace\nEnfoque: Antiaéreo\n\nMantén tu espacio aéreo libre de peligros con la Anvil Ballista. Diseñada originalmente para defender puestos de avanzada de los ataques vanduul, este sistema móvil de defensa antimisiles cuenta con un potente equipamiento que permite a la Ballista mantenerse firme contra cualquier amenaza, ya llegue por aire o por tierra. La variante Dunestalker presenta un esquema de pintura naturalista ideal para integrarse en paisajes hostiles.
; FORCE
vehicle_DescANVL_Ballista_Snowblind=Fabricante: Anvil Aerospace\nEnfoque: Antiaéreo\n\nMantén tu espacio aéreo libre de peligros con la Anvil Ballista. Diseñada originalmente para defender puestos de avanzada de los ataques vanduul, este sistema móvil de defensa antimisiles cuenta con un potente equipamiento que permite a la Ballista mantenerse firme contra cualquier amenaza, ya llegue por aire o por tierra. La variante Snowblind viene en un patrón de camuflaje gris para mantenerla oculta contra terrenos rocosos o lunares.
; FORCE
vehicle_DescANVL_C8X_Pisces_Expedition=Fabricante: Anvil Aerospace\nEnfoque: Explorador\n\nCon más armas y una pintura de edición limitada, el C8X Pisces Expedition convierte a la robusta nave de corto alcance en un vehículo de exploración independiente perfectamente viable. Con su estructura compacta, maniobrabilidad ágil y asientos para tres personas, el Pisces Expedition está listo para emprender sus propias aventuras.
; FORCE
vehicle_DescANVL_C8_Pisces=Fabricante: Anvil Aerospace\nEnfoque: Explorador\n\nCon su estructura compacta, maniobrabilidad ágil y asientos para tres personas, la nave de corto alcance C8 Pisces, incluida con cada Carrack, está construida por Anvil Aerospace para explorar por delante o investigar entornos inaccesibles para su nave nodriza más grande.
; FORCE
vehicle_DescANVL_Carrack=Fabricante: Anvil Aerospace\nEnfoque: Expedición\n\nLa aventura llama y Anvil Aerospace responde con la Carrack. Construida para soportar condiciones extremas tanto en el espacio como en la atmósfera, esta exploradora autosuficiente se ha ganado con creces su estatus de exploradora de referencia tanto para el servicio militar como civil.
; FORCE
vehicle_DescANVL_Carrack_Expedition=Fabricante: Anvil Aerospace\nEnfoque: Expedición\n\nLa aventura llama y Anvil Aerospace responde con la Carrack. Construida para soportar condiciones extremas tanto en el espacio como en la atmósfera, esta exploradora autosuficiente se ha ganado con creces su estatus de exploradora de referencia tanto para el servicio militar como civil. La edición 'Expedition' presenta una decoración especial ideal para viajar audazmente por las estrellas.
; FORCE
vehicle_DescANVL_Centurion=Fabricante: Anvil Aerospace\nEnfoque: Antiaéreo\n\nConstruido sobre la popular plataforma Atlas de Anvil, el Centurion presenta una solución táctica para operaciones antiaéreas de corto alcance. Gracias a la torreta AA personalizada basada en energía del Centurion, tus fuerzas pueden establecer superioridad terrestre asegurándose de que las amenazas inmediatas desde arriba se enfrenten de manera rápida y eficiente.
; FORCE
vehicle_DescANVL_Spartan=Fabricante: Anvil Aerospace\nEnfoque: Pasajero\n\nConstruido sobre la robusta plataforma Atlas de Anvil, el mismo chasis utilizado para su devastador sistema de defensa aérea Ballista, el Spartan es un transporte totalmente blindado equipado con ocho asientos plegables. La robusta estructura del Spartan lo hace perfecto para todo tipo de terreno, y su torreta Gatling remota ayuda a despejar el área para un despliegue más fácil.
; FORCE
vehicle_DescANVL_Valkyrie_CitizenCon=Fabricante: Anvil Aerospace \nEnfoque: Dropship\n\nDurante más de un siglo, las naves Anvil se han distinguido en innumerables operaciones de combate civiles y militares. Honra esa orgullosa tradición de seguridad con la Valkyrie Liberator Edition limitada, que presenta un paquete de equipamiento exclusivo que conmemora el debut de la nave en CitizenCon 2948.
; FORCE
vehicle_DescARGO_CSV_Cargo=Fabricante: Argo Astronautics\nEnfoque: Carga ligera\n\nTienes tu terreno, tienes los materiales de construcción adecuados, y ahora estás listo para ver cómo tus sueños toman forma. La compañera ideal de la CSV-FM, la CSV Supply Model proporciona almacenamiento adicional para todos los recursos necesarios para construir tu próximo asentamiento.\n
; FORCE
vehicle_DescARGO_MOTH=Fabricante: Argo Astronautics\nEnfoque: Recuperación media\n\nExperimenta los siglos de experiencia industrial de Argo con la MOTH. Utilizando un chasis probado y contrastado como base, la MOTH cuenta con tres torretas dedicadas a la recuperación y un autocargador externo de recuperación, para que una tripulación de cuatro personas pueda desmantelar, fracturar y almacenar la chatarra tan rápido como pueda acceder a ella.
; FORCE
vehicle_DescARGO_MPUV_Tractor=Fabricante: Argo Astronautics\nEnfoque: Carga ligera\n\nEl Argo Astronautics MPUV-1T está equipado con un rayo tractor que le permite mover fácilmente contenedores de carga dentro y fuera de naves de transporte más grandes. Su tamaño más pequeño y su maniobrabilidad lo convierten en un vehículo de apoyo ideal en zonas de aterrizaje y estaciones espaciales.
; FORCE
vehicle_DescARGO_MPUV_Transport=Fabricante: Argo Astronautics\nEnfoque: Pasajero\n\nEl Argo Astronautics MPUV-1P (comúnmente 'Argo Personnel'). Esta versión del Argo está orientada a una responsabilidad simple pero increíblemente importante: trasladar grupos de personas de un lugar a otro. La Armada de la UEE utiliza ampliamente los MPUV-1P, y cualquier nuevo recluta probablemente pueda recordar esos momentos aterradores en los que una nave así los llevó a su primera misión espacial. En manos civiles, las naves Argo Personnel están adaptadas para todo, desde servicios de taxi estándar hasta su uso como naves de combate improvisadas. El Argo MPUV-1P es capaz de transportar hasta ocho personas y su equipo.
; FORCE
vehicle_DescARGO_Mole=Fabricante: Argo Astronautics\nEnfoque: Minería media\n\nEl icónico extractor láser para múltiples operadores de Argo, más comúnmente conocido como el MOLE, te permite trabajar más rápido y de forma más eficiente que nunca gracias a su sistema de minería trilateral patentado. Sus tres estaciones de extracción articuladas y controladas de manera independiente permiten una potencia máxima y una versatilidad casi ilimitada. El MOLE vive según el dicho «muchas manos hacen el trabajo ligero».
; FORCE
vehicle_DescARGO_Mole_Carbon=Fabricante: Argo Astronautics\nEnfoque: Minería media\n\nEl icónico extractor láser para múltiples operadores de Argo, más comúnmente conocido como el MOLE, te permite trabajar más rápido y de forma más eficiente que nunca gracias a su sistema de minería trilateral patentado. Sus tres estaciones de extracción articuladas y controladas de manera independiente permiten una potencia máxima y una versatilidad casi ilimitada. La Carbon Edition ofrece la venerada capacidad minera del MOLE con un distintivo acabado completamente negro.
; FORCE
vehicle_DescARGO_Mole_Talus=Fabricante: Argo Astronautics\nEnfoque: Minería media\n\nEl icónico extractor láser para múltiples operadores de Argo, más comúnmente conocido como el MOLE, te permite trabajar más rápido y de forma más eficiente que nunca gracias a su sistema de minería trilateral patentado. Sus tres estaciones de extracción articuladas y controladas de manera independiente permiten una potencia máxima y una versatilidad casi ilimitada. El MOLE Talus Edition cuenta con la misma habilidad minera que la nave estándar junto con una pintura gris más discreta.\n
; FORCE
vehicle_DescARGO_Mole_Teach=Fabricante: Argo Astronautics\nEnfoque: Minería media\n\nEl icónico extractor láser para múltiples operadores de Argo, más comúnmente conocido como el MOLE, te permite trabajar más rápido y de forma más eficiente que nunca gracias a su sistema de minería trilateral patentado. Sus tres estaciones de extracción articuladas y controladas de manera independiente permiten una potencia máxima y una versatilidad casi ilimitada. El MOLE vive según el dicho «muchas manos hacen el trabajo ligero».\n\nPara adaptarse a las duras condiciones de trabajo en Nyx, Teach's Ship Shop ha equipado esta edición especial con una configuración personalizada que incluye componentes resistentes para ayudarte a afrontar mejor la tarea.
; FORCE
vehicle_DescARGO_RAFT=Fabricante: Argo Astronautics\nEnfoque: Carga media\n\nLa Argo RAFT cuenta con una amplia bodega de carga de 192 SCU y es capaz de transportar contenedores de carga estandarizados de 32 SCU. Perfecta tanto para transportistas principiantes como para veteranos experimentados, la RAFT es una solución ideal para un transporte de mercancías local fiable.
; FORCE
vehicle_DescARGO_RAFT_Collector_Indust=Fabricante: Argo Astronautics\nEnfoque: Carga media\n\nLa Argo RAFT cuenta con una amplia bodega de carga de 192 SCU y es capaz de transportar contenedores de carga estandarizados de 32 SCU. Perfecta tanto para transportistas principiantes como para veteranos experimentados, la RAFT es una solución ideal para un transporte de mercancías local fiable.\n\nWikelo hi. He realizado modificaciones útiles para hacer que la nave sea aún más industriosa. Te gustará.
; FORCE
vehicle_DescARGO_SRV=Fabricante: Argo Astronautics\nEnfoque: Recuperación\n\nCuando se trata de hacer el trabajo, Argo no pierde el tiempo. Desde simples remolques de mercancías y carga hasta desgarradoras operaciones de búsqueda y rescate, el SRV se encarga de todo lo que le puedas arrojar. El sistema de tractor a medida utiliza una innovadora combinación de placa y brazo, lo que permite un uso individual sin esfuerzo, así como un remolque de equipo de precisión para trabajos más grandes. Tu tripulación y pasajeros también están seguros gracias a escudos duraderos y armaduras resistentes que mantienen la cabina y los componentes seguros cuando la situación se pone complicada.
; FORCE
vehicle_DescCNOU_HoverQuad=Fabricante: Consolidated Outland\nEnfoque: Pasajero\n\nDiseñado como vehículo terrestre compañero del Nomad, el elegante marco angular del HoverQuad utiliza cuatro plataformas Gravlev para una máxima maniobrabilidad, lo que lo convierte en el transporte perfecto en todo tipo de superficies.
; FORCE
vehicle_DescCNOU_Mustang_Alpha=Fabricante: Consolidated Outland \nEnfoque: Inicial / Carga ligera\n\nInspirado por la vanguardista visión del CEO de Consolidated Outland, Silas Koerner, el Mustang Alpha es una nave espacial elegante y con estilo que utiliza aleaciones ultraligeras para llevar las proporciones de potencia al límite, aunque a veces de forma poco segura. Y ahora, con el Cargo Carrier opcional, puedes disfrutar de las ventajas del Alpha sin sacrificar la capacidad de carga.
; FORCE
vehicle_DescCNOU_Mustang_Alpha_CitizenCon18=Fabricante: Consolidated Outland \nEnfoque: Inicial / Carga ligera\n\nDiseñado para conmemorar la CitizenCon 2948, este modelo personalizado del recién revisado Mustang Alpha presenta una exclusiva nueva pintura diseñada por el propio Silas Koerner.
; FORCE
vehicle_DescCNOU_Nomad=Fabricante: Consolidated Outland \nEnfoque: Inicial / Carga ligera\n\nCon la versatilidad de un carguero multipropósito de tamaño mediano integrada en un elegante y compacto diseño, el Consolidated Outland Nomad es el modelo de autosuficiencia, el espíritu del cielo abierto y la solución perfecta para cualquiera que desee comenzar una nueva aventura.
; FORCE
vehicle_DescCNOU_Nomad_Teach=Fabricante: Consolidated Outland \nEnfoque: Inicial / Carga ligera\n\nCon la versatilidad de un carguero multipropósito de tamaño mediano integrada en un elegante y compacto diseño, el Consolidated Outland Nomad es el modelo de autosuficiencia, el espíritu del cielo abierto y la solución perfecta para cualquiera que desee comenzar una nueva aventura.\n\nPara adaptarse a las duras condiciones de trabajo en Nyx, Teach's Ship Shop ha equipado esta edición especial con una configuración personalizada que incluye componentes resistentes para ayudarte a afrontar mejor la tarea.
; FORCE
vehicle_DescCRUS_A1_Spirit=Fabricante: Crusader Industries\nEnfoque: Bombardero\n\nCrusader Industries trae su compromiso habitual con la excelencia directamente al mercado civil con la A1 Spirit, una nave estelar multipropósito de tamaño mediano equipada como bombardero ligero pero con suficiente versatilidad para abordar múltiples funciones y trabajos impredecibles.
; FORCE
vehicle_DescCRUS_C1_Spirit=Fabricante: Crusader Industries\nEnfoque: Carga ligera\n\nCrusader Industries trae su compromiso habitual con la excelencia directamente al mercado civil con la C1 Spirit, una nave estelar multipropósito de tamaño mediano construida para el transporte y la entrega de carga, pero con suficiente versatilidad para abordar múltiples funciones y trabajos impredecibles.
; FORCE
vehicle_DescCRUS_Intrepid=Fabricante: Crusader Industries\nEnfoque: Inicial / Carga ligera\n\nPara aquellos ansiosos por enfrentar su futuro, los renombrados ingenieros de Crusader Industries presentan con orgullo la Intrepid. Una nave audaz lista para asumir una amplia variedad de trabajos y superar numerosos desafíos, la Intrepid cuenta con un espacio de carga eficiente y cómodas áreas habitables para aprovechar al máximo tu viaje en solitario por las estrellas.
; FORCE
vehicle_DescCRUS_Intrepid_Collector_Indust,P=Fabricante: Crusader Industries\nEnfoque: Inicial / Carga ligera\n\nPara aquellos ansiosos por enfrentarse a su futuro, los renombrados ingenieros de naves de Crusader Industries presentan con orgullo la Intrepid. Una nave audaz lista para abordar una gran cantidad de trabajos y conquistar numerosos desafíos, la Intrepid cuenta con un espacio de carga eficiente y cómodas instalaciones para vivir, lo que te permitirá aprovechar al máximo tu viaje en solitario a través de las estrellas.
; FORCE
vehicle_DescCRUS_Spirit_C1_Collector_Civilian=Fabricante: Crusader Industries\nEnfoque: Carga ligera\n\nCrusader Industries lleva su habitual compromiso con la excelencia directamente al mercado civil con la C1 Spirit, una nave estelar multipropósito de tamaño mediano diseñada para el transporte y la entrega de carga, pero con suficiente versatilidad para abordar múltiples roles y trabajos impredecibles.\n\nWikelo aquí. Hice modificaciones útiles para hacerla mucho más impresionante.
; FORCE
vehicle_DescCRUS_Starlifter_2951_BIS=Fabricante: Crusader Industries\nEnfoque: Carga pesada\n\nUtilizando el bastidor espacial militar patentado Hercules y ampliando la capacidad de carga, sacrificando apenas potencia de fuego, la C2 ha revolucionado el sector privado. Se ha convertido en el estándar de la industria para equipos de carreras, concesionarios y fabricantes de naves, organizaciones de construcción, corporaciones mineras e incluso grandes compañías de entretenimiento itinerante. Para celebrar que la Hercules fue votada finalista al premio Best in Show en 2951, esta edición de la nave incluye una pintura especial azul y negra ya aplicada.
; FORCE
vehicle_DescCRUS_Starlifter_A2=Fabricante: Crusader Industries\nEnfoque: Bombardero pesado\n\nLa A2 Starlifter ha sido utilizada con efectos devastadores en asaltos aéreos, operaciones de búsqueda y rescate, y misiones de desembarco. Con más del doble de potencia de fuego que la M2 y una bahía de bombas personalizada capaz de entregar una carga asombrosa, la A2 está pensada para quienes transportan enormes cantidades de carga a través de cielos potencialmente hostiles.
; FORCE
vehicle_DescCRUS_Starlifter_A2_Collector_Military=Fabricante: Crusader Industries\nEnfoque: Bombardero pesado\n\nLa A2 Starlifter ha sido utilizada con efectos devastadores en asaltos aéreos, operaciones de búsqueda y rescate, y misiones de desembarco. Con más del doble de potencia de fuego que la M2 y una bahía de bombas personalizada capaz de entregar una carga asombrosa, la A2 está pensada para quienes transportan enormes cantidades de carga a través de cielos potencialmente hostiles.\n\nWikelo aquí. He hecho modificaciones útiles para que la nave sea mucho más parecida a un caza. Muy impresionante.
; FORCE
vehicle_DescCRUS_Starlifter_C2=Fabricante: Crusader Industries\nEnfoque: Carga pesada\n\nUtilizando el chasis espacial militar patentado Hercules y expandiendo la capacidad de carga, sin sacrificar prácticamente ninguna potencia de fuego, la C2 ha arrasado en el sector privado. Se ha convertido en el estándar de la industria para equipos de carreras, distribuidores y fabricantes de naves, organizaciones de construcción, corporaciones mineras e incluso empresas de entretenimiento turístico a gran escala.
; FORCE
vehicle_DescCRUS_Starlifter_M2=Fabricante: Crusader Industries\nEnfoque: Carga pesada\n\nLa M2 Hercules es la principal transportadora estelar táctica de la UEE. La potente combinación de capacidad, maniobrabilidad, durabilidad y robusto paquete de armas del transporte a gran escala garantiza que tu carga y tu tripulación lleguen a su destino en una sola pieza.
; FORCE
vehicle_DescDRAK_Buccaneer=Fabricante: Drake Interplanetary\nEnfoque: Caza ligero\n\nLa Buccaneer ha sido diseñada desde cero para volar y luchar como tú vives. Aquí no hay interiores de cuero ni hiperalmohadas: la Bucc es una chatarrera diseñada para maniobrar y luchar por encima de su categoría de peso. Esta turbulenta caza fronteriza se puede mantener en las peores condiciones para mantener con vida a tripulaciones espaciales reales y en funcionamiento.
; FORCE
vehicle_DescDRAK_Caterpillar=Fabricante: Drake Interplanetary\nEnfoque: Carga media\n\nIntroducida por primera vez en 2871, la Caterpillar de Drake Interplanetary ha demostrado durante mucho tiempo ser una nave multifunción fiable y rentable, capaz de equiparse para todo, desde operaciones mercantiles hasta apoyo de combate. Aclamada durante mucho tiempo como una alternativa muy reñida a la omnipresente serie Hull, la Caterpillar es un carguero que no escatima en armamento ni personalización.
; FORCE
vehicle_DescDRAK_Caterpillar_Pirate=Fabricante: Drake Interplanetary\nEnfoque: Carga media\n\nIntroducida por primera vez en 2871, la Caterpillar de Drake Interplanetary ha demostrado durante mucho tiempo ser una nave multifunción fiable y rentable, capaz de equiparse para todo, desde operaciones mercantiles hasta apoyo de combate. Aclamada durante mucho tiempo como una alternativa muy reñida a la omnipresente serie Hull, la Caterpillar es un carguero que no escatima en armamento ni personalización. Este modelo presenta una decoración única aplicada por los propietarios anteriores.
; FORCE
vehicle_DescDRAK_Caterpillar_ShipShowdown=Fabricante: Drake Interplanetary\nEnfoque: Carga media\n\nIntroducida por primera vez en 2871, la Caterpillar de Drake Interplanetary ha demostrado durante mucho tiempo ser una nave multifunción fiable y rentable, capaz de equiparse para todo, desde operaciones mercantiles hasta apoyo de combate. Aclamada durante mucho tiempo como una alternativa muy reñida a la omnipresente serie Hull, la Caterpillar es un carguero que no escatima en armamento ni personalización.
; FORCE
vehicle_DescDRAK_Clipper=Fabricante: Drake Interplanetary\nEnfoque: Generalista\n \nSi hay algo que todo capitán debe tener muy presente al prepararse para viajar por las estrellas es «esperar lo inesperado». Con una bodega de carga, instalaciones médicas y capacidades de fabricación, junto con la práctica filosofía de diseño de Drake, la Clipper es la nave perfecta para cualquier nueva empresa dedicada a recorrer el espacio.
; FORCE
vehicle_DescDRAK_Corsair=Fabricante: Drake Interplanetary\nEnfoque: Expedición\n\nEscucha el llamado del espacio inexplorado y aprovecha el espíritu de la exploración con la Drake Corsair. Utilizando un diseño único de casco asimétrico, esta exploradora versátil puede ir a donde sea que los vientos de la aventura te lleven.
; FORCE
vehicle_DescDRAK_Corsair_PYAM_Exec=Fabricante: Drake Interplanetary\nEnfoque: Expedición\n\nEscucha el llamado del espacio inexplorado y aprovecha el espíritu de la exploración con la Drake Corsair. Utilizando un diseño único de casco asimétrico, esta exploradora versátil puede ir a donde sea que los vientos de la aventura te lleven. Esta variante presenta una pintura y una carga útil exclusivas para la nave.
; FORCE
vehicle_DescDRAK_Cutlass_Black=Fabricante: Drake Interplanetary\nEnfoque: Carga ligera / Caza mediano\n\nDrake Interplanetary afirma que la Cutlass Black es una solución de bajo coste y fácil mantenimiento para las unidades locales de milicia dentro del sistema. El compartimento de carga más grande de lo normal, el asiento RIO y el soporte dedicado para el rayo tractor son, según asegura la literatura de la compañía, para facilitar las operaciones de búsqueda y rescate.
; FORCE
vehicle_DescDRAK_Cutlass_Black_PYAM_Exec=Fabricante: Drake Interplanetary\nEnfoque: Carga ligera / Caza mediano\n\nDrake Interplanetary afirma que la Cutlass Black es una solución de bajo coste y fácil mantenimiento para las unidades locales de milicia dentro del sistema. El compartimento de carga más grande de lo normal, el asiento RIO y el soporte dedicado para el rayo tractor son, según asegura la literatura de la compañía, para facilitar las operaciones de búsqueda y rescate. Esta variante presenta una pintura y una carga útil exclusivas para la nave.
; FORCE
vehicle_DescDRAK_Cutlass_Black_ShipShowdown=Fabricante: Drake Interplanetary\nEnfoque: Carga ligera / Caza mediano\n\nDrake Interplanetary afirma que la Cutlass Black es una solución de bajo coste y fácil mantenimiento para las unidades locales de milicia dentro del sistema. El compartimento de carga más grande de lo normal, el asiento RIO y el soporte dedicado para el rayo tractor son, según asegura la literatura de la compañía, para facilitar las operaciones de búsqueda y rescate.
; FORCE
vehicle_DescDRAK_Cutlass_Steel=Fabricante: Drake Interplanetary\nEnfoque: Dropship\n\nCon la Cutlass Steel, Drake Interplanetary ha vuelto a reinventar su diseño clásico para crear una nave de transporte de combate de nueva generación mediante la adición de asientos plegables dedicados y un arsenal ampliado. Es un verso peligroso ahí fuera, y la Cutlass Steel está lista para abrirse camino a través de cualquier obstáculo que se interponga en tu camino y el de tu dedicado equipo.
; FORCE
vehicle_DescDRAK_Cutter=Fabricante: Drake Interplanetary\nEnfoque: Inicial / Explorador\n\nDiseñada para personas trabajadoras de todo tipo, la Cutter incluye 4 SCU de espacio de carga y un montón de pegada en un marco compacto y resistente. Es una nave que verdaderamente encarna el espíritu de Drake: que no importa quién seas o qué hagas, puedes alcanzar las estrellas.
; FORCE
vehicle_DescDRAK_Cutter_Scout=Fabricante: Drake Interplanetary\nEnfoque: Explorador\n\nReduciendo el robusto y compacto bastidor del Cutter a lo esencial, Drake tomó una nave ya impresionante y la transformó en la nave de exploración ideal. Con capacidades mejoradas de radar y escaneo, junto con mayor potencia y refrigeración, el Cutter Scout está listo para volar por delante del grupo.
; FORCE
vehicle_DescDRAK_Golem=Fabricante: Drake Interplanetary\nEnfoque: Inicial / Minería ligera\n\nCon la Golem, Drake diseñó la nave ideal para quienes desean iniciar una carrera en la minería. La nave cuenta con un láser de minería personalizado y la capacidad de transportar 32 SCU de valiosos recursos. Fiel al estilo clásico de Drake, la Golem es una nave diseñada con un propósito claro, priorizando la funcionalidad sobre los adornos.
; FORCE
vehicle_DescDRAK_Golem_Collector_Indust=Fabricante: Drake Interplanetary\nEnfoque: Inicial / Minería ligera\n\nCon la Golem, Drake diseñó la nave ideal para quienes desean iniciar una carrera en la minería. La nave cuenta con un láser de minería personalizado y la capacidad de transportar 32 SCU de valiosos recursos. Fiel al estilo clásico de Drake, la Golem es una nave diseñada con un propósito claro, priorizando la funcionalidad sobre los adornos.\n\nWikelo aquí. He hecho modificaciones útiles para que la nave sea aún más productiva. Te gustará.
; FORCE
vehicle_DescDRAK_Golem_OX=Fabricante: Drake Interplanetary\nEnfoque: Carga ligera\n \nCon la Golem OX, Drake ha transformado a esta fiable bestia de carga en la nave ideal para transportar suministros y equipo. Diseñada para pilotos que prefieren la funcionalidad antes que los adornos, la OX duplica la capacidad del modelo original con espacio para 64 SCU e incorpora un rayo tractor para que las transferencias de carga sean tan fluidas como la seda.
; FORCE
vehicle_DescDRAK_Golem_Teach=Fabricante: Drake Interplanetary\nEnfoque: Inicial / Minería ligera\n\nCon la Golem, Drake diseñó la nave ideal para quienes desean iniciar una carrera en la minería. La nave cuenta con un láser de minería personalizado y la capacidad de transportar 32 SCU de valiosos recursos. Fiel al estilo clásico de Drake, la Golem es una nave diseñada con un propósito claro, priorizando la funcionalidad sobre los adornos.\n\nAdaptándose a las duras condiciones de trabajo de Nyx, Teach's Ship Shop ha equipado esta edición especial con una configuración personalizada que incluye componentes resistentes para ayudarte a afrontar mejor el trabajo.
; FORCE
vehicle_DescDRAK_Ironclad_Assault=Fabricante: Drake Interplanetary\nEnfoque: Dropship\n \nCuando la entrega especial que tienes que hacer es una incursión a gran escala, necesitas el Drake Ironclad Assault. No solo puede albergar varios vehículos terrestres en su compartimento, sino que tiene torretas a lo largo de su parte inferior para despejar el camino para el aterrizaje, e incluso una bahía de fabricación para reparaciones de emergencia.
; FORCE
vehicle_DescDRAK_Mule=Fabricante: Drake Interplanetary\nEnfoque: Carga ligera\n\nEl Mule de seis ruedas de Drake es un caballo de batalla fiable para todo tipo de trabajos de carga y transporte. Ya sea transportando mercancías a través de terrenos accidentados o trasladándolas a naves más grandes y cubiertas de carga, el Mule lleva a cabo incluso los contratos más duros hasta el final. Simple y directo.
; FORCE
vehicle_DescESPR_Prowler=Fabricante: Esperia\nEnfoque: Dropship\n\nEl Prowler, que lleva el nombre de la designación militar de la UPE, es una versión modernizada de la infame nave de abordaje tevarin de la Primera Guerra Tevarin. La eficacia del Prowler como vehículo de despliegue rápido de personal se debió principalmente a su silencio. Con el Prowler, encontrarás la fusión perfecta de dos culturas: la elegancia y efectividad de la máquina de guerra tevarin combinada con la fiabilidad de la moderna tecnología UEE.
; FORCE
vehicle_DescESPR_Prowler_Utility=Fabricante: Esperia\nEnfoque: Carga ligera\n\nAunque no existen ejemplos conocidos de esta nave histórica fabricados por los tevarin, los historiadores de Esperia estudiaron informes de campo del ejército de la UPE para reconstruir este Prowler modificado. Utilizado por el ejército tevarin para entregar suministros urgentes en las líneas del frente, el Prowler Utility combina un rayo tractor con una bodega completamente accesible, junto con el armamento aún significativo de la nave de guerra, para convertir la transferencia de carga en condiciones de combate en una operación de precisión.
; FORCE
vehicle_DescESPR_Prowler_Utility_Collector_Indust=Fabricante: Esperia\nEnfoque: Carga ligera\n\nAunque no existen ejemplos conocidos de esta nave histórica fabricados por los tevarin, los historiadores de Esperia estudiaron informes de campo del ejército de la UPE para reconstruir este Prowler modificado. Utilizado por el ejército tevarin para entregar suministros urgentes en las líneas del frente, el Prowler Utility combina un rayo tractor con una bodega completamente accesible, junto con el armamento aún significativo de la nave de guerra, para convertir la transferencia de carga en condiciones de combate en una operación de precisión. \n\nWikelo aquí. He hecho modificaciones útiles para que la nave sea aún más productiva. Te gustará.
; FORCE
vehicle_DescGAMA_Syulen=Fabricante: Gatac Manufacture\nEnfoque: Inicial / Explorador\n\nLa nave de carga Syulen ha sido diseñada artísticamente por la renombrada Casa Gatac para adaptarse tanto a pilotos humanos como xi'an. Con un bastidor refinado y ágil, la Syulen es ideal para transportar entregas importantes a través del universo, o como la nave perfecta para quienes inician su carrera en el transporte.
; FORCE
vehicle_DescGAMA_Syulen_PYAM_Exec=Fabricante: Gatac Manufacture\nEnfoque: Inicial / Explorador\n\nLa nave de carga Syulen ha sido diseñada artísticamente por la renombrada Casa Gatac para adaptarse tanto a pilotos humanos como xi'an. Con un bastidor refinado y ágil, la Syulen es ideal para transportar entregas importantes a través del universo. Esta variante especial presenta una pintura y equipamiento exclusivos para la nave.
; FORCE
vehicle_DescGRIN_MTC=Fabricante: Greycat Industrial\nEnfoque: Explorador\n\nComo experto en operaciones industriales, Greycat entiende que la seguridad en el lugar de trabajo es una parte vital de cualquier empresa exitosa. No solo eso, sino que, para ser completamente efectivo, necesitas poder transportar a tu personal de seguridad y su equipo a donde más se les necesita. Por eso, el MTC Mobile Tactical Center es una adición tan importante para tu próximo proyecto. Lo suficientemente ágil para acceder al terreno difícil que se encuentra en operaciones remotas y equipado con suficientes casilleros para trajes, estantes para armas y almacenamiento para enfrentar una amplia gama de problemas, el Greycat MTC podría marcar la diferencia a la hora de convertir un problema potencial en una ganancia potencial.
; FORCE
vehicle_DescGRIN_PTV=Fabricante: Greycat Industrial\nEnfoque: Pasajero\n\nEl Greycat PTV es un buggy simple y práctico que se utiliza con frecuencia para reducir los tiempos de desplazamiento en grandes hangares o puestos de avanzada.
; FORCE
vehicle_DescGRIN_ROC=Fabricante: Greycat Industrial\nEnfoque: Minería ligera\n\nCentrándose en lo esencial de la minería terrestre, Greycat Industrial diseñó su incansable y directo ROC (Remote Ore Collector) para complementar a los mineros que lo utilizan. Desde su brazo minero con cardán de precisión hasta sus ruedas todoterreno, este vehículo para un solo operador demuestra lo importante que es tener la herramienta adecuada para el trabajo.
; FORCE
vehicle_DescGRIN_ROC_DS=Fabricante: Greycat Industrial\nEnfoque: Minería ligera\n\nCentrándose en lo esencial de la minería terrestre, Greycat Industrial diseñó su incansable y directo ROC-DS (Remote Ore Collector Dual Seat) para permitir que las parejas de mineros hagan más mientras están sobre el terreno. El ROC-DS eleva el nivel de la minería terrestre al añadir mayor capacidad de carga y un segundo asiento para operar el brazo minero con cardán de precisión. Greycat incluso mejoró la cabina del conductor con un recinto protector para permitir excursiones más largas en condiciones adversas. Con el ROC-DS, los equipos de minería ahora tienen la herramienta adecuada para recolectar más mineral con comodidad.
; FORCE
vehicle_DescGRIN_STV=Fabricante: Greycat Industrial\nEnfoque: Pasajero\n\nPrepárate para divertirte de verdad en el trabajo con el STV de Greycat. Este vehículo deportivo todoterreno ha sido construido por profesionales para profesionales y ofrece una velocidad asombrosa y almacenamiento integrado muy práctico.
; FORCE
vehicle_DescGrin_MDC=Fabricante: Greycat Industrial\nEnfoque: Antiaéreo\n \nA partir de un armazón industrial robusto y resistente, Greycat ha creado el MDC Mobile Defense Center, un vehículo de combate eficaz listo para proteger tus intereses, desde zonas mineras remotas hasta patrullas en centros de procesamiento de alto valor, gracias a su torreta PDS montada.
; FORCE
vehicle_DescKRIG_P72_Archimedes=Fabricante: Kruger Intergalactic\nEnfoque: Carreras\n\nYa sea para mayor seguridad, explorar un sistema o simplemente por el placer de volar, la nave de corto alcance P-72 Archimedes de Kruger Intergalactic fue diseñada para ofrecer un manejo excepcional y una aceleración ágil en un paquete elegante y con estilo.
; FORCE
vehicle_DescKRIG_P72_Archimedes_Emerald=Fabricante: Kruger Intergalactic\nEnfoque: Carreras\n\nYa sea para mayor seguridad, explorar un sistema o simplemente por el placer de volar, la nave de corto alcance Kruger Intergalactic P-72 Archimedes fue diseñada para ofrecer un manejo excepcional y una aceleración ágil en un paquete elegante y con estilo.  La edición limitada Emerald presenta una pintura especial "de la suerte".
; FORCE
vehicle_DescMISC_Fortune=Fabricante: MISC\nEnfoque: Recuperación ligera\n\nPara quienes están listos para llevar su profesión al siguiente nivel, los ingenieros de MISC han diseñado cuidadosamente la Fortune como una nave de reclamación pequeña líder en su categoría. Equipada con un brazo de recuperación versátil y un elevador de carga, la MISC Fortune está construida desde la estructura para convertir la chatarra en tesoros.\n
; FORCE
vehicle_DescMISC_Fortune_Teach=Fabricante: MISC\nEnfoque: Recuperación ligera\n\nPara quienes están listos para llevar su profesión al siguiente nivel, los ingenieros de MISC han diseñado cuidadosamente la Fortune como una nave de reclamación pequeña líder en su categoría. Equipada con un brazo de recuperación versátil y un elevador de carga, la MISC Fortune está construida desde la estructura para convertir la chatarra en tesoros.\n\nAdaptándose a las duras condiciones de trabajo de Nyx, Teach's Ship Shop ha equipado esta edición especial con una configuración personalizada que incluye componentes resistentes para ayudarte a afrontar mejor el trabajo.
; FORCE
vehicle_DescMISC_Freelancer=Fabricante: MISC\nEnfoque: Carga ligera\n\nLas grandes corporaciones utilizan los Freelancer como naves mercantes de largo recorrido, pero capitanes independientes que desean operar en los márgenes de la galaxia los reutilizan con la misma frecuencia como naves de exploración dedicadas.
; FORCE
vehicle_DescMISC_Hull_A=Fabricante: MISC\nEnfoque: Carga ligera\n\nEl Hull más pequeño y asequible. El Hull A es ideal para quienes simplemente se aventuran solos en la galaxia. El Hull A es más similar al Aurora y al Mustang, pero carece de la naturaleza de "experto en todos los oficios". Mientras que los demás intercambian capacidad de carga por potencia de fuego o velocidad, el Hull A es 100% transporte de misión.
; FORCE
vehicle_DescMISC_Prospector=Fabricante: MISC\nEnfoque: Minería ligera\n\nDurante años, la Prospector ha sido la nave de minería preferida del universo para los operadores en solitario. Con el característico diseño estilizado de MISC y un conjunto de avanzadas herramientas de minería mejoradas, la Prospector 2947 equilibra a la perfección forma y funcionalidad.
; FORCE
vehicle_DescMISC_Prospector_Collector_Indust=Fabricante: MISC\nEnfoque: Minería ligera\n\nDurante años, la Prospector ha sido la nave de minería preferida del universo para los operadores en solitario. Con el característico diseño estilizado de MISC y un conjunto de avanzadas herramientas de minería mejoradas, la Prospector 2947 equilibra a la perfección forma y funcionalidad. \n\nWikelo aquí. He hecho modificaciones útiles para que la nave sea aún más productiva. Te gustará.
; FORCE
vehicle_DescMISC_Razor_LX=Fabricante: Mirai\nEnfoque: Carreras\n\nLa Razor se sobrealimenta. La LX cuenta con un motor sobreoptimizado para alcanzar velocidades máximas increíbles. Esta potencia tiene un coste en maniobrabilidad y armamento reducidos, lo que la hace ideal para carreras directas. Pero, ¿quién necesita armas cuando estás dejando a tu competencia en el polvo?
; FORCE
vehicle_DescMISC_Reliant=Fabricante: MISC\nEnfoque: Inicial / Carga ligera\n\nCon la Reliant Kore, MISC añade a su ya impresionante línea de naves una nave espacial más pequeña de clase introductoria. Utilizando avanzados diseños xi'an, la Reliant presenta alas amplias y elegantes, propulsores omnidireccionales y una cabina de dos asientos totalmente articulada que admite modos de vuelo horizontal y vertical. Todo esto se combina con una mayor capacidad de carga que muchas naves de su clase para hacer de la Kore una opción natural para transporte de corto alcance, o, con la simple adición de algunos componentes opcionales, esta nave todoterreno puede hacer cualquier cosa que sueñes.
; FORCE
vehicle_DescMISC_Starlancer_MAX_Collector_Indust,P=Fabricante: MISC\nEnfoque: Carga media\n \nPara quienes buscan expandir sus operaciones de transporte, los ingenieros de MISC han mejorado la Starlancer MAX con un compartimento de carga extra espacioso, listo para transportar mercancías y vehículos. Combinado con cómodas instalaciones para viajes largos y un paquete defensivo completo para cuando te desvías de la ruta principal, es fácil ver por qué la Starlancer MAX es la nave de carga preferida por pilotos industriosos en todo el 'verso.
; FORCE
vehicle_DescMISC_Starlancer_TAC_Collector_Military=Fabricante: MISC\nEnfoque: Cañonera\n \nPara quienes buscan una nave versátil que pueda valerse por sí sola en combate, los ingenieros han mejorado la Starlancer TAC con un paquete ofensivo agresivo, lista para enfrentarse a los enemigos más feroces. Cuando aceptas un trabajo de alto riesgo y alta recompensa, la Starlancer TAC está ahí para asegurarse de que tú y tu tripulación puedan completarlo hasta el final.\n\nWikelo aquí. He hecho modificaciones útiles para que la nave sea aún más parecida a un caza. Muy impresionante.
; FORCE
vehicle_DescMRAI_Guardian=Fabricante: Mirai\nEnfoque: Caza pesado\n\nAdoptando el adagio de que la mejor defensa es un buen ataque, los ingenieros de Mirai han aportado su experiencia en rendimiento y maniobrabilidad al caza de largo alcance Guardian.  Vuela en círculos alrededor de tus oponentes con el Mirai Guardian mientras estableces tu superioridad espacial. \n
; FORCE
vehicle_DescMRAI_Guardian_Collector_Military=Fabricante: Mirai\nEnfoque: Caza pesado\n\nAdoptando el adagio de que la mejor defensa es un buen ataque, los ingenieros de Mirai han aportado su experiencia en rendimiento y maniobrabilidad al caza de largo alcance Guardian.  Vuela en círculos alrededor de tus oponentes con el Mirai Guardian mientras estableces tu superioridad espacial. \n\nWikelo aquí. He hecho modificaciones útiles para que la nave sea mucho más parecida a un caza. Muy impresionante.
; FORCE
vehicle_DescMisc_Fury_Miru=Fabricante: Mirai\nEnfoque: Caza de corto alcance\n\nCon la mejor maniobrabilidad de su clase y tecnología xi'an de vanguardia totalmente integrada, el bombardero de corto alcance Fury MX de próxima generación de Mirai utiliza sus veinte misiles montados en halo para devastar objetivos durante el combate espacial de corto alcance.
; FORCE
vehicle_DescORIG_100i=Fabricante: Origin Jumpworks\nEnfoque: Inicial / Explorador\n\nRecorre el universo con la combinación perfecta de lujo y rendimiento. El 100i cuenta con el sistema de combustible AIR patentado de Origin Jumpworks, lo que lo convierte en la nave más eficiente y ecológica del mercado. Capaz de realizar vuelos de larga distancia para los que la mayoría de las naves de su tamaño no están equipadas, el 100i es perfecto para pilotos solitarios que buscan llamar la atención sin sacrificar la funcionalidad o la fiabilidad.
; FORCE
vehicle_DescORIG_125a=Fabricante: Origin Jumpworks\nEnfoque: Caza ligero\n\nLos riesgos están hechos para tomarse, pero ¿por qué arriesgarse a quedarse sin combustible en plena batalla? Con el sistema de combustible AIR, un paquete de armas mejorado y todo el lujo y refinamiento que esperas de Origin Jumpworks, el 125a ha sido diseñado para el inconformista exigente.
; FORCE
vehicle_DescORIG_135c=Fabricante: Origin Jumpworks\nEnfoque: Carga ligera\n\nCon una cantidad engañosa de espacio de almacenamiento en su elegante y estilizado bastidor, y el sistema de combustible AIR patentado de Origin, el modelo 135c es la opción obvia para músicos, mensajeros y cualquiera que intente comenzar la fiesta. Llévalo allí rápido, y luce bien mientras lo haces.
; FORCE
vehicle_DescORIG_300i=Fabricante: Origin Jumpworks\nEnfoque: Turismo de lujo\n\nSi vas a viajar por las estrellas... ¿por qué no hacerlo con estilo? El 300i es la principal nave espacial de lujo de Origin Jumpworks. Es un asesino plateado y elegante que envía tanto mensaje con su silueta como con sus cañones de partículas.
; FORCE
vehicle_DescORIG_325a=Fabricante: Origin Jumpworks\nEnfoque: Interceptor\n\nEl hecho de que sea una galaxia accidentada no significa que debas sacrificar tu comodidad: el 325a puede salir victorioso en cualquier combate aéreo. El 325a presenta una carga útil de armas avanzada, así como un sistema de orientación personalizado diseñado especialmente para el 325a por WillsOp.
; FORCE
vehicle_DescORIG_400i=Fabricante: Origin Jumpworks\nEnfoque: Expedición\n\nExplorar las estrellas es un esfuerzo muy noble, y Origin Jumpworks ha estado a la altura de las circunstancias al crear el explorador de alto rendimiento 400i. Con un alcance líder en su clase, importantes capacidades defensivas y un sistema de escaneo equipado de fábrica, el 400i está listo para enfrentarse a los rincones más duros de la galaxia manteniendo la comodidad y la elegancia por las que Origin es conocida.
; FORCE
vehicle_DescORIG_600i=Fabricante: Origin Jumpworks\nEnfoque: Expedición\n\nEsta embarcación de lujo multifunción de Origin Jumpworks presenta un diseño de casco exquisitamente detallado que equilibra rendimiento y versatilidad en una forma elegante y atemporal. El 600i está diseñado con una tecnología modular de vanguardia, lo que te permite personalizar tu nave según tus necesidades.
; FORCE
vehicle_DescORIG_600i_2951_BIS=Fabricante: Origin Jumpworks\nEnfoque: Expedición\n\nEsta embarcación de lujo multifunción de Origin Jumpworks presenta un diseño de casco exquisitamente detallado que equilibra rendimiento y versatilidad en una forma elegante y atemporal. El 600i está diseñado con una tecnología modular de vanguardia, lo que te permite personalizar tu nave según tus necesidades. Para celebrar que el 600i ha sido elegido finalista del Best in Show de 2951, esta edición de la nave presenta una pintura especial azul y negra ya aplicada.
; FORCE
vehicle_DescORIG_600i_Touring=Fabricante: Origin Jumpworks\nEnfoque: Turismo de lujo\n\nEsta embarcación de lujo multifunción de Origin Jumpworks presenta un diseño de casco exquisitamente detallado que equilibra rendimiento y versatilidad en una forma elegante y atemporal. El 600i está diseñado con una tecnología modular de vanguardia, lo que te permite personalizar tu nave según tus necesidades.
; FORCE
vehicle_DescORIG_890Jump=Fabricante: Origin Jumpworks\nEnfoque: Turismo de lujo\n\nCon un exterior elegante y estilizado que contradice su espacioso interior, el 890 Jump es una verdadera maravilla de la ingeniería; diseñado para impresionar desde todos los ángulos combinando un diseño único e innovador con los mejores materiales y la tecnología más avanzada. El resultado es una nave única en su clase, una obra maestra digna del nombre Origin.
; FORCE
vehicle_DescORIG_X1=Fabricante: Origin Jumpworks\nEnfoque: Pasajero\n\nBienvenido al siguiente nivel con el X1, el vehículo de cabina abierta de alto rendimiento de Origin Jumpworks. Construido con polímeros ligeros, el X1 lleva la velocidad y la agilidad al siguiente nivel gracias a la tecnología de motor perfectamente integrada y a la disposición conjunta de los propulsores vectoriales. El diseño innovador y la ingeniería de alta calidad se entrelazan para crear una experiencia de vuelo como ninguna otra.
; FORCE
vehicle_DescORIG_X1_Force=Fabricante: Origin Jumpworks\nEnfoque: Pasajero\n\nConstruida para soportar entornos más duros y lucir bien al hacerlo, la X1 Force es una versión modificada del modelo X1 base que presenta elementos defensivos adicionales para fortalecer esta veloz y ágil moto de cabina abierta, lo que le permite servir en una variedad de roles, desde explorar mundos hasta posibles operaciones de infiltración de seguridad.
; FORCE
vehicle_DescRSI_Aurora_ES=Fabricante: RSI\nEnfoque: Inicial / Explorador\n\nLa Aurora es la descendiente moderna de la nave espacial X-7 de Roberts Space Industries, que probó los primeros motores de salto. Utilitaria al cien por cien, la Aurora es la nave perfecta para principiantes: lo que le falta en estilo lo compensa con un amplio espacio para módulos de mejora.
; FORCE
vehicle_DescRSI_Aurora_MR=Fabricante: RSI\nEnfoque: Inicial / Caza ligero\n\n¿Quizás estás buscando algo que ofrezca capacidad de carga pero también capacidades de combate? La Aurora Marque viene con un par de láseres de calidad Behring y un sistema de refrigeración de armas de alta calidad.
; FORCE
vehicle_DescRSI_Aurora_Mk2=Fabricante: Roberts Space Industries\nEnfoque: Inicial / Carga ligera\n \nUna nueva interpretación de la nave clásica, Roberts Space Industries ha reinventado la probada Aurora desde su estructura. Presentamos la Aurora Mk II. Todo, desde el rendimiento de la nave y su usabilidad hasta su diseño, ha sido renovado pensando en una nueva generación de pilotos. Además, esta última versión introduce una nueva característica en la serie Aurora: módulos intercambiables. En lugar de limitar a los pilotos a una única trayectoria profesional, estos módulos permiten una especialización operativa sencilla desde la comodidad de tu hangar. Tanto si eres propietario de tu primera nave como si eres un piloto veterano listo para mejorar tu nave de uso diario, la Aurora Mk II te está esperando.
; FORCE
vehicle_DescRSI_Constellation_Phoenix=Fabricante: RSI\nEnfoque: Turismo de lujo\n\nUna nave espacial de lujo dedicada para el capitán estelar más exigente. La Constellation Phoenix puede operar como nave de mando de una organización y cuenta con un interior lujosamente rediseñado. Incluye un compartimento oculto con supresión de sensores para tu carga más valiosa. La Phoenix viene con un rover Lynx y un caza Kruger P-72 Archimedes.
; FORCE
vehicle_DescRSI_Constellation_Phoenix_Emerald=Fabricante: RSI \nEnfoque: Turismo de lujo\n\nYa seas un sofisticado amante de la vida social o un fiestero empedernido, la Constellation Phoenix Emerald es tu pasaporte personal al entretenimiento. Con una lujosa cabina interior diseñada específicamente para la diversión y una pintura de edición limitada "de la suerte", la Emerald es el lugar perfecto para saborear una copa de Radegast Gold o disfrutar de una Sleeping Tiger Malt verde mientras viajas con lujo por las estrellas. Solo asegúrate de traer un piloto designado.
; FORCE
vehicle_DescRSI_Hermes=Fabricante: Roberts Space Industries\nEnfoque: Carga media\n\nA diferencia de su homónimo mitológico, la RSI Hermes no es ninguna embaucadora: realmente es así de rápida. Con un paquete de propulsores a medida e innovador, un impresionante conjunto de medidas defensivas y una bodega de carga de gran tamaño, la Hermes está lista para acelerar las entregas hasta sus destinos finales. Incluso en puntos de entrega peligrosos a los que otras cargueras no se atreverían a ir.
; FORCE
vehicle_DescRSI_Lynx=Fabricante: RSI\nEnfoque: Turismo de lujo\n\nRSI diseñó el Lynx Rover para que sea un vehículo capaz de explorar una amplia variedad de terrenos y al mismo tiempo ofrecer una experiencia de conducción de primer nivel y optimizada.
; FORCE
vehicle_DescRSI_Perseus=Fabricante: RSI\nEnfoque: Cañonera pesada\n\nCuando RSI se propuso hacer la declaración moderna definitiva en prevención persuasiva, miraron hacia su propio pasado, a las históricas cañoneras designadas Perseus. Capaz de destrozar goliats de clase subcapital, la mera presencia de una cañonera Perseus en un escuadrón de bloqueo o patrulla es suficiente para hacer que tus enemigos más agresivos se lo piensen dos veces antes de atacar, al igual que su homónimo clásico.
; FORCE
vehicle_DescRSI_Scorpius_Antares=Fabricante: RSI\nEnfoque: Caza pesado\n\nRSI ha actualizado la característica configuración de bi-ala adaptable del Scorpius y ha añadido un Amortiguador Cuántico y un Dispositivo EMP a medida diseñados exclusivamente por su equipo interno para crear el poderoso Scorpius Antares. Construido pensando en la potencia de frenado, el Scorpius Antares está diseñado para llevar cualquier persecución a un final rápido.
; FORCE
vehicle_DescRSI_Ursa_Rover=Fabricante: RSI\nEnfoque: Explorador\n\nConstruido por RSI específicamente para el explorador planetario, el Ursa Rover ofrece a los civiles capacidades todoterreno de grado militar y se erige como el estándar resistente en aplicaciones terrestres de exploración, mapeo y descubrimiento.
; FORCE
vehicle_DescRSI_Ursa_Rover_Emerald=Fabricante: RSI\nEnfoque: Explorador\n\nLa fortuna favorece a los audaces. El nombre más fiable en la exploración todoterreno encarna la esencia de la buena fortuna y el éxito con este Ursa Rover conmemorativo de edición limitada.
; FORCE
vehicle_DescRSI_Zeus_ES=Fabricante: Roberts Space Industries\nEnfoque: Expedición\n\nListo para transportar a toda una nueva generación de viajeros a través del universo, Roberts Space Industries se enorgullece de presentar una nave espacial que lleva ocho siglos en desarrollo: la nueva nave Zeus Mk II. Rindiendo homenaje al diseño clásico que lanzó a la humanidad a las estrellas en 2140, el Zeus Mk II ha sido actualizado para superar los estándares modernos, manteniendo el corazón de este querido ícono espacial.  Con un enfoque en la exploración, la edición Zeus Mk II ES presenta un robusto paquete de radar para descubrir nuevos hallazgos, y armamento y escudos mejorados para ayudar a regresar a casa.\n
; FORCE
vehicle_DescRSI_Zeus_ES_Collector_Indust,P=Fabricante: Roberts Space Industries\nEnfoque: Expedición\n\nListo para transportar a toda una nueva generación de viajeros a través del universo, Roberts Space Industries se enorgullece de presentar una nave espacial que lleva ocho siglos en desarrollo: la nueva nave Zeus Mk II. Rindiendo homenaje al diseño clásico que lanzó a la humanidad a las estrellas en 2140, el Zeus Mk II ha sido actualizado para superar los estándares modernos, manteniendo el corazón de este querido ícono espacial.  Con un enfoque en la exploración, la edición Zeus Mk II ES presenta un robusto paquete de radar para descubrir nuevos hallazgos, y armamento y escudos mejorados para ayudar a regresar a casa.
; FORCE
vehicle_DescTMBL_Cyclone=Fabricante: Tumbril Land Systems\nEnfoque: Pasajero\n\nCon una potente combinación de velocidad, maniobrabilidad y robusta durabilidad, el Cyclone es una opción perfecta para entregas locales y transporte entre granjas y puestos de avanzada planetarios.
; FORCE
vehicle_DescTMBL_Cyclone_AA=Fabricante: Tumbril Land Systems \nEnfoque: Antiaéreo\n\nUn ecualizador en el campo de batalla, el Cyclone AA viene equipado con un misil tierra-aire y un paquete de contramedidas para proporcionar cobertura a las tropas terrestres contra objetivos aéreos.
; FORCE
vehicle_DescTMBL_Cyclone_MT=Fabricante: Tumbril Land Systems \nEnfoque: Antiaéreo\n\nSiguiendo el éxito del lanzamiento inicial del Cyclone, Tumbril ha tenido en cuenta tus comentarios y ha expandido su popular línea de vehículos tácticos con el totalmente nuevo Cyclone MT. Equipado con una combinación de torreta de cañón y misiles, este módulo ofrece opciones de combate aumentadas en el campo.
; FORCE
vehicle_DescTMBL_Cyclone_RN=Fabricante: Tumbril Land Systems \nEnfoque: Explorador\n\nMantente móvil y alerta con el Cyclone RN. Este vehículo ligero de reconocimiento es la solución perfecta para carreras de reconocimiento, proporcionando exploraciones rápidas y detalladas del terreno, así como la colocación de balizas.
; FORCE
vehicle_DescTMBL_Cyclone_TR=Fabricante: Tumbril Land Systems \nEnfoque: Antivehículo\n\nDiseñado para uso militar y de seguridad, el módulo Cyclone TR cuenta con una armadura mejorada y una torreta operada por un humano capaz de montar un arma de Tamaño 1 y un campo de fuego responsivo de 360°.
; FORCE
vehicle_DescTMBL_Nova=Fabricante: Tumbril Land Systems\nEnfoque: Tanque pesado\n\nEl nuevo Nova de Tumbril es un guerrero de campo de batalla clásico, reinventado para la era moderna. Este tanque pesado ofrece una combinación devastadora de armamento para eliminar amenazas en tierra y en el aire.
; FORCE
vehicle_DescTMBL_Storm=Fabricante: Tumbril Land Systems\nEnfoque: Tanque ligero\n \nIntroducido originalmente en 2606 durante la Segunda Guerra Tevarin, el minitanque de un solo operador Tumbril Storm fue construido para arrasar campos de batalla y eliminar la artillería enemiga. Reinventado desde cero para ser más rápido, más fuerte y más impactante que nunca, el último Storm es una verdadera fuerza de la naturaleza, muy adaptado al paisaje frenético de la guerra moderna.
; FORCE
vehicle_DescTMBL_Storm_AA=Fabricante: Tumbril Land Systems\nEnfoque: Tanque ligero\n\nIntroducido originalmente en 2606 durante la Segunda Guerra Tevarin, el minitanque de un solo operador Tumbril Storm fue construido para arrasar campos de batalla y eliminar la artillería enemiga. Reinventado desde cero para ser más rápido, más fuerte y más impactante que nunca, el Storm AA es una verdadera fuerza de la naturaleza, equipado con una lluvia de misiles para proporcionar cobertura contra objetivos aéreos y terrestres.
; FORCE
vehicle_NameRSI_Aurora_CL_short=Aurora CL
