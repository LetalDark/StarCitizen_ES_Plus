item_Desc_rsi_pilot_flightsuit_helmet_01=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\n\nEl casco Odyssey de RSI es tan ligero y discreto que casi olvidarás que lo llevas puesto. Su construcción de fibra de carbono resistente a impactos con inserciones de espuma absorbente de golpes y una visera laminada moldeada de una sola pieza proporciona un campo de visión máximo tanto horizontal como verticalmente.
