item_Descvolt_optics_tsco_x8_s3_store01=Fabricante: VOLT\nTipo: Telescópica\nPunto de montaje: Óptica\nAumento: 8x\nTiempo de apuntado: +0%\nTamaño: 3\n\nDiseñada para disparos de precisión a larga distancia, la FarSight está cuidadosamente fabricada para proporcionar una fidelidad de objetivos sin igual. La tecnología de lentes TruePicture de VOLT ofrece altos niveles de transmisión de luz, asegurando una fácil adquisición de objetivos y una iluminación diurna para que siempre consigas tu marca.\n\nLa versión Golden Blossom es principalmente negra, adornada con intrincadas flores doradas, ofreciendo a tus enemigos un último vistazo de vida antes de la muerte.
; FORCE
item_Descvolt_sniper_energy_01_store01=Fabricante: Verified Offworld Laser Technologies\nTipo de artículo: Rifle de francotirador\nClase: Energía (Láser)\n\nTamaño de batería: 22\nCadencia de fuego: 60-300 rpm\nAlcance efectivo: 80 m\n\nAccesorios: Ópticas (S3), Subcañón (S2)\n\nEl rifle de francotirador láser Zenith de VOLT ofrece flexibilidad operativa en el campo de batalla, ya que puede disparar rápidamente disparos de baja energía, o dejarse cargar automáticamente para disparar un proyectil de energía mucho más potente que también genera significativamente más ruido y calor.\n\nLa versión Golden Blossom es principalmente negra, adornada con intrincadas flores doradas, ofreciendo a tus enemigos un último vistazo de vida antes de la muerte.
; FORCE
