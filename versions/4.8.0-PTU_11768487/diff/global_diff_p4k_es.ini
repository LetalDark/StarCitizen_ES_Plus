item_Desc_vpw_bouncer_jacket_01_02_01=Capacidad de carga: 1K µSCU\n\nLa chaqueta Vaporwear Creese cuenta con un cuello de la antigua Tierra y etiquetas alrededor de los hombros. Los detalles blindados en los hombros y las mangas ventiladas brindan protección sin restringir el movimiento, lo que permite usar la chaqueta de manera informal o pilotar un vehículo con techo abierto. La edición especial Skullsnap es plateada elegante con estilos geométricos y una calavera gritando en la parte posterior.
