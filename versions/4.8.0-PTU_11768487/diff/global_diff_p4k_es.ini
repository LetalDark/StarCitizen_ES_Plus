Journal_General_Harvestables_Content=Esta guía te ayudará a identificar qué es útil, qué es comestible y qué es mortal.\n\n*SISTEMA STANTON*\nPuede parecer completamente corporativo, pero el sistema Stanton es rico en recursos para el recolector emprendedor.\n\nDEGNOUS ROOT\nUn tipo de macroalga que se ha aclimatado a gran parte del sistema Stanton, la degnous root es originaria de Terra III, donde crece en abundancia a lo largo de costas poco profundas. Fue introducida en algunos planetas y lunas de Stanton cuando fueron terraformados por primera vez como parte de sus ecosistemas construidos artificialmente. La degnous root en polvo es un aditivo popular en múltiples productos médicos y de salud gracias a su mezcla única de aminoácidos.\nDónde encontrarla: Pastizales de Hurston (Stanton I)\n\nGOLDEN MEDMON\nCultivado por primera vez en Jalan, el árbol maru ebony destaca sobre todo por el fruto que produce, el curiosamente formado golden medmon. Cuando se cosechan, los golden medmon son extremadamente firmes y astringentes, con una dura piel naranja. Solo se vuelven agradables al paladar si se dejan ablandar mediante maduración con etileno, momento en el que adquieren un sabor similar al caramelo y desarrollan una consistencia cremosa. En este punto, la piel amarillo-anaranjada se vuelve arrugada y oscura, lo que a veces lleva a quienes no conocen la fruta a descartarla erróneamente como si estuviera podrida.\nDónde encontrarlo: Pastizales de Hurston (Stanton I), tundras de microTech (Stanton IV)\n\nHEART OF THE WOODS\nEste hongo rojizo-marrón parecido a una seta puede encontrarse en climas fríos donde crece en árboles y troncos en descomposición. Apreciado por los sibaritas por su sabor complejo, el heart of the woods aún no se cultiva comercialmente y, por ello, puede alcanzar un alto precio en los mercados adecuados. Debe señalarse que la seta es levemente tóxica hasta que se cocina por completo, por lo que no debe consumirse cruda.\nDónde encontrarlo: Bosques de microTech (Stanton IV)\n\nPITAMBU\nUna planta de hojas que fue descubierta por primera vez en Reisse, el pitambu produce un fruto del mismo nombre con un sabor suave y a nuez. Aunque se cultiva como cosecha comercial, suele encontrarse en estado silvestre gracias a su capacidad para sobrevivir en una amplia variedad de climas. El fruto es crujiente y acuoso bajo su piel y está lleno de pequeñas semillas que pueden consumirse junto con la pulpa. La flor del pitambu también puede cocinarse y comerse, o dejarse infusionar en agua caliente para crear un té que ayude a aliviar molestias digestivas.\nDónde encontrarlo: Pastizales de Hurston (Stanton I), tundras de microTech (Stanton IV)\n\nPROTA\nResistente y prolífico, el prota es un tipo de moho mucilaginoso capaz de crecer en entornos extremos. En general prefiere condiciones ricas en ácidos y se sabe que prospera en zonas afectadas por la contaminación industrial. Cuando está listo para reproducirse, el prota crea cápsulas de esporas que crecen desde pequeños tallos que brotan de la superficie del moho. Estas cápsulas tienen propiedades adhesivas innatas, lo que ha llevado a su uso como ingrediente en múltiples tipos de pegamento comercial.\nDónde encontrarlo: Pastizales de Hurston (Stanton I)\n\nREVENANT POD\nLas vainas de semillas del revenant tree se recolectan habitualmente porque su polen se procesa y se transforma en la droga altruciatoxina, que es ilegal en muchas jurisdicciones. Una variedad de la altrucia de Terra III, el revenant tree surgió del duro y ventoso clima de Hyperion, donde fue introducido por geoingenieros en un intento de crear cortavientos contra el polvo. Es importante no consumir las semillas ni el polen que se encuentran en las vainas, ya que pueden provocar una reacción alérgica y causar efectos sensoriales y musculares no deseados. El transporte de las vainas puede estar restringido en algunas zonas.\nDónde encontrarlo: Desiertos de Hurston (Stanton I)\n\nSTONE BUG SHELL\nEl stone bug no es realmente un insecto, sino un crustáceo que vive en tierra firme y habita zonas secas y rocosas. De media mide unos 45 cm de largo y puede identificarse por sus patas multiarticuladas y su duro caparazón exterior. Cuando se siente amenazado, se enrolla formando una bola compacta, usando su resistente caparazón para mantener a salvo sus partes blandas de las mandíbulas de los depredadores. Las conchas procesadas del stone bug se utilizan como ingrediente en ciertos tipos de compuestos para armaduras.\nDónde encontrarlo: Desiertos de Daymar (Stanton 2b)\n\nSUNSET BERRIES\nEl arbusto de sunset berries puede encontrarse creciendo en estado silvestre en entornos perpetuamente fríos. Puede identificarse por sus hermosas bayas rojas, que crecen durante todo el año en racimos sobre las ramas leñosas de la planta. Aunque puedan parecer tentadoras, si se consumen, estas bayas muy amargas y tánicas pueden causar vómitos, calambres extremos y espasmos musculares. Varias compañías farmacéuticas están realizando estudios de investigación sobre las posibles aplicaciones médicas de la baya, y se sabe que las compran a recolectores individuales.\nDónde encontrarlo: Tundras de microTech (Stanton IV)\n\n\n*SISTEMA PYRO*\nEntre los forajidos descontrolados y el duro entorno, el sistema Pyro puede ser difícil de recorrer, pero aun así puede resultar gratificante para el recolector ingenioso dispuesto a asumir un poco de riesgo.\n\nAMIANT POD\nObtenidas del amiant tree, las cáscaras fibrosas de estas vainas de semillas se utilizan para fabricar textiles resistentes al calor. Una vez retiradas, las cáscaras deben empaparse primero en una solución química antes de poder separar las fibras.\nDónde encontrarlo: Bloom (Pyro III)\n\nDECARI POD\nEl decari es un tipo de hongo que produce una gran vaina de esporas. Se fija a rocas y suelo utilizando largos rizoides filamentosos capaces de regenerar el cuerpo principal del decari si este es destruido. Las vainas pueden recolectarse y usarse para diversos fines científicos o incluso como fuente de alimento. Sin embargo, la vaina de decari no puede consumirse directamente. Debe retirársele su gruesa capa exterior y sus filamentos espinosos, y el himenio fibroso debe cocinarse durante mucho tiempo antes de que pueda ser digerido con seguridad por los Humanos.\nDónde encontrarlo: Pyro I\n\nFLAREWEED STALK\nEl flareweed es una planta resistente que puede sobrevivir en entornos hostiles. Gracias a su capacidad natural para filtrar elementos nocivos de su suministro de agua, los tallos de flareweed se recolectan con frecuencia para ser utilizados en sistemas de filtración.\nDónde encontrarlo: Bloom (Pyro III)\n\nFOTIA SEEDPOD\nEl fotia scrub depende de las llamaradas solares para su reproducción. En lugar de tener estambres y polen tradicionales, permite que la radiación de las llamaradas altere su genética antes de liberar su vaina de semillas. Algunas personas emprendedoras buscan y recolectan estas vainas por sus propiedades radiológicas naturales, que pueden utilizarse de diversas maneras.\nDónde encontrarlo: Pyro I\n\nPINGALA SEEDS\nCada aspecto del pingala sigue la proporción áurea, dando como resultado una planta visualmente impactante. Esto incluye sus semillas, muy buscadas por coleccionistas de plantas. Especialmente porque los intentos de cultivar el pingala en entornos de invernadero han resultado extremadamente difíciles.\nDónde encontrarlo: Monox (Pyro II)\n\nWUOTAN SEED\nEl wuotan es una planta leñosa autóctona del sistema Pyro. Capaz de prosperar en entornos tormentosos, ha evolucionado para soportar vientos huracanados y descargas eléctricas. Produce una semilla que se vuelve bioluminiscente al madurar para llamar la atención y favorecer su dispersión. A menudo se recolectan para utilizarlas como fuente de luz natural.\nDónde encontrarlo: Pyro I\n\n\n*SISTEMA NYX*\n\nMINER’S HORN\nDescubierto por primera vez en las líneas de alcantarillado de la estación minera QV, construida en el asteroide Delamar en Nyx, este hongo de rápido crecimiento se ha convertido en un componente útil de fabricación para los colonos de Levski gracias a las fuertes fibras de su micelio, que pueden secarse y utilizarse de diversas maneras.\nDónde encontrarlo: Levski\n\n\n*MÚLTIPLES SISTEMAS*\n\nAMIOSHI PLAGUE\nNo tan ominoso como su nombre, el amioshi plague es un liquen invasivo que crece en las grietas de las rocas. Mientras que el núcleo del liquen se entierra fuera de la vista para tratar de absorber toda la humedad que pueda encontrar, la parte cercana a la superficie hace brotar escamas con capucha que expulsan esporas para extenderse a otras rocas. Su periodo de maduración relativamente corto es el origen de su nombre.\nDónde encontrarlo: Cuevas de todos los planetas y lunas de Pyro, cuevas de Hurston (Stanton I) y sus lunas, cuevas de Cellin (Stanton 2a), cuevas de Daymar (Stanton 2b), cuevas de Wala (Stanton 3b), cuevas de microTech (Stanton IV), cuevas de Euterpe (Stanton 4c)\n\nBLUEMOON FUNGUS\nCon preferencia por esporular en las profundidades de cuevas oscuras, las setas fructíferas del bluemoon fungus se recolectan a menudo para fabricar un lubricante sin petróleo muy valorado y utilizado en una gran variedad de industrias.\nDónde encontrarlo: Cuevas de todos los planetas y lunas de Pyro, cuevas de Hurston (Stanton I) y sus lunas, cuevas de Cellin (Stanton 2a), cuevas de Daymar (Stanton 2b), cuevas de Wala (Stanton 3b), cuevas de microTech (Stanton IV), cuevas de Euterpe (Stanton 4c)\n\nRANTA DUNG\nUn excremento seco con forma de cubo procedente del ranta, un gran crustáceo similar a un isópodo. Se ha descubierto recientemente que el excremento contiene un bioma bacteriano único que ayuda al ranta a procesar y digerir minerales, y algunos investigadores tienen la esperanza de que su estudio conduzca a innovaciones industriales o médicas.\nDónde encontrarlo: Cuevas de todos los planetas y lunas de Pyro, cuevas de Hurston (Stanton I) y sus lunas, cuevas de Cellin (Stanton 2a), cuevas de Daymar (Stanton 2b), cuevas de Wala (Stanton 3b), cuevas de microTech (Stanton IV), cuevas de Euterpe (Stanton 4c)
; FORCE
Journal_General_Mining_Compendium_Content=Para fomentar el espíritu emprendedor del minero moderno, United Resource Workers ha elaborado una práctica guía que enumera las ubicaciones más comunes donde encontrar minerales, menas y gemas a lo largo del ‘verse.\n\nAgricium - ARC-L3, Cellin, CRU-L5, Daymar, MIC-L4, cúmulos de asteroides de Pyro, Terminus, Vuur, Yela\n\nAluminio - Aaron Halo, Aberdeen, ARC-L1, ARC-L2, Arial, CRU-L3, Glaciem Ring, HUR-L1, HUR-L2, HUR-L4, HUR-L5, Ita, cinturón Keeger, Magda, MIC-L1, MIC-L2, MIC-L5, cúmulos de asteroides de Pyro\n\nAphorite - Todas las lunas/planetas/cuevas\n\nAslarite - Aaron Halo, ARC-L5, CRU-L4, Fuego, Ita, Magda, MIC-L4, cúmulos de asteroides de Pyro, Vuur\n\nBeradon - Bloom, Pyro I\n\nBeryl - Aaron Halo, ARC-L3, CRU-L5, MIC-L4, cúmulos de asteroides de Pyro, Wala\n\nBexalite - CRU-L1, CRU-L2, Fairo, Fuego, Glaciem Ring, HUR-L3, cinturón Keeger, cúmulos de asteroides de Pyro, Vuur\n\nBorase - Adir, Bloom, Fuego, HUR-L1, HUR-L4, HUR-L5, cúmulos de asteroides de Pyro, Pyro IV\n\nCaranite - Aberdeen, Daymar\n\nCobre - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Clio, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Euterpe, Lyria, MIC-L3, MIC-L4, cúmulos de asteroides de Pyro, Pyro I, Pyro IV, Terminus, Wala, anillo de Yela\n\nCorundum - Aberdeen, ARC-L1, ARC-L2, ARC-L4, Arial, CRU-L3, Hurston, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, MIC-L2, MIC-L5, cúmulos de asteroides de Pyro\n\nCuarzo - Bloom, Cellin, Daymar, cúmulos de asteroides de Pyro, Yela\n\nDolivine - Todas las lunas/planetas/cuevas\n\nEstaño - Arial, Hurston, Ignis, Ita, Monox, cúmulos de asteroides de Pyro, Pyro I\n\nFeynmaline - Pyro IV\n\nGlacosite - Monox\n\nHadanite - Todas las lunas/planetas/cuevas\n\nHephaestanite - Arial, ARC-L1, ARC-L2, ARC-L4, Calliope, CRU-L3, Fuego, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, microTech, MIC-L2, MIC-L5, Monox, cúmulos de asteroides de Pyro, Vuur\n\nHielo - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Calliope, Clio, Euterpe, Glaciem Ring, HUR-L3, cinturón Keeger, microTech, MIC-L3, MIC-L4, cúmulos de asteroides de Pyro, anillo de Yela\n\nHierro - Aaron Halo, Adir, Akiro Cluster, ARC-L3, ARC-L5, Bloom, Calliope, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Fairo, Fuego, Glaciem Ring, HUR-L3, cinturón Keeger, Lyria, Magda, microTech, MIC-L3, MIC-L4, Monox, cúmulos de asteroides de Pyro, Pyro I, Pyro IV, Vatra, Vuur, Wala, anillo de Yela\n\nJanalite - Daymar, Hurston, Ita, cuevas de arena de Magda, Wala\n\nLaranite - HUR-L1, HUR-L4, HUR-L5, Lyria, Pyro IV, Wala\n\nLindinium - Glaciem Ring, cinturón Keeger\n\nOro - ARC-L5, CRU-L4, Fairo, Ignis, MIC-L3, cúmulos de asteroides de Pyro, Terminus, Vatra\n\nOuratite - Aberdeen, Arial, Hurston, anillo de Yela\n\nQuantainium - Se encuentra en todos los depósitos de Stanton (Raro)\n\nRiccite - Adir, Akiro Cluster, Bloom, Ignis, cúmulos de asteroides de Pyro, Terminus, Vatra\n\nSadaryx - estaciones QV Breaker (Nyx)\n\nSavrilium - Glaciem Ring, cinturón Keeger, estaciones QV Breaker (Nyx)\n\nSilicio - Aaron Halo, Akiro Cluster, Cellin, Daymar, Fairo, Ignis, cúmulos de asteroides de Pyro, Vatra, Yela\n\nStileron - Todos los planetas de Pyro, Akiro Cluster, cúmulos de asteroides de Pyro\n\nTaranite - ARC-L1, ARC-L2, ARC-L4, Cellin, Clio, Euterpe, HUR-L2, cúmulos de asteroides de Pyro, Yela\n\nTitanio - Aaron Halo, Aberdeen, CRU-L1, CRU-L2, HUR-L3, Magda, cúmulos de asteroides de Pyro, Terminus, anillo de Yela\n\nTorite - Akiro Cluster, CRU-L3, Glaciem Ring, cinturón Keeger, MIC-L1, MIC-L2, MIC-L5, cúmulos de asteroides de Pyro, estaciones QV Breaker (Nyx)\n\nTungsteno - Adir, ARC-L1, ARC-L2, ARC-L4, Fairo, HUR-L2, cúmulos de asteroides de Pyro
Kaboos_Intro_Description=ESPECIFICACIONES DE MISIÓN\n\nÁrea de operación: Sistema Nyx\nFuerzas hostiles: Desconocidas\nEspecificaciones de equipo: Nave de combate, Armas personales\nBriefing: InterSec ha sido contratada por la UEE para recopilar información sobre un grupo de <EM4>contrabandistas que trafican con piezas Vanduul</EM4>, vinculados a los experimentos ilegales con Vanduul que se llevan a cabo en las instalaciones Onyx de ASD. La UEE está ansiosa por comprender y poner fin a sus operaciones.\n\nBasándonos en las pruebas extraídas de las instalaciones de ASD, hemos logrado rastrear la posible ubicación de uno de sus almacenes.\n\nUna vez aceptada la misión, dirígete a la antigua <EM4>estación logística de QV Planet Services</EM4> y nos pondremos en contacto.\n\n\nAtentamente,\n\nDeacon Tobin\nDirector de Operaciones\nInterSec Defense Solutions\n\nEsta comunicación contiene información confidencial destinada únicamente al destinatario. Si la ha recibido por error, ignórela y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben cumplir con las leyes de la UEE y del sistema cuando corresponda.
Kaboos_Mission_Description=ESPECIFICACIONES DE MISIÓN\n\nÁrea de operación: Sistema Nyx\nFuerzas hostiles: Forajidos presentes y armados\nEspecificaciones de equipo: Nave de combate, Armas personales\nBriefing: InterSec necesita tus servicios una vez más.\n\nLa información que recopilaste anteriormente ha sido invaluable para identificar a varios compradores destacados de piezas Vanduul obtenidas ilegalmente. Sin embargo, desde entonces los Shattered Blade han continuado sus operaciones y la UEE solicita que <EM4>actualicemos nuestra información.</EM4>\n\nCreemos que se puede recuperar más información de las instalaciones de almacenamiento ubicadas en la antigua <EM4>estación logística QV.</EM4>\n\nLos parámetros de la operación no han cambiado desde tu última misión: encuentra los <EM4>datos encriptados</EM4> y usa la <EM4>clave de descifrado</EM4> para descifrarlos y subirnos la lista. Los Shattered Blade habrán reforzado la zona desde la última vez, así que espera resistencia.\n\nBuena suerte. Estaremos en contacto.\n\n\nAtentamente,\n\nDeacon Tobin\nDirector de Operaciones\nInterSec Defense Solutions\n\nEsta comunicación contiene información confidencial destinada únicamente al destinatario. Si la ha recibido por error, ignórela y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben cumplir con las leyes de la UEE y del sistema cuando corresponda.
