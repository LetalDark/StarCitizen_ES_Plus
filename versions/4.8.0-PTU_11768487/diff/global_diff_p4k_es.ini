item_Desc_mrai_flightsuit_helmet_01_03_01=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\n\nLánzate de cabeza a la velocidad extrema con comodidad y estilo con el casco de carreras de Origin. Principalmente blanco con detalles en negro y azul, el casco presenta una amplia visera para vistas sin obstáculos mientras pasas a toda velocidad.
