item_Desc_syfb_flightsuit_suit_01_01_01=Tipo de artículo: Traje de vuelo\nReducción de daño: 15%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +97.5%\nCapacidad de carga: 6.5 µSCU\nMochilas: Ligera\n\nPerfeccionado a través de siglos de innovación, el elegante y estilizado traje de vuelo Xanthule de Syang Fabrication ha sido meticulosamente adaptado a la fisiología humana. El traje Xanthule cuenta con placas ligeras y transpirables hechas con un tejido de carbono y seda que proporciona protección fiable mientras mantiene la estética característica de la renombrada Casa.
