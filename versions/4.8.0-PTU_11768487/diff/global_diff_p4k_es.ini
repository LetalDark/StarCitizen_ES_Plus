item_desc_gys_undersuit_01_01_12=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nAventúrate con confianza en lo desconocido con el subtraje Deep-Space. Diseñado de forma inteligente con varias secciones superpuestas para garantizar su integridad, Gyson ha creado un subtraje asequible y con estilo que ayuda a hacer que los viajes espaciales sean más accesibles para todos.\n\nLa versión Shutdown presenta colores negros y grises con detalles en metal oscuro.
; FORCE
item_desc_gys_undersuit_01_01_13=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nVelocidad de limpieza de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nAventúrate con confianza en lo desconocido con el subtraje Deep-Space. Diseñado de forma inteligente con varias secciones superpuestas para garantizar la integridad del traje, Gyson ha creado un subtraje asequible y con estilo que ayuda a hacer los viajes espaciales más accesibles para todos.\n\nLa versión Bruiser presenta colores carmesí oscuro y azul medianoche con detalles en metal pulido.
; FORCE
item_desc_gys_undersuit_01_01_14=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nVelocidad de limpieza de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nAventúrate con confianza en lo desconocido con el subtraje Deep-Space. Diseñado de forma inteligente con varias secciones superpuestas para garantizar la integridad del traje, Gyson ha creado un subtraje asequible y con estilo que ayuda a hacer los viajes espaciales más accesibles para todos.\n\nLa versión Brassy presenta un color blanco con detalles en bronce.
; FORCE
item_fuelnozzle_GRIN_Fast_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 1,71 SCU/s\n\nAl permitir un caudal general considerablemente mayor, la boquilla de combustible Norfield de Greycat prioriza la transferencia rápida y eficiente de combustible y solo sacrifica parte de la capacidad de almacenamiento del módulo.  \n
; FORCE
item_fuelnozzle_GRIN_Safe_Desc=Fabricante: Greycat Industrial\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 1,04 SCU/s\n\nAl mantener una presión de trabajo más alta, la boquilla de combustible Harkin de Greycat no solo presume de una construcción segura, sino que además permite que el almacenamiento adjunto contenga combustible adicional, aunque a una velocidad de transferencia general más lenta.\n
; FORCE
item_fuelnozzle_MISC_Standard_Desc=Fabricante: MISC\nTipo de artículo: Boquilla de combustible\nVelocidad de flujo: 1,65 SCU/s\n\nLa boquilla elegida por el aclamado MISC Starfarer, la RN-7s, fue diseñada para ser una opción de transferencia de combustible flexible adecuada para una gran variedad de situaciones.\n
; FORCE
item_fuelpod_MISC_Standard_Desc=Fabricante: MISC\nTipo de artículo: Módulo de combustible\nModificador de flujo: +5%\nCapacidad: 10 SCU\n\nEl módulo de combustible estándar del Starfarer, el CR-60, fue diseñado por MISC para ser una opción de almacenamiento de combustible bien equilibrada y lista para abordar una amplia variedad de trabajos.\n
; FORCE
item_fuelpod_STOR_Fast_Desc=Fabricante: Stor*All\nTipo de artículo: Módulo de combustible\nModificador de flujo: -37%\nCapacidad: 16.8 SCU\n\nCuando se trata de equilibrar tus resultados, el tiempo es dinero. Por eso Stor*All diseñó el módulo de combustible GSX-RF para que tenga una de las velocidades de flujo más rápidas del mercado. Aunque tiene una capacidad ligeramente reducida, el tiempo ahorrado y las modestas mejoras en la velocidad de flujo segura lo convierten en una solución ideal para naves de servicio.\n
; FORCE
item_fuelpod_STOR_Safe_Desc=Fabricante: Stor*All\nTipo de artículo: Módulo de combustible\nModificador de flujo: -37%\nCapacidad: 7.35 SCU\n\nAl utilizar un revestimiento exterior triple reforzado con una clasificación muy superior a los estándares de la industria, el módulo de combustible GSX-HP de Stor*All puede soportar presiones más altas que las opciones de almacenamiento típicas. Esto te permite transportar más combustible y mejora las velocidades de flujo seguras de cualquier boquilla que utilices.\n
; FORCE
manufacturer_NameKRIG=Kruger Intergalactic
; FORCE
mg_pacheco_assassin_sync_desc_001=Hace un tiempo, recibí una amenaza de chantaje no muy sutil. Pudimos rastrearla hasta dos operadores conocidos como ~mission(TargetName) y ~mission(TargetName2).\n\nVas a enviar un mensaje sobre lo que les hacemos a las personas que intentan aprovecharse de nosotros.\n\nForma un equipo y caza a estos bastardos. Y como no podemos arriesgarnos a que filtren la información que tienen, debes matarlos a ambos al mismo tiempo. \n\n~Mission(Danger) Hazlo de forma que nadie vuelva a pensar en chantajearnos durante mucho tiempo.\n\n-Twitch
; FORCE
mg_pacheco_assassin_sync_desc_002=Mis empleadores quieren muertos a ~mission(TargetName) y ~mission(TargetName2).\n\nMás importante aún, quieren que mueran al mismo tiempo. \n\nCoordina con algunos mercenarios de confianza para realizar un ataque simultáneo.\n\n~Mission(Danger) Como sea que suceda, hazlo de forma limpia y no dejes que ninguno de ellos escape. \n\n-Twitch
; FORCE
