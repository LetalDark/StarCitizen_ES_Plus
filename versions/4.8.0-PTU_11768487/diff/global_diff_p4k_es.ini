item_Desc_mrai_flightsuit_01_01_01=Tipo de artículo: Traje de vuelo\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nEl traje de vuelo de carreras de Mirai utiliza tejidos sintéticos procedentes de los Xi’an para crear un traje cómodo y lo suficientemente duradero para soportar las tensiones de las carreras a alta velocidad. Inspirado en la cultura y estética tradicional Saisei, la marcada franja roja a lo largo del cuerpo del traje de vuelo da como resultado un diseño llamativo pero elegante.
