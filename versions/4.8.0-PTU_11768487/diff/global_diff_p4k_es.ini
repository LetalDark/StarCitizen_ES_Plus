item_Desc_slaver_undersuit_armor_01_01_01=Tipo de artículo: Subtraje\nReducción de daño: 10%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nEl Stoneskin de Kastak Arms es un subtraje de combate basado en el famoso sistema TCS-4 de CDS, desarrollado a partir de la extensa retroalimentación de los operadores que confían en esta tecnología en el campo. Ofreciendo una gran variedad de opciones para armadura y capacidades EVA, el Stoneskin está listo para competir con CDS como un subtraje resistente y confiable.
; FORCE
