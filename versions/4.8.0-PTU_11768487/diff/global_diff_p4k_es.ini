item_Desc_mrai_flightsuit_01_05_01=Tipo de artículo: Traje de vuelo\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nEl traje de vuelo de carreras Star Kitten adopta el icónico aspecto del personaje de dibujos animados. Llevado por los corredores del equipo Takahashi, el traje de vuelo es principalmente rosa con detalles en color verde azulado y grandes imágenes de Star Kitten en la parte delantera y trasera.
