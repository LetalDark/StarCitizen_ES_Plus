item_Desc_mrai_flightsuit_helmet_01_01_01=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\n\nLos cascos de carrera de Mirai utilizan materiales avanzados Xi’an para crear un casco cómodo y ligero, lo suficientemente resistente para soportar las tensiones de las carreras a alta velocidad. Inspirados en la cultura y estética tradicional Saisei, el marcado detalle rojo y el audaz branding de Mirai resultan en un diseño llamativo pero elegante.
