item_Desc_uba_prison_undersuit_01=Tipo de artículo: Mono de trabajo\nReducción de daño: 5%\nRango térmico: -75 / 75 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nEl Mono de Trabajo para Reclusos es un traje duradero y de alta visibilidad diseñado para sobrevivir las duras condiciones que enfrentan los reclusos durante los programas de trabajo fuera. El mono integra acolchados reforzados para protección con un tejido sintético resistente que cumple con el estándar mínimo gubernamental de aislamiento térmico, manteniendo los costos bajos. La resistente mochila de trabajo ofrece amplia capacidad de almacenamiento y distribuye el peso de manera uniforme sobre la espalda del usuario, permitiéndole cargar más durante cada turno. También cuenta con correas inferiores seguras para permitir determinar el tamaño del tanque de oxígeno por recluso, minimizando el riesgo de escape.
; FORCE
item_Desc_vgl_undersuit_01_01_Shared=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nEl ForceFlex de Virgil es la próxima generación en tecnología de subtraje. Certificado tanto para combate como para trabajo industrial, puedes estar seguro de que el tejido combinado te mantendrá protegido en cualquier situación a la que lo sometas.
; FORCE
item_Desc_vpw_bouncer_jacket_01_01_01=Capacidad de carga: 1K µSCU\n\nLa chaqueta Vaporwear Creese cuenta con un cuello de la antigua Tierra y etiquetas alrededor de los hombros. Los detalles blindados en los hombros y las mangas ventiladas permiten usar la chaqueta de manera informal o pilotando un vehículo con techo abierto.
