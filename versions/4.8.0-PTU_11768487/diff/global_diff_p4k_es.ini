item_Desc_rsi_odyssey_undersuit_helmet_01_Shared=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\n\nContinuando con el legado de cascos resistentes y confiables de RSI, el Odyssey II optimiza el diseño original en una estructura más ligera sin sacrificar durabilidad. Este casco multiusos fue extensamente probado en una variedad de condiciones y entornos para mantenerte seguro cada vez que te equipes.
