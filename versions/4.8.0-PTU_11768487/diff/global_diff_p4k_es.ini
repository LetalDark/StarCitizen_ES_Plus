Shubin_Industrial_HandMining_Nyx_M_PlanetarySystem_Desc_001=CONTRATO: Orden minera\nUBICACIÓN: Nyx\n\nDETALLES:\nUno de nuestros equipos de prospección confirmó recientemente que los asteroides que albergan estaciones trituradoras QV por todo el cinturón Keeger de Nyx contienen un tipo de mena raro, Sadaryx.\n\nSin embargo, debido a la dificultad de acceder a estas estaciones y a los riesgos inherentes, buscamos cuadrillas mineras externas que se encarguen de la extracción.\n\nNo tenemos una ubicación confirmada de dónde se encuentran los depósitos de Sadaryx dentro de la estación, pero recomendamos empezar por las secciones de cuevas donde los minerales se forman de manera natural. Si tienes mucha suerte, incluso podrías encontrar algunos cristales almacenados que fueron extraídos por las antiguas cuadrillas de trabajo de QV.\n\n<EM4>CONDICIONES*:</EM4>\nTu cuadrilla tendrá que acceder a una <EM4>estación trituradora QV</EM4>, recoger la <EM4>mena Sadaryx</EM4> requerida y entregarla en el elevador de carga situado en <EM4>~mission(Destination|Address)</EM4>.\n\nEsto requerirá un <EM4>Multi-Tool con un accesorio de minería</EM4> y un conocimiento básico de minería manual.\n\nNuestros equipos de prospección han informado de que estas estaciones podrían haber sido infiltradas por forajidos. Se recomienda precaución.\n\n*Al aceptar este contrato asumes todos y cada uno de los riesgos asociados al trabajo aquí descrito y Shubin Interstellar no podrá ser considerada responsable de ningún daño acumulado durante la duración del contrato.
SidekickShuttles_RepUI_Name=Sidekick Shuttles
Tut03_Part03_Hint06_Landing=Para aterrizar, desciende usando [~action(spaceship_movement|v_strafe_down)]. Cuando estés cerca de la plataforma de aterrizaje, puedes aterrizar automáticamente manteniendo pulsado [~action(spaceship_movement|v_toggle_landing_system)].
; FORCE
UI_TooltipEntitlement_Bricking,P=Inutilización
; FORCE
Vaughn_EliminateSpecific_FPS_storm_H_desc_003=Un objetivo anterior que pensaba haber sido eliminado parece haber resurgido como mercenario contratado en <EM4>~mission(Location)</EM4> trabajando para ASD. Aunque estoy enormemente decepcionado con el contratista que afirmó haber eliminado a <EM4>~mission(TargetName|Last)</EM4>, voy a reabrir el contrato original y dártelo a ti para que lo termines.\n\nActualmente está apostado en una instalación operativa, así que no estará solo. Usa tu criterio al ejecutar el contrato, pero ten claro que <EM4>~mission(TargetName)</EM4> es la prioridad.\n\nConfío en que lo harás mejor que mi anterior subcontratista,\n\nVaughn
; FORCE
Vaughn_EliminateSpecific_FPS_storm_H_desc_004=Tengo un contrato difícil para un operativo exigente. El nombre del objetivo es <EM4>~mission(TargetName)</EM4>. Actualmente trabaja como guardia de seguridad contratada para Associated Science & Development y está apostado en <EM4>~mission(Location)</EM4>, muy lejos de su anterior carrera como ejecutor y recadero de un sindicato.\n\nNecesito que entres y te encargues de <EM4>~mission(TargetName|Last)</EM4>, lo cual es más fácil de decir que de hacer, porque sin duda estará atrincherado con otras fuerzas de seguridad corporativas, pero confío en que lo resolverás.\n\nTodo lo mejor,\n\nVaughn
; FORCE
Vehicle_DescGRIN_UTV=Fabricante: Greycat Industrial\nEnfoque: Pasajeros\n\nEl Greycat UTV es un buggy utilitario y resistente diseñado para transportar cargas ligeras por terrenos accidentados. Tanto si coordinas el almacenamiento de mercancías como si haces una entrega a un puesto avanzado vecino, el diseño directo del UTV permite a los operadores centrarse en la tarea que tienen entre manos.
cfp_missingperson_inv_h_xenothreat_desc_01=Durante lo que debería haber sido un transporte de carga rutinario, el transportista y amigo de toda la vida de Citizens for Prosperity ~mission(TargetName) fue emboscado y secuestrado por XenoThreat. La señal de socorro codificada que recibimos de la víctima justo antes de que sus comunicaciones se cortaran nos dio información suficiente para localizar su ubicación más probable: ~mission(Location|Address).\n\nCFP necesita a alguien que se infiltre en el puesto avanzado, confirme el paradero de ~mission(TargetName|Last) y nos transmita esta información para saber exactamente dónde enviar a nuestro equipo de rescate. O, en el peor de los casos, comunicar a la familia del transportista que su ser querido no sobrevivió.\n\nEntendemos lo peligroso que es acercarse a un bastión de XenoThreat y estamos preparados para ofrecer una recompensa considerable por ponerte en riesgo.\n\nLima Endicott\nDespachadora Principal\nCitizens for Prosperity
cfp_missingperson_multiple_sabotage_servers_H_XT_desc_001=Un pequeño grupo de miembros de Citizens for Prosperity debía entregar datos confidenciales en nuestra sede central en Stanton, pero nunca llegaron.\n\nAhora creemos que fueron capturados por XenoThreat antes de que pudieran abandonar el sistema. Me gustaría que investigaras ~mission(Location|Address) para descubrir qué les ocurrió a los tripulantes desaparecidos y luego destruir cualquier servidor que puedan estar usando para almacenar los datos robados.\n\nAgradecemos mucho tu ayuda,\n\nLima Endicott\nDespachadora Principal\nCitizens for Prosperity
; FORCE
crafting_machineName_fabricator_standard_AA=RediMake Fabricador de artículos AA Support
crusader_UGF_destroy_H_desc_001=Un sindicato incipiente se ha instalado en ~mission(Location|Address) y ha estado intentando introducirse en el mercado de drogas. Desafortunadamente, su producto ha sido vinculado a varias muertes en los alrededores de Crusader. Con lo potente que es esta sustancia, supone una seria amenaza para la población.\n\nCrusader está trabajando para desmantelar toda la operación, pero mientras su producto siga circulando, los cadáveres siguen acumulándose.\n\nQueremos que vayas al lugar y destruyas el alijo que tienen allí antes de que tengan oportunidad de venderlo. Sin embargo, debes esperar que su alijo esté extremadamente bien custodiado.\n\nCONTRATO AUTORIZADO POR:\nOficial de Enlace Bautista\nID# 948J030K
; FORCE
destroyItems_BombingRunItem=Tanques de combustible
; FORCE
harvestable_Armillaria_Lev_desc=Descubierto por primera vez en las líneas de alcantarillado de la estación minera QV, construida en el asteroide Delamar en Nyx, este hongo de rápido crecimiento se ha convertido en un componente útil de fabricación para los colonos de Levski gracias a las fuertes fibras de su micelio, que pueden secarse y utilizarse de diversas maneras.
; FORCE
headhunters_Nyx_bombingrun_M_desc_001=Parece que tenemos un poco de competencia aquí en Nyx. Los exploradores han avistado a una banda atrincherada en <EM4>~mission(Location|Address)</EM4>.\n\nVerás, soy un tío justo. Le mandé un mensaje a esos descerebrados diciéndoles que o bien desalojaban la instalación o haríamos que desearan haberlo hecho, y eligieron lo segundo. Así que ahora necesito que vueles hasta allí y les saques de un soplo los tanques de combustible. Veamos cuánto aguantan sin ellos.\n\n-Stows fuera
; FORCE
headhunters_bombingrun_S_desc_001=Hemos oído rumores de que una banda nueva está planeando un ataque a un sitio en <EM4>~mission(Location|Address)</EM4>. Calculan que si consiguen reventar el suministro de combustible de allí, el lugar será suyo para tomarlo.\n\nPero lo que no saben es que vamos a mandarte a ti primero a volar los tanques de combustible para que podamos reclamar el sitio antes que ellos. Si todo sale según lo previsto, podremos limpiar el lugar y darle un buen palo a esa banda al mismo tiempo. Matar dos pájaros de un tiro.\n\nEl único problema es que ese sitio está armado hasta los dientes. Trae a una cuadrilla y deja esos tanques de combustible fuera de servicio. Nosotros nos encargamos del resto.\n\n-Stows fuera
; FORCE
headhunters_bombingrun_VE_desc_001=Headhunters no ha llegado a ser lo que es hoy jugando limpio. Hemos rastreado el escondite de un puñado de novatos despeinados que han estado metiéndose en nuestro territorio. Necesitamos que les mandes un mensaje.\n\nDirígete a <EM4>~mission(Location|Address)</EM4> y vuela esos tanques de combustible por los aires. Se lo pensarán dos veces antes de meterse en nuestras operaciones cuando sus naves estén en tierra.\n\n-Stows fuera
; FORCE
headhunters_bombingrun_multi_E_CFP_desc_001=Cada día parece que Citizens for Prosperity anda por aquí intentando reclutar a más gente para su causucha de mierda y haciéndoles la vida más difícil a los currantes como nosotros.\n\nMe parece que les vendría bien un recordatorio de quién manda realmente aquí. Dirígete a ~mission(Location|Address) y deja el lugar hecho un desastre.\n\nNo hay nada como un poco de daño a la propiedad para dejar las cosas claras.\n\n-Stows fuera
hud_turret_position_change_in_progress=Reposicionando torreta…
hud_turret_position_scorpius_bottom=Posición: inferior
hud_turret_position_scorpius_top=Posición: superior
hurston_UGF_defend_desc_001=HURSTON DYNAMICS\nOUTSOURCING DEPARTMENT\n\nCONTRACT: Facility Protection\nCONTRACTOR AFFILIATION: Independent\nOUTSOURCE MANAGER: T. Spooner\nRISK ASSESSMENT: High\nRUSH CONTRACT: No\n\nLocal criminals have been making threats against ~mission(Location|Address) and Hurston Security is seeking a contractor to put together a security team to guard the facility against any incursions.\n\nPayment will be sent once the facility is confirmed to be safe. \n\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination, or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n
; FORCE
item_Desc100i_Paint_Camo_Black=Personaliza tu nave Origin de la serie 100 con esta pintura de camuflaje gris.
; FORCE
item_DescFlair_Model_Carrack_toy_b_1H=Esta miniatura altamente detallada celebra el nombramiento de la Carrack como Best in Show en la Exposición Aeroespacial Intergaláctica de 2952. Takuetsu trabajó con Anvil Aerospace para conseguir las dimensiones y los detalles con precisión, de modo que la versión portátil de esta querida nave de exploración pueda acompañarte en aventuras por todo el imperio.
item_DescHammer_Propulsion_HMX_4_3,P=Hammer Propulsion HMX 4.3 Thruster
item_DescHammer_Propulsion_Twin_HM_4_3=El propulsor HMX 4.3 es la versión prémium del modelo HM 4.3 de Hammer Propulsion. Este modelo incluye piezas especialmente resistentes al uso y el óxido, diseñadas por los mejores ingenieros del mundo de la competición.
item_DescRSI_Constellation_Aquila_shop=Fabricante: Roberts Space Industries\nTipo: Exploración\n\n¡Explora nuevos horizontes, por muy lejanos que sean! La Constellation Aquila cuenta con una cabina rediseñada que ofrece mucha más visibilidad, además de sensores avanzados y un rover Ursa. Se trata de una nave ideal para la exploración espacial y terrestre.
; FORCE
item_Desc_BASL_combat_light_helmet_01_01_01=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -31 / 61 °C\nProtección contra radiación: 26000 REM\nTasa de purga de radiación: 145.8 REM/s\n\nEl diseño único con rostro descubierto hace que el casco Advocacy Interceptor sea una opción ligera y liberadora para operar en atmósfera. Cuenta con placas cuidadosamente dispuestas para proteger la cabeza de una variedad de peligros de combate y ambientales, además de una visera resistente a impactos y antirreflejo sobre los ojos. La visera es compatible con retícula de RA.
; FORCE
item_Desc_BASL_undersuit_01_01_01=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nCon un diseño engañosamente simple, el subtraje Advocacy Interceptor es completamente negro con refuerzos acolchados de protección gris en brazos y piernas. La reconocida artesanía de Basilisk hace que este traje de vuelo sea duradero y sumamente cómodo, sin dejar dudas de por qué es ampliamente utilizado por la Advocacy.
; FORCE
item_Desc_CDS_Undersuit_Armor_02_Shared=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\n\nEl FBL-8u es el primer subtraje de CDS que utiliza la nueva tecnología de tejido esférico del fabricante, la cual produce un material sorprendentemente ligero pero resistente que puede soportar los rigores de los viajes espaciales. Originalmente desarrollado para combinar perfectamente con la armadura ligera FBL-8a de CDS, sigue siendo compatible con otros conjuntos de armadura.
; FORCE
item_Desc_CDS_Undersuit_Armor_Shared=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\n\nEste completo Traje de Combate Táctico proporciona un sellado total contra el vacío, libertad total de movimiento e interactúa perfectamente con sistemas de armadura compatibles.
; FORCE
item_Desc_CDS_undersuit_01_03_01=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\n\nEste completo Traje de Combate Táctico proporciona un sellado total contra el vacío, libertad total de movimiento e interactúa perfectamente con sistemas de armadura compatibles. La edición Lifeforce fue diseñada pensando en los servicios de emergencia, con un esquema de colores blanco, rojo y gris muy visible.
; FORCE
item_Desc_COMP_WLOP_S02_Baas=Tipo de artículo: Computadora\nFabricante: WillsOp\nTamaño: 2\nGrado: C\nClase: Civil\n\nEl Baas de WillsOp te brinda un rendimiento superior para ofrecer una de las experiencias computacionales más rápidas y completas.
; FORCE
item_Desc_Slaver_Undersuit_Armor_Shared=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\n\nLa serie Stoneskin de subtrajes de combate de Kastak Arms está construida sobre el famoso sistema TCS-4 de CDS, basándose en la amplia retroalimentación de los operadores que dependen de esta tecnología en el campo. Ofreciendo una miríada de opciones para armadura y capacidades EVA, el Stoneskin está preparado para rivalizar con CDS como un subtraje resistente y fiable.
; FORCE
item_Desc_basl_combat_light_flightsuit_02_01_01=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\nCon un diseño engañosamente simple, el traje de vuelo Ace Interceptor es negro azabache con acolchado protector gris reforzado en brazos y piernas. La reconocida artesanía de Basilisk hace que este traje de vuelo sea duradero y sumamente cómodo, sin dejar dudas de por qué es ampliamente utilizado por los mejores pilotos del imperio.
; FORCE
item_Desc_basl_combat_light_helmet_02_01_01=Tipo de artículo: Casco de carreras\nReducción de daño: 5%\nRango térmico: -35 / 65 °C\nProtección contra radiación: 26000 REM\nTasa de purga de radiación: 145.8 REM/s\n\nEl diseño único de cara abierta hace que el casco Ace Interceptor sea una opción ligera y liberadora para operar en atmósfera. Presenta un revestimiento de placas estratificadas con precisión para proteger la cabeza de diversos peligros ambientales y de combate, junto con una visera resistente a impactos y antirreflejo sobre los ojos. La visera es compatible con retícula de RA.
; FORCE
item_Desc_cds_undersuit_01_crus01_01=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\n\nEste completo Traje de Combate Táctico proporciona un sellado total contra el vacío, libertad total de movimiento e interactúa perfectamente con sistemas de armadura compatibles. La Edición Crusader se hizo específicamente para los servicios de seguridad de la compañía.
; FORCE
item_Desc_cds_undersuit_armor_01_02_01=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\n\nUsando materiales fabricados con tecnología de tejido esférico, CDS ha creado un subtraje ligero y duradero diseñado para satisfacer las necesidades de los combatientes sobre el terreno. Se hizo para combinar con la armadura media GCD-Army de edición limitada, pero es compatible con una amplia variedad de otros conjuntos.
; FORCE
item_Desc_cds_undersuit_helmet_01=Tipo de artículo: Casco de vuelo\nReducción de daño: 15%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\n\nEl A23 ha sido uno de los sistemas de casco principales de CDS durante años. Construido con tecnología compuesta resistente a impactos y una placa facial laminada endurecida, el A23 es perfecto para entornos peligrosos y operaciones EVA básicas. La visera es compatible con retícula de RA.
; FORCE
item_Desc_clda_undersuit_02=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nDiseñado para la aventura pero lo suficientemente cómodo para el día a día, el subtraje Markanda se ha vuelto querido por los exploradores. Un diseño único de parches crea un subtraje flexible pero resistente, mientras que un forro interior SureSoft resistente a olores evitará que quieras quitártelo. Este subtraje en particular ha sido reparado para uso prolongado.
; FORCE
item_Desc_clda_undersuit_02_02_01=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nDiseñado para la aventura pero lo suficientemente cómodo para el día a día, el subtraje Markanda se ha vuelto querido por los exploradores. Un diseño único de parches crea un subtraje flexible pero resistente, mientras que un forro interior SureSoft resistente a olores evitará que quieras quitártelo. Esta edición presenta los colores y el logo de la ya desaparecida Pyrotechnic Amalgamated.
; FORCE
item_Desc_gys_undersuit_01=Tipo de artículo: Subtraje\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nAdéntrate con confianza en lo desconocido con el subtraje Deep-Space. Diseñado inteligentemente con varias secciones superpuestas para garantizar la integridad del traje, Gyson ha creado un subtraje asequible y a la moda que ayuda a hacer el viaje espacial más accesible para todos.
; FORCE
item_Desc_hdtc_undersuit_01_01_01=Tipo de artículo: Subtraje\nReducción de daño: 10%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +90%\nCapacidad de carga: 8.0 µSCU\n\nEl Lamont luce tan bien que no querrás llevar armadura encima. Combinando sin esfuerzo placas ligeras con tejidos sintéticos duraderos, el Lamont será tan cómodo en la cabina como estiloso en las calles. Adopta un equipo de protección personal adecuado tanto para el trabajo como para el ocio, y obtén la ventaja Hardin Tactical.
item_Desc_kap_combat_heavy_arms_02_03_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de descontaminación de radiación: 145.8 REM/s\nCapacidad de carga: 7.5 µSCU\n\nDe los maestros diseñadores de Kilgore & Poole llega la armadura pesada Monde. Integrando sin esfuerzo blindaje trilaminado con lo último en tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de confort de última generación y articulaciones flexibles especializadas.\n\nLa edición HighSec presenta un acabado en fibra de carbono con acentos rojos.
item_Desc_kap_combat_heavy_arms_02_05_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de descontaminación de radiación: 145.8 REM/s\nCapacidad de carga: 7.5 µSCU\n\nDe los maestros diseñadores de Kilgore & Poole llega la armadura pesada Monde. Integrando sin esfuerzo blindaje trilaminado con lo último en tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de confort de última generación y articulaciones flexibles especializadas.\n\nLa edición Daimyo presenta colores marrón y gris con blindaje de acero pulido.
item_Desc_kap_combat_heavy_arms_02_06_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de descontaminación de radiación: 145.8 REM/s\nCapacidad de carga: 7.5 µSCU\n\nDe los maestros diseñadores de Kilgore & Poole llega la armadura pesada Monde. Integrando sin esfuerzo blindaje trilaminado con lo último en tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de confort de última generación y articulaciones flexibles especializadas.\n\nEsta edición presenta un llamativo patrón de camuflaje digital rojo.
item_Desc_kap_combat_heavy_arms_02_07_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -77 / 107 °C\nProtección contra radiación: 26800 REM\nTasa de descontaminación de radiación: 145.8 REM/s\nCapacidad de carga: 7.5 µSCU\n\nDe los maestros diseñadores de Kilgore & Poole llega la armadura pesada Monde. Integrando sin esfuerzo blindaje trilaminado con lo último en tecnología defensiva, esta armadura proporciona protección lista para el combate con un sistema de confort de última generación y articulaciones flexibles especializadas.\n\nEsta edición presenta un patrón de camuflaje marrón, gris y tostado con acentos de latón.
