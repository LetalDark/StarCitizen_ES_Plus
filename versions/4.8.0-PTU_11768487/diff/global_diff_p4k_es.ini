vehicle_descMISC_Starlancer_MAX=Fabricante: MISC\nEnfoque: Carga media\n \nPara quienes buscan expandir sus operaciones de transporte, los ingenieros de MISC han mejorado la Starlancer MAX con un compartimento de carga extra espacioso, listo para transportar mercancías y vehículos. Combinado con cómodas instalaciones para viajes largos y un paquete defensivo completo para cuando te desvías de la ruta principal, es fácil ver por qué la Starlancer MAX es la nave de carga preferida por pilotos industriosos en todo el 'verso.
; FORCE
vehicle_descMISC_Starlancer_TAC=Fabricante: MISC\nEnfoque: Cañonera\n \nPara quienes buscan una nave versátil que pueda valerse por sí sola en combate, los ingenieros han mejorado la Starlancer TAC con un paquete ofensivo agresivo, lista para enfrentarse a los enemigos más feroces. Cuando aceptas un trabajo de alto riesgo y alta recompensa, la Starlancer TAC está ahí para asegurarse de que tú y tu tripulación puedan completarlo hasta el final.
