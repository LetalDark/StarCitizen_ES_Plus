item_Desc_mrai_flightsuit_01_04_01=Tipo de artículo: Traje de vuelo\nReducción de daño: 5%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\nTolerancia a fuerza G: +100%\nCapacidad de carga: 8.0 µSCU\n\n\nUn audaz amarillo neón y un vivo azul se combinan para hacer que el traje de vuelo oficial de la Murray Cup destaque entre la multitud. Diseñado con los mismos estándares que los trajes de vuelo que llevan los corredores profesionales, también presenta los logos de los patrocinadores oficiales de la carrera Murray Cup.
