item_Desc_srvl_undersuit_helmet_01=Tipo de artículo: Casco de vuelo\nReducción de daño: 15%\nRango térmico: -30 / 60 °C\nProtección contra radiación: 15200 REM\nTasa de purga de radiación: 81 REM/s\n\nQue un casco esté roto no significa que sea inútil. Este casco de subtraje recuperado debería ofrecer protección adecuada contra el vacío. Si te gusta arriesgar, arriesga con este. ¿Por qué no?
