PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_001,P=Uh oh. Something doesn't feel right here… Look out!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_002,P=That's weird. I don't see a ship… careful! It's a trap.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_003,P=Hey! It's a set up! Watch out!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_001,P=Alrighty, looks like you just arrived, so I'm gonna patch you into the client.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_002,P=Great, you made it. I'll patch the client into you now.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_003,P=Okay, now that you're onsite I'll get you patched in with the client…
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_001,P=Hey, heads up! You got trouble coming your way. Look sharp.
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_002,P=Hey. Get ready. You got some hostiles that'll be there any moment. 
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_003,P=Bad news. Picked up some hostiles heading right for you.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_001,P=Hey there, it's DD. Thanks for hopping on this refueling contract. Don't know about you, but the thought of being stranded without fuel scares the hell outta me. Well, thankfully they got you to rescue them.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_002,P=Hiya, DD here. Let's see what you got cooking today… Alright, a refueling job. What would we do without folks forgetting to top off, huh? Anyway, I'll leave you to it.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_003,P=Heyo, it's DD again. Looks like we got you booked for a refueling job. Good luck and be safe out there.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_001,P=Oh my. That poor soul... And I'm afraid there's more bad news. Without a ship to refuel, I have to cancel the contract. Next one will have a happier ending I hope. Be safe, you hear?
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_002,P=I can't believe the client didn't make it. At least you're still with us, huh? Silver linings and all that. Unfortunately, I am going to have cancel the contract. Better luck next time.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_003,P=While I love this job, some days sure are tougher than others. Not only is the client gone, but I have to cancel the contract too. Well, tomorrow's another day, right? Talk soon.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_001,P=Whew! I am pleased you made it out of that mess. And don't worry about the contract. I arranged for Wayfarer's to give you some credits anyway. I mean, it wasn't your fault the service request ended up being bait. 
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_002,P=Thank heavens you're alright. Now, normally no client means no pay, but I was able to swing some compensation for your trouble. Hopefully that makes your day a little brighter. Be safe out there, okay.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_003,P=Can't believe you're okay. That was pretty scary, but I was able to get you some hazard pay for all your trouble. That way we can get you back out there as soon as possible, alright? Let's talk soon.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_001,P=Hey there, I'm gonna be your refueler for today. Go ahead and request to dock so we can started.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_002,P=Low on gas, huh? Happens to the best of us. Well, request to dock and we can see about getting you back out on the move.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_003,P=How's it going? Got some fuel here with your name on it. Just need yo to request to dock and we can get you out of here.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_001,P=Okay, glad that's over. Let's finish up the refueling while we can.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_002,P=I think we're good. Connect the ships before more show up.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_003,P=That all of them? Good. Let's get you fueled up.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_001,P=All right, you should be all set. Hope you have a good rest of your day.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_002,P=Tank's full. Stay safe out there.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_003,P=We are all good now. Tank's full and space awaits. Take it easy.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_001,P=Okay, we're all connected. Once you confirm the fuel purchase from you mobi I can start the transfer.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_002,P=Alright… link established. You should be able to see the fuel purchase order in your mobi now. Once you confirm I can start filling your tanks.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_003,P=And there we go. Linked up. Now we just need you to sign off on the fuel purchase in your mobiGlas.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_001,P=You know what, I got other clients waiting. We're done here.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_002,P=Okay, I think I know where this is headed. I'm out of here.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_003,P=I don't have time for this. Good luck.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_001,P=Okay, transferring fuel now.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_002,P=Great, starting fuel transfer.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_003,P=Looks good. Fuel's a-flowing.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_001,P=Woah! The transfer wasn't done yet.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_002,P=Why'd you break? You aren't refueled.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_003,P=Lost the connection. What happened?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Where do you think you're going? What about the rest of the fuel?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=What's going on? Your ship's not full yet.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Uh… hello? We haven't finished the refueling.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Damn it, we got trouble.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Look out. Got some hostiles.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Watch it. They don't look like they're here to help.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=Hey! I'm trying to help you!
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=What the hell are you doing?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=Oh hell no. I'm out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Well, that was absolutely terrifying. Okay, let's hurry up and get the fuel transfer done.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=Is that all of them? Alright, how about we finish this and get the hell out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Thank you. This system's getting more dangerous by the day. Let's finish this before more show up.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_001,P=That's it. Ready to go. Thanks again and sorry for the trouble.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_002,P=Okay. Fuel transfer's done. Thanks for the rescue. I hope it wasn't too much bother for you.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_003,P=Phew. All refueled. Thanks so much for the help. I'm going to try to be a bit better about watching my gauges next time.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=Great. We're docked up. Go ahead and authorize the fuel transaction.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Docking complete. Just need you to confirm the fuel transaction.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=That should do it. Set the fuel transaction terms, and I'll take a look.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Hold up. I lost connection.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Hey, I still need more fuel.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Wait, the fuel transfer wasn't done yet.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Hey, thanks for showing up. I feel like an idiot for running out of fuel. If you want to dock up quick, we can get this over with.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=Hey, over here. I'm really sorry about this. I could've sworn I calculated the distance right… Anyway, let's get docked up so you can get on your way.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Hi. Sorry, this is really embarassing. I had a bunch of things I needed to pick up from the last transfer station and I guess I forgot to get fuel. Such a rookie mistake. Anyway, sorry, if we can get docked, I can get you out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=All right, come back soon. I'll be here waiting.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=No worries, take care of whatever you have to. I'll be here when you're ready.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Oh, you're leaving… yeah, sure, that's fine. I can wait.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Okay, let's get reconnected so we can get out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Welcome back. Let's dock and finish the refuel.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=Glad you made it. I'm ready to dock when you are.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=That's great. Seeing the fuel transfer now.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=That price's a bit higher than I was expecting.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Holy shit! Who the hell is that?!
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Got company… got bad company…
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Help! I'm under attack.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=Hey! What gives?
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Why did you do that?!
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell's the matter with you?
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Thank the powers. Gotta admit it got tense there for a moment. Now that's done, let's finish up.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=That was close. Let's finish refueling so I can get gone.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Glad that's over. Hopefully we can finish up without any more issues.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_001,P=Alright. Looks like we're done. I'm out of here.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_002,P=Okay. I'm refueled. Thanks. And sorry if I was a bit short with you. Just one of those days. Safe flying.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_003,P=There. Tank's full. Thought I would never get out of here. Okay. I'm off.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=We're connected. Get the pricing set so we can get going.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Docked. Go ahead and send the pricing over.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Connection confirmed. Set the transaction terms so we can get started.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Hey, I wasn't done refueling yet.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_002,P=What's going on? We're not done refueling.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Something wrong? I still need more fuel.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Good, you're here. Go ahead and dock so we can get this show on the road.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=About time. Was about to lose my mind if I had to float any longer. Get docked so I can get out of here.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Glad someone showed up. Why don't you hurry up and dock. No reason this has to take any longer than it needs to.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Okay… Guess I'm supposed to just wait here then?
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=Hurry up and come back, okay? I don't want to spend all day waiting on you.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Sure... Leave me waiting here. It's not like I have anything better to do.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=How about you dock so we can finish this. Or are you going to waste more of my time?
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=There you are. Dock already and we can wrap this up.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=And my savior returns. How about you dock so I can get going.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Filling up my tank now. Should be done soon.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=That's more than I can pay.
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Damn it. What else can go wrong today!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Crap! Get them off me!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=You gotta be kidding me. First the fuel, and now this?
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=What the hell are you doing?!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Have you lost your mind?
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell was that for?
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Seems we're safe for now. Better finish refueling.
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=I think that was the last of 'em. Let's finish sorting my fuel while we can.
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=All clear. Hopefully we can finish refueling before any more trouble shows up.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_001,P=And there we go. Topped off and ready to fly. Thanks for all your hard work.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_002,P=Done. Thanks for the refuel. Fly safe out there.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_003,P=Great. All fueled up. Though here's hoping I won't need your services again for a while.
PU_RefuelNPC03_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=All right. Connected. Not too bad. Just need you to approve the fuel transaction.
PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=There we go. All hooked up. I'm ready to look at the fuel transaction terms as soon as you send 'em my way.
PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Looks like we're set. Go ahead and confirm the fuel transaction.
PU_RefuelNPC03_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Uh… you know we're not done yet, right?
PU_RefuelNPC03_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Hold on there. I'm still not refueled yet.
PU_RefuelNPC03_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Whoa, what's happening? I still need more fuel.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Ah, perfect. You're here. Appreciate the help. Can't believe I ran out. Anyway, I'm ready to dock when you are.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=Great, thanks for coming. I'm all set to dock so we can start whenever you want. I actually used to fly a tanker myself so I know what it's like. Makes it that much more embarassing that my fuel dried up. Anyway, I'll leave you to it.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Hey, you made it. Thanks for coming. Where would the 'verse be without refuelers like you, huh? I've got everything set up so we can start the transfer once you're docked.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Okay, if you got something urgent, I can just hold tight until you get back with the rest of the fuel.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=Oh, you're ducking out for a minute? No worries. I'll hang out here. Just hurry back, okay?
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=We taking a little break? Just don't take too long, all right. Would be good to get back flying soon.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Welcome back. I'm still ready to dock.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Nice to see you again. Let's get docked and refueled.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=Glad you made it back. Shall we go ahead and get this refueling sorted once and for all?
PU_RefuelNPC03_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Okay, fuel transferring now.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=You better be joking with that price. Try again.
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Oh, shit. I'm taking fire!
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Damn it. Could they have picked a worse time?
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Can you believe these assholes?
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=What the hell's gotten into you?
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Hey, you're supposed to help me, not shoot me.
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What was that for?
PU_RefuelNPC04_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Geez. That was too close. Finish refueling before any more trouble shows up.
PU_RefuelNPC04_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=Was that all of them? Let's finish refueling so I can get the hell out of here.
PU_RefuelNPC04_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Good riddance. Now hurry up and finishing refueling me.
PU_RefuelNPC04_CIV_M_ATC_RefuelingComplete_GP_001,P=There. All done. And no, you won't be getting a tip.
PU_RefuelNPC04_CIV_M_ATC_RefuelingComplete_GP_002,P=That's it. Got my fuel. Bye.
PU_RefuelNPC04_CIV_M_ATC_RefuelingComplete_GP_003,P=Good. We're finally finished. I'm out of here.
PU_RefuelNPC04_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC04_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=Docked. Set the transaction to what we agreed.
PU_RefuelNPC04_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Okay. We’re docked. Just set the transaction price to what was agreed.
PU_RefuelNPC04_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Everything's connected. Set the price to what I specified. No funny stuff.
PU_RefuelNPC04_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Where the hell are you going with my fuel?
PU_RefuelNPC04_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Hey, we're not done here.
PU_RefuelNPC04_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Uh, if you hadn't noticed, you didn't finish refueling me.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=You must be my refueler. And before you ask, no, I don't want any extra services. Just the refuel. Now go ahead and dock.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=I was wondering when my tanker was going to show up. Anyway, what are you waiting for? Go ahead and dock.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Let's just skip the pleasantries, okay? You're here to do a job, so go ahead and dock.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=You're leaving? I guess I don't have anything better to do with my time than wait around here for you to come back.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=I can't believe you're leaving without finishing. Fine. Whatever. Just get back as soon as possible.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Wow. How professional. Guess I'm expected to just sit here waiting for you to feel like coming back? Sure. Why not.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Finally. Dock so we can get this over with.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Look who decided to come back? Dock already and finish refueling me.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=About time. You know, I should really get a discount after sitting here waiting. Whatever, go ahead and dock. I'm late enough as it is.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Okay, fuel's transferring. And don't bother with small talk.
PU_RefuelNPC04_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=I'm not paying that.
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Damn it! I can't afford extra repairs right now!
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=What the hell are they shooting me for?
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Oh, hell no! Get them off me!
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=Watch what you're shooting!
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Hey! That how you treat a customer?
PU_RefuelNPC04_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell? You're shooting at me?!
