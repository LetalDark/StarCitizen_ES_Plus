; Foxwell_DefendEntitesAndEscort_* — Foxwell Enforcement defend+escort contracts (DCB, no upstream). Variantes E/M/H/S/VH
Foxwell_DefendEntitesAndEscort_E_Title=Yellow Level Contract: Defend and Escort ~mission(Objects)
Foxwell_DefendEntitesAndEscort_E_Desc=Got a pilot free in the area? We need protection and escort services at <EM4>~mission(Location|Address)</EM4> for a client. A small-time outlaw crew has been targeting their <EM4>~mission(Objects)</EM4>, and we need someone to keep them safe while moving them to safety. Take out anyone hostile in the area.\n\nFrom what we've gathered, these punks are small-time but they can sting if you're not careful. Handle it the Foxwell way and we'll offer <EM4>~mission(ScripAmount) MG Scrip</EM4> to the prime contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, your way'\n\nFoxwell Enforcement is a security specialist authorized to operate across the UEE. We're always looking for new operators to join our family. If you or someone you know is interested, get in touch with one of our contract representatives.
Foxwell_DefendEntitesAndEscort_M_Title=Orange Level Contract: Defend and Escort ~mission(Objects)
Foxwell_DefendEntitesAndEscort_M_Desc=Hoping you can provide protection and escort services at <EM4>~mission(Location|Address)</EM4>. One of our high-priority clients is having serious trouble with an outlaw crew targeting their ~mission(Objects), and they need to be moved and kept as safe and intact as possible. The client expects the service they're paying for, so don't drop the ball or we could lose a loyal client.\n\nWe're still a bit in the dark about these outlaws, but if you handle it the Foxwell way, we'll offer <EM4>~mission(ScripAmount) MG Scrip</EM4> to the prime contractor.\n\nGood luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, your way'\n\nFoxwell Enforcement is a security specialist authorized to operate across the UEE. We're always looking for new operators to join our family. If you or someone you know is interested, get in touch with one of our contract representatives.
Foxwell_DefendEntitesAndEscort_H_Title=Red Level Contract: Defend and Escort ~mission(Objects)
Foxwell_DefendEntitesAndEscort_H_Desc=One of our high-priority clients is under attack by a criminal crew targeting their <EM4>~mission(Objects)</EM4> at <EM4>~mission(Location|Address)</EM4>, and they need to be escorted to safety. The client's assets are valuable, so we need to keep them safe at all costs, but I'm not going to lie to you: it's going to be one hell of a challenge with these thugs determined to cause serious damage.\n\nIf I were you, I wouldn't hesitate to <EM4>bring backup</EM4> to deal with them. They're no joke, so we're offering a well-deserved <EM4>~mission(ScripAmount) MG Scrip</EM4> to the prime contractor who handles these guys successfully.\n\nVery good luck,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, your way'\n\nFoxwell Enforcement is a security specialist authorized to operate across the UEE. We're always looking for new operators to join our family. If you or someone you know is interested, get in touch with one of our contract representatives.
Foxwell_DefendEntitesAndEscort_S_Title=Purple Level Contract: Defend and Escort ~mission(Objects)
Foxwell_DefendEntitesAndEscort_S_Desc=We've got a special-tier contract for the right operator. A client of the highest priority requires defense and escort of their <EM4>~mission(Objects)</EM4> at <EM4>~mission(Location|Address)</EM4>. The threat level is significantly higher than usual: organized assets, advanced loadouts and the determination to finish the job they started. Don't underestimate them.\n\nThis kind of work is not for everyone, but if you've earned the reputation, you'll know that we offer top compensation: <EM4>~mission(ScripAmount) MG Scrip</EM4> to the prime contractor. Bring backup, bring a plan, and bring them home.\n\nStay alert,\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, your way'\n\nFoxwell Enforcement is a security specialist authorized to operate across the UEE. We're always looking for new operators to join our family. If you or someone you know is interested, get in touch with one of our contract representatives.
Foxwell_DefendEntitesAndEscort_VH_Title=Black Level Contract: Defend and Escort ~mission(Objects)
Foxwell_DefendEntitesAndEscort_VH_Desc=Black Level. Read those words carefully — they mean exactly what you think.\n\nWe have a VIP client whose <EM4>~mission(Objects)</EM4> need defending and escorting from <EM4>~mission(Location|Address)</EM4>. The hostile force you'll face is not just organized but funded, equipped to military standards and out for blood. The vast majority of operators we approach turn this kind of work down. We don't blame them.\n\nIf you accept, we offer <EM4>~mission(ScripAmount) MG Scrip</EM4> to the prime contractor — well above market rate. No questions about your loadout, no questions about how you finish the job. Just bring our client and their assets home in one piece.\n\nStay sharp. Stay alive.\n\nKevin Walton\nDispatcher, Foxwell Enforcement\n'Security, your way'\n\nFoxwell Enforcement is a security specialist authorized to operate across the UEE. We're always looking for new operators to join our family. If you or someone you know is interested, get in touch with one of our contract representatives.
