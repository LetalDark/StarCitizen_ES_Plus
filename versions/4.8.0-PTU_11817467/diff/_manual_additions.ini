; ===================================================================
; CIG MISSING STRINGS - manual override patch
;
; These keys are referenced by the engine UI but CIG forgot to add
; them to global_p4k_en.ini. Without this patch the keybindings menu
; shows literal @ui_v_set_refuel_mode / @ui_CIRefuelMode.
;
; Tracked in cig_bugs.json (bug_type: missing_key_patched_by_us).
; Run check_cig_bugs.py on each new version: if any of these keys
; appear in p4k_en upstream, retire the override (this file + diff_es).
;
; Patched: 2026-05-11 | Version: 4.8.0-PTU_11812390
; ===================================================================
; --- Refuel operator mode (missing peer of mining/missile/salvage/scanning) ---
ui_CIRefuelMode=Toggle Refuel Operator Mode
ui_v_set_refuel_mode=Set Refuel Operator Mode
; --- EliminateAllFF mission contracts (DCB references new keys not in p4k_en) ---
; HH_Pyro_EliminateAll_FrontierFighters — Headhunters paying for FF cleanup in Pyro
Headhunters_EliminateAllFF_Title_001=Send a Message to the Frontier Fighters
Headhunters_EliminateAllFF_Desc_001=The Frontier Fighters have been pushing into our territory at <EM4>~mission(Location|Address)</EM4>. We need their crew shut down before they get any ideas. Head over there and take out everyone you find. No survivors.
; FoxwellEnforcement_EliminateAll_FrontierFighters — CFP/Foxwell paying for FF cleanup in Stanton
cfp_EliminateAllFF_Title_001=Yellow Level Contract: Clear Frontier Fighters
cfp_EliminateAllFF_Desc_001=Frontier Fighters have set up at <EM4>~mission(Location|Address)</EM4> and are interfering with our operations. We need someone to go in and clear them out. Standard payment terms.
; --- DCB-referenced contracts/items absent from p4k_en (4.8.0-PTU_11812390) ---
