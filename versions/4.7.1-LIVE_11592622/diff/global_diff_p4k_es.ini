Journal_General_Mining_Compendium_Content=Para fomentar el espíritu emprendedor del minero moderno, United Resource Workers ha elaborado una práctica guía que enumera las ubicaciones más comunes donde encontrar minerales, menas y gemas a lo largo del ‘verse.\n\nAgricium - ARC-L3, Cellin, CRU-L5, Daymar, MIC-L4, cúmulos de asteroides de Pyro, Terminus, Vuur, Yela\n\nAluminio - Aaron Halo, Aberdeen, ARC-L1, ARC-L2, Arial, CRU-L3, Glaciem Ring, HUR-L1, HUR-L2, HUR-L4, HUR-L5, Ita, cinturón Keeger, Magda, MIC-L1, MIC-L2, MIC-L5, cúmulos de asteroides de Pyro\n\nAphorite - Todas las lunas/planetas/cuevas\n\nAslarite - Aaron Halo, ARC-L5, CRU-L4, Fuego, Ita, Magda, MIC-L4, cúmulos de asteroides de Pyro, Vuur\n\nBeradon - Bloom, Pyro I\n\nBeryl - Aaron Halo, ARC-L3, CRU-L5, MIC-L4, cúmulos de asteroides de Pyro, Wala\n\nBexalite - CRU-L1, CRU-L2, Fairo, Fuego, Glaciem Ring, HUR-L3, cinturón Keeger, cúmulos de asteroides de Pyro, Vuur\n\nBorase - Adir, Bloom, Fuego, HUR-L1, HUR-L4, HUR-L5, cúmulos de asteroides de Pyro, Pyro IV\n\nCaranite - Aberdeen, Daymar\n\nCobre - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Clio, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Euterpe, Lyria, MIC-L3, MIC-L4, cúmulos de asteroides de Pyro, Pyro I, Pyro IV, Terminus, Wala, anillo de Yela\n\nCorundum - Aberdeen, ARC-L1, ARC-L2, ARC-L4, Arial, CRU-L3, Hurston, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, MIC-L2, MIC-L5, cúmulos de asteroides de Pyro\n\nCuarzo - Bloom, Cellin, Daymar, cúmulos de asteroides de Pyro, Yela\n\nDolivine - Todas las lunas/planetas/cuevas\n\nEstaño - Arial, Hurston, Ignis, Ita, Monox, cúmulos de asteroides de Pyro, Pyro I\n\nFeynmaline - Pyro IV\n\nGlacosite - Monox\n\nHadanite - Todas las lunas/planetas/cuevas\n\nHephaestanite - Arial, ARC-L1, ARC-L2, ARC-L4, Calliope, CRU-L3, Fuego, HUR-L1, HUR-L2, HUR-L4, HUR-L5, MIC-L1, microTech, MIC-L2, MIC-L5, Monox, cúmulos de asteroides de Pyro, Vuur\n\nHielo - Aaron Halo, Akiro Cluster, ARC-L3, ARC-L5, Calliope, Clio, Euterpe, Glaciem Ring, HUR-L3, cinturón Keeger, microTech, MIC-L3, MIC-L4, cúmulos de asteroides de Pyro, anillo de Yela\n\nHierro - Aaron Halo, Adir, Akiro Cluster, ARC-L3, ARC-L5, Bloom, Calliope, CRU-L1, CRU-L2, CRU-L4, CRU-L5, Fairo, Fuego, Glaciem Ring, HUR-L3, cinturón Keeger, Lyria, Magda, microTech, MIC-L3, MIC-L4, Monox, cúmulos de asteroides de Pyro, Pyro I, Pyro IV, Vatra, Vuur, Wala, anillo de Yela\n\nJanalite - Daymar, Hurston, Ita, cuevas de arena de Magda, Wala\n\nLaranite - HUR-L1, HUR-L4, HUR-L5, Lyria, Pyro IV, Wala\n\nLindinium - Glaciem Ring, cinturón Keeger\n\nOro - ARC-L5, CRU-L4, Fairo, Ignis, MIC-L3, cúmulos de asteroides de Pyro, Terminus, Vatra\n\nOuratite - Aberdeen, Arial, Hurston, anillo de Yela\n\nQuantainium - Se encuentra en todos los depósitos de Stanton (Raro)\n\nRiccite - Adir, Akiro Cluster, Bloom, Ignis, cúmulos de asteroides de Pyro, Terminus, Vatra\n\nSadaryx - estaciones QV Breaker (Nyx)\n\nSavrilium - Glaciem Ring, cinturón Keeger, estaciones QV Breaker (Nyx)\n\nSilicio - Aaron Halo, Akiro Cluster, Cellin, Daymar, Fairo, Ignis, cúmulos de asteroides de Pyro, Vatra, Yela\n\nStileron - Todos los planetas de Pyro, Akiro Cluster, cúmulos de asteroides de Pyro\n\nTaranite - ARC-L1, ARC-L2, ARC-L4, Cellin, Clio, Euterpe, HUR-L2, cúmulos de asteroides de Pyro, Yela\n\nTitanio - Aaron Halo, Aberdeen, CRU-L1, CRU-L2, HUR-L3, Magda, cúmulos de asteroides de Pyro, Terminus, anillo de Yela\n\nTorite - Akiro Cluster, CRU-L3, Glaciem Ring, cinturón Keeger, MIC-L1, MIC-L2, MIC-L5, cúmulos de asteroides de Pyro, estaciones QV Breaker (Nyx)\n\nTungsteno - Adir, ARC-L1, ARC-L2, ARC-L4, Fairo, HUR-L2, cúmulos de asteroides de Pyro
Kaboos_Intro_Description=ESPECIFICACIONES DE MISIÓN\n\nÁrea de operación: Sistema Nyx\nFuerzas hostiles: Desconocidas\nEspecificaciones de equipo: Nave de combate, Armas personales\nBriefing: InterSec ha sido contratada por la UEE para recopilar información sobre un grupo de <EM4>contrabandistas que trafican con piezas Vanduul</EM4>, vinculados a los experimentos ilegales con Vanduul que se llevan a cabo en las instalaciones Onyx de ASD. La UEE está ansiosa por comprender y poner fin a sus operaciones.\n\nBasándonos en las pruebas extraídas de las instalaciones de ASD, hemos logrado rastrear la posible ubicación de uno de sus almacenes.\n\nUna vez aceptada la misión, dirígete a la antigua <EM4>estación logística de QV Planet Services</EM4> y nos pondremos en contacto.\n\n\nAtentamente,\n\nDeacon Tobin\nDirector de Operaciones\nInterSec Defense Solutions\n\nEsta comunicación contiene información confidencial destinada únicamente al destinatario. Si la ha recibido por error, ignórela y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben cumplir con las leyes de la UEE y del sistema cuando corresponda.
Kaboos_Mission_Description=ESPECIFICACIONES DE MISIÓN\n\nÁrea de operación: Sistema Nyx\nFuerzas hostiles: Forajidos presentes y armados\nEspecificaciones de equipo: Nave de combate, Armas personales\nBriefing: InterSec necesita tus servicios una vez más.\n\nLa información que recopilaste anteriormente ha sido invaluable para identificar a varios compradores destacados de piezas Vanduul obtenidas ilegalmente. Sin embargo, desde entonces los Shattered Blade han continuado sus operaciones y la UEE solicita que <EM4>actualicemos nuestra información.</EM4>\n\nCreemos que se puede recuperar más información de las instalaciones de almacenamiento ubicadas en la antigua <EM4>estación logística QV.</EM4>\n\nLos parámetros de la operación no han cambiado desde tu última misión: encuentra los <EM4>datos encriptados</EM4> y usa la <EM4>clave de descifrado</EM4> para descifrarlos y subirnos la lista. Los Shattered Blade habrán reforzado la zona desde la última vez, así que espera resistencia.\n\nBuena suerte. Estaremos en contacto.\n\n\nAtentamente,\n\nDeacon Tobin\nDirector de Operaciones\nInterSec Defense Solutions\n\nEsta comunicación contiene información confidencial destinada únicamente al destinatario. Si la ha recibido por error, ignórela y notifique al remitente. Todas las operaciones se realizan bajo el riesgo personal del contratista y deben cumplir con las leyes de la UEE y del sistema cuando corresponda.
PU_ADVREP01_F_DEH_Enter_Shuttle_NFZActive_Siege_BossDead_RepeatOccur_IG_003_HeresAQuick=Here's a quick brief. The Nine Tails Commander and Lieutenants have been dealt with. We're just searching the barge for that inverter to restore command of the Restricted Airspace to Crusader. Any questions, check your mobiGlas for a full breakdown.
